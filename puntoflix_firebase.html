// ── ALTERNAR CUENTA COMPLETA (rápido sin editar suscripción) ──
async function toggleCuentaCompleta(cId,sId){
  const c=S.clients.find(x=>x.id===cId);if(!c)return;
  const s=(c.subs||[]).find(x=>x.id===sId);if(!s)return;
  if(!s.cuentaCompleta){
    if(!s.masterAccountId){toast('❌ Primero vincula esta suscripción a una cuenta maestra','R');return}
    const otrosClientes=[];
    S.clients.forEach(otherC=>{(otherC.subs||[]).forEach(otherS=>{if(otherS.masterAccountId===s.masterAccountId&&otherS.id!==s.id)otrosClientes.push({clientName:otherC.name,sub:otherS});});});
    if(otrosClientes.length>0){
      const nombres=otrosClientes.map(o=>'• '+o.clientName).join('\n');
      if(!confirm('⚠️ Esta cuenta tiene '+otrosClientes.length+' cliente(s) más usándola:\n\n'+nombres+'\n\n¿Continuar igual? Marcará la cuenta como completa.'))return;
    }
    s.cuentaCompleta=true;
    renderCont();sv();toast('🟣 Marcada como CUENTA COMPLETA','G');
  }else{
    s.cuentaCompleta=false;
    renderCont();sv();toast('🟢 Cambiada a modo compartido','B');
  }
}

// Copiar la contraseña
async function copiarClave(cId,sId){
  const c=S.clients.find(x=>x.id===cId);
  const s=c?.subs?.find(x=>x.id===sId);
  if(!s||!s.password){toast('❌ Sin contraseña','R');return}
  try{await navigator.clipboard.writeText(s.password);toast('🔑 Contraseña copiada · pégala en la plataforma','G');}catch(e){toast('Error al copiar','R')}
}
// ── TRANSFERIR SUSCRIPCIÓN A OTRA CUENTA MAESTRA ─────────────
// Mover el perfil de un cliente a otra cuenta: libera la actual y ocupa la nueva (los perfiles se cuentan por masterAccountId)
function transferirCuenta(cId,sId){
  const c=S.clients.find(x=>x.id===cId);
  const s=c&&(c.subs||[]).find(x=>x.id===sId);
  if(!c||!s){toast('No se encontró la suscripción','R');return}
  const actual=s.masterAccountId;const esCompleta=!!s.cuentaCompleta;
  let cand=S.cuentas.filter(ca=>ca.id!==actual&&platGroup(ca.platform)===platGroup(s.platform));
  if(esCompleta)cand=cand.filter(ca=>profInUse(ca.id)===0);
  else cand=cand.filter(ca=>!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0);
  cand.sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  // Cuentas LLENAS (mismo grupo de plataforma) que tienen morosos (vencidos) → se puede liberar un cupo
  // sacando a un vencido. Solo para el caso normal (una sub "cuenta completa" exige destino vacío, no swap).
  // Moroso = vencido ('ven') O "vence hoy / por vencer" ('exp') — un cliente que vence HOY es 'exp', no 'ven'
  // (gst: df<0→'ven', df<=reminderDays→'exp'). Antes solo contaba 'ven' y por eso la sección no salía cuando
  // los morosos vencían hoy (pedido del dueño: "toma en cuenta a morosos que vencen hoy").
  const _nMor=id=>_ocupantesSub(id).filter(o=>['ven','exp'].includes(gst(o.s.endDate))).length;
  // Se muestran TODAS las cuentas llenas del mismo grupo de plataforma (así la opción nunca "desaparece"),
  // ordenadas por más morosos primero. El selector de a-quién-sacar marca vencido/hoy vs al día.
  const llenas=esCompleta?[]:S.cuentas.filter(ca=>ca.id!==actual&&platGroup(ca.platform)===platGroup(s.platform)&&!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)===0).sort((a,b)=>_nMor(b.id)-_nMor(a.id));
  if(document.getElementById('transferMod'))return;
  const caActual=S.cuentas.find(x=>x.id===actual);
  const mod=document.createElement('div');mod.id='transferMod';mod.className='ov';
  mod.onclick=e=>{if(e.target===mod)mod.remove()};
  mod.innerHTML=`<div class="mod" style="max-width:460px" onclick="event.stopPropagation()">
    <div class="mh"><h3>🔄 Transferir a otra cuenta</h3><button class="ib" onclick="document.getElementById('transferMod').remove()">✕</button></div>
    <div class="mb">
      <div style="background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:700">${c.name||'—'}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">${pi(s.platform)} ${s.platform}${s.profile?' · Perfil '+s.profile:''}${esCompleta?' · 🟣 Cuenta completa':''}</div>
        <div style="font-size:11px;color:var(--text2)">Cuenta actual: <b>${caActual?caActual.email||caActual.platform:'sin asignar'}</b></div>
      </div>
      ${cand.length?`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">Elige la cuenta destino. Se copiarán correo y clave, se conserva su perfil (se ajusta solo si choca con otro) y la cuenta actual recupera el cupo.</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${cand.map(ca=>{const avail=profDisponibles(ca.id);const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:10px">
          <span style="font-size:16px;flex-shrink:0">${pi(ca.platform)}</span>
          <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ca.email||'—'}</div><div style="font-size:10px;color:var(--green);font-weight:700">🟢 ${esCompleta?'cuenta vacía':avail+' de '+limit+' libres'}</div>${_destinoInfo(ca)}</div>
          <button class="btn bp" style="border-radius:8px;font-size:11px;flex-shrink:0;padding:6px 12px" onclick="ejecutarTransferencia('${c.id}','${s.id}','${ca.id}')">Transferir aquí</button>
        </div>`;}).join('')}
      </div>`:''}
      ${llenas.length?`<div style="margin-top:${cand.length?'14px':'0'}">
        <div style="font-size:12px;font-weight:800;color:var(--text)">🔓 ¿No hay cupo? Libera un lugar</div>
        <div style="font-size:11px;color:var(--text2);margin:3px 0 8px">Estas cuentas de ${s.platform} están llenas. Saca a alguien (de preferencia un <b style="color:var(--red)">vencido</b> o que <b style="color:var(--red)">vence hoy</b>) y mete aquí a <b>${c.name||'tu cliente'}</b>.</div>
        <div style="display:flex;flex-direction:column;gap:7px">
        ${llenas.map(ca=>{const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);const nmor=_nMor(ca.id);return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf2);border:1px solid rgba(239,68,68,.28);border-radius:10px">
          <span style="font-size:16px;flex-shrink:0">${pi(ca.platform)}</span>
          <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ca.email||'—'}</div><div style="font-size:10px;color:var(--red);font-weight:700">🔴 LLENA (${limit}/${limit})${nmor?' · '+nmor+' por cobrar':''}</div>${_destinoInfo(ca)}</div>
          <button class="btn bs" style="border-radius:8px;font-size:11px;flex-shrink:0;padding:6px 12px;color:var(--red);border-color:rgba(239,68,68,.4)" onclick="liberarCupoModal('${c.id}','${s.id}','${ca.id}')">Liberar cupo →</button>
        </div>`;}).join('')}
        </div>
      </div>`:''}
      ${(!cand.length&&!llenas.length)?`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:12px;font-size:12px;color:var(--yellow)">⚠️ No hay otra cuenta de ${s.platform} ${esCompleta?'totalmente vacía':'con cupo libre'} para transferir. Crea una cuenta nueva o libera espacio primero.</div>`:''}
    </div>
    <div class="mf"><button class="btn bs" onclick="document.getElementById('transferMod').remove()">Cerrar</button></div>
  </div>`;
  document.body.appendChild(mod);
}
// Info extra de la cuenta candidata en los modales de transferencia (individual y masiva):
// cuándo renueva/vence la cuenta destino y qué clientes ya están en ella.
function _destinoInfo(ca){
  const ocs=ocupantesDeCuenta(ca.id);
  const quienes=ocs.length?ocs.slice(0,3).map(o=>(o.nombre||'—').split(' ')[0]+(o.perfil?' ('+o.perfil+')':'')).join(', ')+(ocs.length>3?' +'+(ocs.length-3)+' más':''):'sin clientes aún';
  return `<div style="font-size:10px;color:var(--text2);margin-top:3px">🗓 Renueva: <b>${fd(ca.renewalDate)}</b>${ca.renewalDate?' · '+dLbl(ca.renewalDate):''}</div>
  <div style="font-size:10px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${ocs.map(o=>o.nombre).join(', ')}">👥 ${quienes}</div>`;
}
// Paso 2 del "liberar cupo": elegir a QUIÉN sacar de la cuenta destino llena para hacerle espacio al que
// paga. Lista los ocupantes (más vencido primero, marcados 🔴); al elegir uno → _swapEjecutar.
function liberarCupoModal(cId,sId,destCaId){
  const c=S.clients.find(x=>x.id===cId);const s=c&&(c.subs||[]).find(x=>x.id===sId);
  const dest=S.cuentas.find(x=>x.id===destCaId);
  if(!c||!s||!dest){toast('No se encontró la cuenta','R');return}
  const ocs=_ocupantesSub(destCaId).slice().sort((a,b)=>{const va=dl(a.s.endDate),vb=dl(b.s.endDate);return(va===null?1e9:va)-(vb===null?1e9:vb);});
  if(!ocs.length){toast('Esa cuenta no tiene ocupantes','R');return}
  if(document.getElementById('swapMod'))return;
  const cerrar="document.getElementById('swapMod').remove();";
  const filas=ocs.map(o=>{
    const est=gst(o.s.endDate);const d=dl(o.s.endDate);const mor=est==='ven'||est==='exp'; // moroso = vencido o vence hoy/pronto
    const badge=est==='ven'?'<span style="color:var(--red);font-weight:700">🔴 venció hace '+Math.abs(d)+'d — no paga</span>'
      :est==='exp'?'<span style="color:var(--yellow);font-weight:700">🟠 '+(d===0?'vence HOY':'vence en '+d+'d')+' — por cobrar</span>'
      :'<span style="color:var(--green);font-weight:700">🟢 al día ('+fd(o.s.endDate)+') — ¡ojo, sí paga!</span>';
    return `<button class="subMenuItem" style="width:100%;padding:11px 12px;border-radius:10px;background:var(--surf2);margin-bottom:7px;border:1px solid ${mor?'rgba(239,68,68,.28)':'var(--border)'}" onclick="${cerrar}_swapEjecutar('${cId}','${sId}','${destCaId}','${o.c.id}','${o.s.id}')">

// Ejecuta el swap: saca la sub del moroso de la cuenta destino (libera el perfil) y mueve ahí al que paga.
async function _swapEjecutar(payCId,paySId,destCaId,evCId,evSId){
  const evC=S.clients.find(x=>x.id===evCId);
  const evS=evC&&(evC.subs||[]).find(x=>x.id===evSId);
  const dest=S.cuentas.find(x=>x.id===destCaId);
  if(!evC||!evS||!dest){toast('Error al liberar el cupo','R');return}
  const plat=evS.platform||dest.platform||'esta cuenta';
  if(!confirm('¿Sacar a '+(evC.name||'este cliente')+' de '+(dest.email||dest.platform||'la cuenta')+'?\n\nSe le quita SOLO la suscripción de '+plat+' (libera el cupo). Sus otras suscripciones NO se tocan.'))return;
  evC.subs=(evC.subs||[]).filter(x=>x.id!==evSId); // quita solo esa sub → libera el perfil
  // Si el moroso quedó sin ninguna suscripción, preguntar si mandarlo a la papelera (política confirmada).
  if(!(evC.subs||[]).length){
    if(confirm('⚠️ '+(evC.name||'El cliente')+' quedó sin ninguna suscripción.\n\n¿Mandarlo también a la papelera?\n\n• Aceptar = a la papelera (recuperable)\n• Cancelar = dejarlo en la lista (sin suscripciones)')){
      const i=S.clients.findIndex(x=>x.id===evCId);
      if(i>-1){const cli=S.clients[i];cli.deletedAt=Date.now();cli.deletedReason='sin-suscripciones';if(!S.papelera)S.papelera=[];S.papelera.push(cli);S.clients.splice(i,1);}
    }
  }
  const sm=document.getElementById('swapMod');if(sm)sm.remove();
  // Cuenta VIEJA del que paga (para ofrecer borrarla si queda vacía tras moverlo).
  const payC=S.clients.find(x=>x.id===payCId);const payS=payC&&(payC.subs||[]).find(x=>x.id===paySId);
  const origenPay=payS?payS.masterAccountId:'';
  // Mover al que paga a la cuenta destino. {swap:true} silencia los toasts de ejecutarTransferencia porque aquí
  // guiamos la secuencia: mover → PEDIR cambiar la clave → tras guardarla, AVISAR al cliente movido con los datos nuevos.
  ejecutarTransferencia(payCId,paySId,destCaId,{swap:true});
  setTimeout(()=>cambiarClaveModal(destCaId,{avisarCId:payCId,avisarSId:paySId,origen:origenPay}),350);
}
async function ejecutarTransferencia(cId,sId,nuevaCaId,opts){
  const c=S.clients.find(x=>x.id===cId);
  const s=c&&(c.subs||[]).find(x=>x.id===sId);
  const nueva=S.cuentas.find(x=>x.id===nuevaCaId);
  if(!c||!s||!nueva){toast('Error al transferir','R');return}
  const swap=!!(opts&&opts.swap); // en el swap, el flujo de "liberar cupo" maneja avisos/borrado; no duplicar toasts aquí
  const origen=s.masterAccountId; // cuenta ANTERIOR (para ofrecer borrarla si queda vacía tras mover)
  s.masterAccountId=nueva.id;
  s.accountEmail=nueva.email||'';
  s.password=nueva.password||'';
  // Conservar el perfil del cliente (puede ser un nombre como "Kamig"). Solo se ajusta
  // si está vacío o si choca con otro perfil ya usado en la cuenta destino.
  if(!s.cuentaCompleta){
    const miPerfil=String(s.profile||'').trim().toLowerCase();
    const choca=miPerfil&&S.clients.some(cl=>(cl.subs||[]).some(x=>x.masterAccountId===nueva.id&&x.id!==s.id&&String(x.profile||'').trim().toLowerCase()===miPerfil));
    if(!s.profile||choca){const p=sugerirPerfil(nueva.id);if(p)s.profile=String(p);}
  }
  const mod=document.getElementById('transferMod');if(mod)mod.remove();
  render();sv();
  toast('✅ Transferido a '+(nueva.email||'la cuenta nueva')+' · cupo anterior liberado','G');
  if(c.phone&&!swap){
    setTimeout(()=>{
      const t=document.createElement('div');t.className='toast tB';
      t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:360px';
      t.innerHTML='<span style="flex:1;color:var(--text)">📲 ¿Avisar a '+c.name+' los datos nuevos?</span><button onclick="enviarActualizacion(\''+c.id+'\',\''+s.id+'\');this.closest(\'.toast\').remove()" style="background:var(--acc);border:none;color:#07130c;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">Avisar</button><button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">✕</button>';
      document.body.appendChild(t);
      setTimeout(()=>{if(t.parentNode)t.remove()},10000);
    },400);
  }
  // Si la cuenta de ORIGEN quedó SIN nadie tras mover a este cliente, ofrecer eliminarla (en el swap lo maneja
  // el flujo de cambio de clave, para no encimar toasts sobre el modal).
  if(!swap)_ofrecerBorrarCuentaVacia(origen);
}

  let cand=S.cuentas.filter(ca=>ca.id!==caId&&platGroup(ca.platform)===platGroup(origen.platform));
  if(hayCompleta)cand=cand.filter(ca=>profInUse(ca.id)===0);
  else cand=cand.filter(ca=>!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>=mov.length);

async function ejecutarTransferenciaMasiva(origenId,destinoId){
  const origen=S.cuentas.find(x=>x.id===origenId);
  const destino=S.cuentas.find(x=>x.id===destinoId);
  if(!origen||!destino){toast('Error al transferir','R');return}
  const mov=[];S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===origenId)mov.push({c,s});}));
  if(!mov.length){toast('❌ Esta cuenta ya no tiene clientes','R');return}
  if(!confirm('¿Transferir los '+mov.length+' cliente(s) de:\n'+(origen.email||origen.platform)+'\n\n→ a: '+(destino.email||destino.platform)+'?\n\nTodos recibirán el correo y la clave de la cuenta destino.'))return;
  mov.forEach(x=>{const s=x.s;
    s.masterAccountId=destino.id;
    s.accountEmail=destino.email||'';
    s.password=destino.password||'';
    // Misma regla que la transferencia individual: conservar el perfil salvo vacío o choque.
    if(!s.cuentaCompleta){
      const miPerfil=String(s.profile||'').trim().toLowerCase();
      const choca=miPerfil&&S.clients.some(cl=>(cl.subs||[]).some(y=>y.masterAccountId===destino.id&&y.id!==s.id&&String(y.profile||'').trim().toLowerCase()===miPerfil));
      if(!s.profile||choca){const p=sugerirPerfil(destino.id);if(p)s.profile=String(p);}
    }
  });
  const mod=document.getElementById('transferAllMod');if(mod)mod.remove();
  render();sv();
  toast('✅ '+mov.length+' cliente(s) transferidos a '+(destino.email||'la cuenta nueva'),'G');
  setTimeout(()=>{
    const t=document.createElement('div');t.className='toast tB';
    t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:360px';
    t.innerHTML='<span style="flex:1;color:var(--text)">📢 ¿Avisar a los '+mov.length+' cliente(s) sus datos nuevos?</span><button onclick="notificarClientesDeCuenta(\''+destino.id+'\');this.closest(\'.toast\').remove()" style="background:var(--acc);border:none;color:#07130c;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">Avisar</button><button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">✕</button>';
    document.body.appendChild(t);
    setTimeout(()=>{if(t.parentNode)t.remove()},15000);
  },400);
}

// Mostrar/ocultar campo de nueva plataforma
function toggleNuevaPlat(){
  const sel=document.getElementById('cpl');
  const box=document.getElementById('nuevaPlatBox');
  const cuentaBox=document.getElementById('cuentaDispBox');
  if(!sel||!box)return;
  if(sel.value==='__NUEVA__'){
    box.style.display='block';
    if(cuentaBox)cuentaBox.style.display='none';
    mostrarNuevaCuentaCfg(true);
    setTimeout(()=>document.getElementById('cNuevaPlat')?.focus(),50);
  }else{
    box.style.display='none';
    // updateCuentaDisponible se encarga de mostrar/ocultar el bloque según disponibilidad
  }
}
// Muestra/oculta un box al elegir la opción "__NUEVA__" de un select y enfoca su primer campo.
// Compartido por nuevo-proveedor (cliente/sub) y nueva-plataforma del modal de suscripción.
function _toggleCampoNuevo(selId,boxId,focusId){
  const sel=document.getElementById(selId);const box=document.getElementById(boxId);
  if(!sel||!box)return;
  if(sel.value==='__NUEVA__'){box.style.display='block';setTimeout(()=>document.getElementById(focusId)?.focus(),50);}
  else box.style.display='none';
}
// Mostrar/ocultar campo de nuevo proveedor en el form de cliente nuevo
function toggleNuevoProv(){_toggleCampoNuevo('cprov','nuevoProvBox','cNuevoProv');}
// Verificar si la plataforma escrita ya existe (para evitar duplicados)
function checkPlatExistente(){
  const inp=document.getElementById('cNuevaPlat');
  const warn=document.getElementById('platExistenteWarn');
  if(!inp||!warn)return;
  const val=inp.value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!val){warn.style.display='none';return;}
  // Buscar coincidencia exacta o muy cercana
  const match=PLATS.find(p=>{
    const pn=p.toLowerCase().replace(/[^a-z0-9]/g,'');
    return pn===val||pn.startsWith(val)||val.startsWith(pn);
  });
  if(match&&match!=='Otro'){
    warn.style.display='block';
    warn.innerHTML='⚠️ Ya existe <b>'+match+'</b> en tu catálogo. Si quieres agregar una nueva cuenta de esta plataforma, selecciónala directamente en el campo <b>Plataforma</b> arriba — no necesitas crear una nueva. <button type="button" class="btn bb" style="margin-top:6px;width:100%;justify-content:center" onclick="usarPlatExistente(\''+match+'\')">'+ic('check',12)+' Usar '+match+' existente</button>';
  }else{
    warn.style.display='none';
  }
}
// Botón para usar plataforma existente en lugar de crear duplicado
function usarPlatExistente(plat){
  const sel=document.getElementById('cpl');
  if(!sel)return;
  sel.value=plat;
  // Ocultar el panel de nueva plataforma y mostrar cuentas disponibles
  const box=document.getElementById('nuevaPlatBox');
  if(box)box.style.display='none';
  updateCuentaDisponible();
  autoCompletarPrecio("cpl","cprice");
}
// Mostrar cuentas disponibles cuando se selecciona plataforma
function autoCompletarPrecio(platId,priceId){
  const sel=document.getElementById(platId||'spl');
  let plat=sel?sel.value:'';
  if(plat==='__NUEVA__'){const np=document.getElementById((platId||'spl')==='spl'?'sNuevaPlat':'cNuevaPlat');plat=np?np.value.trim():'';}
  const priceInp=document.getElementById(priceId||'spr2');
  if(!plat||!priceInp)return;
  // data-auto = último valor puesto por autollenado. Si el valor actual difiere, lo escribió el
  // dueño a mano (precio negociado) → NO tocar. Si coincide (o está vacío), sí se actualiza.
  const auto=priceInp.dataset?priceInp.dataset.auto:undefined;
  if(priceInp.value&&priceInp.value!==auto)return;
  const precio=getCatalogoPrecio(plat);
  if(precio){priceInp.value=String(precio);if(priceInp.dataset)priceInp.dataset.auto=String(precio);}
}
// Botón "+N meses" (jul 2026, "precio auto por meses"): mueve la fecha fin Y ajusta el precio a
// n× el del catálogo — solo si el precio está vacío o fue puesto por autollenado (data-auto),
// para no pisar un precio negociado a mano. Re-tocar un botón recalcula con la plataforma actual.
function _mesesRapido(iniId,finId,platSelId,priceId,n){
  const ini=document.getElementById(iniId),fin=document.getElementById(finId);
  if(fin)fin.value=addMonths((ini&&ini.value)||nowDate(),n);
  const inp=document.getElementById(priceId);if(!inp)return;
  const sel=document.getElementById(platSelId);let plat=sel?sel.value:'';
  if(plat==='__NUEVA__'){const np=document.getElementById(platSelId==='spl'?'sNuevaPlat':'cNuevaPlat');plat=np?np.value.trim():'';}
  const unit=plat?parseFloat(getCatalogoPrecio(plat))||0:0;
  if(!unit)return;
  const auto=inp.dataset?inp.dataset.auto:undefined;
  if(inp.value===''||inp.value===auto||parseFloat(inp.value)===unit){
    const total=String(Math.round(unit*n*100)/100);
    inp.value=total;
    if(inp.dataset)inp.dataset.auto=total;
  }
}

// ── Pegar datos de cuenta (jul 2026): separa correo/clave/perfil/PIN del texto que manda el
// proveedor por WhatsApp/Telegram (mismo truco que el "Pegar" de contactos, pero para credenciales).
async function _pegarDatosCuenta(emailId,passId,profId,pinId,resumenFn){
  try{
    const t=await navigator.clipboard.readText();
    if(!t||!t.trim()){toast('❌ No hay nada copiado','R');return;}
    const email=(t.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/)||[])[0]||'';
    let pass=(t.match(/(?:clave|contraseña|password|pass|pw)\s*[:=\-]?\s*(\S+)/i)||[])[1]||'';
    const pin=(t.match(/\bpin\s*[:=\-#]?\s*(\d{3,8})/i)||[])[1]||'';
    const perfil=(t.match(/\bperfil(?:es)?\s*[:=\-#]?\s*([^\s,;]+)/i)||[])[1]||'';
    if(!pass&&email){
      // Sin etiqueta "clave": tomar la palabra que sigue al correo (misma línea o la siguiente)
      const resto=t.slice(t.indexOf(email)+email.length);
      const m=resto.match(/^\s*[:\-|/·]*\s*(\S{4,})/);
      if(m&&!m[1].includes('@'))pass=m[1];
    }
    pass=pass.replace(/[.,;)]+$/,'');
    let n=0;
    const put=(id,v)=>{if(!id||!v)return;const e=document.getElementById(id);if(e){e.value=v;try{e.dispatchEvent(new Event('input'))}catch(_){}n++;}};
    put(emailId,email);put(passId,pass);put(profId,perfil);put(pinId,pin);
    if(n){toast('📋 '+n+' campo(s) pegados — revisa que la clave esté bien','B');if(typeof resumenFn==='function')resumenFn();}
    else toast('❌ No encontré correo ni clave en lo copiado','R');
  }catch(e){toast('❌ No se pudo leer el portapapeles','R');}
}

    _limpiarDatosCuentaCliente();

    const maxDevInp=document.getElementById('cMaxDev');
    if(maxDevInp&&!maxDevInp.value)maxDevInp.placeholder='Defecto: '+getPlatLimit(plat)+' dispositivos';
    return;
  }
  mostrarNuevaCuentaCfg(false);
  html+=_selectorCuentasCards(disponibles,todas,llenas,{radioName:'cuentaSel',selFn:'selectCuentaForClient',cfgFalse:'mostrarNuevaCuentaCfg(false)',cfgTrueNueva:'mostrarNuevaCuentaCfg(true)',maxDevId:'cMaxDev',plat});
  box.innerHTML=html;
  // Auto-seleccionar la cuenta con MÁS cupo (primera de la lista ya ordenada) y rellenar correo/clave/perfil
  const best=disponibles[0];
  selectCuentaForClient(best.id,false,true);
  const prof=document.getElementById('cprofile');
  if(prof&&!prof.value){const p=sugerirPerfil(best.id);if(p)prof.value=p;}
  mostrarNuevaCuentaCfg(false);
}

// Limpia correo/clave/perfil/proveedor del form de cliente nuevo (al cambiar a "crear cuenta nueva")
function _limpiarDatosCuentaCliente(){
  ['cemail','cpass','cprofile'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  const prov=document.getElementById('cprov');if(prov){prov.value='';if(typeof toggleNuevoProv==='function')toggleNuevoProv();}
}
// Motor compartido de "elegir cuenta en las tarjetas-radio" (form de cliente nuevo Y modal de
// suscripción — antes 2 funciones espejo de ~30 líneas). cfg: {aplicar(ca,caId,isFull) setea el
// campo master/full propio de cada form, emailId, passId, profId, provId, provToggle, resumen}.
function _selectCuentaGen(caId,isFull,force,cfg){
  const email=document.getElementById(cfg.emailId);
  const pass=document.getElementById(cfg.passId);
  const prof=document.getElementById(cfg.profId);
  const ca=caId?S.cuentas.find(x=>x.id===caId):null;
  cfg.aplicar(ca,caId,isFull);
  // force (el usuario eligió otra cuenta) → sobreescribe correo/clave/perfil.
  // Sin force (autorelleno inicial) → solo rellena si está vacío, para no pisar lo que escribiste.
  if(ca){
    if(email&&(force||!email.value))email.value=ca.email||'';
    if(pass&&(force||!pass.value))pass.value=ca.password||'';
    if(prof&&(force||!prof.value)){const p=sugerirPerfil(caId);prof.value=p?String(p):'';}
  }else if(force){
    // "Crear cuenta nueva": limpiar para escribir datos frescos
    if(email)email.value='';
    if(pass)pass.value='';
    if(prof)prof.value='';
  }
  // Autoseleccionar el proveedor de la cuenta elegida
  const prov=document.getElementById(cfg.provId);
  if(prov){
    if(ca&&ca.proveedorId&&[...prov.options].some(o=>o.value===ca.proveedorId)){
      if(force||!prov.value)prov.value=ca.proveedorId;
    }else if(force&&!ca){
      prov.value='';
    }
    if(typeof window[cfg.provToggle]==='function')window[cfg.provToggle]();
  }
  if(typeof cfg.resumen==='function')cfg.resumen(); // refrescar la línea resumen del bloque colapsado
}
function selectCuentaForClient(caId,isFull,force){
  _selectCuentaGen(caId,isFull,force,{
    aplicar:(ca,id,f)=>{const m=document.getElementById('cmaster');if(m)m.value=id;const fl=document.getElementById('cfull');if(fl)fl.value=f?'true':'false';},
    emailId:'cemail',passId:'cpass',profId:'cprofile',provId:'cprov',provToggle:'toggleNuevoProv',resumen:_cModAccResumen
  });
}

async function confirmarGrpRen(){
  const nuevaFecha=document.getElementById('grFecha')?document.getElementById('grFecha').value:'';
  if(!nuevaFecha){toast('❌ Selecciona la nueva fecha de vencimiento','R');return}
  const monto=parseFloat(document.getElementById('grMonto').value)||0;
  const nota=document.getElementById('grNota').value.trim();
  const sel=S.grpRenSel||new Set();
  const items=_itemsGrupoUrg(S.grpRenCId,S.grpRenPhone,S.grpRenEnd).filter(i=>sel.has(i.c.id+'_'+i.s.id));
  if(!items.length){toast('❌ Marca al menos una cuenta','R');return}
  const pagoId=gid();
  const venciaEl=_aplicarRen(items,()=>nuevaFecha,{pagoId}); // snapshot Deshacer + muta fechas
  const dueño=items[0].c; // el pago se registra bajo el primer dueño seleccionado
  const plats=items.map(i=>i.s.platform).filter(Boolean).join(', ')||'—';
  _nuevoPago({id:pagoId,clientId:dueño.id,clientName:dueño.name,platform:plats,monto,notas:nota||`Renovación (${items.length} cuenta(s)) hasta ${fd(nuevaFecha)}`,endDate:nuevaFecha,venciaEl});
  S.grpRenMod=false;render();   // cerrar YA
  sv();                          // guardar en 2.º plano
  _ofrecerComprobante(pagoId,`${items.length} cuenta(s) renovadas hasta ${fd(nuevaFecha)}`);
}

function addComboApp(rowId){
  const row=document.getElementById(rowId||'cbAppsRow');if(!row)return;

  if(n>=6){toast('❌ Máximo 6 apps por combo','R');return}

  row.appendChild(w);

// ctx opcional: 'M' = creado desde el modal 🎁 (ids *M; al crear selecciona el combo y sigue la venta/armado)
async function addComboDef(ctx){
  const enModal=ctx==='M';
  // Lee TODAS las apps de la fila (las 2 fijas + las añadidas con ➕ Otra app)
  const apps=[...document.querySelectorAll('#'+(enModal?'cbAppsRowM':'cbAppsRow')+' .cbAppSel')].map(s=>s.value).filter(Boolean);
  const precio=parseFloat(document.getElementById(enModal?'cbPrecioM':'cbPrecio').value);
  if(apps.length<2){toast('❌ Un combo lleva al menos 2 apps','R');return}
  if(new Set(apps.map(p=>platGroup(p))).size!==apps.length){toast('❌ No repitas apps en el combo','R');return}
  if(!(precio>0)){toast('❌ Escribe el precio del combo','R');return}
  const lista=_combosEdit();
  const mismas=(x,y)=>[...new Set(x.map(p=>platGroup(p)))].sort().join('|')===[...new Set(y.map(p=>platGroup(p)))].sort().join('|');
  if(lista.some(c=>mismas(c.apps,apps))){toast('❌ Ya existe un combo con esas mismas apps','R');return}
  const nombre=apps.join(' & ');
  const nuevo={id:gid(),nombre,apps,precio};
  lista.push(nuevo);
  if(enModal)selectCombo(nuevo.id);else renderCont(); // en el modal: pasa directo a vender/armar el combo recién creado
  sv();toast('🎁 Combo "'+nombre+'" creado — $'+precio.toFixed(2),'G');
  _syncCatalogoWeb();
}

async function submitCombo(){
  const combo=getCombos().find(x=>x.id===S.comboSel);
  if(!combo)return;
  const end=document.getElementById('comboEnd').value;
  if(S.comboArmar){submitArmarCombo(combo,end);return}
  const subs=[];
  const precioPorApp=combo.precio/combo.apps.length;
  let clientId,nombre,tel;
  if(S.comboClientMode==='existing'){
    const selEl=document.getElementById('comboExistingClient');
    const selId=selEl?selEl.value:S.comboClientId;
    if(!selId){toast('❌ Selecciona un cliente existente','R');return}
    const existingCli=S.clients.find(x=>x.id===selId);
    if(!existingCli){toast('❌ Cliente no encontrado','R');return}
    clientId=existingCli.id;nombre=existingCli.name;tel=existingCli.phone;
  }else{
    nombre=sanTxt(document.getElementById('comboNombre').value);
    if(!nombre){toast('❌ Escribe el nombre del cliente','R');return}
    tel=document.getElementById('comboTel').value.trim();
    clientId=gid();
  }
  for(let i=0;i<combo.apps.length;i++){
    const app=combo.apps[i];
    const email=document.getElementById('comboEmail'+i).value.trim();
    const pass=document.getElementById('comboPass'+i).value;
    const profile=document.getElementById('comboProfile'+i).value.trim();
    const pin=document.getElementById('comboPin'+i).value.trim();
    const completa=document.getElementById('comboCompleta'+i).checked;
    const subId=gid();
    const masterSelEl=document.getElementById('comboMaster'+i);
    let masterId=masterSelEl?masterSelEl.value:'';
    if(!masterId&&email){
      const tempSub={platform:app,accountEmail:email,password:pass,plan:'Estándar',endDate:end};
      const newMid=autoCrearCuentaMaestra(tempSub,nombre,{esCompleta:completa});
      if(newMid)masterId=newMid;
    }
    // Proveedor elegido para esta cuenta maestra
    const provSel=document.getElementById('comboProv'+i);
    const provId=provSel?provSel.value:'';
    if(provId&&masterId){const mca=S.cuentas.find(x=>x.id===masterId);if(mca)mca.proveedorId=provId;}
    subs.push({id:subId,platform:app,plan:'Estándar',accountEmail:email,password:pass,profile,profilePin:pin,masterAccountId:masterId,cuentaCompleta:completa,startDate:nowDate(),endDate:end,price:String(precioPorApp.toFixed(2)),paymentMethod:'Efectivo',pagado:true,combo:combo.nombre});
  }
  if(S.comboClientMode==='existing'){
    const existingCli=S.clients.find(x=>x.id===clientId);
    if(!existingCli.subs)existingCli.subs=[];
    subs.forEach(s=>existingCli.subs.push(s));
    S.pagos.push({id:gid(),clientId,clientName:nombre,platform:combo.nombre,monto:combo.precio,fecha:nowDate(),notas:'Combo añadido - '+combo.nombre,endDate:end});
    S.comboMod=false;render();sv(); // cerrar de inmediato; guardar en 2.º plano (no congelar el modal)
    toast('🎁 Combo añadido a '+nombre,'G');
    if(tel)setTimeout(()=>{S.welcomeMod=true;S.welcomeCId=clientId;S.welcomeSId=subs[0].id;S.welcomeComboSIds=subs.map(s=>s.id);render();},400);
  }else{
    const cliente={id:clientId,name:nombre,phone:tel,clientStatus:'Activo',sendReminders:true,notes:'Combo: '+combo.nombre,subs};
    S.clients.push(cliente);
    S.pagos.push({id:gid(),clientId,clientName:nombre,platform:combo.nombre,monto:combo.precio,fecha:nowDate(),notas:'Combo nuevo - '+combo.nombre,endDate:end});
    S.comboMod=false;render();sv(); // cerrar de inmediato; guardar en 2.º plano (no congelar el modal)
    toast('🎁 Combo creado: '+nombre,'G');
    if(tel)setTimeout(()=>{S.welcomeMod=true;S.welcomeCId=clientId;S.welcomeSId=subs[0].id;S.welcomeComboSIds=subs.map(s=>s.id);render();},400);
  }
}
// Armar/completar un combo desde las subs que el cliente YA tiene: reutiliza las que coinciden, agrega las que
// faltan y quita las marcadas en "fuera del combo". SIN cobro; alinea la fecha de todas las apps del combo.
function submitArmarCombo(combo,end){
  const cli=S.clients.find(x=>x.id===S.comboClientId);
  if(!cli){toast('❌ Cliente no encontrado','R');return}
  if(!end){toast('❌ Elige la fecha de vencimiento del combo','R');return}
  const price=String((combo.precio/combo.apps.length).toFixed(2));
  // 1) Validar TODO antes de mutar (evita cambios a medias)
  const plan=[];
  for(let i=0;i<combo.apps.length;i++){
    const app=combo.apps[i];
    const origin=(document.getElementById('comboOrigin'+i)||{}).value||'new';
    if(origin.indexOf('reuse:')===0){plan.push({tipo:'reuse',app,i,subId:origin.slice(6)});continue}
    const email=(document.getElementById('comboEmail'+i)||{}).value.trim();
    const master=(document.getElementById('comboMaster'+i)||{}).value||'';
    if(!email&&!master){toast('❌ Escribe el correo o elige una cuenta para '+app,'R');return}
    plan.push({tipo:'new',app,i});
  }
  // Subs con "🔄 La cambió por el combo" marcado en la sección 🤔 — leerlas ANTES de mutar
  const quitarIds=(cli.subs||[]).filter(s=>{const r=document.querySelector('input[name="comboQuitarR_'+s.id+'"]:checked');return r&&r.value==='quitar';}).map(s=>s.id);
  // 2) Aplicar
  const newSubIds=[];
  plan.forEach(p=>{
    if(p.tipo==='reuse'){
      const s=(cli.subs||[]).find(x=>x.id===p.subId);
      if(s){s.endDate=end;s.price=price;s.combo=combo.nombre;s.pagado=true;newSubIds.push(s.id);}
      return;
    }
    const i=p.i;
    const email=(document.getElementById('comboEmail'+i)||{}).value.trim();
    const pass=(document.getElementById('comboPass'+i)||{}).value;
    const profile=(document.getElementById('comboProfile'+i)||{}).value.trim();
    const pin=(document.getElementById('comboPin'+i)||{}).value.trim();
    const completa=!!(document.getElementById('comboCompleta'+i)||{}).checked;
    let masterId=(document.getElementById('comboMaster'+i)||{}).value||'';
    if(!masterId&&email){const newMid=autoCrearCuentaMaestra({platform:p.app,accountEmail:email,password:pass,plan:'Estándar',endDate:end},cli.name,{esCompleta:completa});if(newMid)masterId=newMid;}
    const provId=(document.getElementById('comboProv'+i)||{}).value||'';
    if(provId&&masterId){const mca=S.cuentas.find(x=>x.id===masterId);if(mca)mca.proveedorId=provId;}
    const nid=gid();if(!cli.subs)cli.subs=[];
    cli.subs.push({id:nid,platform:p.app,plan:'Estándar',accountEmail:email,password:pass,profile,profilePin:pin,masterAccountId:masterId,cuentaCompleta:completa,startDate:nowDate(),endDate:end,price,paymentMethod:'Efectivo',pagado:true,combo:combo.nombre});
    newSubIds.push(nid);
  });
  // 3) Quitar las marcadas (mismo efecto que delSub: libera el perfil de la cuenta maestra sola)
  if(quitarIds.length)cli.subs=(cli.subs||[]).filter(s=>!quitarIds.includes(s.id));
  if(cli.clientStatus&&cli.clientStatus!=='Activo')cli.clientStatus='Activo'; // reactivar si estaba suspendido/cancelado
  // Decisión del dueño: NO se registra pago al armar (el cobro se hace normal al renovar)
  S.comboMod=false;S.comboArmar=false;render();sv();
  toast('🎁 Combo armado para '+(cli.name||'cliente')+(quitarIds.length?' · '+quitarIds.length+' cuenta(s) quitada(s)':''),'G');
  if(cli.phone&&newSubIds.length)setTimeout(()=>{S.welcomeMod=true;S.welcomeCId=cli.id;S.welcomeSId=newSubIds[0];S.welcomeComboSIds=newSubIds;render();},400);
}

let _syncEstado=(typeof navigator!=='undefined'&&navigator.onLine===false)?'offline':'ok';
function _syncMeta(e){
  if(e==='guardando')return{c:'#eab308',t:'Guardando…',pulse:true};
  if(e==='offline')return{c:'#9ca3af',t:'Sin conexión',pulse:false};
  if(e==='error')return{c:'#ef4444',t:'Error al guardar',pulse:false};
  return{c:'#22c55e',t:'Sincronizado',pulse:false};
}
function renderSyncInd(){
  const m=_syncMeta(_syncEstado);
  return`<span id="syncInd" title="${m.t}" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text2);padding:5px 10px;border:1.5px solid var(--border2);border-radius:20px;flex-shrink:0"><span style="width:8px;height:8px;border-radius:50%;background:${m.c};flex-shrink:0;${m.pulse?'animation:syncPulse 1s ease-in-out infinite':''}"></span><span class="desktopOnly">${m.t}</span></span>`;
}
function setSync(e){
  const prev=_syncEstado;
  if(_syncEstado===e&&e!=='guardando'){_evaluarBannerSync(prev,e);return;}
  _syncEstado=e;
  const el=document.getElementById('syncInd');
  if(el)el.outerHTML=renderSyncInd();
  _evaluarBannerSync(prev,e);
}
// ── BANNER ROJO DE ALERTA (imposible de ignorar cuando algo no se sube) ──────
// El puntito de "Sincronizado" es discreto a propósito; este banner es el aviso fuerte:
// aparece de inmediato en 'error' y, si el 'offline' se prolonga, también. Desaparece solo al volver a 'ok'.
let _bannerOfflineTimer=null;
function _evaluarBannerSync(prev,e){
  if(e==='ok'){ _ocultarBannerSync(); if(_bannerOfflineTimer){clearTimeout(_bannerOfflineTimer);_bannerOfflineTimer=null;} return; }
  if(e==='error'){ if(_bannerOfflineTimer){clearTimeout(_bannerOfflineTimer);_bannerOfflineTimer=null;} _mostrarBannerSync('error'); return; }
  if(e==='offline'){
    // No alarmar por un parpadeo de red: solo si sigue sin conexión tras 12 s.
    if(_bannerOfflineTimer)return;
    _bannerOfflineTimer=setTimeout(()=>{_bannerOfflineTimer=null;if(_syncEstado==='offline')_mostrarBannerSync('offline');},12000);
    return;
  }
  // 'guardando': no tocar el banner (si había error y reintenta, se mantiene hasta saber el desenlace).
}
function _mostrarBannerSync(tipo){
  const esErr=tipo==='error';
  const msg=esErr
    ? '⚠️ <b>No se pudieron subir tus últimos cambios a la nube.</b> Están guardados en este teléfono. No cierres la app: revisa tu conexión y reintenta.'
    : '📶 <b>Sin conexión.</b> Tus cambios están guardados en este teléfono y se subirán solos al volver el internet. No cierres la app todavía.';
  const bg=esErr?'linear-gradient(135deg,#dc2626,#991b1b)':'linear-gradient(135deg,#d97706,#92400e)';
  let b=document.getElementById('syncBanner');
  if(!b){ b=document.createElement('div'); b.id='syncBanner'; document.body.appendChild(b); }
  b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:100000;background:'+bg+';color:#fff;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;font-size:12.5px;font-weight:600;line-height:1.45;box-shadow:0 4px 18px rgba(0,0,0,.45);display:flex;align-items:center;gap:10px;justify-content:center;text-align:center;animation:slideDownBanner .3s ease';
  b.innerHTML='<span style="flex:1;max-width:560px">'+msg+'</span>'
    +'<button onclick="reintentarSync()" style="flex-shrink:0;background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer">'+ic('refresh',12)+' Reintentar</button>';
}
function _ocultarBannerSync(){ const b=document.getElementById('syncBanner'); if(b)b.remove(); }
function reintentarSync(){ setSync('guardando'); sv(); }

function reportarProveedor(caId){
  const ca=S.cuentas.find(x=>x.id===caId);if(!ca)return;
  const p=proveedorDe(caId);
  if(!p){toast('❌ Esta cuenta no tiene proveedor. Edítala para asignarle uno.','R');return;}
  if(!p.phone){toast('❌ El proveedor no tiene teléfono guardado','R');return;}
  let msg=`¡Hola! ¿Qué tal? 👋\n\nEsta cuenta no funciona:\n\n📺 *${ca.platform||'—'}*`;

  msg+=`\n\n¿Me ayudas revisándola, por favor? 🙏`;
  openWA(p.phone,msg);

function genWANuevaCuenta(c,s){
  // Determinar dispositivos permitidos (bloque dinámico anti-compartir)
  let maxDev=1;
  if(s.cuentaCompleta){
    const ca=S.cuentas.find(x=>x.id===s.masterAccountId);
    maxDev=(ca&&parseInt(ca.maxDispositivos)>0)?parseInt(ca.maxDispositivos):getPlatLimit(s.platform);
  }
  const disp=maxDev<=1
    ?`📱 *Uso permitido:* 1 dispositivo a la vez.\n⚠️ Por favor *no compartas* tus datos ni inicies sesión en más de un dispositivo. Hacerlo puede suspender tu cuenta y *anular la garantía.*`
    :`📱 *Uso permitido:* hasta ${maxDev} dispositivos a la vez.\n⚠️ Si superas ese límite, la cuenta puede suspenderse y se *anula la garantía.*`;
  const data=Object.assign(_plantData(c,s),{negocio:(S.biz||'PUNTOFLIX').toUpperCase(),dispositivos:disp});
  return aplicarPlantilla('bienvenida',data);
}
function genWACombo(c,subs){
  const nombre=c?.name||'cliente';
  const neg=(S.biz||'PUNTOFLIX').toUpperCase();
  const comboNombre=subs[0]?.combo||'Combo';
  let msg=`🎬 *${neg}*\n━━━━━━━━━━━━━━\n\n¡Hola, *${nombre}*! 👋\nTu *${comboNombre}* ya está activo. Aquí tienes tus datos de acceso:\n\n`;
  subs.forEach(s=>{
    msg+=`${pi(s.platform)} *${s.platform}*\n`;
    if(s.accountEmail)msg+=`📧 *Correo:* ${s.accountEmail}\n`;
    if(s.password)msg+=`🔒 *Contraseña:* ${s.password}\n`;
    if(s.profile)msg+=`👤 *Perfil:* ${s.profile}\n`;
    if(s.profilePin)msg+=`🔢 *PIN:* ${s.profilePin}\n`;
    let maxDev=1;
    if(s.cuentaCompleta){const ca=S.cuentas.find(x=>x.id===s.masterAccountId);maxDev=(ca&&parseInt(ca.maxDispositivos)>0)?parseInt(ca.maxDispositivos):getPlatLimit(s.platform);}
    if(maxDev<=1){msg+=`📱 *Uso:* 1 dispositivo a la vez.\n`;}else{msg+=`📱 *Uso:* hasta ${maxDev} dispositivos a la vez.\n`;}
    msg+=`\n`;
  });
  if(subs[0]?.startDate)msg+=`📅 *Fecha de inicio:* ${fd(subs[0].startDate)}\n`;
  if(subs[0]?.endDate)msg+=`📅 *Válido hasta:* ${fd(subs[0].endDate)}\n`;
  msg+=`━━━━━━━━━━━━━━\n⚠️ Por favor *no compartas* tus datos ni inicies sesión en más dispositivos de los permitidos. Hacerlo puede suspender tu cuenta y *anular la garantía.*\n\n¡Disfruta tu combo! 🍿\nCualquier duda, estamos para ayudarte 🫱🏼‍🫲🏼`;
  return msg;
}

// Menú "Más opciones" en cada suscripción
function toggleSubMenu(sId,ev){
  if(ev)ev.stopPropagation();
  const menu=document.getElementById('subMenu_'+sId);
  if(!menu)return;
  const abierto=menu.style.display==='block';
  cerrarSubMenus();
  if(!abierto){menu.style.display='block';
    // Anular el transform :active de la tarjeta contenedora mientras el menú esté abierto
    // (un transform en el ancestro re-ancla el menú fixed y el toque cae fuera del botón).
    const host=menu.closest('.sc,.mCliCard,.caGRow,.tb2');
    if(host)host.classList.add('subMenuHostAbierto');
    // Posición FIJA respecto a la ventana: así el menú no lo recorta el scroll de .cont
    // y puede usar todo el alto de la pantalla (antes se cortaba dentro del contenedor).
    menu.style.position='fixed';menu.style.maxHeight='none';menu.style.overflowY='visible';
    // Por encima del FAB (+, z 90) y la barra inferior móvil (z 50), debajo de los modales (z 100):
    // si el menú se abre hacia abajo, esos elementos tapaban las últimas opciones y robaban el toque.
    menu.style.zIndex='95';
    const wrap=menu.parentElement;const wr=wrap.getBoundingClientRect();
    const vh=window.innerHeight,vw=window.innerWidth,margen=10;
    // En móvil, dejar aire para la barra de estado/notch (arriba) y la barra inferior de navegación (abajo),
    // si no un menú largo abierto hacia arriba queda con su primera opción tapada por la hora/batería.
    const movil=vw<=768;
    const margenTop=movil?54:margen;
    const margenBot=movil?70:margen;
    const necesita=menu.scrollHeight;
    const menuW=menu.offsetWidth||220;
    // Alinear el borde derecho del menú con el del botón ⋯, sin salirse de la pantalla
    let left=wr.right-menuW;
    if(left<margen)left=margen;
    if(left+menuW>vw-margen)left=vw-margen-menuW;
    const espacioAbajo=vh-wr.bottom-margenBot;
    const espacioArriba=wr.top-margenTop;
    if(espacioAbajo>=necesita||espacioAbajo>=espacioArriba){
      // Abrir hacia abajo
      menu.style.top=(wr.bottom+2)+'px';menu.style.bottom='auto';
      menu.style.maxHeight=Math.max(160,espacioAbajo)+'px';
    }else{
      // Abrir hacia arriba
      menu.style.top='auto';menu.style.bottom=(vh-wr.top+2)+'px';
      menu.style.maxHeight=Math.max(160,espacioArriba)+'px';
    }
    menu.style.left=left+'px';menu.style.right='auto';menu.style.marginTop='0';menu.style.marginBottom='0';
    menu.style.overflowY='auto';
    // Cerrar al hacer click fuera o al hacer scroll en la lista
    setTimeout(()=>{document.addEventListener('click',cerrarSubMenusUnaVez);const cont=document.querySelector('.cont');if(cont)cont.addEventListener('scroll',cerrarSubMenusUnaVez,{passive:true});},50);
  }
}
function cerrarSubMenus(){
  document.querySelectorAll('[id^="subMenu_"]').forEach(m=>m.style.display='none');
  document.querySelectorAll('.subMenuHostAbierto').forEach(e=>e.classList.remove('subMenuHostAbierto'));
}
function cerrarSubMenusUnaVez(){
  cerrarSubMenus();
  document.removeEventListener('click',cerrarSubMenusUnaVez);
  const cont=document.querySelector('.cont');if(cont)cont.removeEventListener('scroll',cerrarSubMenusUnaVez);
}

async function submitCMod(){
  const name=sanTxt(document.getElementById('cn').value);
  const phone=document.getElementById('cp2').value.trim();
  const notes=sanTxt(document.getElementById('cnt').value);
  if(!name&&!phone){toast('❌ Ingresa al menos el nombre o teléfono','R');return}
  // ── Evitar clientes DUPLICADOS: si el cliente ya existe, se ANEXA la nueva suscripción al existente ──
  let mergeTarget=null;
  if(S.cMode==='add'){
    const phoneClean=phone.replace(/\D/g,'');
    const nameN=norm(name).trim();
    // 1) Match FUERTE por teléfono (≥7 dígitos) → es la misma persona con seguridad
    if(phoneClean.length>=7){
      mergeTarget=S.clients.find(c=>{const cp=(c.phone||'').replace(/\D/g,'');return cp.length>=7&&cp===phoneClean;})||null;
    }
    // 2) Si no hubo match por teléfono, por NOMBRE normalizado (ignora tildes y mayúsculas: "Solórzano"=="solorzano")
    let soloPorNombre=false;
    if(!mergeTarget&&nameN){
      mergeTarget=S.clients.find(c=>norm(c.name||'').trim()===nameN)||null;
      soloPorNombre=!!mergeTarget;
    }
    // Teléfono igual → anexar directo (sin preguntar). Solo el nombre igual → confirmar (podría ser un homónimo).
    if(mergeTarget&&soloPorNombre){
      const n=(mergeTarget.subs||[]).length;
      if(!confirm(`⚠️ Ya existe un cliente llamado "${mergeTarget.name}" (${mergeTarget.phone||'sin teléfono'} · ${n} suscripción(es)).\n\n¿Es la misma persona?\n\n• Aceptar → se le AÑADE esta suscripción (sin duplicar el cliente).\n• Cancelar → se crea un cliente aparte.`)){
        mergeTarget=null;
      }
    }
  }
  let newClientId=null;let newSubId=null;
  if(S.cMode==='add'){
    let platform=document.getElementById('cpl').value;
    // Si eligió "crear nueva plataforma", resolver el nombre escrito (dedup o crear custom)
    if(platform==='__NUEVA__'){
      platform=_resolverPlataformaNueva(document.getElementById('cNuevaPlat')?.value,document.getElementById('cNuevaPlatLimite')?.value);
      if(!platform){toast('❌ Escribe el nombre de la nueva plataforma','R');return}
    }
    const email=document.getElementById('cemail').value.trim();
    const pass=document.getElementById('cpass').value;
    const profile=document.getElementById('cprofile').value.trim();
    const pin=document.getElementById('cpin').value.trim();
    const start=document.getElementById('cstart').value;
    const end=document.getElementById('cend').value;
    const price=document.getElementById('cprice').value;
    const masterId=document.getElementById('cmaster')?document.getElementById('cmaster').value:'';
    const cuentaCompleta=document.getElementById('cfull')?document.getElementById('cfull').value==='true':false;
    // Nuevos campos de configuración de cuenta maestra nueva
    const maxDevInp=document.getElementById('cMaxDev');
    const maxDev=maxDevInp?parseInt(maxDevInp.value)||0:0;
    const costoProveedorInp=document.getElementById('cCostoProveedor');
    const costoProveedor=costoProveedorInp?parseFloat(costoProveedorInp.value)||0:0;
    const esCuentaCompletaNueva=document.getElementById('cNuevaCompleta')?document.getElementById('cNuevaCompleta').checked:false;
    const vencCuentaInp=document.getElementById('cVencCuenta');
    const vencCuenta=vencCuentaInp?vencCuentaInp.value:'';
    const iniCuentaInp=document.getElementById('cIniCuenta');
    const iniCuenta=iniCuentaInp?iniCuentaInp.value:'';
    const subs=[];
    newClientId=mergeTarget?mergeTarget.id:gid(); // si es duplicado, el pago/suscripción van al cliente existente
    // Si hay datos de suscripción (correo, contraseña, precio, perfil) PERO no hay plataforma → error
    const tieneAlgunDatoSub=email||pass||price||profile||pin||end;
    if(tieneAlgunDatoSub&&!platform){
      toast('❌ Selecciona la plataforma (Netflix, Disney+, etc) para la suscripción','R');
      return;
    }
    if(platform){
      newSubId=gid();
      let masterIdFinal=masterId;
      let autoCreatedMaster=false;
      // Auto-crear/vincular cuenta maestra automáticamente
      if(!masterIdFinal&&platform&&email){
        const tempSub={platform,accountEmail:email,password:pass,plan:'Estándar',endDate:end};
        const newMid=autoCrearCuentaMaestra(tempSub,name,{maxDev,esCompleta:esCuentaCompletaNueva,costoProveedor,renewalDate:vencCuenta,startDate:iniCuenta});
        if(newMid){masterIdFinal=newMid;autoCreatedMaster=true;}
      }
      // Proveedor elegido (existente o nuevo) → asignarlo a la cuenta maestra de esta suscripción
      let provIdSel=document.getElementById('cprov')?document.getElementById('cprov').value:'';
      if(provIdSel==='__NUEVA__'){
        const pn=(document.getElementById('cNuevoProv')?.value||'').trim();
        if(pn){
          if(!S.proveedores)S.proveedores=[];
          let pr=S.proveedores.find(p=>(p.name||'').toLowerCase()===pn.toLowerCase());
          if(!pr){pr={id:gid(),name:pn,phone:(document.getElementById('cNuevoProvTel')?.value||'').trim(),notes:''};S.proveedores.push(pr);}
          provIdSel=pr.id;
        }else provIdSel='';
      }
      if(provIdSel&&masterIdFinal){const mca=S.cuentas.find(x=>x.id===masterIdFinal);if(mca)mca.proveedorId=provIdSel;}
      // Si el usuario marcó "cuenta completa" en la nueva cuenta, la suscripción también lo refleja
      const subEsCompleta=cuentaCompleta||esCuentaCompletaNueva;
      subs.push({id:newSubId,platform,plan:'Estándar',accountEmail:email,password:pass,profile,profilePin:pin,masterAccountId:masterIdFinal,cuentaCompleta:subEsCompleta,startDate:start,endDate:end,price,paymentMethod:'Efectivo',pagado:true});
      // Registrar el pago automáticamente si hay precio
      if(price&&parseFloat(price)>0){
        S.pagos.push({id:gid(),clientId:newClientId,clientName:(mergeTarget?mergeTarget.name:name),platform,monto:parseFloat(price),fecha:nowDate(),notas:mergeTarget?'Suscripción añadida - pago inicial':'Cliente nuevo - pago inicial'});
      }
      if(autoCreatedMaster){
        setTimeout(()=>toast('📡 Cuenta maestra de '+platform+' auto-creada','B'),800);
      }
    }
    if(mergeTarget){
      // ── Cliente ya existía: anexar la nueva suscripción SIN duplicar ──
      mergeTarget.subs=(mergeTarget.subs||[]).concat(subs);
      if(!mergeTarget.phone&&phone)mergeTarget.phone=phone;                       // completar teléfono si faltaba
      if(mergeTarget.clientStatus&&mergeTarget.clientStatus!=='Activo')mergeTarget.clientStatus='Activo'; // reactivar si estaba suspendido/cancelado
      if(notes)mergeTarget.notes=(mergeTarget.notes?mergeTarget.notes+' · ':'')+notes;
    }else{
      S.clients.push({id:newClientId,name,phone,city:'',clientStatus:'Activo',notes,sendReminders:true,subs});
    }
  }else{
    const i=S.clients.findIndex(c=>c.id===S.cEditId);
    if(i>=0)S.clients[i]={...S.clients[i],name,phone,notes,clientStatus:document.getElementById('cstatus').value};
  }
  const wasAdd=S.cMode==='add';
  const fueAnexado=!!mergeTarget; // se añadió a un cliente existente (no se duplicó)
  // Cerrar el form y mostrar la bienvenida DE INMEDIATO; el guardado corre en 2.º plano
  // (un sv() lento en el celular dejaba el formulario "congelado" — mismo fix que confirmarRenovar/confirmarPago)
  S.cMod=false;
  // Si se creó/anexó una suscripción, mostrar modal con botón real (funciona en móvil)
  if(wasAdd&&newSubId){
    S.welcomeMod=true;
    S.welcomeCId=newClientId;
    S.welcomeSId=newSubId;
    S.welcomeMerged=fueAnexado;
  }
  render();
  // Mensaje honesto según el resultado real del guardado (no mentir con un "✅" si falló)
  sv().then(res=>{
    const accion=fueAnexado?'Suscripción añadida al cliente existente':'Cliente creado';
    if(res==='error'||res==='sin-sesion'){
      toast('⚠️ '+(wasAdd?accion:'Cambios')+' guardado en este dispositivo, pero NO se pudo subir a la nube. Revisa tu conexión/sesión — no cierres la app hasta que el indicador diga "Sincronizado".','R');
    }else if(res==='offline'){
      toast('📶 '+(wasAdd?accion:'Cliente actualizado')+' (sin conexión) — se subirá solo al recuperar internet.','B');
    }else{
      toast(wasAdd?(fueAnexado?`✅ Suscripción añadida a ${mergeTarget.name} (sin duplicar)`:'✅ Cliente creado y marcado como pagado'):'✅ Cliente actualizado','G');
    }
  });
}

// Contact Picker API (Android/Chrome): rellena nombre y teléfono sin escribirlos
// GENÉRICAS (jul 2026): reciben los ids destino (Venta exprés o formulario completo). Tras llenar,
// disparan 'input' en los campos para que corran los oninput enganchados (hint de duplicado, resúmenes).
function _contactoFill(id,valor){const e=document.getElementById(id);if(e&&valor){e.value=valor;try{e.dispatchEvent(new Event('input'))}catch(_){}}}
async function _contactoPicker(nId,tId){
  try{
    const sel=await navigator.contacts.select(['name','tel'],{multiple:false});
    if(sel&&sel[0]){
      _contactoFill(nId,sel[0].name&&sel[0].name[0]);
      _contactoFill(tId,sel[0].tel&&sel[0].tel[0]);
    }
  }catch(e){/* canceló el selector — no pasa nada */}
}
// Alternativa para iPhone (Apple no deja leer contactos por web): el dueño copia el contacto o su número
// en Contactos/WhatsApp y toca "Pegar" — leemos el portapapeles y separamos nombre y teléfono a los campos.
async function _contactoPegar(nId,tId){
  let txt='';
  try{txt=await navigator.clipboard.readText();}
  catch(e){toast('No pude leer lo copiado. Pega el número directamente en el campo Teléfono.','R');return;}
  txt=(txt||'').trim();
  if(!txt){toast('Primero copia el contacto o su número en Contactos/WhatsApp','B');return;}
  // Un teléfono = secuencia con + opcional y ≥7 dígitos (permite espacios, guiones y paréntesis intermedios)
  const m=txt.match(/\+?\d[\d\s().-]{5,}\d/);
  let tel='',nombre=txt;
  if(m){tel=m[0].replace(/[^\d+]/g,'');nombre=txt.replace(m[0],'').replace(/[\r\n]+/g,' ').replace(/\s{2,}/g,' ').replace(/^[^A-Za-zÀ-ÿ]+/,'').replace(/[^A-Za-zÀ-ÿ.]+$/,'').trim();}
  _contactoFill(tId,tel);
  _contactoFill(nId,nombre);
  if(tel||nombre)toast('📋 Pegado'+(nombre?': '+nombre:'')+(tel?' · '+tel:''),'G');
  else toast('No reconocí un nombre ni un número en lo que copiaste','B');
}

function confirmarVentaExpres(){
  const name=sanTxt(document.getElementById('veNombre').value);
  const phone=(document.getElementById('veTel').value||'').trim();
  const plat=document.getElementById('vePlat').value;
  const caIdV=document.getElementById('veCaId').value;
  if(!name&&!phone){toast('❌ Ingresa al menos el nombre o teléfono','R');return}
  if(!plat){toast('❌ Elige la plataforma','R');return}
  const ca=S.cuentas.find(x=>x.id===caIdV);
  if(!ca){toast('❌ No hay cuenta con cupo — usa el formulario completo','R');return}
  if(profDisponibles(ca.id)<=0){toast('❌ Esa cuenta se llenó — se buscó otra','R');veActualizar();return}
  const perfil=sanTxt(document.getElementById('vePerfil')?.value||'');
  const pin=sanTxt(document.getElementById('vePin')?.value||'');
  const price=document.getElementById('vePrecio')?.value||'';
  // Anti-duplicados (misma lógica que submitCMod): teléfono igual = anexar directo; nombre igual = confirmar
  let mergeTarget=null;
  const phoneClean=phone.replace(/\D/g,'');
  const nameN=norm(name).trim();
  if(phoneClean.length>=7){
    mergeTarget=S.clients.find(c=>{const cp=(c.phone||'').replace(/\D/g,'');return cp.length>=7&&cp===phoneClean;})||null;
  }
  if(!mergeTarget&&nameN){
    const porNombre=S.clients.find(c=>norm(c.name||'').trim()===nameN)||null;
    if(porNombre){
      const nS=(porNombre.subs||[]).length;
      if(confirm(`⚠️ Ya existe un cliente llamado "${porNombre.name}" (${porNombre.phone||'sin teléfono'} · ${nS} suscripción(es)).\n\n¿Es la misma persona?\n\n• Aceptar → se le AÑADE esta suscripción (sin duplicar el cliente).\n• Cancelar → se crea un cliente aparte.`))mergeTarget=porNombre;
    }
  }
  const newClientId=mergeTarget?mergeTarget.id:gid();
  const newSubId=gid();
  const sub={id:newSubId,platform:plat,plan:'Estándar',accountEmail:ca.email||'',password:ca.password||'',profile:perfil,profilePin:pin,masterAccountId:ca.id,cuentaCompleta:false,startDate:nowDate(),endDate:addMonths(nowDate(),1),price,paymentMethod:'Efectivo',pagado:true};
  if(price&&parseFloat(price)>0){
    S.pagos.push({id:gid(),clientId:newClientId,clientName:(mergeTarget?mergeTarget.name:name),platform:plat,monto:parseFloat(price),fecha:nowDate(),notas:mergeTarget?'⚡ Venta exprés - suscripción añadida':'⚡ Venta exprés - pago inicial'});
  }
  if(mergeTarget){
    mergeTarget.subs=(mergeTarget.subs||[]).concat([sub]);
    if(!mergeTarget.phone&&phone)mergeTarget.phone=phone;
    if(mergeTarget.clientStatus&&mergeTarget.clientStatus!=='Activo')mergeTarget.clientStatus='Activo';
  }else{
    S.clients.push({id:newClientId,name,phone,city:'',clientStatus:'Activo',notes:'',sendReminders:true,subs:[sub]});
  }
  const m=document.getElementById('ventaExpMod');if(m)m.remove();
  // Bienvenida de inmediato; guardado en 2.º plano con toast honesto (mismo patrón que submitCMod)
  S.welcomeMod=true;S.welcomeCId=newClientId;S.welcomeSId=newSubId;S.welcomeMerged=!!mergeTarget;
  render();
  sv().then(res=>{
    const accion=mergeTarget?'Suscripción añadida a '+mergeTarget.name:'Venta registrada';
    if(res==='error'||res==='sin-sesion'){
      toast('⚠️ '+accion+' en este dispositivo, pero NO se pudo subir a la nube. Revisa tu conexión/sesión.','R');
    }else if(res==='offline'){
      toast('📶 '+accion+' (sin conexión) — se subirá sola al recuperar internet.','B');
    }else{
      toast('⚡ '+accion+' — '+plat+(price&&parseFloat(price)>0?' · $'+parseFloat(price).toFixed(2):''),'G');
    }
  });
}

// Resuelve el nombre escrito en "➕ Otra plataforma (crear nueva)": si ya existe una igual o muy
// parecida la REUTILIZA (no duplica), si no la crea como plataforma custom (PLATS/PI/colores/límite
// + S.customPlats persistido). Compartida por el form de cliente nuevo y el modal de suscripción.
function _resolverPlataformaNueva(nombre,limite){
  nombre=(nombre||'').trim();
  if(!nombre)return '';
  const platNorm=nombre.toLowerCase().replace(/[^a-z0-9]/g,'');
  const existente=PLATS.find(p=>{
    const pn=p.toLowerCase().replace(/[^a-z0-9]/g,'');
    return pn===platNorm||pn.startsWith(platNorm)||platNorm.startsWith(pn);
  });
  if(existente&&existente!=='Otro'){
    toast('📌 Se usó "'+existente+'" (ya existía en tu catálogo)','B');
    return existente;
  }
  if(!PLATS.includes(nombre)){
    PLATS.splice(PLATS.length-1,0,nombre); // insertar antes de "Otro"
    if(!PI[nombre])PI[nombre]='📺';
    if(!PLATCOLORS[nombre])PLATCOLORS[nombre]='#6868a0';
    PLAT_LIMITS[nombre]=parseInt(limite)||4;
    if(!S.customPlats)S.customPlats=[];
    if(!S.customPlats.includes(nombre))S.customPlats.push(nombre);
  }
  return nombre;
}

// Sugiere el primer número de perfil libre (1..límite) en una cuenta
function sugerirPerfil(caId){
  const usados=new Set();
  S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===caId){const n=parseInt(s.profile);if(!isNaN(n))usados.add(n);}}));
  const ca=S.cuentas.find(x=>x.id===caId);
  const limit=parseInt(ca?.totalProfiles)||getPlatLimit(ca?.platform)||8;
  for(let i=1;i<=limit;i++){if(!usados.has(i))return i;}
  return '';
}

// Renderiza las cuentas disponibles como radios, preselecciona la de más cupo y ofrece cuenta completa / crear nueva.
function autoAsignarCuenta(){
  if(S.sMode!=='add')return;
  const box=document.getElementById('cuentaDispBoxSub');
  const sma=document.getElementById('sma');
  const info=document.getElementById('cuentaInfo');
  if(!box||!sma)return;
  if(info)info.innerHTML='';
  const plat=document.getElementById('spl')?.value||'';
  if(!plat){box.style.display='none';box.innerHTML='';sma.value='';mostrarNuevaCuentaCfgSub(false);return}
  if(plat==='__NUEVA__'){
    // Plataforma nueva (aún sin nombre): no puede haber cuentas maestras de ella → directo a crear cuenta nueva
    box.style.display='block';
    box.innerHTML='<div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:10px;font-size:11px;color:var(--yellow)"><b>🆕 Plataforma nueva</b><br>Se creará una cuenta maestra nueva con el correo que ingreses abajo.</div>';
    sma.value='__NUEVA__';_limpiarDatosCuentaSub();
    mostrarNuevaCuentaCfgSub(true,'');
    return;
  }
  const todas=S.cuentas.filter(ca=>platGroup(ca.platform)===platGroup(plat));
  if(!todas.length){
    box.style.display='block';
    box.innerHTML='<div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:10px;font-size:11px;color:var(--yellow)"><b>⚠️ No tienes cuentas de '+pi(plat)+' '+plat+'</b><br>Se creará una cuenta maestra nueva con el correo que ingreses abajo.</div>';
    sma.value='__NUEVA__';_limpiarDatosCuentaSub();
    mostrarNuevaCuentaCfgSub(true,plat);
    const md=document.getElementById('sMaxDev');if(md&&!md.value)md.placeholder='Defecto: '+getPlatLimit(plat)+' dispositivos';
    return;
  }
  // Disponibles vs llenas — ordenadas por MÁS cupo primero (desempata por menor costo)
  const disponibles=todas.filter(ca=>profDisponibles(ca.id)>0&&!tieneCuentaCompleta(ca.id))
    .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  const llenas=todas.length-disponibles.length;
  box.style.display='block';
  let html='<label class="lbl">📡 Cuenta donde colocar al cliente <span style="color:var(--green);font-weight:600">· preseleccionamos la de más cupo</span></label>';
  if(disponibles.length===0){
    html+='<div style="background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.25);border-radius:10px;padding:10px;font-size:11px;color:var(--red)"><b>🔴 Todas tus cuentas de '+plat+' están llenas</b><br>Se creará una cuenta maestra nueva con el correo de abajo.</div>';
    box.innerHTML=html;sma.value='__NUEVA__';_limpiarDatosCuentaSub();
    mostrarNuevaCuentaCfgSub(true,plat);
    const md=document.getElementById('sMaxDev');if(md&&!md.value)md.placeholder='Defecto: '+getPlatLimit(plat)+' dispositivos';
    return;
  }
  mostrarNuevaCuentaCfgSub(false);
  html+=_selectorCuentasCards(disponibles,todas,llenas,{radioName:'cuentaSelSub',selFn:'selectCuentaForSub',cfgFalse:'mostrarNuevaCuentaCfgSub(false)',cfgTrueNueva:"mostrarNuevaCuentaCfgSub(true,'"+plat+"')",maxDevId:'sMaxDev',plat});
  box.innerHTML=html;
  // Auto-seleccionar la cuenta con MÁS cupo (primera de la lista ya ordenada) y rellenar correo/clave/perfil
  const best=disponibles[0];
  selectCuentaForSub(best.id,false,true);
  const prof=document.getElementById('spr');
  if(prof&&!prof.value){const p=sugerirPerfil(best.id);if(p)prof.value=String(p);}
  mostrarNuevaCuentaCfgSub(false);
}

// Avisar renovación a un cliente — unifica todas sus cuentas en un solo mensaje
function avisarRenovacionCliente(id){
  const c=S.clients.find(x=>x.id===id);
  if(!c){toast('Cliente no encontrado','R');return}
  if(!c.phone){toast('❌ Este cliente no tiene teléfono registrado','R');return}
  const subs=c.subs||[];
  if(!subs.length){toast('Sin suscripciones','B');return}
  // Determinar qué cuentas están vencidas vs por vencer
  const vencidas=subs.filter(s=>gst(s.endDate)==='ven');
  const porVencer=subs.filter(s=>gst(s.endDate)==='exp'||gst(s.endDate)==='act');
  let relevantes,tipo;
  if(vencidas.length&&!porVencer.length){relevantes=vencidas;tipo='venc';}
  else{relevantes=subs;tipo='proximo';}
  let msg;
  if(relevantes.length===1){
    const s=relevantes[0];
    const venc=gst(s.endDate)==='ven';
    msg=`${venc?'⏰':'📅'} ¡Hola, *${c.name||'cliente'}*! 👋\n\n${venc?'Tu cuenta':'Te recuerdo que tu cuenta'} *${s.platform}*${s.accountEmail?` (${s.accountEmail})`:''} ${venc?'venció '+fdRel(s.endDate):'vence '+fdRel(s.endDate)}. La renovación es de *$${precioMostrar(s).toFixed(2)}*.\n\n¿Deseas ${venc?'reactivarla':'renovar'}? 🍿`;
  }else{
    const total=relevantes.reduce((sum,s)=>sum+precioMostrar(s),0);
    msg=`📋 ¡Hola, *${c.name||'cliente'}*! 👋\n\nEste es el detalle de tus cuentas para renovar:\n\n`;
    msg+=relevantes.map(s=>`• ${pi(s.platform)} *${s.platform}*${s.accountEmail?` (${s.accountEmail})`:''}\n   ${gst(s.endDate)==='ven'?'Venció':'Vence'} ${fdRel(s.endDate)} — $${precioMostrar(s).toFixed(2)}`).join('\n\n');
    msg+=`\n\n💰 *Total a renovar: $${total.toFixed(2)}*\n\n¿Deseas renovar? 🍿`;
  }
  openWA(c.phone,msg);
}

// Detecta grupos de clientes que son la MISMA persona: por teléfono (≥7 dígitos iguales)
// o por nombre normalizado (sin tildes). Devuelve [{tipo,principal,otros:[...]}].
let _dupGroups=[];
// ── AUDITORÍA DE DATOS ("🩺 Salud de los Datos") ─────────────
// Solo LEE: detecta inconsistencias y lleva al lugar para corregirlas a mano.
// Cancelados quedan fuera de los chequeos rojo/amarillo (no son negocio activo).
function auditarDatos(){
  const cats=[];
  const add=(sev,titulo,detalle,items)=>{if(items.length)cats.push({sev,titulo,detalle,items});};
  const activos=S.clients.filter(c=>c.clientStatus!=='Cancelado');
  const sinFecha=[],finAntes=[],ctaRota=[],sinPrecio=[],sinPlat=[],credDesync=[],sinTel=[],sinCta=[],sinSubs=[];
  activos.forEach(c=>{
    if(!(c.subs||[]).length)sinSubs.push({label:c.name||'—',det:c.phone||'sin teléfono',cId:c.id});
    if(!c.phone)sinTel.push({label:c.name||'—',det:(c.subs||[]).map(s=>s.platform).filter(Boolean).join(', ')||'sin suscripciones',cId:c.id});
    (c.subs||[]).forEach(s=>{
      const it={label:c.name||'—',cId:c.id,sId:s.id};
      if(!s.endDate)sinFecha.push({...it,det:(s.platform||'¿plataforma?')+' · sin fecha de fin'});
      else if(s.startDate&&s.endDate<s.startDate)finAntes.push({...it,det:(s.platform||'—')+' · fin '+fd(s.endDate)+' ANTES del inicio '+fd(s.startDate)});
      if(precioMostrar(s)<=0)sinPrecio.push({...it,det:(s.platform||'—')+' · precio $0 (ni propio ni de catálogo)'});
      if(!s.platform)sinPlat.push({...it,det:'suscripción sin plataforma'});
      if(s.masterAccountId){
        const ca=S.cuentas.find(x=>x.id===s.masterAccountId);
        if(!ca){
          const enPap=(S.papeleraCuentas||[]).some(x=>x.id===s.masterAccountId);
          ctaRota.push({...it,det:(s.platform||'—')+' · '+(enPap?'su cuenta maestra está en la PAPELERA':'su cuenta maestra ya NO existe')});
        }else if((ca.email&&s.accountEmail&&norm(ca.email)!==norm(s.accountEmail))||(ca.password&&s.password&&ca.password!==s.password)){
          credDesync.push({...it,det:(s.platform||'—')+' · correo/clave distintos a los de la cuenta '+(ca.email||'')});
        }
      }else{
        sinCta.push({...it,det:(s.platform||'—')+' · sin cuenta maestra asignada'});
      }
    });
  });
  // Perfil repetido en la misma cuenta (solo clientes Activos, igual que profInUse; las "cuenta completa" no usan perfil)
  const perfilDup=[];const porCtaPerfil={};
  S.clients.filter(c=>c.clientStatus==='Activo'||!c.clientStatus).forEach(c=>(c.subs||[]).forEach(s=>{
    if(!s.masterAccountId||s.cuentaCompleta)return;
    const p=norm(String(s.profile||'')).trim();if(!p)return;
    const k=s.masterAccountId+'|'+p;
    (porCtaPerfil[k]=porCtaPerfil[k]||[]).push({c,s});
  }));
  Object.values(porCtaPerfil).forEach(arr=>{
    if(arr.length<2)return;
    const ca=S.cuentas.find(x=>x.id===arr[0].s.masterAccountId);
    arr.forEach(x=>perfilDup.push({label:x.c.name||'—',det:'perfil "'+(x.s.profile||'')+'" repetido en '+(ca?ca.email||ca.platform:'la cuenta'),cId:x.c.id,sId:x.s.id}));
  });
  // Cuentas sobrevendidas (más perfiles ocupados que el límite)
  const sobreV=[];
  S.cuentas.forEach(ca=>{
    const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
    const used=profInUse(ca.id);
    if(used>limit)sobreV.push({label:ca.email||ca.platform||'—',det:pi(ca.platform)+' '+(ca.platform||'')+' · '+used+' perfiles ocupados de '+limit,caId:ca.id});
  });
  const dups=detectarClientesDuplicados();
  add('R','⛔ Sin fecha de fin','No entran a recordatorios ni cuentan como deuda',sinFecha);

function detectarClientesDuplicados(){
  const grupos=[];const usados=new Set();
  const clientes=S.clients||[];
  // Elige como principal el que tenga MÁS suscripciones (desempata: el que tenga teléfono, luego el primero)
  const elegirPrincipal=arr=>arr.slice().sort((a,b)=>((b.subs||[]).length-(a.subs||[]).length)||((b.phone?1:0)-(a.phone?1:0)))[0];
  // 1) Por teléfono
  const porTel={};
  clientes.forEach(c=>{const ph=_phoneKey(c);if(ph.length>=7){(porTel[ph]=porTel[ph]||[]).push(c);}});
  Object.values(porTel).forEach(arr=>{
    if(arr.length<2)return;
    const principal=elegirPrincipal(arr);
    grupos.push({tipo:'tel',principal,otros:arr.filter(c=>c!==principal)});
    arr.forEach(c=>usados.add(c.id));
  });
  // 2) Por nombre normalizado (solo clientes que no cayeron en un grupo por teléfono)
  const porNom={};
  clientes.forEach(c=>{if(usados.has(c.id))return;const n=norm(c.name||'').trim();if(n)(porNom[n]=porNom[n]||[]).push(c);});
  Object.values(porNom).forEach(arr=>{
    if(arr.length<2)return;
    // Si tienen 2+ teléfonos DISTINTOS entre sí, probablemente son personas diferentes → no unir
    const telsDistintos=new Set(arr.map(c=>_phoneKey(c)).filter(p=>p.length>=7));
    if(telsDistintos.size>1)return;
    const principal=elegirPrincipal(arr);
    grupos.push({tipo:'nombre',principal,otros:arr.filter(c=>c!==principal)});
    arr.forEach(c=>usados.add(c.id));
  });
  return grupos;
}

async function confirmarUnirDuplicados(){
  const sel=S.dupSel||new Set();
  const grupos=_dupGroups.filter((g,i)=>sel.has(i));
  if(!grupos.length){toast('Marca al menos un grupo','B');return;}
  let unidos=0,subsMovidas=0;
  grupos.forEach(g=>{
    const P=g.principal;P.subs=P.subs||[];
    g.otros.forEach(o=>{
      // Mover (clonando) las suscripciones al principal — clon para no compartir referencias con la copia en papelera
      (o.subs||[]).forEach(s=>{P.subs.push({...s});subsMovidas++;});
      if(!P.phone&&o.phone)P.phone=o.phone;
      if(o.notes)P.notes=(P.notes?P.notes+' · ':'')+o.notes;
      if(o.clientStatus==='Activo'||!o.clientStatus)P.clientStatus='Activo';
      // Reasignar los pagos del duplicado al cliente conservado (continuidad del historial)
      (S.pagos||[]).forEach(p=>{if(p.clientId===o.id){p.clientId=P.id;p.clientName=P.name;}});
      // Sacar el duplicado de clientes y guardarlo en papelera (con sus subs originales, recuperable)
      S.clients=S.clients.filter(c=>c.id!==o.id);
      if(!S.papelera)S.papelera=[];
      S.papelera.push({...o,deletedAt:Date.now(),_unidoA:P.id});
      unidos++;
    });
  });
  _dupGroups=[];S.dupSel=new Set();S.dupMod=false;render();
  sv();
  toast(`🔗 ${unidos} duplicado(s) unido(s) · ${subsMovidas} suscripción(es) movida(s)`,'G');
}

// AUTOMATIZACIÓN: suspende clientes 100% vencidos hace más de N días (solo si está activado). Devuelve cuántos.
function autoSuspenderVencidos(){
  if(!S.autoSuspend)return 0;
  const dias=parseInt(S.autoSuspendDays)||30;let n=0;
  S.clients.forEach(c=>{
    if((c.clientStatus||'Activo')!=='Activo')return;
    const subs=c.subs||[];if(!subs.length)return;
    if(!subs.every(s=>gst(s.endDate)==='ven'))return;       // todas vencidas
    const latest=subs.reduce((m,s)=>{const d=dl(s.endDate);return d===null?m:Math.max(m,d)},-Infinity);
    if(latest===-Infinity)return;
    if(latest< -dias){c.clientStatus='Suspendido';c.autoSuspendedAt=nowDate();n++;}  // la más reciente venció hace +dias
  });
  return n;
}

// Sincroniza AUTOMÁTICAMENTE el catálogo (precios + combos + marca) con la página pública
// puntoflix.com (doc publico/catalogo, la landing lo lee sin login). Sin botón: se dispara al
// guardar precios/combos/plataformas/nombre. Solo el owner puede escribir (regla Firestore
// publico/*); para otros usuarios es un no-op. Escritura directa, NO pasa por sv() (es otro doc).
// Guard anti-borrón: si no hay nada con precio no publica (no deja la página en blanco).
function _syncCatalogoWeb(){
  if(!esOwner())return;
  try{
    const plats=PLATS.filter(p=>p!=='Otro'&&parseFloat(getCatalogoPrecio(p))>0);
    const combos=getCombos().filter(cb=>parseFloat(cb.precio)>0);
    if(!plats.length&&!combos.length)return;
    const precios={};plats.forEach(p=>{precios[p]=parseFloat(getCatalogoPrecio(p));});
    db.collection('publico').doc('catalogo').set({
      precios:JSON.stringify(precios),
      combos:JSON.stringify(combos.map(cb=>({nombre:cb.nombre,apps:cb.apps,precio:parseFloat(cb.precio)}))),
      biz:S.biz||'PUNTOFLIX',
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>toast('🏪 puntoflix.com actualizado','B')).catch(e=>console.error('Sync catálogo web:',e));
  }catch(e){console.error('Sync catálogo web:',e);}
}

// Lista de envío AGRUPADA por MISMO teléfono (o cliente) + misma fecha de vencimiento → 1 solo mensaje con total,
// aunque sean 2 registros de la misma persona. 'todos' = vencidos + hoy (+ mañana si S.incluirManana).
// Cada grupo: {c(primer dueño), tipo, endDate, subs[], items[{c,s}]} — items lleva el dueño real de cada sub.
function getListaEnvio(dia){
  const rem=getReminders();
  const tag=(arr,t)=>arr.map(x=>({...x,tipo:t}));
  let flat;
  if(dia==='vencidos')flat=tag(rem.vencidos,'vencido');
  else if(dia==='tomorrow')flat=tag(rem.tomorrow,'manana');
  else if(dia==='today')flat=tag(rem.today,'hoy');
  else{flat=[...tag(rem.vencidos,'vencido'),...tag(rem.today,'hoy')];if(S.incluirManana!==false)flat=flat.concat(tag(rem.tomorrow,'manana'));}
  flat=flat.filter(x=>x.c.phone);
  const grupos=[];const idx={};
  flat.forEach(x=>{
    const ph=_phoneKey(x.c);
    const key=(ph?'ph:'+ph:'id:'+x.c.id)+'|'+(x.s.endDate||'');
    if(idx[key]===undefined){idx[key]=grupos.length;grupos.push({c:x.c,tipo:x.tipo,endDate:x.s.endDate,subs:[x.s],items:[{c:x.c,s:x.s}]});}
    else{grupos[idx[key]].subs.push(x.s);grupos[idx[key]].items.push({c:x.c,s:x.s});}
  });
  return grupos;
}

// Clientes activos cuyas suscripciones vencieron hace >= S.seguimientoDias y aún no renuevan.
function getSeguimiento(){
  if(S.seguimiento===false)return [];
  const dias=Math.max(1,parseInt(S.seguimientoDias)||2);
  // Agrupar por MISMO teléfono (o cliente) → un solo seguimiento por persona aunque sean 2 registros. items=[{c,s}]
  const grupos=[];const idx={};
  S.clients.filter(c=>(c.clientStatus==='Activo'||!c.clientStatus)&&c.sendReminders!==false&&c.phone).forEach(c=>{
    const subs=(c.subs||[]).filter(s=>{const n=dl(s.endDate);return n!==null&&n<=-dias});
    if(!subs.length)return;
    const ph=_phoneKey(c);const key=ph.length>=7?('ph:'+ph):('id:'+c.id);
    if(idx[key]===undefined){idx[key]=grupos.length;grupos.push({c,subs:subs.slice(),items:subs.map(s=>({c,s}))});}
    else{const g=grupos[idx[key]];subs.forEach(s=>{g.subs.push(s);g.items.push({c,s});});}
  });
  return grupos;
}
// Segundo aviso, amable pero más directo
function genWASeguimiento(c,subs){
  const nombre=c.name||'cliente';
  if(subs.length===1){
    return aplicarPlantilla('seguimiento',_plantData(c,subs[0]));
  }
  const info=totalSubs(subs);const total=info.total;const esCombo=!!info.combo;
  let msg=`👋 ¡Hola de nuevo, *${nombre}*!\n\nTienes estas cuentas vencidas que aún no renuevas:\n`;
  subs.forEach(s=>{msg+=`\n• *${s.platform}*${s.accountEmail?` (${s.accountEmail})`:''}${s.profile?` · Perfil ${s.profile}`:''}${esCombo?'':` — $${precioMostrar(s).toFixed(2)}`} (venció ${fdRel(s.endDate)})`;});
  msg+=`\n\n${esCombo?`🎁 *Combo ${info.combo.nombre}*\n`:''}💰 Total para reactivar todo: *$${total.toFixed(2)}*\n\n¿Las reactivamos hoy? 🍿`;
  return msg;
}

function parseImportDate(v){if(!v)return'';if(v instanceof Date)return v.toISOString().slice(0,10);const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`}return''}

// ── VINCULAR SUSCRIPCIONES A CUENTAS MAESTRAS AUTOMÁTICAMENTE ──
async function vincularSuscripcionesACuentas(silent=false){
  let vinculadas=0,yaVinculadas=0,sinMatch=0;
  S.clients.forEach(c=>{
    (c.subs||[]).forEach(s=>{
      if(s.masterAccountId){const exists=S.cuentas.find(ca=>ca.id===s.masterAccountId);if(exists){yaVinculadas++;return}}
      if(!s.platform||!s.accountEmail){sinMatch++;return}
      const emailLower=s.accountEmail.toLowerCase().trim();
      const match=S.cuentas.find(ca=>ca.platform===s.platform&&(ca.email||'').toLowerCase().trim()===emailLower);
      if(match){s.masterAccountId=match.id;vinculadas++;}
      else sinMatch++;
    });
  });
  sv(); // guardado en 2.º plano — la vinculación ya quedó aplicada en memoria
  if(!silent){
    if(vinculadas>0)toast('🔗 '+vinculadas+' suscripción(es) vinculada(s) automáticamente','G');
    else if(yaVinculadas>0)toast('✅ Todas las suscripciones ya estaban vinculadas','B');
    else toast('⚠️ No se encontraron coincidencias para vincular','R');
  }
  return {vinculadas,yaVinculadas,sinMatch};
}

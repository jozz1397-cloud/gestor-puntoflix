<title>PUNTOFLIX Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6fb;--surf:#ffffff;--surf2:#f8f9fd;--surf3:#f1f3fa;
  --border:#e4e7f2;--border2:#d5d9ed;
  --acc:#a3e635;--acc2:#bef264;--accTx:#4d7c0f;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;
  --sw:252px;--sw-col:68px;
  --radius:14px;--radius2:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.05);
}
body.dark{
  --bg:#0d1424;--surf:#141c30;--surf2:#1a2340;--surf3:#212c4a;
  --border:#262f4c;--border2:#30395a;--accTx:#a3e635;
  --text:#eef2fb;--text2:#9eaace;--text3:#7884ad;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 16px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.2);
  --shadow-lg:0 10px 40px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.3);
}
body.dark select option{background:#141c30;color:var(--text)}
body.dark .tB{background:#141c30;border-color:var(--border2);color:var(--text)}
body.dark .lCard{box-shadow:var(--shadow-lg)}
body.dark #lScr{background:radial-gradient(ellipse at 30% 40%,rgba(163,230,53,.06) 0%,var(--bg) 60%)}
body.dark .tw{box-shadow:var(--shadow-md)}
body.dark .sb{background:var(--bg)}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased}
input,select,textarea{background:var(--surf);border:1.5px solid var(--border2);border-radius:var(--radius2);padding:9px 12px;color:var(--text);font-size:13px;outline:none;width:100%;transition:all .18s;font-family:inherit;font-weight:400}
input:focus,select:focus,textarea:focus{border-color:var(--accTx);box-shadow:0 0 0 3px rgba(163,230,53,.1);background:var(--surf)}
select option{background:var(--surf);color:var(--text)}
.lbl{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;letter-spacing:.2px;font-weight:500}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap;letter-spacing:.1px;font-family:inherit}
.bp{background:var(--acc);color:#07130c;box-shadow:0 2px 8px rgba(163,230,53,.3)}.bp:hover{background:#bef264;box-shadow:0 4px 14px rgba(163,230,53,.45);transform:translateY(-1px)}
.bs{background:var(--surf);color:var(--text);border:1.5px solid var(--border2)}.bs:hover{background:var(--surf2)}
.bg2{background:rgba(16,185,129,.08);color:var(--green);border:1.5px solid rgba(16,185,129,.2)}.bg2:hover{background:rgba(16,185,129,.15)}
.bw{background:rgba(37,211,102,.08);color:#25d366;border:1.5px solid rgba(37,211,102,.2)}.bw:hover{background:rgba(37,211,102,.15)}
.by{background:rgba(245,158,11,.08);color:var(--yellow);border:1.5px solid rgba(245,158,11,.2)}.by:hover{background:rgba(245,158,11,.15)}
.bb{background:rgba(59,130,246,.08);color:var(--blue);border:1.5px solid rgba(59,130,246,.2)}.bb:hover{background:rgba(59,130,246,.15)}
.br{background:rgba(239,68,68,.08);color:var(--red);border:1.5px solid rgba(239,68,68,.2)}.br:hover{background:rgba(239,68,68,.15)}
.bf{width:100%;justify-content:center}
.ib{padding:5px 7px;background:transparent;border:none;cursor:pointer;border-radius:6px;color:var(--text2);font-size:14px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center}.ib:hover{background:var(--surf3);color:var(--text)}
/* Iconos SVG del chrome: heredan color (currentColor), alineados al texto */
.svgi{vertical-align:-2px;flex-shrink:0;display:inline-block}
.btn .svgi{margin-right:2px}
.subMenuItem .svgi{margin-right:7px;vertical-align:-3px;opacity:.9}
/* Botones utilitarios con emoji (copiar/ver clave/expandir): monocromo sobrio */
.cpB,.pT,.expBtn{filter:grayscale(1);opacity:.85}
/* Números alineados en tarjetas, precios y tablas (look de app financiera) */
body{font-variant-numeric:tabular-nums}
.subMenuItem{display:block;width:100%;text-align:left;padding:8px 12px;background:transparent;border:none;cursor:pointer;border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;transition:all .12s;font-weight:500}.subMenuItem:hover{background:var(--surf2)}

/* LOGIN */
#lScr{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;background:radial-gradient(ellipse at 30% 40%,#fff1f1 0%,var(--bg) 65%)}
.lCard{background:var(--surf);border:1.5px solid var(--border);border-radius:20px;padding:48px 44px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.lLogo{text-align:center;margin-bottom:36px}
.lLogo h1{font-size:30px;font-weight:800;background:linear-gradient(135deg,#bef264,var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.lLogo p{color:var(--text2);font-size:12px;margin-top:8px;letter-spacing:.3px;font-weight:500}
.lLogo svg{display:block;margin:0 auto 10px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.18))}
.fg{margin-bottom:16px}

/* APP LAYOUT */
#aScr{display:flex;height:100vh;height:100dvh}
.sb{width:var(--sw);background:var(--surf);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .22s cubic-bezier(.4,0,.2,1),min-width .22s;overflow:hidden}
.sb.collapsed{width:var(--sw-col);min-width:var(--sw-col)}
.sb.collapsed .sbLogoText,.sb.collapsed .nLbl,.sb.collapsed .bLbl,.sb.collapsed .sbDivider{opacity:0;pointer-events:none;width:0;overflow:hidden;white-space:nowrap}
.sb.collapsed .sbTop{padding:16px 18px}
.sb.collapsed .sbN{padding:8px}
.sb.collapsed .ni{padding:10px;justify-content:center;gap:0}
.sb.collapsed .nBdg{position:absolute;top:4px;right:4px;font-size:8px;padding:1px 4px;min-width:14px;display:flex;justify-content:center}
.sb.collapsed .sbF{padding:8px}
.sb.collapsed .sbF button{justify-content:center;padding:8px}
.sbToggle{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:4px 6px;border-radius:6px;margin-left:auto;transition:all .15s;flex-shrink:0}.sbToggle:hover{background:var(--surf2);color:var(--text2)}
.sbTop{padding:16px 18px;border-bottom:1.5px solid var(--border)}
.sbLogo{display:flex;align-items:center;gap:10px}
.sbLogoIcon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbLogoText{transition:opacity .18s;white-space:nowrap}
.sbLogoText div:first-child{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.3px}
.sbLogoText div:last-child{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500}
.sbN{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:pointer;color:var(--text);font-size:14px;transition:all .15s;position:relative;border:none;background:none;width:100%;text-align:left;border-radius:var(--radius2);font-weight:600}
.ni:hover{background:var(--surf2);color:var(--text)}
.ni.on{background:var(--acc);color:#07130c;font-weight:700}
.ni.on:hover{background:var(--acc);color:#07130c}
.ni.on .niIcon{color:#07130c}
.ni.on .nBdg.bdgR{background:#07130c;color:#fff}
.niIcon{font-size:16px;width:20px;text-align:center;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:var(--text2)}
.ni:hover .niIcon{color:var(--text)}
.nLbl{transition:opacity .18s;white-space:nowrap}
.nBdg{border-radius:20px;padding:2px 6px;font-size:10px;font-weight:700;margin-left:auto}
.bdgR{background:var(--red);color:#fff}.bdgG{background:var(--green);color:#fff}
.sbDivider{height:1px;background:var(--border);margin:4px 8px;transition:opacity .18s}
.sbF{padding:10px}.bLbl{transition:opacity .18s;white-space:nowrap}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.tbr{background:var(--surf);border-bottom:1.5px solid var(--border);padding:calc(11px + env(safe-area-inset-top)) 22px 11px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tbr h2{font-size:20px;font-weight:800;flex:1;color:var(--text);letter-spacing:-.4px}
.sB{position:relative;display:flex;align-items:center}
.sB input{padding:7px 12px 7px 32px;width:200px;border-radius:20px;font-size:12px}
.sI{position:absolute;left:10px;color:var(--text3);pointer-events:none;font-size:12px}
.cont{flex:1;overflow-y:auto;padding:22px}
.darkToggle{background:none;border:1.5px solid var(--border2);cursor:pointer;color:var(--text2);font-size:14px;padding:5px 9px;border-radius:8px;transition:all .15s;flex-shrink:0}.darkToggle:hover{background:var(--surf2);color:var(--text)}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 16px;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s;box-shadow:var(--shadow)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.cBlue::before{background:var(--blue)}
.sc.cGreen::before{background:var(--green)}
.sc.cYellow::before{background:var(--yellow)}
.sc.cRed::before{background:var(--red)}
.sc.cPurple::before{background:var(--purple)}
.sc .lb{font-size:12.5px;color:var(--text);margin-bottom:8px;font-weight:600}
.sc .vl{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sc .sb2{font-size:11px;color:var(--text2);margin-top:4px}
.cBlue .vl{color:var(--blue)}.cGreen .vl{color:var(--green)}.cYellow .vl{color:var(--yellow)}.cRed .vl{color:var(--red)}.cPurple .vl{color:var(--purple)}

/* CARDS / TABLE */
.tw{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.tb2{padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1.5px solid var(--border)}
.twTitle{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.1px}
.fs{background:var(--surf2);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;color:var(--text);font-size:12px;outline:none;cursor:pointer;font-weight:500}
.tc{overflow-x:auto;max-height:calc(100vh - 200px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;background:var(--surf2);z-index:2}
th{padding:9px 12px;text-align:left;font-size:11px;color:var(--text2);white-space:nowrap;font-weight:600;letter-spacing:.1px;border-bottom:1.5px solid var(--border)}
td{padding:12px 12px;border-top:1px solid var(--border);white-space:nowrap;vertical-align:middle;font-size:12px}
tr.cRow{transition:background .12s}
tr.cRow:hover td{background:rgba(59,130,246,.025)}
tr.sRow td{background:rgba(163,230,53,.012);border-top:1px solid var(--border)}
tr.sRow:hover td{background:rgba(163,230,53,.04)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.2px}
.bAct{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.bExp{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.bVen{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bUnk{background:rgba(107,114,128,.1);color:var(--text2);border:1px solid var(--border)}


/* ALERTS */
.alert{border-radius:var(--radius2);padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.alert h4{font-size:13px;font-weight:600;margin-bottom:2px}
.alert p{font-size:11px;opacity:.8}
.alertY{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2)}.alertY h4{color:var(--yellow)}
.alertR{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2)}.alertR h4{color:var(--red)}
.alertG{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2)}.alertG h4{color:var(--green)}

/* REMINDER CARDS */
.remCard{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--radius2);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:all .15s}
.remCard:hover{border-color:rgba(163,230,53,.35);background:rgba(163,230,53,.02)}
.remAvatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.remInfo{flex:1;min-width:0}
.remName{font-weight:600;font-size:13px;color:var(--text)}
.remSub{font-size:11px;color:var(--text2);margin-top:2px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:calc(16px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom));backdrop-filter:blur(6px)}
.mod{background:var(--surf);border:1.5px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:calc(100vh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));max-height:calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));overflow-y:auto;box-shadow:var(--shadow-lg)}
.mh{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:16px 16px 0 0}
.mh h3{font-size:14px;font-weight:700;letter-spacing:-.1px}
.mb{padding:20px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg2 .full{grid-column:1/-1}
.cModFilaFechas{grid-template-columns:1fr 1fr 1fr}
.mf{padding:12px 20px;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surf);border-radius:0 0 16px 16px}
.pW{display:flex}.pW input{border-radius:var(--radius2) 0 0 var(--radius2)!important;border-right:none!important}
.pT{background:var(--surf2);border:1.5px solid var(--border2);border-left:none;border-radius:0 var(--radius2) var(--radius2) 0;padding:0 10px;cursor:pointer;color:var(--text2);font-size:13px}.pT:hover{color:var(--text)}

/* CHARTS */
.cr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.cc{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.cc h4{font-size:11px;color:var(--text2);margin-bottom:12px;font-weight:600;letter-spacing:.2px}
.bR{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px}
.bL{width:80px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.bT{flex:1;background:var(--surf3);border-radius:20px;height:14px;overflow:hidden}
.bF{height:100%;border-radius:20px;background:var(--acc);display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-size:9px;font-weight:700;color:#07130c;min-width:20px}

/* WA */
.waCard{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--radius2);padding:11px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s}
.waCard input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;margin-top:3px;accent-color:#25d366}
.waMsg{background:rgba(37,211,102,.04);border:1px solid rgba(37,211,102,.15);border-radius:6px;padding:10px;font-size:11px;color:var(--text2);margin-top:7px;white-space:pre-wrap;line-height:1.6}

/* ACTION BUTTONS */
.iconActionBtn{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;border:1px solid transparent;user-select:none;flex-shrink:0}
.fabBtn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:14px;background:var(--acc);color:#07130c;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(163,230,53,.4);z-index:90;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fabBtn:hover{transform:scale(1.06);box-shadow:0 6px 24px rgba(163,230,53,.5)}
@media(max-width:680px){
  .fabBtn{bottom:calc(84px + env(safe-area-inset-bottom));right:16px;width:48px;height:48px;font-size:20px;border-radius:12px}
  .toast{bottom:calc(90px + env(safe-area-inset-bottom))}
}

// ── APLICAR DATOS DESDE FIRESTORE (una sola fuente, usada al cargar y al sincronizar) ──
// ── BASE DE SINCRONIZACIÓN (para fusión 3-way en conflictos) ──
// Foto por-item (id → JSON) del ÚLTIMO estado del servidor que vio este dispositivo.
// En un conflicto permite distinguir qué items se tocaron AQUÍ de los que solo están viejos:
// si un item local está idéntico a la base, lo del servidor es más nuevo y debe ganar.
// (Antes lo local pisaba SIEMPRE: un dispositivo con datos viejos revertía renovaciones
// hechas en el celular al guardar cualquier cosa, p.ej. marcar un recordatorio enviado.)
const _SYNC_COLS=['clients','pagos','cuentas','proveedores','papelera','papeleraCuentas','papeleraProveedores'];
let _syncBase={};
// Campos de AJUSTES (todo lo que NO es una de las colecciones por-id de arriba ni los marcadores waEnviados/
// waSeguimiento). Se fusionan aparte, con la misma idea 3-way: en un conflicto, un ajuste solo lo pisa este
// dispositivo si REALMENTE lo cambió (difiere de la base); si no, gana el servidor. Así cambiar un precio del
// catálogo en la PC ya no se pierde porque el celular guardó un cliente al mismo tiempo (y viceversa).
// ⚠️ Si agregas un ajuste nuevo a sv()/aplicarDatosFirestore, agrégalo también aquí y en _configFromState().
const _CONFIG_KEYS=['catalogo','platLimits','customPlats','platsOcultas','autoBackupEnabled','autoBackupDays','lastBackup','biz','reminderDays','platGroups','combos','countryCode','dailyDigest','autoSuspend','autoSuspendDays','seguimiento','seguimientoDias','confirmacionPago','plantillas','datosPago'];
let _syncBaseSettings={}; // ajustes tal como estaban en el servidor la última vez que lo vimos (forma cruda de Firestore)
function _configFromData(d){const o={};if(!d)return o;_CONFIG_KEYS.forEach(k=>{o[k]=d[k];});return o;}
// Ajustes actuales de S en la MISMA forma serializada que el payload de _svCore (para comparar contra la base).
function _configFromState(){
  return {
    catalogo:JSON.stringify(S.catalogo||{}),platLimits:JSON.stringify(S.platLimits||{}),
    customPlats:JSON.stringify(S.customPlats||[]),platsOcultas:JSON.stringify(S.platsOcultas||[]),
    autoBackupEnabled:S.autoBackupEnabled,autoBackupDays:S.autoBackupDays,lastBackup:S.lastBackup||'',
    biz:S.biz,reminderDays:S.reminderDays,platGroups:JSON.stringify(S.platGroups||{}),
    combos:Array.isArray(S.combos)?JSON.stringify(S.combos):'',countryCode:S.countryCode||'',
    dailyDigest:S.dailyDigest,autoSuspend:S.autoSuspend,autoSuspendDays:S.autoSuspendDays,
    seguimiento:S.seguimiento,seguimientoDias:S.seguimientoDias,confirmacionPago:S.confirmacionPago,
    plantillas:JSON.stringify(S.plantillas||{}),datosPago:S.datosPago||''
  };
}
function _syncBaseFrom(d){
  try{
    const out={};
    _SYNC_COLS.forEach(k=>{
      const m=new Map();
      try{(JSON.parse(d[k]||'[]')||[]).forEach(it=>{if(it&&it.id!=null)m.set(it.id,JSON.stringify(it));});}catch(e){}
      out[k]=m;
    });
    _syncBase=out;
    _syncBaseSettings=_configFromData(d); // misma base, para la fusión 3-way de ajustes
  }catch(e){}
}
function aplicarDatosFirestore(d){
  if(!d)return;
  if(d.clients)S.clients=JSON.parse(d.clients);
  if(d.pagos)S.pagos=JSON.parse(d.pagos);
  if(d.cuentas)S.cuentas=JSON.parse(d.cuentas);
  if(d.proveedores){try{S.proveedores=JSON.parse(d.proveedores)}catch(e){}}
  if(d.catalogo)S.catalogo=JSON.parse(d.catalogo);
  if(d.platLimits)S.platLimits=JSON.parse(d.platLimits);
  if(d.customPlats){S.customPlats=JSON.parse(d.customPlats);S.customPlats.forEach(p=>{if(!PLATS.includes(p)){PLATS.splice(PLATS.length-1,0,p);if(!PI[p])PI[p]='📺';if(!PLATCOLORS[p])PLATCOLORS[p]='#6868a0';if(!PLAT_LIMITS[p])PLAT_LIMITS[p]=4;}});}
  if(d.platsOcultas){S.platsOcultas=JSON.parse(d.platsOcultas);S.platsOcultas.forEach(p=>{const i=PLATS.indexOf(p);if(i>-1)PLATS.splice(i,1);});}
  if(d.papelera)S.papelera=JSON.parse(d.papelera);
  if(d.papeleraCuentas){try{S.papeleraCuentas=JSON.parse(d.papeleraCuentas)}catch(e){}}
  if(d.papeleraProveedores){try{S.papeleraProveedores=JSON.parse(d.papeleraProveedores)}catch(e){}}
  if(typeof d.autoBackupEnabled==='boolean')S.autoBackupEnabled=d.autoBackupEnabled;
  if(d.autoBackupDays)S.autoBackupDays=d.autoBackupDays;
  if(d.lastBackup)S.lastBackup=d.lastBackup;
  if(d.biz)S.biz=d.biz;
  if(d.reminderDays)S.reminderDays=d.reminderDays;
  if(d.countryCode)S.countryCode=d.countryCode;
  if(typeof d.dailyDigest==='boolean')S.dailyDigest=d.dailyDigest;
  if(typeof d.autoSuspend==='boolean')S.autoSuspend=d.autoSuspend;
  if(d.autoSuspendDays)S.autoSuspendDays=d.autoSuspendDays;
  if(typeof d.seguimiento==='boolean')S.seguimiento=d.seguimiento;
  if(d.seguimientoDias)S.seguimientoDias=d.seguimientoDias;
  if(typeof d.confirmacionPago==='boolean')S.confirmacionPago=d.confirmacionPago;
  if(d.plantillas){try{S.plantillas=JSON.parse(d.plantillas)}catch(e){}}
  if(typeof d.datosPago==='string')S.datosPago=d.datosPago;
  // Marcadores "ya avisé/seguí": UNIÓN (local ∪ servidor), NO reemplazo. Antes un snapshot viejo o un
  // guardado propio que no llegó a la nube BORRABA los marcadores locales → "los avisos que mandé ayer
  // aparecen hoy como no enviados". Unir es seguro: _prunMarcadores quita los obsoletos (endDate que ya no
  // coincide con la sub, p.ej. tras renovar). No existe "desmarcar", así que unir nunca conserva algo que
  // debiera borrarse. Mismo criterio que la fusión de conflictos (`_fusionarConflicto`).
  if(d.waEnviados){try{S.waEnviados=_prunMarcadores(Object.assign({},S.waEnviados||{},JSON.parse(d.waEnviados)))}catch(e){}}
  if(d.waSeguimiento){try{S.waSeguimiento=_prunMarcadores(Object.assign({},S.waSeguimiento||{},JSON.parse(d.waSeguimiento)))}catch(e){}}
  if(d.platGroups){try{S.platGroups=JSON.parse(d.platGroups)}catch(e){}}
  if(d.combos){try{const cb=JSON.parse(d.combos);if(Array.isArray(cb))S.combos=cb}catch(e){}}
  // Versión del documento (control de concurrencia entre dispositivos): registra la última revisión vista.
  S._rev=(typeof d.rev==='number')?d.rev:0;
  _syncBaseFrom(d); // registrar la base: así quedó el servidor la última vez que lo vimos
  aplicarMarca(); // cada usuario ve SU nombre de negocio (título, meta iOS, caché local)
}
// Elimina de la papelera los items con más de 30 días (lo que promete la UI)
function _limpiarPapelera(){
  const limite=Date.now()-30*86400000;
  if(S.papeleraCuentas&&S.papeleraCuentas.length)S.papeleraCuentas=S.papeleraCuentas.filter(c=>!c.deletedAt||c.deletedAt>limite);
  if(S.papeleraProveedores&&S.papeleraProveedores.length){const purgar=S.papeleraProveedores.filter(p=>p.deletedAt&&p.deletedAt<=limite).map(p=>p.id);if(purgar.length)S.cuentas.forEach(ca=>{if(purgar.includes(ca.proveedorId))ca.proveedorId='';});S.papeleraProveedores=S.papeleraProveedores.filter(p=>!p.deletedAt||p.deletedAt>limite);}
  if(!S.papelera||!S.papelera.length)return 0;
  const antes=S.papelera.length;
  S.papelera=S.papelera.filter(c=>!c.deletedAt||c.deletedAt>limite);
  return antes-S.papelera.length;
}

// ── GUARDAR EN FIRESTORE ──────────────────────────────────────
let ultimoGuardadoLocal=0;
// Serializa los guardados: nunca corren dos a la vez en el mismo dispositivo (evita que un guardado
// automático en 2.º plano y uno manual choquen y se pisen). Cada sv() espera al anterior y luego corre.
let _svCola=Promise.resolve();
function sv(){
  // Respaldo local + bandera "pendiente" SINCRÓNICOS, ANTES de encolar: si `_svCore` queda detrás de otro
  // guardado en vuelo y la app se cierra en ese instante, el cambio (p.ej. una renovación con 💰) ya quedó
  // guardado en el dispositivo y el rescate de `ld()` lo recupera. `_svCore` los repite sin problema.
  try{const u=(auth.currentUser&&auth.currentUser.uid)||_ultimoUid;if(u){_guardarEmergencia(u);_marcarPendiente(u);}}catch(e){}
  _svCola=_svCola.then(_svCore,_svCore);return _svCola;
}
// Fusión en caso de conflicto: trae lo último del servidor PERO conserva el cambio
// que el usuario acaba de hacer en este dispositivo (antes se descartaba → se perdían clientes).
function _fusionarConflicto(serverData){
  // 0) Base 3-way: cómo estaba cada item la última vez que ESTE dispositivo vio el servidor.
  //    (capturar ANTES de aplicar el servidor, porque aplicarDatosFirestore la reescribe)
  const base=_syncBase||{};
  const baseS=_syncBaseSettings||{};   // ajustes tal como estaban en el servidor la última vez
  const localS=_configFromState();     // ajustes locales actuales (pueden traer un cambio recién hecho)
  // 1) Guardar el estado local actual (incluye el cambio recién hecho, p.ej. el cliente nuevo)
  const local={
    clients:S.clients,pagos:S.pagos,cuentas:S.cuentas,proveedores:S.proveedores,
    papelera:S.papelera,papeleraCuentas:S.papeleraCuentas,papeleraProveedores:S.papeleraProveedores,
    waEnviados:S.waEnviados,waSeguimiento:S.waSeguimiento
  };
  // 1b) AJUSTES 3-way: partimos de los del servidor y solo conservamos los que ESTE dispositivo cambió
  //     (difieren de la base). Si no cambió un ajuste, gana el servidor (respeta un cambio del otro equipo).
  //     Sin base conocida para un campo (doc viejo sin ese campo) → deja ganar al servidor (conservador).
  const mergedData={...serverData};
  try{Object.keys(localS).forEach(k=>{const b=baseS[k];if(b!==undefined&&localS[k]!==b)mergedData[k]=localS[k];});}catch(e){}
  // 2) Cargar lo último del servidor con los ajustes ya fusionados (deja S._rev en la revisión del servidor)
  aplicarDatosFirestore(mergedData);
  // 3) Fusión 3-way por id: parte de lo del servidor y superpone SOLO lo local que realmente
  //    cambió en este dispositivo (distinto a la base) o que es nuevo. Un item local IGUAL a la
  //    base no se tocó aquí → manda el servidor (no lo pisa ni lo revive si otro lo borró).
  //    Antes lo local ganaba SIEMPRE y un dispositivo viejo revertía renovaciones del celular.
  // 3a) SUBS 3-way dentro de un cliente que ESTE dispositivo cambió: sin esto, ganar el cliente ENTERO
  //     pisaba una suscripción añadida/renovada al mismo cliente desde el otro dispositivo (la fusión
  //     por-id ve al cliente como un solo item; las subs viven DENTRO). Regla por sub del servidor:
  //     no está local y NO estaba en la base → nueva del otro equipo → se añade;
  //     no está local pero SÍ estaba en la base → este equipo la borró → se respeta el borrado;

  const _fusionSubs3=(srvC,locC,baseC)=>{

    const baseSubs=new Map(((baseC&&baseC.subs)||[]).map(s=>[s&&s.id,JSON.stringify(s)]));
    ((srvC&&srvC.subs)||[]).forEach(ss=>{
      if(!ss||ss.id==null)return;
      if(!idx.has(ss.id)){if(!baseSubs.has(ss.id))out.push(ss);return;}

        bj=baseMap&&baseMap.get?baseMap.get(it.id):undefined;

      }catch(e){}

  S.proveedores=fusion(S.proveedores,local.proveedores,base.proveedores);
  S.papelera=fusion(S.papelera,local.papelera,base.papelera);
  S.papeleraCuentas=fusion(S.papeleraCuentas,local.papeleraCuentas,base.papeleraCuentas);
  S.papeleraProveedores=fusion(S.papeleraProveedores,local.papeleraProveedores,base.papeleraProveedores);

let _ultimoUid=null; // último uid conocido (para respaldar aunque la sesión se caiga un instante)

// confirmó. Si al abrir la app sigue puesta, el rescate de ld() usa el respaldo local SIN límite de horas
// (fix del caso real: cliente creado en la mañana con guardado fallido + app reabierta >2h después = se perdía).
function _marcarPendiente(uid){if(uid)try{localStorage.setItem('pf_pendiente_'+uid,'1');}catch(e){}}

function _guardarEmergencia(uid){

      dailyDigest:S.dailyDigest,autoSuspend:S.autoSuspend,autoSuspendDays:S.autoSuspendDays,
      seguimiento:S.seguimiento,seguimientoDias:S.seguimientoDias,confirmacionPago:S.confirmacionPago,plantillas:S.plantillas||{},datosPago:S.datosPago||'',
      waEnviados:S.waEnviados||{},waSeguimiento:S.waSeguimiento||{},

async function _svCore(_intentos){
  _intentos=_intentos||0;
  const uid=auth.currentUser?.uid;
  if(!uid){
    // Sesión no disponible en este instante (refresco de token, blip de auth). NO perder el cambio:
    // respaldar en el dispositivo y reintentar unos segundos a que vuelva la sesión.
    _guardarEmergencia(_ultimoUid);
    _marcarPendiente(_ultimoUid);
    setSync('error');
    if(_intentos<4){await new Promise(r=>setTimeout(r,1200));return _svCore(_intentos+1);}

  }
  _ultimoUid=uid;
  setSync('guardando');

  // RESPALDO LOCAL DE EMERGENCIA: guardar copia en el dispositivo ANTES de Firebase
  // Así si falla internet, los datos no se pierden
  _guardarEmergencia(uid);
  _marcarPendiente(uid); // se limpia solo cuando la nube confirme este guardado
  const ref=db.collection('usuarios').doc(uid);
  const payload={
      clients:JSON.stringify(S.clients),
      pagos:JSON.stringify(S.pagos),
      cuentas:JSON.stringify(S.cuentas),
      proveedores:JSON.stringify(S.proveedores||[]),
      papeleraProveedores:JSON.stringify(S.papeleraProveedores||[]),
      catalogo:JSON.stringify(S.catalogo||{}),
      platLimits:JSON.stringify(S.platLimits||{}),
      customPlats:JSON.stringify(S.customPlats||[]),
      platsOcultas:JSON.stringify(S.platsOcultas||[]),
      papelera:JSON.stringify(S.papelera||[]),
      papeleraCuentas:JSON.stringify(S.papeleraCuentas||[]),
      autoBackupEnabled:S.autoBackupEnabled,
      autoBackupDays:S.autoBackupDays,
      lastBackup:S.lastBackup||'',
      biz:S.biz,
      reminderDays:S.reminderDays,
      platGroups:JSON.stringify(S.platGroups||{}),
      combos:Array.isArray(S.combos)?JSON.stringify(S.combos):'',
      countryCode:S.countryCode||'',
      dailyDigest:S.dailyDigest,
      autoSuspend:S.autoSuspend,
      autoSuspendDays:S.autoSuspendDays,
      seguimiento:S.seguimiento,
      seguimientoDias:S.seguimientoDias,
      confirmacionPago:S.confirmacionPago,
      plantillas:JSON.stringify(S.plantillas||{}),
      datosPago:S.datosPago||'',
      waEnviados:JSON.stringify(S.waEnviados||{}),
      waSeguimiento:JSON.stringify(S.waSeguimiento||{}),

  // Si otro dispositivo/pestaña ya guardó (rev distinta), NO pisamos: recargamos lo último y avisamos.
  try{
    await db.runTransaction(async tx=>{
      const snap=await tx.get(ref);
      const serverRev=snap.exists?(snap.data().rev||0):0;
      if(snap.exists&&typeof S._rev==='number'&&serverRev!==S._rev){

      }
      tx.set(ref,payload);
    });

    return 'ok';
  }catch(e){
    if(e&&e.__conflict){
      // Otro dispositivo escribió mientras tanto. Fusionamos lo del servidor con NUESTRO cambio
      // (sin perder el cliente/edición recién hecho) y reintentamos el guardado.
      try{_fusionarConflicto(e.__data);}catch(_){try{aplicarDatosFirestore(e.__data);}catch(__){}}
      if(typeof renderCont==='function')try{renderCont();}catch(_){}
      if(_intentos<3){
        // Reintentar ya con la revisión del servidor + nuestro cambio fusionado.
        return _svCore(_intentos+1);
      }
      // Tras varios reintentos seguidos no podemos perder el cambio: forzar escritura (lo fusionado gana).
      const refF=db.collection('usuarios').doc(auth.currentUser?.uid);
      const payloadF={...payload,rev:((typeof S._rev==='number')?S._rev:0)+1,
        clients:JSON.stringify(S.clients),pagos:JSON.stringify(S.pagos),cuentas:JSON.stringify(S.cuentas),
        proveedores:JSON.stringify(S.proveedores||[]),papelera:JSON.stringify(S.papelera||[]),
        papeleraCuentas:JSON.stringify(S.papeleraCuentas||[]),papeleraProveedores:JSON.stringify(S.papeleraProveedores||[])};
      refF.set(payloadF).then(()=>{S._rev=payloadF.rev;_syncBaseFrom(payloadF);_limpiarPendiente(uid);setSync('ok');toast('✅ Guardado (datos fusionados con otro dispositivo)','G');})
        .catch(err=>{console.error('Error guardando (fusión):',err);setSync('error');});
      return 'ok';
    }else{
      // Sin conexión: la transacción falla offline → guardado directo (se encola y sincroniza al reconectar).
      // No se puede esperar (offline nunca resuelve), así que se confía en el respaldo local + la cola del SDK.
      if(!navigator.onLine){
        setSync('offline');
        ref.set(payload).then(()=>{S._rev=payload.rev;_syncBaseFrom(payload);_limpiarPendiente(uid);setSync('ok');}).catch(err=>{console.error('Error guardando en la nube:',err);});
        return 'offline';
      }
      // Online pero la transacción falló por otra razón (permisos, transitorio): intentar set directo
      // y ESPERAR el resultado real para no mentir con un "guardado" falso.
      try{await ref.set(payload);S._rev=payload.rev;_syncBaseFrom(payload);_limpiarPendiente(uid);setSync('ok');return 'ok';}
      catch(err){console.error('Error guardando en la nube:',err);setSync('error');return 'error';}
    }
  }
}

            const snapCa=new Map((snap.cuentas||[]).map(a=>[a&&a.id,a]));
            S.cuentas.forEach(a=>{const la=snapCa.get(a.id);if(!la||!la.renewalDate)return;
              if(!a.renewalDate||cmp(la.renewalDate,a.renewalDate)){a.renewalDate=la.renewalDate;if(la.startDate)a.startDate=la.startDate;rescatados++;}});
          }
          if(rescatados>0){
            // Volver a subir lo rescatado para que nube y respaldo queden iguales.
            setTimeout(()=>{sv();toast('🛟 Se recuperaron '+rescatados+' dato(s) que no se habían subido a la nube','B');},1200);
          }else if(pendiente){
            _limpiarPendiente(uid); // nada que rescatar: el cambio sí llegó por otra vía (cola offline del SDK)
          }
        }
      }
    }catch(e){console.error('Error rescate local:',e);}
  }
  // Limpiar papelera de items con más de 30 días
  const eliminados=_limpiarPapelera();
  if(eliminados>0)sv();
  // Aviso si el documento se acerca al límite de 1 MB de Firestore
  if(dataBytes()>850000)setTimeout(()=>toast('⚠️ Tus datos están cerca del límite de almacenamiento. Ve a Ajustes → Mantenimiento de Datos para archivar pagos viejos.','B'),2500);
  aplicarMarca(); // cubre también el restore de emergencia local, que setea S.biz sin pasar por aplicarDatosFirestore
  _registrarDirectorio(); // ficha en el directorio de usuarios (correo/marca/última entrada), en 2.º plano
}

function platGroup(p){

function addDays(d,n){if(!d)d=nowDate();const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return localISO(dt)}
function addMonths(d,n){if(!d)d=nowDate();const dt=new Date(d+'T12:00:00');const day=dt.getDate();dt.setMonth(dt.getMonth()+n);if(dt.getDate()<day)dt.setDate(0);return localISO(dt)}

// aniversario y no descuenta los días que el cliente esperó para pagar). PERO si el cliente lleva vencido
// MÁS de ese periodo, "anterior + N" caería en el PASADO y la cuenta seguiría vencida al instante (era la
// causa de "renové/cobré y sigue en pendientes", sobre todo con los botones 💰/💸 de 1 toque sin fecha):
// en ese caso se cuentan N meses DESDE HOY para que quede siempre al día. Compara como string 'YYYY-MM-DD'
// (localISO va con padding, así que es orden cronológico).
function renovDesde(base,meses){meses=meses||1;const cand=addMonths(base||nowDate(),meses);return cand>nowDate()?cand:addMonths(nowDate(),meses);}

// Fuentes de "días de atraso": (1) pagos con venciaEl (exacto, guardado al renovar desde jul 2026);
// (2) pares consecutivos de pagos de la MISMA plataforma: fecha del pago vs endDate del pago anterior
//     (ese endDate era el vencimiento que se estaba pagando); (3) subs vencidas HOY (atraso corriente).

function puntualidadCliente(c){
  if(!_puntCache)_puntCache={};
  if(_puntCache[c.id]!==undefined)return _puntCache[c.id];
  const atrasos=[];
  const pagos=S.pagos.filter(p=>p.clientId===c.id&&!p.esCosto&&(parseFloat(p.monto)||0)>0).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  const prevPorPlat={};
  pagos.forEach(p=>{
    if(p.venciaEl){const d=_diasEntre(p.venciaEl,p.fecha);if(d!==null&&d>=-60&&d<=120)atrasos.push(d);}
    else if(p.platform&&p.endDate){
      const prev=prevPorPlat[p.platform];
      if(prev&&prev.endDate){const d=_diasEntre(prev.endDate,p.fecha);if(d!==null&&d>=-60&&d<=120)atrasos.push(d);}
    }
    if(p.platform&&p.endDate)prevPorPlat[p.platform]=p;
  });
  (c.subs||[]).forEach(s=>{if(gst(s.endDate)==='ven'){const n=dl(s.endDate);if(n!==null)atrasos.push(Math.min(-n,120));}});
  let r=null;
  if(atrasos.length>=2){
    const avg=atrasos.reduce((a,b)=>a+b,0)/atrasos.length;
    r={n:atrasos.length,avg,cat:avg<=1?'P':avg<=5?'M':'X'};
  }

}

function profInUseReal(caId){

  if(subs.some(s=>s.cuentaCompleta))return parseInt((S.cuentas.find(x=>x.id===caId)||{}).totalProfiles)||0;

function profDisponibles(caId){
  const ca=S.cuentas.find(x=>x.id===caId);

  if(subs.some(s=>s.cuentaCompleta))return 0;

// Normaliza para buscar: minúsculas y sin tildes/acentos (José → jose)

function filtered(){return S.clients.filter(c=>{

  const ms=!q||[c.name,c.phone].some(x=>norm(x).includes(q))||(c.subs||[]).some(s=>[s.platform,s.accountEmail,s.profile,s.profilePin].some(v=>norm(v).includes(q)));

  const mst=!S.fStat||(S.fStat==='urgente'?(cliSt(c)==='exp'||cliSt(c)==='ven'):cliSt(c)===S.fStat);
  const mcs=!S.fClientSt||c.clientStatus===S.fClientSt;
  return ms&&mp&&mst&&mcs;
}).sort((a,b)=>{
  // Cancelados al final
  const aCanc=(a.clientStatus==='Cancelado')?1:0;
  const bCanc=(b.clientStatus==='Cancelado')?1:0;
  if(aCanc!==bCanc)return aCanc-bCanc;
  // Después suspendidos
  const aSusp=(a.clientStatus==='Suspendido')?1:0;
  const bSusp=(b.clientStatus==='Suspendido')?1:0;
  if(aSusp!==bSusp)return aSusp-bSusp;
  // Finalmente por fecha de vencimiento más próxima (incluyendo vencidos primero)
  const ea=Math.min(...(a.subs||[]).map(s=>s.endDate?new Date(s.endDate).getTime():9e15),9e15);
  const eb=Math.min(...(b.subs||[]).map(s=>s.endDate?new Date(s.endDate).getTime():9e15),9e15);
  return ea-eb;
})}

// Normaliza un teléfono a formato internacional para WhatsApp, anteponiendo el código de país si falta
function waNum(phone){
  let n=String(phone||'').replace(/\D/g,'');
  if(!n)return '';
  const cc=(S.countryCode||'593').replace(/\D/g,'');
  if(cc&&n.startsWith(cc))return n;        // ya trae el código de país
  if(n.startsWith('00'))return n.slice(2); // prefijo internacional 00 → quitar
  if(n.startsWith('0'))n=n.slice(1);       // quitar 0 inicial local
  if(cc&&n.length<=10)return cc+n;         // número local → anteponer código
  return n;
}
function openWA(phone,msg){
  const num=waNum(phone);
  if(!num){toast('❌ Teléfono inválido','R');return}
  // Codificar correctamente: encodeURIComponent maneja UTF-8 multi-byte
  // pero hay que asegurar que el string ya esté en UTF-8 correcto
  const encoded=encodeURIComponent(msg);
  // api.whatsapp.com/send es más estable con caracteres especiales que wa.me
  const url='https://api.whatsapp.com/send?phone='+num+'&text='+encoded;
  window.open(url,'_blank');
}

// Precio a mostrar/cobrar: SIEMPRE el precio propio del cliente; el catálogo solo es respaldo si la suscripción no tiene precio
function precioMostrar(s){const tienePrecio=s&&s.price!==''&&s.price!==null&&s.price!==undefined;const propio=parseFloat(s&&s.price);if(tienePrecio&&propio>=0)return propio;const cat=getCatalogoPrecio(s.platform);return (cat&&parseFloat(cat)>0)?parseFloat(cat):0;}
// Duración en meses de una suscripción, deducida de sus fechas inicio→fin (sin campos nuevos).
// Ej: Spotify 3 meses a $8 → 3. Hasta ~45 días se considera mensual (mes + días de gracia).
function mesesSub(s){
  if(!s||!s.startDate||!s.endDate)return 1;
  const dias=(new Date(s.endDate+'T12:00:00')-new Date(s.startDate+'T12:00:00'))/86400000;
  if(!(dias>45))return 1;
  return Math.max(1,Math.round(dias/30.44));
}
// Precio MENSUAL equivalente: prorratea los planes de 3/6/12 meses para que los cálculos "por mes"
// (ingresos por cuenta, rentabilidad, oportunidad de venta) no cuenten el total del plan como si fuera mensual.
// El flujo de caja real ("Cobrado mes", pagos) NO usa esto: la plata entra completa el día que se cobra.
function precioMensual(s){return precioMostrar(s)/mesesSub(s)}

// Limpia el mensaje: paréntesis/negritas vacíos, espacios y saltos sobrantes
function _limpiarMsg(m){
  return String(m)
    .replace(/\(\s*\)/g,'')
    .replace(/\*\s*\*/g,'')
    .replace(/[ \t]{2,}/g,' ')
    .replace(/[ \t]+\n/g,'\n')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
// Reemplaza {variables} línea por línea. Si una línea de dato (etiqueta:) queda con su variable vacía, se elimina.
function _renderTpl(tpl,data){
  const lines=String(tpl||'').split('\n').map(line=>{
    const ph=line.match(/\{(\w+)\}/g)||[];
    let rep=line;
    for(const k in data){rep=rep.split('{'+k+'}').join(data[k]==null?'':String(data[k]));}
    if(ph.length){
      const todasVacias=ph.every(p=>{const k=p.slice(1,-1);return !data[k]&&data[k]!==0;});
      if(todasVacias){
        const sinPh=line.replace(/\{\w+\}/g,'').trim();
        if(/[:：]\*?\s*$/.test(sinPh))return null; // etiqueta de dato sin valor → quitar línea
      }
    }
    return rep;
  }).filter(l=>l!==null);
  return _limpiarMsg(lines.join('\n'));
}

// Mensaje unificado cuando un cliente tiene VARIAS suscripciones el mismo día: una sola lista + total
// Detecta si un conjunto de suscripciones forma un combo definido (mismas plataformas, sin importar orden)
function comboDe(subs){
  if(!subs||subs.length<2)return null;
  const setSubs=[...new Set(subs.map(s=>platGroup(s.platform)))].sort();
  if(setSubs.length!==subs.length)return null; // plataformas repetidas → no es un combo limpio
  return getCombos().find(cb=>{
    const setCb=[...new Set(cb.apps.map(a=>platGroup(a)))].sort();
    return setCb.length===setSubs.length&&setCb.every((a,i)=>a===setSubs[i]);
  })||null;
}
// Particiona un grupo de subs en combos (por conjunto de plataformas) + sueltos, aunque haya apps extra.
// Greedy, combos más grandes primero. Devuelve {combos:[{combo,subs}], sueltos:[...], total}.
function desgloseCombos(subs){
  let rest=(subs||[]).slice();
  const combos=[];
  const defs=getCombos().slice().sort((a,b)=>b.apps.length-a.apps.length);
  let changed=true;
  while(changed){
    changed=false;
    for(const cb of defs){
      const need=[...new Set(cb.apps.map(a=>platGroup(a)))];
      const used=new Set();let ok=true;
      for(const pg of need){
        const idx=rest.findIndex((s,k)=>!used.has(k)&&platGroup(s.platform)===pg);
        if(idx<0){ok=false;break}
        used.add(idx);
      }
      if(ok){
        combos.push({combo:cb,subs:rest.filter((s,k)=>used.has(k))});
        rest=rest.filter((s,k)=>!used.has(k));
        changed=true;break;
      }
    }
  }
  const total=combos.reduce((a,x)=>a+x.combo.precio,0)+rest.reduce((a,s)=>a+precioMostrar(s),0);
  return {combos,sueltos:rest,total};
}
// Total de un grupo: precio del combo si aplica. `.combo` = el combo si el grupo ENTERO es exactamente uno
// (compat con quien lo lee); `.total` es siempre subset-aware (combos a precio de combo + sueltos sumados).
function totalSubs(subs){const cb=comboDe(subs);if(cb)return{total:cb.precio,combo:cb};const dg=desgloseCombos(subs);return{total:dg.total,combo:null,desglose:dg};}
function genWACombinado(c,subs){

  const idsEnCombo=new Set();dg.combos.forEach(x=>x.subs.forEach(s=>idsEnCombo.add(s.id)));

// Carga la librería de Excel (XLSX) solo cuando se necesita — no en cada apertura de la app
let _xlsxPromise=null;
function loadXLSX(){
  if(window.XLSX)return Promise.resolve();
  if(_xlsxPromise)return _xlsxPromise;
  _xlsxPromise=new Promise((resolve,reject)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    sc.onload=()=>resolve();
    sc.onerror=()=>{_xlsxPromise=null;reject(new Error('No se pudo cargar la librería de Excel. Revisa tu conexión e inténtalo de nuevo.'))};
    document.head.appendChild(sc);
  });
  return _xlsxPromise;
}

// ── AUTO-CREAR/VINCULAR CUENTA MAESTRA AUTOMÁTICAMENTE ───────
function autoCrearCuentaMaestra(sub,clientName,opts){
  // opts = { maxDev, esCompleta, costoProveedor } opcionales
  // Necesita plataforma VÁLIDA + correo (nunca crear cuentas sin categoría)
  if(!sub.platform||sub.platform==='Otro'||!PLATS.includes(sub.platform))return null;
  if(!sub.accountEmail||!sub.accountEmail.trim())return null;
  const emailLower=sub.accountEmail.toLowerCase().trim();
  // Si ya existe con ese correo+plataforma, vincular a esa (no duplicar)
  const exists=S.cuentas.find(ca=>ca.platform===sub.platform&&(ca.email||'').toLowerCase().trim()===emailLower);
  if(exists)return exists.id;
  // Crear nueva cuenta maestra respetando maxDev si fue especificado
  const limit=(opts&&opts.maxDev&&parseInt(opts.maxDev)>0)?parseInt(opts.maxDev):getPlatLimit(sub.platform);
  const newCa={
    id:gid(),
    platform:sub.platform,
    plan:'',
    email:sub.accountEmail.trim(),
    password:sub.password||'',
    totalProfiles:limit,
    costPerMonth:(opts&&opts.costoProveedor>0)?String(opts.costoProveedor.toFixed(2)):'',
    startDate:(opts&&opts.startDate)||'',
    renewalDate:(opts&&opts.renewalDate)||sub.endDate||'',
    cuentaEstado:'ok',
    notes:'Auto-creada al registrar a '+(clientName||'cliente')
  };
  S.cuentas.push(newCa);
  return newCa.id;
}

async function saveSub(d,nuevaCfg){
  // nuevaCfg (opcional, solo al crear): { forzar, maxDev, costoProveedor, startDate, renewalDate, provId }
  const c=S.clients.find(x=>x.id===S.sClientId);
  if(!c)return;
  let subId;
  const wasAdd=S.sMode==='add';
  let autoCreated=false,autoLinked=false;
  const cfgOpts=nuevaCfg?{maxDev:nuevaCfg.maxDev,esCompleta:d.cuentaCompleta,costoProveedor:nuevaCfg.costoProveedor,renewalDate:nuevaCfg.renewalDate,startDate:nuevaCfg.startDate}:undefined;
  if(!d.masterAccountId&&d.platform){
    if(nuevaCfg&&nuevaCfg.forzar){
      // 0) El usuario pidió explícitamente crear una cuenta maestra nueva
      if(d.accountEmail){
        const newMasterId=autoCrearCuentaMaestra(d,c.name,cfgOpts);
        if(newMasterId){d.masterAccountId=newMasterId;autoCreated=true;}
      }
    }else{
    // 1) Auto-asignar la cuenta existente con MÁS perfiles libres (misma plataforma, con cupo)
    const cand=S.cuentas
      .filter(ca=>platGroup(ca.platform)===platGroup(d.platform)&&!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0)
      .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
    if(cand.length){
      const best=cand[0];d.masterAccountId=best.id;
      if(!d.accountEmail)d.accountEmail=best.email||'';
      if(!d.password)d.password=best.password||'';
      autoLinked=true;
    }else if(d.accountEmail){
      // 2) Si no hay cuentas con cupo, auto-crear una nueva desde el correo escrito
      const newMasterId=autoCrearCuentaMaestra(d,c.name,cfgOpts);
      if(newMasterId){d.masterAccountId=newMasterId;autoCreated=true;}
    }
    }
  }
  // Proveedor elegido en el panel de cuenta nueva → asignarlo a la cuenta maestra creada/vinculada
  if(nuevaCfg&&nuevaCfg.provId&&d.masterAccountId){
    const mca=S.cuentas.find(x=>x.id===d.masterAccountId);
    if(mca)mca.proveedorId=nuevaCfg.provId;
  }
  if(wasAdd){
    if(!c.subs)c.subs=[];
    subId=gid();
    c.subs.push({id:subId,...d});
  }else{
    subId=S.sEditId;
    const i=(c.subs||[]).findIndex(s=>s.id===S.sEditId);
    if(i>=0)c.subs[i]={id:S.sEditId,...d};
  }
  if(autoCreated) setTimeout(()=>toast('📡 Cuenta maestra de '+d.platform+' auto-creada','B'),600);
  if(autoLinked){const ca=S.cuentas.find(x=>x.id===d.masterAccountId);setTimeout(()=>toast('🔗 Auto-vinculado a '+(ca?ca.email||ca.platform:'cuenta')+' (la de más cupo)','B'),600);}
  // Editar correo/clave de una sub ligada a una cuenta maestra propaga a la cuenta maestra
  // y a TODOS los clientes que la comparten (mismo comportamiento que editar desde "Cuentas").
  let credsSync=0;
  if(!wasAdd&&d.masterAccountId){
    const ca=S.cuentas.find(x=>x.id===d.masterAccountId);
    if(ca){
      const emailCambio=!!d.accountEmail&&d.accountEmail!==ca.email;
      const passCambio=!!d.password&&d.password!==ca.password;
      if(emailCambio||passCambio){
        if(emailCambio)ca.email=d.accountEmail;
        if(passCambio)ca.password=d.password;
        S.clients.forEach(cl=>(cl.subs||[]).forEach(s=>{
          if(s.masterAccountId===d.masterAccountId){
            if(emailCambio)s.accountEmail=d.accountEmail;
            if(passCambio)s.password=d.password;
            if(s.id!==subId)credsSync++;
          }
        }));
      }
    }
  }
  S.sMod=false;
  const fueCombinado=S.sEditConCliente;S.sEditConCliente=false;
  render();
  sv(); // guardar en 2.º plano — no congelar el modal esperando la nube
  if(credsSync>0){
    const caId=d.masterAccountId;
    toast(`✅ Cuenta maestra actualizada — ${credsSync} cliente(s) más sincronizados`,'G');
    setTimeout(()=>{if(confirm('🔄 Cambiaste el correo/clave de la cuenta maestra. ¿Abrir la lista para notificar por WhatsApp a los clientes que la usan?'))notificarClientesDeCuenta(caId);},350);
    return;
  }
  toast(fueCombinado?'✅ Cliente y suscripción actualizados':(wasAdd?'✅ Suscripción agregada':'✅ Suscripción actualizada'),'G');
  if(wasAdd&&(d.accountEmail||d.password||d.profile||d.profilePin)){
    // Mismo menú de bienvenida que al crear un cliente: PASO 1 copiar correo/clave/perfil + PASO 2 enviar por WhatsApp
    setTimeout(()=>{S.welcomeMod=true;S.welcomeCId=c.id;S.welcomeSId=subId;S.welcomeComboSIds=[subId];S.welcomeMerged=true;render();},300);
  }else if(!wasAdd&&c.phone&&(d.accountEmail||d.password||d.profile||d.profilePin)){
    setTimeout(()=>{
      if(confirm('¿Enviar al cliente los datos actualizados por WhatsApp?'))waActualizacion(c.id,subId);
    },300);
  }
}
async function saveCuenta(d){
  if(!d.totalProfiles||parseInt(d.totalProfiles)<=0){d.totalProfiles=getPlatLimit(d.platform)}
  let clientesAfectados=[];
  let cambios={email:false,password:false};
  if(S.caMode==='add'){
    S.cuentas.push({id:gid(),...d});
  }else{
    const i=S.cuentas.findIndex(x=>x.id===S.caEditId);
    if(i>=0){
      const old=S.cuentas[i];
      cambios.email=old.email!==d.email;
      cambios.password=old.password!==d.password;
      if(cambios.email||cambios.password){
        S.clients.forEach(c=>{
          (c.subs||[]).forEach(s=>{
            if(s.masterAccountId===S.caEditId){
              if(cambios.email)s.accountEmail=d.email;
              if(cambios.password)s.password=d.password;
              clientesAfectados.push({clientId:c.id,subId:s.id,clientName:c.name,phone:c.phone});
            }
          });
        });
      }
      S.cuentas[i]={id:S.caEditId,...d};
    }
  }
  const editedCaId=S.caEditId;
  S.caMod=false;render();sv();
  if(clientesAfectados.length>0){
    const conTel=clientesAfectados.filter(x=>x.phone);
    toast(`✅ Cuenta guardada — ${clientesAfectados.length} cliente(s) sincronizados`,'G');
    if(conTel.length>0){
      setTimeout(()=>{
        if(confirm(`🔄 ${conTel.length} cliente(s) usan esta cuenta. ¿Abrir la lista para notificarles los nuevos datos?`)){
          notificarClientesDeCuenta(editedCaId);
        }
      },300);
    }
  }else{
    toast('✅ Cuenta guardada','G');
  }
}

      </div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${subs.map((x,i)=>`<div id="notifRow_${x.subId}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:10px">

// Cambiar la clave de una cuenta maestra en UN paso y avisar a los que quedan (pedido del dueño: "casi
// siempre que saco un cliente de una cuenta cambio la clave"). Actualiza ca.password + todas las subs de
// esa cuenta y ofrece notificar (reusa notificarClientesDeCuenta). Modal con input (NO se cierra al tocar
// fuera porque tiene datos que se perderían).
let _claveCtx=null; // contexto opcional del cambio de clave. En el swap: {avisarCId,avisarSId,origen} → tras
                    // guardar avisa SOLO al cliente que se movió (con datos nuevos) y ofrece borrar la cuenta origen.
function cambiarClaveModal(caId,ctx){
  const ca=S.cuentas.find(x=>x.id===caId);
  if(!ca){toast('Cuenta no encontrada','R');return}
  if(document.getElementById('claveMod'))return;
  _claveCtx=ctx||null;
  const ocs=_ocupantesSub(caId);const conTel=ocs.filter(o=>o.c.phone).length;
  const swap=!!(ctx&&ctx.avisarCId);
  const payC=swap?S.clients.find(x=>x.id===ctx.avisarCId):null;
  const nota=swap?(payC&&payC.phone?' Luego te abro el mensaje para enviar los datos nuevos a '+(payC.name||'tu cliente')+'.':' Luego te muestro los datos nuevos de tu cliente.'):(conTel?' Luego te abro la lista para avisar a los '+conTel+' con teléfono.':' (Nadie tiene teléfono para avisar.)');
  const mod=document.createElement('div');mod.id='claveMod';mod.className='ov';
  mod.innerHTML=`<div class="mod" style="max-width:420px">
    <div class="mh"><h3>🔑 Cambiar clave · ${ca.platform}</h3><button class="ib" onclick="_claveModCerrar()">✕</button></div>
    <div class="mb">
      ${swap?`<div style="background:rgba(66,153,225,.08);border:1px solid rgba(66,153,225,.2);border-radius:10px;padding:9px 11px;font-size:11px;color:var(--blue);margin-bottom:12px">🔓 Sacaste al moroso y moviste a <b>${payC?(payC.name||'tu cliente'):'tu cliente'}</b> aquí. Cambia la clave para cortarle el acceso al que sacaste.</div>`:''}
      <div style="font-size:11px;color:var(--text2);margin-bottom:10px">📧 ${ca.email||'—'} · ${ocs.length} ocupante(s)</div>
      <div class="fg"><label class="lbl">Clave actual</label><div style="font-size:12px;color:var(--text2);background:var(--surf2);border-radius:8px;padding:8px 10px;word-break:break-all">${ca.password||'—'}</div></div>
      <div class="fg"><label class="lbl">Clave nueva</label><input type="text" id="nuevaClaveInp" value="${(ca.password||'').replace(/"/g,'&quot;')}" placeholder="La clave que pusiste en el proveedor" autocomplete="off"></div>
      <div style="background:rgba(0,212,126,.08);border:1px solid rgba(0,212,126,.2);border-radius:10px;padding:10px;font-size:11px;color:var(--green)">✅ Se actualiza en la cuenta y en sus ${ocs.length} suscripción(es).${nota}</div>
    </div>
    <div class="mf"><button class="btn bs" onclick="_claveModCerrar()">Cancelar</button><button class="btn bg2" onclick="_cambiarClaveAplicar('${caId}')">${ic('check',13)} Guardar y avisar</button></div>
  </div>`;
  document.body.appendChild(mod);
  setTimeout(()=>{const el=document.getElementById('nuevaClaveInp');if(el){el.focus();el.select();}},60);
}
// Cerrar sin guardar. En contexto swap igual ofrece borrar la cuenta origen vacía (es independiente de la clave).
function _claveModCerrar(){
  const mod=document.getElementById('claveMod');if(mod)mod.remove();
  const ctx=_claveCtx;_claveCtx=null;
  if(ctx&&ctx.origen)_ofrecerBorrarCuentaVacia(ctx.origen);
  if(ctx&&ctx.restantes)_reofrecerClaveCli(ctx.restantes);
}
function _cambiarClaveAplicar(caId){
  const ca=S.cuentas.find(x=>x.id===caId);const inp=document.getElementById('nuevaClaveInp');
  if(!ca||!inp)return;
  const nueva=inp.value.trim();
  if(!nueva){toast('Escribe la clave nueva','R');return}
  const ctx=_claveCtx;const swap=!!(ctx&&ctx.avisarCId);
  const cambio=nueva!==ca.password;
  if(!cambio&&!swap){toast('Esa ya es la clave actual','B');return} // contexto normal sin cambio: nada que hacer
  _claveCtx=null;
  if(cambio){
    ca.password=nueva;
    let n=0;S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===caId){s.password=nueva;n++;}}));
    render();sv();
    toast('🔑 Clave actualizada en '+n+' suscripción(es)','G');
  }
  const mod=document.getElementById('claveMod');if(mod)mod.remove();
  if(swap){
    // Swap: avisar al cliente que se movió (con los datos ya actualizados), ofrecer avisar a los OTROS de la
    // cuenta (opcional) y ofrecer borrar la cuenta vieja.
    setTimeout(()=>enviarActualizacion(ctx.avisarCId,ctx.avisarSId),350);
    _ofrecerAvisarOtros(caId,ctx.avisarCId);
    if(ctx.origen)_ofrecerBorrarCuentaVacia(ctx.origen);
  }else if(_ocupantesSub(caId).some(o=>o.c.phone)){
    setTimeout(()=>notificarClientesDeCuenta(caId),350); // contexto normal: avisar a todos los ocupantes
  }
  if(ctx&&ctx.restantes)_reofrecerClaveCli(ctx.restantes); // quedan más cuentas del cliente eliminado
}
// Toast persistente que ofrece borrar una cuenta que quedó SIN ocupantes (reutilizado por transferencia y swap).
function _ofrecerBorrarCuentaVacia(caId){
  if(!caId||!S.cuentas.some(x=>x.id===caId)||ocupantesDeCuenta(caId).length>0)return;
  const ca=S.cuentas.find(x=>x.id===caId);const nom=(ca&&(ca.email||ca.platform))||'la anterior';
  setTimeout(()=>{
    if(document.getElementById('offVaciaToast'))return;
    const t=document.createElement('div');t.id='offVaciaToast';t.className='toast tB';
    t.style.cssText='position:fixed;bottom:20px;left:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:380px';
    t.innerHTML='<span style="flex:1;color:var(--text)">🗑️ La cuenta <b>'+nom+'</b> quedó vacía. ¿Eliminarla?</span><button onclick="delCuentaChooser(\''+caId+'\');this.closest(\'.toast\').remove()" style="background:var(--red);border:none;color:#fff;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">Eliminar</button><button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">✕</button>';
    document.body.appendChild(t);
    setTimeout(()=>{if(t.parentNode)t.remove()},12000);
  },700);
}
// Tras cambiar la clave en un swap, ofrece (OPCIONAL) avisar a los OTROS ocupantes de la cuenta (los que no
// son el cliente recién movido, que ya recibió su mensaje). Toast persistente abajo-derecha; solo si hay
// otros con teléfono. El botón abre notificarClientesDeCuenta excluyendo al ya avisado.

async function delCuenta(id,saltarConfirm){
  const ca=S.cuentas.find(x=>x.id===id);

  let msg='¿Mover esta cuenta maestra a la papelera'+(ca?' ('+pi(ca.platform)+' '+(ca.email||'')+')':'')+'?\n\nPodrás recuperarla después.';
  if(clientesVinc.length){
    msg='⚠️ Esta cuenta tiene '+clientesVinc.length+' cliente(s) encima:\n\n'+clientesVinc.slice(0,8).map(c=>'• '+(c.name||'—')).join('\n')+(clientesVinc.length>8?'\n…y '+(clientesVinc.length-8)+' más':'')+'\n\nSe moverá a la papelera y esos clientes quedarán SIN cuenta asignada (NO se borran sus datos). Podrás recuperar la cuenta después. ¿Continuar?';
  }
  if(!saltarConfirm&&!confirm(msg))return; // saltarConfirm=true cuando lo llama delCuentaChooser (ya confirmó ahí)
  S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===id)s.masterAccountId=''}));

// Elimina la cuenta maestra Y quita de cada cliente SOLO la suscripción que estaba en ESA cuenta —
// NUNCA el cliente entero ni sus otras suscripciones (pedido del dueño jul 2026: "que solo elimine la
// suscripción que corresponde, no todo el cliente"). La cuenta va a papelera (recuperable). Si algún
// cliente queda SIN ninguna suscripción, se PREGUNTA cliente por cliente si mandarlo también a la papelera.
async function delCuentaYSub(caId,saltarConfirm){
  const ca=S.cuentas.find(x=>x.id===caId);
  if(!ca){toast('Error: cuenta no encontrada','R');return}
  const afectados=S.clients.filter(c=>(c.subs||[]).some(s=>s.masterAccountId===caId));
  let msg='🗑️ Eliminar la cuenta maestra '+pi(ca.platform)+' '+(ca.email||ca.platform||'')+'.\nVa a la papelera (recuperable).';
  if(afectados.length){
    msg+='\n\nA estos clientes se les quitará SOLO la suscripción de '+ca.platform+' (el cliente y sus DEMÁS suscripciones NO se tocan):\n'+afectados.slice(0,8).map(c=>'• '+(c.name||'—')).join('\n')+(afectados.length>8?'\n…y '+(afectados.length-8)+' más':'');
  }
  msg+='\n\n¿Continuar?';
  if(!saltarConfirm&&!confirm(msg))return; // saltarConfirm=true cuando lo llama delCuentaChooser (ya confirmó ahí)
  const quedanVacios=[];
  afectados.forEach(c=>{
    c.subs=(c.subs||[]).filter(s=>s.masterAccountId!==caId); // quita SOLO la(s) sub(s) de esta cuenta
    if(!(c.subs||[]).length)quedanVacios.push(c);
  });
  ca.deletedAt=Date.now();if(!S.papeleraCuentas)S.papeleraCuentas=[];S.papeleraCuentas.push(ca);
  S.cuentas=S.cuentas.filter(x=>x.id!==caId);
  // Clientes que quedaron sin ninguna suscripción → preguntar (uno por uno) si van también a la papelera
  quedanVacios.forEach(c=>{
    if(confirm('⚠️ '+(c.name||'El cliente')+' quedó sin ninguna suscripción.\n\n¿Mandarlo también a la papelera?\n\n• Aceptar = a la papelera (recuperable)\n• Cancelar = dejarlo en la lista (sin suscripciones)')){
      const i=S.clients.findIndex(x=>x.id===c.id);
      if(i>-1){const cli=S.clients[i];cli.deletedAt=Date.now();cli.deletedReason='sin-suscripciones';if(!S.papelera)S.papelera=[];S.papelera.push(cli);S.clients.splice(i,1);}
    }
  });
  render();sv();toast('🗑️ Cuenta eliminada · suscripción quitada'+(afectados.length>1?' a '+afectados.length+' clientes':''),'B');
}

async function confirmarPago(){
  const monto=parseFloat(document.getElementById('pMonto').value)||0;
  const nota=document.getElementById('pNota').value.trim();
  const c=S.clients.find(x=>x.id===S.pagoId);if(!c)return;
  const nuevaFecha=document.getElementById('pFecha')?document.getElementById('pFecha').value:'';
  const pagoId=gid();
  // Renovar: aplicar la nueva fecha de vencimiento a las cuentas vencidas (o a todas si ninguna venció).
  // La fecha de inicio pasa a ser hoy, igual que en una renovación normal.
  let renovadas=0,venciaEl='';
  _ultimoCobro={pagoId,items:[]}; // para ↩️ Deshacer (sin fecha = solo se registra el pago; deshacer lo quita)
  if(nuevaFecha){
    const vencidas=(c.subs||[]).filter(s=>gst(s.endDate)==='ven');
    const renovables=vencidas.length?vencidas:(c.subs||[]);
    venciaEl=_aplicarRen(renovables.map(s=>({c,s})),()=>nuevaFecha,{pagoId}); // snapshot Deshacer + muta fechas
    renovadas=renovables.length;
  }
  const minEnd=(c.subs||[]).filter(s=>s.endDate).map(s=>s.endDate).sort()[0]||'';
  _nuevoPago({id:pagoId,clientId:c.id,clientName:c.name,platform:(c.subs||[]).filter(s=>s.platform).map(s=>s.platform).join(', ')||'—',monto,notas:nota||(renovadas?`Renovación (${renovadas} cuenta(s)) hasta ${fd(nuevaFecha)}`:'Pago registrado'),endDate:nuevaFecha||minEnd,venciaEl});
  S.pagoMod=false;render();   // cerrar el modal YA, sin esperar al guardado
  sv();                        // guardar en 2.º plano (anti-pérdida intacta)
  const msgToast=renovadas?`${renovadas} cuenta(s) renovadas — $${monto}`:`$${monto} registrado`;
  _ofrecerComprobante(pagoId,msgToast); // opción PERSISTENTE de avisar al cliente

// Crea (o reemplaza) un overlay .ov con innerHTML y lo agrega al body. opts.focus = id a enfocar tras 80ms;
// opts.clickFuera = cerrar al tocar fuera del recuadro (por defecto NO, como el resto de modales). Devuelve el nodo.
// Reemplaza el patrón repetido createElement+id+className+innerHTML+appendChild(+focus) de ~10 modales.
function _modClose(id){document.getElementById(id)?.remove()}
function _modalDOM(id,html,opts){
  opts=opts||{};
  _modClose(id);
  const mod=document.createElement('div');mod.id=id;mod.className='ov';
  if(opts.clickFuera)mod.onclick=e=>{if(e.target===mod)mod.remove()};
  mod.innerHTML=html;
  document.body.appendChild(mod);
  if(opts.focus)setTimeout(()=>document.getElementById(opts.focus)?.focus(),80);
  return mod;
}

// ── COBRO RÁPIDO DE UN TOQUE (💰 "Cobré") ────────────────────
// Renueva +1 mes desde el vencimiento ANTERIOR (misma filosofía que renMod: no se pierden los días
// esperados), registra el pago con precioMostrar y ofrece comprobante — con Deshacer por si el toque
// fue al cliente equivocado. Solo se puede deshacer el ÚLTIMO cobro rápido (variable _ultimoCobro).
let _ultimoCobro=null; // {pagoId, items:[{cId,sId,prevEnd,prevStart,prevPagado}]} — solo el último, para Deshacer
// ── NÚCLEO COMPARTIDO DE RENOVACIÓN (lo usan los 4 confirmar* y _cobrarPares) ──
// Aplica la renovación a cada par {c,s}: snapshot para ↩️ Deshacer (salvo undo:false, la masiva no
// lo tiene), endDate=fechaFn(s), startDate=hoy, pagado=true. Devuelve venciaEl (el vencimiento
// previo más próximo, capturado ANTES de mutar — alimenta el score de puntualidad).
function _aplicarRen(pares,fechaFn,opts){
  const venciaEl=pares.map(p=>p.s.endDate).filter(Boolean).sort()[0]||'';
  if(!opts||opts.undo!==false)_ultimoCobro={pagoId:(opts&&opts.pagoId)||'',items:pares.map(p=>({cId:p.c.id,sId:p.s.id,prevEnd:p.s.endDate||'',prevStart:p.s.startDate||'',prevPagado:!!p.s.pagado}))};
  pares.forEach(p=>{p.s.endDate=fechaFn(p.s);p.s.startDate=nowDate();p.s.pagado=true;});
  return venciaEl;
}
// Arma y registra el objeto de pago estándar (fecha=hoy; venciaEl solo si existe, como siempre).
function _nuevoPago(d){
  const pago={id:d.id||gid(),clientId:d.clientId,clientName:d.clientName,platform:d.platform,monto:d.monto,fecha:nowDate(),notas:d.notas,endDate:d.endDate};
  if(d.venciaEl)pago.venciaEl=d.venciaEl;
  S.pagos.push(pago);
  return pago;
}
// Núcleo: cobra un conjunto de pares {c,s} (1 o varios, incluso de 2 registros de la misma persona):
// cada sub +1 mes desde SU vencimiento anterior, UN pago con el total (precio de COMBO si aplica).
function _cobrarPares(pares){
  if(!pares||!pares.length)return;
  const pagoId=gid();
  const venciaEl=_aplicarRen(pares,s=>renovDesde(s.endDate,1),{pagoId});
  const subs=pares.map(p=>p.s);
  const total=totalSubs(subs).total; // combo-aware: si las apps forman combo, cobra el precio del combo
  const dueño=pares[0].c;
  const maxEnd=subs.map(s=>s.endDate).filter(Boolean).sort().slice(-1)[0]||'';
  _nuevoPago({id:pagoId,clientId:dueño.id,clientName:dueño.name,platform:subs.map(s=>s.platform).filter(Boolean).join(', ')||'—',monto:total,notas:'💰 Cobro rápido +1 mes'+(subs.length>1?' ('+subs.length+' cuentas)':''),endDate:maxEnd,venciaEl});
  // Si se cobró DESDE un modal de avisos (recordatorios/seguimiento), re-renderizar todo para que
  // la fila cobrada salga de la lista; el modal de éxito se agrega DESPUÉS (sobrevive al render).
  if(S.cobrosHoyMod)render();else renderCont();
  sv(); // guardar en 2.º plano (patrón del repo: nunca await antes de la UI)
  _cobroOkModal(pagoId,dueño,subs,total);
}

// Conteo animado de los números del dashboard (estilo Bayzon)
function animarNumeros(){
  if(window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  document.querySelectorAll('.sg .sc .vl').forEach(el=>{
    const txt=el.textContent.trim();
    const m=txt.match(/^([^\d-]*)(-?\d+(?:\.\d+)?)(.*)$/);
    if(!m)return;
    const pre=m[1],end=parseFloat(m[2]),suf=m[3],dec=(m[2].split('.')[1]||'').length;
    const dur=650,t0=performance.now();
    (function step(t){
      const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3),v=end*e;
      el.textContent=pre+(dec?v.toFixed(dec):Math.round(v))+suf;
      if(p<1)requestAnimationFrame(step);else el.textContent=txt;
    })(t0);
  });
}

// ── RECORDATORIOS ────────────────────────────────────────────
function cuentaMatchCliente(ca,q){
  // ¿Algún cliente vinculado a esta cuenta coincide por nombre, teléfono, correo o perfil?
  return S.clients.some(c=>(c.subs||[]).some(s=>s.masterAccountId===ca.id&&(
    norm(c.name).includes(q)||
    norm(c.phone).includes(q)||
    norm(s.accountEmail).includes(q)||
    norm(s.profile).includes(q)||
    norm(s.profilePin).includes(q)
  )));
}
function cuentaMatch(ca,q){
  if(!q)return true;
  return norm(ca.email).includes(q)||norm(ca.platform).includes(q)||cuentaMatchCliente(ca,q);
}
function cuentasOrdenadas(){
  let lista=[...S.cuentas];
  const q=norm(S.caSearch).trim();
  if(S.fCuentaPlat)lista=lista.filter(ca=>platGroup(ca.platform)===S.fCuentaPlat);
  if(q)lista=lista.filter(ca=>cuentaMatch(ca,q));
  if(S.fCuentaEspacio==='libre')lista=lista.filter(ca=>profDisponibles(ca.id)>0);
  if(S.fCuentaEspacio==='llena')lista=lista.filter(ca=>profDisponibles(ca.id)<=0);
  if(S.fCuentaProv==='__none__')lista=lista.filter(ca=>!ca.proveedorId||!(S.proveedores||[]).some(p=>p.id===ca.proveedorId));
  else if(S.fCuentaProv)lista=lista.filter(ca=>ca.proveedorId===S.fCuentaProv);
  return lista.sort((a,b)=>{
    const da=a.renewalDate?new Date(a.renewalDate).getTime():9e15;
    const db=b.renewalDate?new Date(b.renewalDate).getTime():9e15;
    return da-db;
  });
}

// ── VISTA AGRUPADA POR CUENTA MAESTRA ────────────────────────
// Filtro a nivel de SUSCRIPCIÓN: filtered() deja pasar al cliente entero si CUALQUIER sub coincide,
// pero en la vista agrupada eso arrastraba las OTRAS cuentas del cliente a la pantalla (buscar un
// correo de cuenta mostraba grupos "no relacionados"). Regla: si lo buscado coincide con el CLIENTE
// (nombre/teléfono) se muestran todas sus subs; si solo coincide con datos de sub, solo las que coinciden.
function subMatchBusqueda(c,s){
  const q=norm(S.search).trim();
  if(!q)return true;
  if([c.name,c.phone].some(x=>norm(x).includes(q)))return true;
  return [s.platform,s.accountEmail,s.profile,s.profilePin].some(v=>norm(v).includes(q));
}
function renderClientesAgrupados(){
  const clientesOk=filtered(); // respeta búsqueda/plataforma/vencimiento/estado a nivel cliente
  const mapa={};const sinCuenta=[];const sinSubs=[];
  // Si se enfocó una sola suscripción (ej. clic desde el dashboard), mostrar solo esa
  const focusActivo=S.focusSub&&clientesOk.some(c=>(c.subs||[]).some(s=>s.id===S.focusSub));
  let focusCli=null;
  clientesOk.forEach(c=>{
    // Clientes SIN ninguna suscripción: no caen en ningún grupo (la vista recorre subs) y
    // quedaban invisibles aunque filtered() los contara — van a su propia sección.
    if(!(c.subs||[]).length){if(!focusActivo)sinSubs.push(c);return;}
    (c.subs||[]).forEach(s=>{
    if(focusActivo&&s.id!==S.focusSub)return; // foco: solo la sub elegida
    if(S.fpLat&&platGroup(s.platform)!==S.fpLat)return; // si filtras por plataforma, solo esas subs
    if(!focusActivo&&!subMatchBusqueda(c,s))return; // búsqueda por datos de sub: no arrastrar las otras cuentas del cliente
    if(focusActivo)focusCli=c;
    const ca=s.masterAccountId?S.cuentas.find(x=>x.id===s.masterAccountId):null;
    if(ca){(mapa[ca.id]=mapa[ca.id]||[]).push({c,s});}else sinCuenta.push({c,s});
  });});
  // Orden: por categoría (plataforma) y luego por correo de la cuenta
  const caIds=Object.keys(mapa).sort((a,b)=>{
    const ca1=S.cuentas.find(x=>x.id===a),ca2=S.cuentas.find(x=>x.id===b);
    const p1=PLATS.indexOf(ca1.platform),p2=PLATS.indexOf(ca2.platform);
    if(p1!==p2)return p1-p2;
    return (ca1.email||'').localeCompare(ca2.email||'');
  });
  const itemRow=x=>{const c=x.c,s=x.s;return `<div data-cli="${c.id}" data-sub="${s.id}" class="${S.highlightSub===s.id||(!S.highlightSub&&S.highlightClient===c.id)?'cliHL':''}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-top:1px solid var(--border);flex-wrap:wrap">
      ${S.delMode?`<input type="checkbox" ${S.delSel&&S.delSel.has(c.id)?'checked':''} onchange="toggleDelSel('${c.id}')" style="width:16px;height:16px;cursor:pointer;accent-color:var(--red);flex-shrink:0">`:''}
      <div class="cliAvatar" style="background:${pc(s.platform)}22;color:${pc(s.platform)};width:30px;height:30px;font-size:11px;flex-shrink:0">${initials(c.name)}</div>
      <div style="flex:1 1 120px;min-width:110px"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name||'—'}</div><div style="font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.phone||'—'}${s.profile?' · Perfil: '+s.profile:''}${s.profilePin?' · PIN: '+s.profilePin:''}</div></div>

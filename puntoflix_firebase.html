// ── REPORTE MENSUAL AUTOMÁTICO ───────────────────────────────
function ymPrev(){const now=new Date();let y=now.getFullYear(),m=now.getMonth();m-=1;if(m<0){m=11;y--;}return y+'-'+String(m+1).padStart(2,'0');}
function ymAnterior(ym){const p=String(ym).split('-');let y=parseInt(p[0]),m=parseInt(p[1])-2;if(m<0){m=11;y--;}return y+'-'+String(m+1).padStart(2,'0');}
function nombreMes(ym){const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];const p=String(ym).split('-');return (meses[parseInt(p[1])-1]||'')+' '+p[0];}
function generarReporteMensual(ym){
  const pagosMes=S.pagos.filter(p=>p.fecha&&String(p.fecha).startsWith(ym));
  let ingresos=0,costos=0,cobros=0,nuevos=0;
  pagosMes.forEach(p=>{
    const m=parseFloat(p.monto)||0;
    if(p.esCosto||m<0){costos+=Math.abs(m);}else{ingresos+=m;cobros++;}
    if(/cliente nuevo|combo nuevo/i.test(p.notas||''))nuevos++;
  });
  return {ym,ingresos,costos,neto:ingresos-costos,cobros,nuevos,nPagos:pagosMes.length};
}
// ── Reporte mensual en PDF (descargable) ─────────────────────
let _jspdfPromise=null;
function loadJsPDF(){
  if(window.jspdf&&window.jspdf.jsPDF)return Promise.resolve();
  if(_jspdfPromise)return _jspdfPromise;
  _jspdfPromise=new Promise((resolve,reject)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    sc.onload=()=>resolve();
    sc.onerror=()=>{_jspdfPromise=null;reject(new Error('No se pudo cargar la librería de PDF. Revisa tu conexión e inténtalo de nuevo.'))};
    document.head.appendChild(sc);
  });
  return _jspdfPromise;
}
// Dibuja una tabla simple con encabezado oscuro, filas alternadas y salto de página automático. Devuelve la nueva y.
function _pdfTabla(doc,x,y,width,cols,rows,H,M){
  const rowH=20;
  const drawHead=()=>{
    doc.setFillColor(26,26,46);doc.rect(x,y,width,22,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
    let cx=x;cols.forEach(c=>{const cw=width*c[1];const al=c[2]||'left';doc.text(c[0],al==='right'?cx+cw-8:cx+8,y+15,{align:al});cx+=cw;});
    y+=22;
  };
  drawHead();
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  rows.forEach((row,i)=>{
    if(y+rowH>H-40){doc.addPage();y=M+10;drawHead();doc.setFont('helvetica','normal');doc.setFontSize(9);}
    if(i%2===0){doc.setFillColor(245,245,248);doc.rect(x,y,width,rowH,'F');}
    doc.setTextColor(40,40,50);
    let cx=x;cols.forEach((c,ci)=>{const cw=width*c[1];const al=c[2]||'left';let txt=String(row[ci]==null?'':row[ci]);const maxCh=Math.floor(cw/5);if(txt.length>maxCh)txt=txt.slice(0,maxCh-1)+'…';doc.text(txt,al==='right'?cx+cw-8:cx+8,y+14,{align:al});cx+=cw;});
    y+=rowH;
  });
  doc.setDrawColor(225,225,230);doc.line(x,y,x+width,y);
  return y;
}
async function descargarReporteMensualPDF(ym){
  ym=ym||S.reporteMensualYM||ymPrev();

function parseImportDate(v){if(!v)return'';if(v instanceof Date)return v.toISOString().slice(0,10);const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`}return''}

// ── VINCULAR SUSCRIPCIONES A CUENTAS MAESTRAS AUTOMÁTICAMENTE ──
async function vincularSuscripcionesACuentas(silent=false){
  let vinculadas=0,yaVinculadas=0,sinMatch=0;
  S.clients.forEach(c=>{
    (c.subs||[]).forEach(s=>{
      if(s.masterAccountId){const exists=S.cuentas.find(ca=>ca.id===s.masterAccountId);if(exists){yaVinculadas++;return}}
      if(!s.platform||!s.accountEmail){sinMatch++;return}
      const emailLower=s.accountEmail.toLowerCase().trim();
      const match=S.cuentas.find(ca=>ca.platform===s.platform&&(ca.email||'').toLowerCase().trim()===emailLower);
      if(match){s.masterAccountId=match.id;vinculadas++;}
      else sinMatch++;
    });
  });
  await sv();
  if(!silent){
    if(vinculadas>0)toast('🔗 '+vinculadas+' suscripción(es) vinculada(s) automáticamente','G');
    else if(yaVinculadas>0)toast('✅ Todas las suscripciones ya estaban vinculadas','B');
    else toast('⚠️ No se encontraron coincidencias para vincular','R');
  }
  return {vinculadas,yaVinculadas,sinMatch};
}

async function desvincularOcupante(cId,sId){
  if(!confirm('¿Desvincular este cliente de la cuenta?\n\nEl perfil quedará libre. El cliente NO se elimina, solo se quita el vínculo con esta cuenta maestra.'))return;
  const c=S.clients.find(x=>x.id===cId);if(!c)return;
  const s=(c.subs||[]).find(x=>x.id===sId);if(!s)return;
  s.masterAccountId='';s.cuentaCompleta=false;
  await sv();render();toast('🔗 Cliente desvinculado · perfil liberado','G');
}
async function recalcularPerfiles(){
  const idsValidos=new Set(S.cuentas.map(ca=>ca.id));
  let huerfanos=0,papeleraLimpiados=0;
  S.clients.forEach(c=>{(c.subs||[]).forEach(s=>{if(s.masterAccountId&&!idsValidos.has(s.masterAccountId)){s.masterAccountId='';huerfanos++;}});});
  (S.papelera||[]).forEach(c=>{(c.subs||[]).forEach(s=>{if(s.masterAccountId){s.masterAccountId='';papeleraLimpiados++;}});});
  let reporte='';let cuentasConProblema=0;
  S.cuentas.forEach(ca=>{
    const used=profInUse(ca.id);const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
    if(used>limit){cuentasConProblema++;reporte+='⚠️ '+pi(ca.platform)+' '+ca.platform+' ('+ca.email+'): '+used+'/'+limit+' SOBRECARGADA\n';}
  });
  await sv();render();
  let msg='✅ RECÁLCULO COMPLETADO\n\n';
  if(huerfanos>0)msg+='🔗 '+huerfanos+' vínculo(s) roto(s) limpiado(s).\n';
  if(papeleraLimpiados>0)msg+='🗑️ '+papeleraLimpiados+' vínculo(s) liberado(s) de la papelera.\n';
  if(huerfanos===0&&papeleraLimpiados===0)msg+='No se encontraron vínculos rotos.\n';
  if(cuentasConProblema>0)msg+='\n'+reporte;
  msg+='\n💡 Los clientes cancelados/papelera no ocupan perfil.';
  alert(msg);
}

async function confirmImport(){
  if(!importData.length)return;
  const grouped={};
  importData.forEach(r=>{
    const n=(r['Nombre']||r['nombre']||'').toString().trim();
    if(!n)return;
    if(!grouped[n])grouped[n]={name:n,phone:String(r['Teléfono']||r['Telefono']||r['telefono']||'').trim(),notes:String(r['Notas']||r['notas']||'').trim(),subs:[]};

  });
  let added=0,skipped=0;
  Object.values(grouped).forEach(nc=>{
    const exists=S.clients.find(c=>c.name.toLowerCase()===nc.name.toLowerCase()&&c.phone===nc.phone);
    if(exists){nc.subs.forEach(s=>exists.subs.push(s));skipped++}

  });
  await sv();S.importMod=false;importData=[];
  // Vincular automáticamente las suscripciones nuevas a sus cuentas maestras
  const vinc=await vincularSuscripcionesACuentas(true);
  render();
  let msg='✅ '+added+' clientes importados';
  if(skipped)msg+=', '+skipped+' actualizados';
  if(vinc.vinculadas>0)msg+=' · 🔗 '+vinc.vinculadas+' vinculadas a cuentas';
  toast(msg,'G');
}

      ${c.phone?`<button class="btn bw" style="padding:7px 10px;font-size:11px;border-radius:20px;flex:1;justify-content:center;background:rgba(37,211,102,.12);color:#25d366;border-color:rgba(37,211,102,.3)" onclick="waConfirmacionRenovacion('${c.id}','${s.id}')">✅ Confirmar renovación</button>`:''}
      ${c.phone?`<button class="btn by" style="padding:7px 10px;font-size:11px;border-radius:20px;flex:1;justify-content:center" onclick="avisarVencimiento('${c.id}','${s.id}')">⏰ Avisar vencimiento</button>`:''}
    </div>
    <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
      <button class="btn bs" style="padding:6px 10px;font-size:10px;border-radius:20px;flex:1;justify-content:center" onclick="copiarClave('${c.id}','${s.id}')">🔑 Clave</button>
      <button class="btn bs" style="padding:6px 10px;font-size:10px;border-radius:20px;flex:1;justify-content:center;color:${s.cuentaCompleta?'var(--purple)':'var(--text)'}" onclick="toggleCuentaCompleta('${c.id}','${s.id}')">🟣 ${s.cuentaCompleta?'Quitar completa':'Cuenta completa'}</button>
      <button class="btn bs" style="padding:6px 10px;font-size:10px;border-radius:20px" onclick="editarCliente('${c.id}','${s.id}')">✏️</button>
      <button class="btn bs" style="padding:6px 10px;font-size:10px;border-radius:20px;color:var(--red)" onclick="delSub('${c.id}','${s.id}')">🗑️</button>
    </div>
  </div>`}).join('')}
  ${S.focusSub&&(c.subs||[]).some(s=>s.id===S.focusSub)&&(c.subs||[]).length>1?`<button class="btn bs" style="width:100%;border-radius:10px;margin-top:4px;font-size:11px;color:var(--acc)" onclick="verTodasLasSubs('${c.id}')">▾ Ver las otras ${(c.subs||[]).length-1} cuenta(s)</button>`:''}
  <button class="btn bp" style="width:100%;border-radius:10px;margin-top:4px;font-size:12px" onclick="openAddS('${c.id}')">➕ Agregar suscripción</button>
  </div>`:''}
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-weight:800;color:var(--text);font-size:15px">$${tot.toFixed(2)}/mes${cliDeuda(c)>0?' · <span style=\"color:var(--red)\">$'+cliDeuda(c).toFixed(2)+' pendiente</span>':''}</span>
    <div style="display:flex;gap:6px">
      <span class="iconActionBtn btnRen" onclick="renovarClienteRapido('${c.id}')" title="Renovar">🛒</span>
      ${c.phone?`<span class="iconActionBtn btnWA" onclick="avisarRenovacionCliente('${c.id}')" title="Avisar renovación">💬</span>`:''}
      <span class="iconActionBtn btnHist" onclick="verHistorial('${c.id}')" title="Historial de pagos">📋</span>
      <span class="iconActionBtn btnDel" onclick="delClient('${c.id}')" title="Eliminar">🗑️</span>
    </div>
  </div>
</div>`}


// ── PWA: Registrar Service Worker ────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
// ── PWA: Detectar instalación ────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  try{
    if(!window.matchMedia('(display-mode: standalone)').matches&&!localStorage.getItem('pwa_dismissed')){
      setTimeout(()=>mostrarPwaPrompt(),3000);
    }
  }catch(e){}
});
function mostrarPwaPrompt(){
  if(!deferredPrompt)return;
  if(document.getElementById('pwaBanner'))return;
  const b=document.createElement('div');
  b.id='pwaBanner';
  b.style.cssText='position:fixed;bottom:84px;left:16px;right:16px;background:linear-gradient(135deg,#16a34a,#0f5132);color:#fff;padding:14px 18px;border-radius:14px;box-shadow:0 8px 30px rgba(34,197,94,.4);z-index:9999;display:flex;align-items:center;gap:12px;animation:slideUp .3s';
  b.innerHTML='<div style="font-size:26px">📱</div><div style="flex:1"><div style="font-weight:800;font-size:14px">Instala PUNTOFLIX</div><div style="font-size:11px;opacity:.9">Acceso rápido desde tu pantalla de inicio</div></div><button onclick="instalarPwa()" style="background:#fff;color:#16a34a;border:none;padding:8px 14px;border-radius:8px;font-weight:800;cursor:pointer;font-size:12px">Instalar</button><button onclick="cerrarPwaBanner()" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:18px;padding:4px">✕</button>';
  document.body.appendChild(b);
}
async function instalarPwa(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  cerrarPwaBanner();
}
function cerrarPwaBanner(){
  const b=document.getElementById('pwaBanner');
  if(b)b.remove();
  try{localStorage.setItem('pwa_dismissed','1');}catch(e){}
}


// ── AUTO-RESPALDO SILENCIOSO ─────────────────────────────────
async function checkAutoBackup(){
  if(!S.autoBackupEnabled)return;
  if(!S.clients||S.clients.length===0)return; // No respaldar si no hay datos
  const days=S.autoBackupDays||7;
  const lastB=S.lastBackup?new Date(S.lastBackup):null;
  const now=new Date();now.setHours(0,0,0,0);
  // Calcular si toca respaldo
  let needsBackup=false;
  if(!lastB){
    needsBackup=true;
  }else{
    const diff=Math.floor((now-lastB)/86400000);
    if(diff>=days)needsBackup=true;
  }
  if(!needsBackup)return;
  // Hacer respaldo silencioso
  try{
    await loadXLSX();
    const wb=XLSX.utils.book_new();
    const rows=[];
    S.clients.forEach(c=>{
      if(!c.subs||!c.subs.length){
        rows.push({Nombre:c.name,'Teléfono':c.phone,Estado:c.clientStatus||'Activo',Plataforma:'',Vencimiento:'',Precio:'',Pagado:'',Notas:c.notes});
      }else{
        c.subs.forEach(s=>rows.push({Nombre:c.name,'Teléfono':c.phone,Estado:c.clientStatus||'Activo',Plataforma:s.platform,Perfil:s.profile,PIN:s.profilePin,Correo:s.accountEmail,'Contraseña':s.password,Inicio:s.startDate,Vencimiento:s.endDate,Precio:s.price,Pagado:s.pagado?'Sí':'No',Notas:c.notes}));
      }
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Clientes');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.pagos.map(p=>({Fecha:p.fecha,Cliente:p.clientName,Plataforma:p.platform,Monto:p.monto,Notas:p.notas}))),'Pagos');
    // Cuentas maestras también
    if(S.cuentas&&S.cuentas.length){
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.cuentas.map(ca=>{const pr=(S.proveedores||[]).find(p=>p.id===ca.proveedorId);return{Plataforma:ca.platform,Correo:ca.email,'Contraseña':ca.password,'Total Perfiles':ca.totalProfiles,'Costo Mensual':ca.costPerMonth,Inicio:ca.startDate,'Fecha Renovación':ca.renewalDate,Estado:ca.cuentaEstado||'ok',Proveedor:pr?pr.name:'','Tel Proveedor':pr?pr.phone:'',Notas:ca.notes};})),'CuentasMaestras');
    }
    XLSX.writeFile(wb,`PUNTOFLIX_auto_${nowDate()}.xlsx`);
    S.lastBackup=nowDate();
    await sv();
    toast('💾 Auto-respaldo descargado','B');
  }catch(err){console.error('Auto-backup failed:',err)}
}

async function toggleAutoBackup(){
  S.autoBackupEnabled=!S.autoBackupEnabled;
  await sv();render();
  toast(S.autoBackupEnabled?'✅ Auto-respaldo activado':'⏸️ Auto-respaldo desactivado','B');
}
async function saveAutoBackupDays(){
  const v=parseInt(document.getElementById('abDays').value)||7;
  S.autoBackupDays=Math.max(1,Math.min(60,v));
  await sv();render();
  toast('💾 Frecuencia actualizada: cada '+S.autoBackupDays+' días','G');
}

async function init(){
  // Restaurar dark mode y sidebar state desde preferencias locales
  try{
    // Oscuro por defecto (estilo Bayzon); solo claro si el usuario lo eligió explícitamente
    if(localStorage.getItem('pf_dark')!=='0'){S.dark=true;document.body.classList.add('dark');}
  }catch(e){S.dark=true;document.body.classList.add('dark');}
  document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)"><div style="text-align:center"><div style="font-size:40px;font-weight:900;background:linear-gradient(135deg,#86efac,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;margin-bottom:12px">PUNTOFLIX</div><div style="color:#7070a0;font-size:13px">Conectando...</div></div></div>';
  
  auth.onAuthStateChanged(async user=>{
    if(user){
      S.in=true;
      await ld();
      const nSusp=autoSuspenderVencidos();
      render();
      if(nSusp>0){sv();setTimeout(()=>toast('🛌 '+nSusp+' cliente(s) suspendido(s) automáticamente (vencidos +'+(S.autoSuspendDays||30)+' días)','B'),1600);}
      // Resumen del día (una vez al día)
      setTimeout(()=>mostrarResumenDia(),2800);
      // Reporte mensual automático (una vez al iniciar un nuevo mes)
      setTimeout(()=>checkReporteMensual(),3600);
      // Verificar si toca auto-respaldo (esperar 2 seg para no interrumpir)
      setTimeout(()=>checkAutoBackup(),2000);
      // Sincronización en tiempo real: escuchar cambios en Firestore
      iniciarSyncTiempoReal();
    } else {
      S.in=false;
      S.clients=[];S.pagos=[];S.cuentas=[];
      render();
    }
  });
}
// ── SINCRONIZACIÓN EN TIEMPO REAL ────────────────────────────
let syncUnsub=null;
function iniciarSyncTiempoReal(){
  const uid=auth.currentUser?.uid;
  if(!uid)return;
  if(syncUnsub)syncUnsub(); // Cancelar listener anterior si existe
  syncUnsub=db.collection('usuarios').doc(uid).onSnapshot(doc=>{
    if(!doc.exists)return;
    // Ignorar cambios que vienen de nuestro propio guardado reciente (evita parpadeos)
    if(doc.metadata.hasPendingWrites)return;
    // No sobrescribir si el usuario tiene un modal abierto (está editando)
    const editando=S.cMod||S.sMod||S.caMod||S.renMod||S.pagoMod||S.renCaMod||S.importMod||S.importCAMod;
    if(editando)return;
    // No actualizar si acabamos de guardar nosotros (menos de 3 seg)
    if(Date.now()-ultimoGuardadoLocal<3000)return;
    try{
      aplicarDatosFirestore(doc.data());
      renderCont();
    }catch(e){console.error('Error sync:',e);}
  },err=>console.error('Sync error:',err));
}
init();

<title>PUNTOFLIX Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6fb;--surf:#ffffff;--surf2:#f8f9fd;--surf3:#f1f3fa;
  --border:#e4e7f2;--border2:#d5d9ed;
  --acc:#22c55e;--acc2:#4ade80;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;
  --sw:252px;--sw-col:68px;
  --radius:14px;--radius2:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.05);
}
body.dark{
  --bg:#0d0f18;--surf:#141720;--surf2:#1a1e2e;--surf3:#1e2338;
  --border:#242840;--border2:#2d3352;
  --text:#f1f3fa;--text2:#8b93b8;--text3:#4a5175;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 16px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.2);
  --shadow-lg:0 10px 40px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.3);
}
body.dark select option{background:#141720;color:var(--text)}
body.dark .tB{background:#141720;border-color:var(--border2);color:var(--text)}
body.dark .lCard{box-shadow:var(--shadow-lg)}
body.dark #lScr{background:radial-gradient(ellipse at 30% 40%,rgba(34,197,94,.06) 0%,var(--bg) 60%)}
body.dark .tw{box-shadow:var(--shadow-md)}
body.dark .sb{background:var(--surf)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased}
input,select,textarea{background:var(--surf);border:1.5px solid var(--border2);border-radius:var(--radius2);padding:9px 12px;color:var(--text);font-size:13px;outline:none;width:100%;transition:all .18s;font-family:inherit;font-weight:400}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(34,197,94,.1);background:var(--surf)}
select option{background:var(--surf);color:var(--text)}
.lbl{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;letter-spacing:.2px;font-weight:500}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap;letter-spacing:.1px;font-family:inherit}
.bp{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.3)}.bp:hover{background:#16a34a;box-shadow:0 4px 14px rgba(34,197,94,.45);transform:translateY(-1px)}
.bs{background:var(--surf);color:var(--text);border:1.5px solid var(--border2)}.bs:hover{background:var(--surf2)}
.bg2{background:rgba(16,185,129,.08);color:var(--green);border:1.5px solid rgba(16,185,129,.2)}.bg2:hover{background:rgba(16,185,129,.15)}
.bw{background:rgba(37,211,102,.08);color:#25d366;border:1.5px solid rgba(37,211,102,.2)}.bw:hover{background:rgba(37,211,102,.15)}
.by{background:rgba(245,158,11,.08);color:var(--yellow);border:1.5px solid rgba(245,158,11,.2)}.by:hover{background:rgba(245,158,11,.15)}
.bb{background:rgba(59,130,246,.08);color:var(--blue);border:1.5px solid rgba(59,130,246,.2)}.bb:hover{background:rgba(59,130,246,.15)}
.br{background:rgba(239,68,68,.08);color:var(--red);border:1.5px solid rgba(239,68,68,.2)}.br:hover{background:rgba(239,68,68,.15)}
.bf{width:100%;justify-content:center}
.ib{padding:5px 7px;background:transparent;border:none;cursor:pointer;border-radius:6px;color:var(--text2);font-size:14px;transition:all .15s}.ib:hover{background:var(--surf3);color:var(--text)}
.subMenuItem{display:block;width:100%;text-align:left;padding:8px 12px;background:transparent;border:none;cursor:pointer;border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;transition:all .12s;font-weight:500}.subMenuItem:hover{background:var(--surf2)}

/* LOGIN */
#lScr{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;background:radial-gradient(ellipse at 30% 40%,#fff1f1 0%,var(--bg) 65%)}
.lCard{background:var(--surf);border:1.5px solid var(--border);border-radius:20px;padding:48px 44px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.lLogo{text-align:center;margin-bottom:36px}
.lLogo h1{font-size:30px;font-weight:800;background:linear-gradient(135deg,#4ade80,var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.lLogo p{color:var(--text2);font-size:12px;margin-top:8px;letter-spacing:.3px;font-weight:500}
.lLogo svg{display:block;margin:0 auto 10px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.18))}
.fg{margin-bottom:16px}

/* APP LAYOUT */
#aScr{display:flex;height:100vh;height:100dvh}
.sb{width:var(--sw);background:var(--surf);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .22s cubic-bezier(.4,0,.2,1),min-width .22s;overflow:hidden}
.sb.collapsed{width:var(--sw-col);min-width:var(--sw-col)}
.sb.collapsed .sbLogoText,.sb.collapsed .nLbl,.sb.collapsed .bLbl,.sb.collapsed .sbDivider{opacity:0;pointer-events:none;width:0;overflow:hidden;white-space:nowrap}
.sb.collapsed .sbTop{padding:16px 18px}
.sb.collapsed .sbN{padding:8px}
.sb.collapsed .ni{padding:10px;justify-content:center;gap:0}
.sb.collapsed .nBdg{position:absolute;top:4px;right:4px;font-size:8px;padding:1px 4px;min-width:14px;display:flex;justify-content:center}
.sb.collapsed .sbF{padding:8px}
.sb.collapsed .sbF button{justify-content:center;padding:8px}
.sbToggle{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:4px 6px;border-radius:6px;margin-left:auto;transition:all .15s;flex-shrink:0}.sbToggle:hover{background:var(--surf2);color:var(--text2)}
.sbTop{padding:16px 18px;border-bottom:1.5px solid var(--border)}
.sbLogo{display:flex;align-items:center;gap:10px}
.sbLogoIcon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbLogoText{transition:opacity .18s;white-space:nowrap}
.sbLogoText div:first-child{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.3px}
.sbLogoText div:last-child{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500}
.sbN{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;position:relative;border:none;background:none;width:100%;text-align:left;border-radius:var(--radius2);font-weight:500}
.ni:hover{background:var(--surf2);color:var(--text)}
.ni.on{background:rgba(34,197,94,.07);color:var(--acc);font-weight:600}
.ni.on .niIcon{color:var(--acc)}
.niIcon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nLbl{transition:opacity .18s;white-space:nowrap}
.nBdg{border-radius:20px;padding:2px 6px;font-size:10px;font-weight:700;margin-left:auto}
.bdgR{background:var(--red);color:#fff}.bdgG{background:var(--green);color:#fff}
.sbDivider{height:1px;background:var(--border);margin:4px 8px;transition:opacity .18s}
.sbF{padding:10px}.bLbl{transition:opacity .18s;white-space:nowrap}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.tbr{background:var(--surf);border-bottom:1.5px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tbr h2{font-size:15px;font-weight:700;flex:1;color:var(--text);letter-spacing:-.2px}
.sB{position:relative;display:flex;align-items:center}
.sB input{padding:7px 12px 7px 32px;width:200px;border-radius:20px;font-size:12px}
.sI{position:absolute;left:10px;color:var(--text3);pointer-events:none;font-size:12px}
.cont{flex:1;overflow-y:auto;padding:22px}
.darkToggle{background:none;border:1.5px solid var(--border2);cursor:pointer;color:var(--text2);font-size:14px;padding:5px 9px;border-radius:8px;transition:all .15s;flex-shrink:0}.darkToggle:hover{background:var(--surf2);color:var(--text)}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 16px;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s;box-shadow:var(--shadow)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.cBlue::before{background:var(--blue)}
.sc.cGreen::before{background:var(--green)}
.sc.cYellow::before{background:var(--yellow)}
.sc.cRed::before{background:var(--red)}
.sc.cPurple::before{background:var(--purple)}
.sc .lb{font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:500}
.sc .vl{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sc .sb2{font-size:11px;color:var(--text2);margin-top:4px}
.cBlue .vl{color:var(--blue)}.cGreen .vl{color:var(--green)}.cYellow .vl{color:var(--yellow)}.cRed .vl{color:var(--red)}.cPurple .vl{color:var(--purple)}

/* CARDS / TABLE */
.tw{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.tb2{padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1.5px solid var(--border)}
.twTitle{font-weight:700;font-size:13px;color:var(--text);letter-spacing:-.1px}
.fs{background:var(--surf2);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;color:var(--text);font-size:12px;outline:none;cursor:pointer;font-weight:500}
.tc{overflow-x:auto;max-height:calc(100vh - 200px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;background:var(--surf2);z-index:2}
th{padding:9px 12px;text-align:left;font-size:11px;color:var(--text2);white-space:nowrap;font-weight:600;letter-spacing:.1px;border-bottom:1.5px solid var(--border)}
td{padding:12px 12px;border-top:1px solid var(--border);white-space:nowrap;vertical-align:middle;font-size:12px}
tr.cRow{transition:background .12s}
tr.cRow:hover td{background:rgba(59,130,246,.025)}
tr.sRow td{background:rgba(34,197,94,.012);border-top:1px solid var(--border)}
tr.sRow:hover td{background:rgba(34,197,94,.04)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.2px}
.bAct{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.bExp{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.bVen{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bUnk{background:rgba(107,114,128,.1);color:var(--text2);border:1px solid var(--border)}


/* ALERTS */
.alert{border-radius:var(--radius2);padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.alert h4{font-size:13px;font-weight:600;margin-bottom:2px}
.alert p{font-size:11px;opacity:.8}
.alertY{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2)}.alertY h4{color:var(--yellow)}
.alertR{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2)}.alertR h4{color:var(--red)}
.alertG{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2)}.alertG h4{color:var(--green)}

/* REMINDER CARDS */
.remCard{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--radius2);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:all .15s}
.remCard:hover{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.02)}
.remAvatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.remInfo{flex:1;min-width:0}
.remName{font-weight:600;font-size:13px;color:var(--text)}
.remSub{font-size:11px;color:var(--text2);margin-top:2px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(6px)}
.mod{background:var(--surf);border:1.5px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mh{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:16px 16px 0 0}
.mh h3{font-size:14px;font-weight:700;letter-spacing:-.1px}
.mb{padding:20px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg2 .full{grid-column:1/-1}
.mf{padding:12px 20px;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surf);border-radius:0 0 16px 16px}
.pW{display:flex}.pW input{border-radius:var(--radius2) 0 0 var(--radius2)!important;border-right:none!important}
.pT{background:var(--surf2);border:1.5px solid var(--border2);border-left:none;border-radius:0 var(--radius2) var(--radius2) 0;padding:0 10px;cursor:pointer;color:var(--text2);font-size:13px}.pT:hover{color:var(--text)}

/* CHARTS */
.cr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.cc{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.cc h4{font-size:11px;color:var(--text2);margin-bottom:12px;font-weight:600;letter-spacing:.2px}
.bR{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px}
.bL{width:80px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.bT{flex:1;background:var(--surf3);border-radius:20px;height:14px;overflow:hidden}
.bF{height:100%;border-radius:20px;background:var(--acc);display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-size:9px;font-weight:700;color:#fff;min-width:20px}

/* WA */
.waCard{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--radius2);padding:11px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s}
.waCard input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;margin-top:3px;accent-color:#25d366}
.waMsg{background:rgba(37,211,102,.04);border:1px solid rgba(37,211,102,.15);border-radius:6px;padding:10px;font-size:11px;color:var(--text2);margin-top:7px;white-space:pre-wrap;line-height:1.6}

/* ACTION BUTTONS */
.iconActionBtn{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;border:1px solid transparent;user-select:none;flex-shrink:0}
.fabBtn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:14px;background:var(--acc);color:#fff;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(34,197,94,.4);z-index:90;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fabBtn:hover{transform:scale(1.06);box-shadow:0 6px 24px rgba(34,197,94,.5)}
@media(max-width:680px){
  .fabBtn{bottom:calc(84px + env(safe-area-inset-bottom));right:16px;width:48px;height:48px;font-size:20px;border-radius:12px}
  .toast{bottom:calc(90px + env(safe-area-inset-bottom))}
}
.iconActionBtn:hover{background:var(--surf3)}
.btnRen{background:rgba(16,185,129,.08);color:var(--green);border-color:rgba(16,185,129,.2)}.btnRen:hover{background:rgba(16,185,129,.15)}
.btnEdit{background:rgba(59,130,246,.08);color:var(--blue);border-color:rgba(59,130,246,.2)}.btnEdit:hover{background:rgba(59,130,246,.15)}
.btnWA{background:rgba(37,211,102,.08);color:#25d366;border-color:rgba(37,211,102,.2)}.btnWA:hover{background:rgba(37,211,102,.15)}
.btnHist{background:rgba(139,92,246,.08);color:var(--purple);border-color:rgba(139,92,246,.2)}.btnHist:hover{background:rgba(139,92,246,.15)}
.btnAdd{background:rgba(34,197,94,.08);color:var(--acc);border-color:rgba(34,197,94,.2)}.btnAdd:hover{background:rgba(34,197,94,.15)}
.btnDel{background:transparent;color:var(--text3);border-color:var(--border)}.btnDel:hover{background:rgba(239,68,68,.08);color:var(--red);border-color:rgba(239,68,68,.2)}
.btnSuspOFF{background:rgba(16,185,129,.08);color:var(--green);border-color:rgba(16,185,129,.2)}.btnSuspOFF:hover{background:rgba(16,185,129,.15)}

function aplicarDatosFirestore(d){

  if(d.pagos)S.pagos=JSON.parse(d.pagos);

  if(d.catalogo)S.catalogo=JSON.parse(d.catalogo);
  if(d.customPlats){S.customPlats=JSON.parse(d.customPlats);S.customPlats.forEach(p=>{if(!PLATS.includes(p)){PLATS.splice(PLATS.length-1,0,p);if(!PI[p])PI[p]='📺';if(!PLATCOLORS[p])PLATCOLORS[p]='#6868a0';if(!PLAT_LIMITS[p])PLAT_LIMITS[p]=4;}});}
  if(d.papelera)S.papelera=JSON.parse(d.papelera);
  if(d.papeleraCuentas){try{S.papeleraCuentas=JSON.parse(d.papeleraCuentas)}catch(e){}}
  if(d.papeleraProveedores){try{S.papeleraProveedores=JSON.parse(d.papeleraProveedores)}catch(e){}}
  if(typeof d.autoBackupEnabled==='boolean')S.autoBackupEnabled=d.autoBackupEnabled;
  if(d.autoBackupDays)S.autoBackupDays=d.autoBackupDays;
  if(d.lastBackup)S.lastBackup=d.lastBackup;
  if(d.biz)S.biz=d.biz;
  if(d.reminderDays)S.reminderDays=d.reminderDays;
  if(d.countryCode)S.countryCode=d.countryCode;
  if(typeof d.dailyDigest==='boolean')S.dailyDigest=d.dailyDigest;
  if(typeof d.autoSuspend==='boolean')S.autoSuspend=d.autoSuspend;
  if(d.autoSuspendDays)S.autoSuspendDays=d.autoSuspendDays;

// Elimina de la papelera los items con más de 30 días (lo que promete la UI)
function _limpiarPapelera(){
  const limite=Date.now()-30*86400000;
  if(S.papeleraCuentas&&S.papeleraCuentas.length)S.papeleraCuentas=S.papeleraCuentas.filter(c=>!c.deletedAt||c.deletedAt>limite);
  if(S.papeleraProveedores&&S.papeleraProveedores.length){const purgar=S.papeleraProveedores.filter(p=>p.deletedAt&&p.deletedAt<=limite).map(p=>p.id);if(purgar.length)S.cuentas.forEach(ca=>{if(purgar.includes(ca.proveedorId))ca.proveedorId='';});S.papeleraProveedores=S.papeleraProveedores.filter(p=>!p.deletedAt||p.deletedAt>limite);}
  if(!S.papelera||!S.papelera.length)return 0;
  const antes=S.papelera.length;
  S.papelera=S.papelera.filter(c=>!c.deletedAt||c.deletedAt>limite);
  return antes-S.papelera.length;
}

let ultimoGuardadoLocal=0;
async function sv(){
  const uid=auth.currentUser?.uid;
  if(!uid)return;
  ultimoGuardadoLocal=Date.now(); // Marcar que acabamos de guardar (para el sync)
  // RESPALDO LOCAL DE EMERGENCIA: guardar copia en el dispositivo ANTES de Firebase
  // Así si falla internet, los datos no se pierden
  try{
    const snapshot={
      clients:S.clients,pagos:S.pagos,cuentas:S.cuentas,proveedores:S.proveedores||[],papeleraProveedores:S.papeleraProveedores||[],
      catalogo:S.catalogo||{},customPlats:S.customPlats||[],papelera:S.papelera||[],papeleraCuentas:S.papeleraCuentas||[],
      biz:S.biz,reminderDays:S.reminderDays,lastBackup:S.lastBackup||'',platGroups:S.platGroups||{},countryCode:S.countryCode||'',
      dailyDigest:S.dailyDigest,autoSuspend:S.autoSuspend,autoSuspendDays:S.autoSuspendDays,
      seguimiento:S.seguimiento,seguimientoDias:S.seguimientoDias,reporteMensual:S.reporteMensual,confirmacionPago:S.confirmacionPago,plantillas:S.plantillas||{},datosPago:S.datosPago||'',
      waEnviados:S.waEnviados||{},waSeguimiento:S.waSeguimiento||{},
      _savedAt:Date.now()
    };
    localStorage.setItem('pf_emergencia_'+uid,JSON.stringify(snapshot));
  }catch(e){/* localStorage lleno o no disponible, continuar */}
  // Con persistencia offline, el cambio se aplica al instante en local y se sincroniza solo al reconectar.
  // No esperamos (await) la confirmación del servidor para no congelar la UI sin conexión.
  db.collection('usuarios').doc(uid).set({
      clients:JSON.stringify(S.clients),
      pagos:JSON.stringify(S.pagos),
      cuentas:JSON.stringify(S.cuentas),
      proveedores:JSON.stringify(S.proveedores||[]),
      papeleraProveedores:JSON.stringify(S.papeleraProveedores||[]),
      catalogo:JSON.stringify(S.catalogo||{}),
      customPlats:JSON.stringify(S.customPlats||[]),
      papelera:JSON.stringify(S.papelera||[]),
      papeleraCuentas:JSON.stringify(S.papeleraCuentas||[]),
      autoBackupEnabled:S.autoBackupEnabled,
      autoBackupDays:S.autoBackupDays,
      lastBackup:S.lastBackup||'',
      biz:S.biz,
      reminderDays:S.reminderDays,
      platGroups:JSON.stringify(S.platGroups||{}),
      countryCode:S.countryCode||'',
      dailyDigest:S.dailyDigest,
      autoSuspend:S.autoSuspend,
      autoSuspendDays:S.autoSuspendDays,
      seguimiento:S.seguimiento,
      seguimientoDias:S.seguimientoDias,
      reporteMensual:S.reporteMensual,
      confirmacionPago:S.confirmacionPago,
      plantillas:JSON.stringify(S.plantillas||{}),
      datosPago:S.datosPago||'',
      waEnviados:JSON.stringify(S.waEnviados||{}),
      waSeguimiento:JSON.stringify(S.waSeguimiento||{}),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e=>{console.error('Error guardando en la nube:',e);});
}

// ── CARGAR DESDE FIRESTORE ────────────────────────────────────
async function ld(){
  const uid=auth.currentUser?.uid;
  if(!uid)return;
  let cargoDeNube=false;
  try{
    const doc=await db.collection('usuarios').doc(uid).get();
    if(doc.exists){
      aplicarDatosFirestore(doc.data());
      cargoDeNube=true;
    }
  }catch(e){console.error('Error cargando de la nube:',e);}
  // RECUPERACIÓN DE EMERGENCIA: si la nube falló o vino vacía, usar respaldo local
  if(!cargoDeNube||S.clients.length===0){
    try{
      const local=localStorage.getItem('pf_emergencia_'+uid);
      if(local){
        const snap=JSON.parse(local);
        if(snap.clients&&snap.clients.length>S.clients.length){
          S.clients=snap.clients;S.pagos=snap.pagos||[];S.cuentas=snap.cuentas||[];S.proveedores=snap.proveedores||[];
          S.catalogo=snap.catalogo||{};S.customPlats=snap.customPlats||[];S.papelera=snap.papelera||[];S.papeleraCuentas=snap.papeleraCuentas||[];S.papeleraProveedores=snap.papeleraProveedores||[];
          if(snap.biz)S.biz=snap.biz;if(snap.reminderDays)S.reminderDays=snap.reminderDays;
          if(snap.platGroups)S.platGroups=snap.platGroups;if(snap.countryCode)S.countryCode=snap.countryCode;
          if(typeof snap.dailyDigest==='boolean')S.dailyDigest=snap.dailyDigest;if(typeof snap.autoSuspend==='boolean')S.autoSuspend=snap.autoSuspend;if(snap.autoSuspendDays)S.autoSuspendDays=snap.autoSuspendDays;
          S.customPlats.forEach(p=>{if(!PLATS.includes(p)){PLATS.splice(PLATS.length-1,0,p);if(!PI[p])PI[p]='📺';if(!PLATCOLORS[p])PLATCOLORS[p]='#6868a0';if(!PLAT_LIMITS[p])PLAT_LIMITS[p]=4;}});
          setTimeout(()=>toast('🛟 Datos recuperados del respaldo local','B'),1000);
        }
      }
    }catch(e){console.error('Error recuperación local:',e);}
  }
  // Limpiar papelera de items con más de 30 días
  const eliminados=_limpiarPapelera();
  if(eliminados>0)sv();
  // Aviso si el documento se acerca al límite de 1 MB de Firestore
  if(dataBytes()>850000)setTimeout(()=>toast('⚠️ Tus datos están cerca del límite de almacenamiento. Ve a Ajustes → Mantenimiento de Datos para archivar pagos viejos.','B'),2500);
}

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function gst(d){if(!d)return'unk';const t=new Date();t.setHours(0,0,0,0);const dt=new Date(d+'T00:00:00');dt.setHours(0,0,0,0);const df=Math.round((dt-t)/86400000);if(df<0)return'ven';if(df<=(S.reminderDays||7))return'exp';return'act'}
function dl(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const dt=new Date(d+'T00:00:00');dt.setHours(0,0,0,0);return Math.round((dt-t)/86400000)}
function fd(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`}
function fdRel(d){if(!d)return'sin fecha';const n=dl(d);if(n===null)return'sin fecha';if(n===0)return'*hoy*';if(n===1)return'*mañana*';if(n===2)return'*en 2 días*';if(n===3)return'*en 3 días*';if(n>3)return`*en ${n} días*`;if(n===-1)return'*ayer*';if(n===-2)return'*hace 2 días*';if(n===-3)return'*hace 3 días*';return`*hace ${Math.abs(n)} días*`;}

// Agrupa familias de plataformas SOLO para los filtros y selectores (NO cambia los datos).
// Configurable desde Ajustes en S.platGroups = { prefijoNormalizado: 'Etiqueta' }. Ej: "Paramount Mundial 2" → "Paramount+".
function platGroup(p){
  if(!p)return p;
  const norm=String(p).toLowerCase().replace(/[^a-z0-9]/g,'');
  const grupos=S.platGroups||{};
  for(const pref in grupos){if(pref&&norm.startsWith(pref))return grupos[pref];}
  return p;
}
function addDays(d,n){if(!d)d=nowDate();const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return localISO(dt)}
function addMonths(d,n){if(!d)d=nowDate();const dt=new Date(d+'T12:00:00');const day=dt.getDate();dt.setMonth(dt.getMonth()+n);if(dt.getDate()<day)dt.setDate(0);return localISO(dt)}

function localISO(dt){const y=dt.getFullYear();const m=String(dt.getMonth()+1).padStart(2,'0');const day=String(dt.getDate()).padStart(2,'0');return`${y}-${m}-${day}`}

function dLbl(d){const n=dl(d);if(n===null)return'';const dia=k=>k===1?'1 día':k+' días';if(n<0)return`<span style="color:var(--red);font-weight:700">Venció hace ${dia(Math.abs(n))}</span>`;if(n===0)return`<span style="color:var(--red);font-weight:700">Vence hoy</span>`;if(n===1)return`<span style="color:var(--red);font-weight:700">Vence mañana</span>`;if(n<=7)return`<span style="color:var(--yellow);font-weight:600">Quedan ${dia(n)}</span>`;return`<span style="color:var(--text2)">Quedan ${dia(n)}</span>`}
// Perfiles ocupados SOLO por clientes activos (sin ajuste manual)
function profInUseReal(caId){
  const subs=S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).filter(s=>s.masterAccountId===caId);
  if(subs.some(s=>s.cuentaCompleta))return parseInt((S.cuentas.find(x=>x.id===caId)||{}).totalProfiles)||0;
  return subs.length;
}
function profInUse(caId){
  // Clientes activos + ajuste manual
  const ca=S.cuentas.find(x=>x.id===caId);
  const real=profInUseReal(caId);
  const manual=parseInt(ca?.perfilesManual)||0;
  return real+manual;
}
function profDisponibles(caId){
  const ca=S.cuentas.find(x=>x.id===caId);
  if(!ca)return 0;
  const subs=S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).filter(s=>s.masterAccountId===caId);
  if(subs.some(s=>s.cuentaCompleta))return 0;
  const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
  return Math.max(0,limit-profInUse(caId));
}
function tieneCuentaCompleta(caId){
  return S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).some(s=>s.masterAccountId===caId&&s.cuentaCompleta);
}

function totalMonthlyCost(){return S.cuentas.reduce((s,ca)=>s+(parseFloat(ca.costPerMonth)||0),0)}
// Ingreso mensual que generan los clientes activos vinculados a una cuenta maestra
function cuentaIngresos(caId){return S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).filter(s=>s.masterAccountId===caId).reduce((sum,s)=>sum+precioMostrar(s),0)}
// Ganancia mensual de una cuenta = ingresos de sus clientes − costo que pagas al proveedor
function cuentaGanancia(caId){const ca=S.cuentas.find(x=>x.id===caId);return cuentaIngresos(caId)-(parseFloat(ca&&ca.costPerMonth)||0)}
// Capacidad ociosa: perfiles libres (ya pagados) y el ingreso extra que generarían si los vendieras
function oportunidadVenta(){
  let libresTotal=0,potencial=0;const precioPorPlat={};
  S.cuentas.forEach(ca=>{
    const libres=profDisponibles(ca.id);
    if(libres<=0)return;
    libresTotal+=libres;
    if(precioPorPlat[ca.platform]===undefined){
      const subs=S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).filter(s=>s.platform===ca.platform&&parseFloat(s.price)>0);
      precioPorPlat[ca.platform]=subs.length?subs.reduce((a,s)=>a+precioMostrar(s),0)/subs.length:(parseFloat(getCatalogoPrecio(ca.platform))||0);
    }
    potencial+=libres*precioPorPlat[ca.platform];
  });
  return {libresTotal,potencial};
}

function stats(){const a=S.clients.filter(c=>c.clientStatus!=='Cancelado');const allSubs=a.flatMap(c=>c.subs||[]);const mesKey=nowDate().slice(0,7);const mesRev=S.pagos.filter(p=>!p.esCosto&&p.fecha&&p.fecha.startsWith(mesKey)).reduce((s,p)=>s+(parseFloat(p.monto)||0),0);const cost=totalMonthlyCost();return{total:S.clients.length,act:a.filter(c=>cliSt(c)==='act').length,exp:a.filter(c=>cliSt(c)==='exp').length,ven:a.filter(c=>cliSt(c)==='ven').length,deuda:a.reduce((s,c)=>s+cliDeuda(c),0),mesRev,cost,ganancia:mesRev-cost,totalSubs:allSubs.length,suspendidos:S.clients.filter(c=>c.clientStatus==='Suspendido').length}}
function byPlat(){const m={};S.clients.flatMap(c=>c.subs||[]).forEach(s=>{const p=s.platform||'Otro';m[p]=(m[p]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,7)}
let _remCache=null;
function getReminders(){
  if(_remCache)return _remCache;
  const t=new Date();t.setHours(0,0,0,0);const rd=S.reminderDays||7;const rem={vencidos:[],today:[],tomorrow:[],soon:[]};S.clients.filter(c=>(c.clientStatus==='Activo'||!c.clientStatus)&&c.sendReminders!==false).forEach(c=>{(c.subs||[]).forEach(s=>{const n=dl(s.endDate);if(n===null)return;if(n<0)rem.vencidos.push({c,s});else if(n===0)rem.today.push({c,s});else if(n===1)rem.tomorrow.push({c,s});else if(n>=2&&n<=rd)rem.soon.push({c,s})})});

// Normaliza para buscar: minúsculas y sin tildes/acentos (José → jose)
function norm(s){return (s==null?'':String(s)).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function filtered(){return S.clients.filter(c=>{
  const q=norm(S.search).trim();
  const ms=!q||[c.name,c.phone].some(x=>norm(x).includes(q))||(c.subs||[]).some(s=>[s.platform,s.accountEmail,s.profile,s.profilePin].some(v=>norm(v).includes(q)));
  const mp=!S.fpLat||(c.subs||[]).some(s=>platGroup(s.platform)===S.fpLat);
  const mst=!S.fStat||(S.fStat==='urgente'?(cliSt(c)==='exp'||cliSt(c)==='ven'):cliSt(c)===S.fStat);
  const mcs=!S.fClientSt||c.clientStatus===S.fClientSt;
  return ms&&mp&&mst&&mcs;
}).sort((a,b)=>{
  // Cancelados al final
  const aCanc=(a.clientStatus==='Cancelado')?1:0;
  const bCanc=(b.clientStatus==='Cancelado')?1:0;
  if(aCanc!==bCanc)return aCanc-bCanc;
  // Después suspendidos
  const aSusp=(a.clientStatus==='Suspendido')?1:0;
  const bSusp=(b.clientStatus==='Suspendido')?1:0;
  if(aSusp!==bSusp)return aSusp-bSusp;
  // Finalmente por fecha de vencimiento más próxima (incluyendo vencidos primero)
  const ea=Math.min(...(a.subs||[]).map(s=>s.endDate?new Date(s.endDate).getTime():9e15),9e15);
  const eb=Math.min(...(b.subs||[]).map(s=>s.endDate?new Date(s.endDate).getTime():9e15),9e15);
  return ea-eb;
})}
// ── HELPER UNIFICADO PARA WHATSAPP (preserva emojis) ─────────
// Normaliza un teléfono a formato internacional para WhatsApp, anteponiendo el código de país si falta
function waNum(phone){
  let n=String(phone||'').replace(/\D/g,'');
  if(!n)return '';
  const cc=(S.countryCode||'593').replace(/\D/g,'');
  if(cc&&n.startsWith(cc))return n;        // ya trae el código de país
  if(n.startsWith('00'))return n.slice(2); // prefijo internacional 00 → quitar
  if(n.startsWith('0'))n=n.slice(1);       // quitar 0 inicial local
  if(cc&&n.length<=10)return cc+n;         // número local → anteponer código
  return n;
}
function openWA(phone,msg){
  const num=waNum(phone);
  if(!num){toast('❌ Teléfono inválido','R');return}
  // Codificar correctamente: encodeURIComponent maneja UTF-8 multi-byte
  // pero hay que asegurar que el string ya esté en UTF-8 correcto
  const encoded=encodeURIComponent(msg);
  // api.whatsapp.com/send es más estable con caracteres especiales que wa.me
  const url='https://api.whatsapp.com/send?phone='+num+'&text='+encoded;
  window.open(url,'_blank');
}

// Limpia el mensaje: paréntesis/negritas vacíos, espacios y saltos sobrantes
function _limpiarMsg(m){
  return String(m)
    .replace(/\(\s*\)/g,'')
    .replace(/\*\s*\*/g,'')
    .replace(/[ \t]{2,}/g,' ')
    .replace(/[ \t]+\n/g,'\n')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
// Reemplaza {variables} línea por línea. Si una línea de dato (etiqueta:) queda con su variable vacía, se elimina.
function _renderTpl(tpl,data){
  const lines=String(tpl||'').split('\n').map(line=>{
    const ph=line.match(/\{(\w+)\}/g)||[];
    let rep=line;
    for(const k in data){rep=rep.split('{'+k+'}').join(data[k]==null?'':String(data[k]));}
    if(ph.length){
      const todasVacias=ph.every(p=>{const k=p.slice(1,-1);return !data[k]&&data[k]!==0;});
      if(todasVacias){
        const sinPh=line.replace(/\{\w+\}/g,'').trim();
        if(/[:：]\*?\s*$/.test(sinPh))return null; // etiqueta de dato sin valor → quitar línea
      }
    }
    return rep;
  }).filter(l=>l!==null);
  return _limpiarMsg(lines.join('\n'));
}
// Aplica la plantilla guardada (o la de por defecto) de una clave
function aplicarPlantilla(key,data){const tpl=(S.plantillas&&S.plantillas[key])||PLANTILLAS_DEF[key]||'';return _renderTpl(tpl,data);}

// Mensaje unificado cuando un cliente tiene VARIAS suscripciones el mismo día: una sola lista + total
// Detecta si un conjunto de suscripciones forma un combo definido (mismas plataformas, sin importar orden)
function comboDe(subs){
  if(!subs||subs.length<2)return null;
  const setSubs=[...new Set(subs.map(s=>platGroup(s.platform)))].sort();
  if(setSubs.length!==subs.length)return null; // plataformas repetidas → no es un combo limpio
  return COMBOS.find(cb=>{
    const setCb=[...new Set(cb.apps.map(a=>platGroup(a)))].sort();
    return setCb.length===setSubs.length&&setCb.every((a,i)=>a===setSubs[i]);
  })||null;
}
// Total de un grupo: precio del combo si aplica, si no la suma de los individuales
function totalSubs(subs){const cb=comboDe(subs);return cb?{total:cb.precio,combo:cb}:{total:(subs||[]).reduce((a,s)=>a+precioMostrar(s),0),combo:null};}
function genWACombinado(c,subs){
  const venc=gst(subs[0]&&subs[0].endDate)==='ven';
  const info=totalSubs(subs);const total=info.total;const esCombo=!!info.combo;
  // Si es combo, no se muestran precios sueltos (suman distinto al combo); solo se listan las cuentas
  const lineas=subs.map(s=>`• ${pi(s.platform)} *${s.platform}*${s.accountEmail?` (${s.accountEmail})`:''}${s.profile?` · Perfil ${s.profile}`:''}${esCombo?'':` — $${precioMostrar(s).toFixed(2)}`}`).join('\n');
  const cab=venc
    ?`Tus siguientes cuentas vencieron ${fdRel(subs[0].endDate)}:`
    :`Te recuerdo que tus siguientes cuentas vencen ${fdRel(subs[0].endDate)}:`;
  const cierre=esCombo?`🎁 *Combo ${info.combo.nombre}*\n*Total a renovar: $${total.toFixed(2)}*`:`*Total a renovar: $${total.toFixed(2)}*`;
  return `${venc?'⏰':'📅'} ¡Hola, *${c.name||'cliente'}*! 👋\n\n${cab}\n\n${lineas}\n\n${cierre}\n\n¿Deseas ${venc?'reactivarlas':'renovarlas'}? 🍿`;
}

// ── AUTO-CREAR/VINCULAR CUENTA MAESTRA AUTOMÁTICAMENTE ───────
function autoCrearCuentaMaestra(sub,clientName,opts){
  // opts = { maxDev, esCompleta } opcionales
  // Necesita plataforma VÁLIDA + correo (nunca crear cuentas sin categoría)
  if(!sub.platform||sub.platform==='Otro'||!PLATS.includes(sub.platform))return null;
  if(!sub.accountEmail||!sub.accountEmail.trim())return null;
  const emailLower=sub.accountEmail.toLowerCase().trim();
  // Si ya existe con ese correo+plataforma, vincular a esa (no duplicar)
  const exists=S.cuentas.find(ca=>ca.platform===sub.platform&&(ca.email||'').toLowerCase().trim()===emailLower);
  if(exists)return exists.id;
  // Crear nueva cuenta maestra respetando maxDev si fue especificado
  const limit=(opts&&opts.maxDev&&parseInt(opts.maxDev)>0)?parseInt(opts.maxDev):getPlatLimit(sub.platform);
  const newCa={
    id:gid(),
    platform:sub.platform,
    plan:'',
    email:sub.accountEmail.trim(),
    password:sub.password||'',
    totalProfiles:limit,
    costPerMonth:'',
    renewalDate:sub.endDate||'',
    cuentaEstado:'ok',
    notes:'Auto-creada al registrar a '+(clientName||'cliente')
  };
  S.cuentas.push(newCa);
  return newCa.id;
}

async function saveSub(d){
  const c=S.clients.find(x=>x.id===S.sClientId);
  if(!c)return;
  let subId;
  const wasAdd=S.sMode==='add';
  let autoCreated=false,autoLinked=false;
  if(!d.masterAccountId&&d.platform){
    // 1) Auto-asignar la cuenta existente con MÁS perfiles libres (misma plataforma, con cupo)
    const cand=S.cuentas
      .filter(ca=>platGroup(ca.platform)===platGroup(d.platform)&&!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0)
      .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
    if(cand.length){
      const best=cand[0];d.masterAccountId=best.id;
      if(!d.accountEmail)d.accountEmail=best.email||'';
      if(!d.password)d.password=best.password||'';
      autoLinked=true;
    }else if(d.accountEmail){
      // 2) Si no hay cuentas con cupo, auto-crear una nueva desde el correo escrito
      const newMasterId=autoCrearCuentaMaestra(d,c.name);
      if(newMasterId){d.masterAccountId=newMasterId;autoCreated=true;}
    }
  }
  if(wasAdd){
    if(!c.subs)c.subs=[];
    subId=gid();
    c.subs.push({id:subId,...d});
  }else{
    subId=S.sEditId;
    const i=(c.subs||[]).findIndex(s=>s.id===S.sEditId);
    if(i>=0)c.subs[i]={id:S.sEditId,...d};
  }
  if(autoCreated) setTimeout(()=>toast('📡 Cuenta maestra de '+d.platform+' auto-creada','B'),600);
  if(autoLinked){const ca=S.cuentas.find(x=>x.id===d.masterAccountId);setTimeout(()=>toast('🔗 Auto-vinculado a '+(ca?ca.email||ca.platform:'cuenta')+' (la de más cupo)','B'),600);}
  // Editar correo/clave de una sub ligada a una cuenta maestra propaga a la cuenta maestra
  // y a TODOS los clientes que la comparten (mismo comportamiento que editar desde "Cuentas").
  let credsSync=0;
  if(!wasAdd&&d.masterAccountId){
    const ca=S.cuentas.find(x=>x.id===d.masterAccountId);
    if(ca){
      const emailCambio=!!d.accountEmail&&d.accountEmail!==ca.email;
      const passCambio=!!d.password&&d.password!==ca.password;
      if(emailCambio||passCambio){
        if(emailCambio)ca.email=d.accountEmail;
        if(passCambio)ca.password=d.password;
        S.clients.forEach(cl=>(cl.subs||[]).forEach(s=>{
          if(s.masterAccountId===d.masterAccountId){
            if(emailCambio)s.accountEmail=d.accountEmail;
            if(passCambio)s.password=d.password;
            if(s.id!==subId)credsSync++;
          }
        }));
      }
    }
  }
  await sv();
  S.sMod=false;
  const fueCombinado=S.sEditConCliente;S.sEditConCliente=false;
  render();
  if(credsSync>0){
    const caId=d.masterAccountId;
    toast(`✅ Cuenta maestra actualizada — ${credsSync} cliente(s) más sincronizados`,'G');
    setTimeout(()=>{if(confirm('🔄 Cambiaste el correo/clave de la cuenta maestra. ¿Abrir la lista para notificar por WhatsApp a los clientes que la usan?'))notificarClientesDeCuenta(caId);},350);
    return;
  }
  toast(fueCombinado?'✅ Cliente y suscripción actualizados':(wasAdd?'✅ Suscripción agregada':'✅ Suscripción actualizada'),'G');
  if(c.phone&&(d.accountEmail||d.password||d.profile||d.profilePin)){
    setTimeout(()=>{
      if(wasAdd){if(confirm('¿Enviar al cliente los datos de acceso por WhatsApp?'))waNuevaCuenta(c.id,subId);}
      else{if(confirm('¿Enviar al cliente los datos actualizados por WhatsApp?'))waActualizacion(c.id,subId);}
    },300);
  }
}

  // Renovar: aplicar la nueva fecha de vencimiento a las cuentas vencidas (o a todas si ninguna venció).
  // La fecha de inicio pasa a ser hoy, igual que en una renovación normal.
  let renovadas=0;
  if(nuevaFecha){
    const vencidas=(c.subs||[]).filter(s=>gst(s.endDate)==='ven');
    const renovables=vencidas.length?vencidas:(c.subs||[]);
    renovables.forEach(s=>{s.endDate=nuevaFecha;s.startDate=nowDate();s.pagado=true;renovadas++;});
  }
  const minEnd=(c.subs||[]).filter(s=>s.endDate).map(s=>s.endDate).sort()[0]||'';
  const pago={id:pagoId,clientId:c.id,clientName:c.name,platform:(c.subs||[]).filter(s=>s.platform).map(s=>s.platform).join(', ')||'—',monto,fecha:nowDate(),notas:nota||(renovadas?`Renovación (${renovadas} cuenta(s)) hasta ${fd(nuevaFecha)}`:'Pago registrado'),endDate:nuevaFecha||minEnd};
  S.pagos.push(pago);
  await sv();S.pagoMod=false;render();
  const msgToast=renovadas?`🔄 ${renovadas} cuenta(s) renovadas — $${monto}`:`💵 $${monto} registrado`;
  if(c.phone&&S.confirmacionPago!==false){
    const t=document.createElement('div');
    t.className='toast tG';
    t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:360px';
    t.innerHTML=`<span>${msgToast}</span><button onclick="enviarConfirmacionPago('${pagoId}');this.closest('.toast').remove()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap">📲 Enviar comprobante</button><button onclick="this.closest('.toast').remove()" style="background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;padding:0 4px">✕</button>`;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),9000);
  }else{
    toast(msgToast+' exitosamente','G');
  }
}

function enviarConfirmacionPago(pagoId){
  const p=S.pagos.find(x=>x.id===pagoId);
  if(!p){toast('❌ Pago no encontrado','R');return}
  const c=S.clients.find(x=>x.id===p.clientId);

// ── RECORDATORIOS ────────────────────────────────────────────
function cuentaMatchCliente(ca,q){
  // ¿Algún cliente vinculado a esta cuenta coincide por nombre, teléfono, correo o perfil?
  return S.clients.some(c=>(c.subs||[]).some(s=>s.masterAccountId===ca.id&&(
    norm(c.name).includes(q)||
    norm(c.phone).includes(q)||
    norm(s.accountEmail).includes(q)||
    norm(s.profile).includes(q)||
    norm(s.profilePin).includes(q)
  )));
}
function cuentaMatch(ca,q){
  if(!q)return true;
  return norm(ca.email).includes(q)||norm(ca.platform).includes(q)||cuentaMatchCliente(ca,q);
}
function cuentasOrdenadas(){
  let lista=[...S.cuentas];
  const q=norm(S.caSearch).trim();
  if(S.fCuentaPlat)lista=lista.filter(ca=>platGroup(ca.platform)===S.fCuentaPlat);
  if(q)lista=lista.filter(ca=>cuentaMatch(ca,q));
  if(S.fCuentaEspacio==='libre')lista=lista.filter(ca=>profDisponibles(ca.id)>0);
  if(S.fCuentaEspacio==='llena')lista=lista.filter(ca=>profDisponibles(ca.id)<=0);
  if(S.fCuentaProv==='__none__')lista=lista.filter(ca=>!ca.proveedorId||!(S.proveedores||[]).some(p=>p.id===ca.proveedorId));
  else if(S.fCuentaProv)lista=lista.filter(ca=>ca.proveedorId===S.fCuentaProv);
  return lista.sort((a,b)=>{
    const da=a.renewalDate?new Date(a.renewalDate).getTime():9e15;
    const db=b.renewalDate?new Date(b.renewalDate).getTime():9e15;
    return da-db;
  });
}

function renderCuentasAgrupadas(){
  const q=norm(S.caSearch).trim();
  let lista=S.cuentas.filter(ca=>{
    if(S.fCuentaPlat&&platGroup(ca.platform)!==S.fCuentaPlat)return false;
    if(q&&!cuentaMatch(ca,q))return false;
    if(S.fCuentaEspacio==='libre'&&profDisponibles(ca.id)<=0)return false;
    if(S.fCuentaEspacio==='llena'&&profDisponibles(ca.id)>0)return false;
    if(S.fCuentaProv==='__none__'&&ca.proveedorId&&(S.proveedores||[]).some(p=>p.id===ca.proveedorId))return false;
    if(S.fCuentaProv&&S.fCuentaProv!=='__none__'&&ca.proveedorId!==S.fCuentaProv)return false;
    return true;
  });
  const mapa={};
  lista.forEach(ca=>{const cat=platGroup(ca.platform)||'Otro';(mapa[cat]=mapa[cat]||[]).push(ca);});
  const cats=Object.keys(mapa).sort((a,b)=>PLATS.indexOf(a)-PLATS.indexOf(b));
  if(!cats.length)return '<div class="tw"><div class="empty"><div class="ei">📡</div><h3>Sin cuentas</h3></div></div>';
  const accRow=ca=>{
    const total=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);const used=profInUse(ca.id);const avail=profDisponibles(ca.id);

      <div style="text-align:center;flex-shrink:0"><div style="font-size:11px;font-weight:700;color:${avail>0?'var(--green)':'var(--red)'}">${used}/${total}</div><div style="font-size:9px;color:var(--text2)">perfiles</div></div>
      <div style="text-align:right;flex-shrink:0"><div style="font-size:9px;color:var(--text3)">Inicio: ${ca.startDate?fd(ca.startDate):'—'}</div><div style="font-size:11px;font-weight:600">Renueva: ${fd(ca.renewalDate)}</div><div class="dSub">${dLbl(ca.renewalDate)}</div></div>
      <div style="text-align:right;flex-shrink:0;min-width:54px"><div style="font-size:11px;color:var(--red);font-weight:700">$${parseFloat(ca.costPerMonth||0).toFixed(2)}</div><div style="font-size:9px;font-weight:700;color:${gan>=0?'var(--green)':'var(--red)'}">${gan>=0?'+':''}$${gan.toFixed(2)}/mes</div></div>
      <span style="display:flex;gap:3px;flex-shrink:0">
        <span class="iconActionBtn btnRen" title="Renovar cuenta" onclick="openRenCuenta('${ca.id}')">🛒</span>
        <span class="iconActionBtn btnEdit" title="Ver ocupantes" onclick="verOcupantes('${ca.id}')">👁</span>
        <span class="iconActionBtn btnWA" title="Notificar clientes" onclick="notificarClientesDeCuenta('${ca.id}')">📢</span>
        ${ca.proveedorId?`<span class="iconActionBtn btnWA" title="Reportar problema al proveedor" onclick="reportarProveedor('${ca.id}')">🆘</span>`:''}
        <span class="iconActionBtn btnEdit" title="Editar" onclick="openEditCA('${ca.id}')">✏️</span>
        <span class="iconActionBtn btnDel" title="Eliminar" onclick="delCuenta('${ca.id}')">🗑️</span>
      </span>
    </div>`;
  };
  let html='';
  cats.forEach(cat=>{
    const accs=mapa[cat].sort((a,b)=>{const da=a.renewalDate?new Date(a.renewalDate).getTime():9e15;const db=b.renewalDate?new Date(b.renewalDate).getTime():9e15;return da-db;});
    const costo=accs.reduce((s,ca)=>s+(parseFloat(ca.costPerMonth)||0),0);
    const gan=accs.reduce((s,ca)=>s+cuentaGanancia(ca.id),0);
    const libres=accs.reduce((s,ca)=>s+profDisponibles(ca.id),0);
    const colapsado=S.colapsados.has('cat_'+cat);
    html+=`<div class="tw" style="margin-bottom:10px;overflow:visible">
      <div class="tb2" style="cursor:pointer;gap:8px;align-items:center" onclick="toggleColapsar('cat_${cat}')">
        <span style="font-size:18px;flex-shrink:0">${pi(cat)}</span>
        <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;color:${pc(cat)}">${cat}</div><div style="font-size:10px;color:var(--text2)">${libres} perfil(es) libre(s)</div></div>

        <span style="font-size:13px;color:var(--acc);flex-shrink:0">${colapsado?'▶':'▼'}</span>
      </div>
      ${colapsado?'':accs.map(accRow).join('')}
    </div>`;
  });
  return html;
}

function _avisosMenu(cId,sId,endDate,recOnclick,recLabel){
  const it=(onclick,color,title,sub)=>`<button class="subMenuItem" onclick="${onclick};cerrarSubMenus()" style="display:flex;flex-direction:column;gap:1px;align-items:flex-start;BORDERPH"><span style="font-weight:700;color:${color}">${title}</span><span style="font-size:10px;color:var(--text2);font-weight:400">${sub}</span></button>`;
  const conf=it(`waConfirmacionRenovacion('${cId}','${sId}')`,'#25d366','✅ Confirmar pago y nueva fecha','Ya te pagó → mándale la fecha nueva');
  const rec=it(recOnclick,'var(--yellow)',recLabel,'Aún no paga → recuérdale que renueve');
  const hi=(btn,color)=>btn.replace('BORDERPH',`background:var(--surf3);border-radius:6px;border-left:3px solid ${color}`);
  const lo=btn=>btn.replace('BORDERPH','border-left:3px solid transparent');
  return gst(endDate)!=='act'?(hi(rec,'var(--yellow)')+lo(conf)):(hi(conf,'#25d366')+lo(rec));
}

function renderClientesAgrupados(){

  // Si se enfocó una sola suscripción (ej. clic desde el dashboard), mostrar solo esa
  const focusActivo=S.focusSub&&clientesOk.some(c=>(c.subs||[]).some(s=>s.id===S.focusSub));
  let focusCli=null;
  clientesOk.forEach(c=>{(c.subs||[]).forEach(s=>{
    if(focusActivo&&s.id!==S.focusSub)return; // foco: solo la sub elegida
    if(S.fpLat&&platGroup(s.platform)!==S.fpLat)return; // si filtras por plataforma, solo esas subs

// ── ALTERNAR CUENTA COMPLETA (rápido sin editar suscripción) ──
async function toggleCuentaCompleta(cId,sId){
  const c=S.clients.find(x=>x.id===cId);if(!c)return;
  const s=(c.subs||[]).find(x=>x.id===sId);if(!s)return;
  if(!s.cuentaCompleta){
    if(!s.masterAccountId){toast('❌ Primero vincula esta suscripción a una cuenta maestra','R');return}
    const otrosClientes=[];
    S.clients.forEach(otherC=>{(otherC.subs||[]).forEach(otherS=>{if(otherS.masterAccountId===s.masterAccountId&&otherS.id!==s.id)otrosClientes.push({clientName:otherC.name,sub:otherS});});});
    if(otrosClientes.length>0){
      const nombres=otrosClientes.map(o=>'• '+o.clientName).join('\n');
      if(!confirm('⚠️ Esta cuenta tiene '+otrosClientes.length+' cliente(s) más usándola:\n\n'+nombres+'\n\n¿Continuar igual? Marcará la cuenta como completa.'))return;
    }
    s.cuentaCompleta=true;
    await sv();renderCont();toast('🟣 Marcada como CUENTA COMPLETA','G');
  }else{
    s.cuentaCompleta=false;
    await sv();renderCont();toast('🟢 Cambiada a modo compartido','B');
  }
}

// Copiar la contraseña
async function copiarClave(cId,sId){
  const c=S.clients.find(x=>x.id===cId);

  else cand=cand.filter(ca=>!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0);

async function ejecutarTransferencia(cId,sId,nuevaCaId){
  const c=S.clients.find(x=>x.id===cId);
  const s=c&&(c.subs||[]).find(x=>x.id===sId);
  const nueva=S.cuentas.find(x=>x.id===nuevaCaId);
  if(!c||!s||!nueva){toast('Error al transferir','R');return}
  s.masterAccountId=nueva.id;
  s.accountEmail=nueva.email||'';
  s.password=nueva.password||'';
  // Conservar el perfil del cliente (puede ser un nombre como "Kamig"). Solo se ajusta
  // si está vacío o si choca con otro perfil ya usado en la cuenta destino.
  if(!s.cuentaCompleta){
    const miPerfil=String(s.profile||'').trim().toLowerCase();
    const choca=miPerfil&&S.clients.some(cl=>(cl.subs||[]).some(x=>x.masterAccountId===nueva.id&&x.id!==s.id&&String(x.profile||'').trim().toLowerCase()===miPerfil));
    if(!s.profile||choca){const p=sugerirPerfil(nueva.id);if(p)s.profile=String(p);}
  }
  const mod=document.getElementById('transferMod');if(mod)mod.remove();
  await sv();render();
  toast('✅ Transferido a '+(nueva.email||'la cuenta nueva')+' · cupo anterior liberado','G');
  if(c.phone){
    setTimeout(()=>{
      const t=document.createElement('div');t.className='toast tB';
      t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:360px';
      t.innerHTML='<span style="flex:1;color:var(--text)">📲 ¿Avisar a '+c.name+' los datos nuevos?</span><button onclick="enviarActualizacion(\''+c.id+'\',\''+s.id+'\');this.closest(\'.toast\').remove()" style="background:var(--acc);border:none;color:#fff;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">Avisar</button><button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">✕</button>';
      document.body.appendChild(t);
      setTimeout(()=>{if(t.parentNode)t.remove()},10000);
    },400);
  }
}

// Verificar si la plataforma escrita ya existe (para evitar duplicados)
function checkPlatExistente(){
  const inp=document.getElementById('cNuevaPlat');
  const warn=document.getElementById('platExistenteWarn');
  if(!inp||!warn)return;
  const val=inp.value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!val){warn.style.display='none';return;}
  // Buscar coincidencia exacta o muy cercana
  const match=PLATS.find(p=>{
    const pn=p.toLowerCase().replace(/[^a-z0-9]/g,'');
    return pn===val||pn.startsWith(val)||val.startsWith(pn);
  });
  if(match&&match!=='Otro'){
    warn.style.display='block';
    warn.innerHTML='⚠️ Ya existe <b>'+match+'</b> en tu catálogo. Si quieres agregar una nueva cuenta de esta plataforma, selecciónala directamente en el campo <b>Plataforma</b> arriba — no necesitas crear una nueva. <button type="button" class="btn bb" style="margin-top:6px;width:100%;justify-content:center" onclick="usarPlatExistente(\''+match+'\')">✅ Usar '+match+' existente</button>';
  }else{
    warn.style.display='none';
  }
}

function selectCuentaForClient(caId,isFull,force){
  const master=document.getElementById('cmaster');
  const full=document.getElementById('cfull');
  const email=document.getElementById('cemail');
  const pass=document.getElementById('cpass');
  const prof=document.getElementById('cprofile');
  if(master)master.value=caId;
  if(full)full.value=isFull?'true':'false';
  // force (el usuario eligió otra cuenta) → sobreescribe correo/clave/perfil.
  // Sin force (autorelleno inicial) → solo rellena si está vacío, para no pisar lo que escribiste.
  const ca=S.cuentas.find(x=>x.id===caId);
  if(ca){
    if(email&&(force||!email.value))email.value=ca.email||'';
    if(pass&&(force||!pass.value))pass.value=ca.password||'';
    if(prof&&(force||!prof.value)){const p=sugerirPerfil(caId);prof.value=p?String(p):'';}
  }else if(force){
    // "Crear cuenta nueva": limpiar para escribir datos frescos
    if(email)email.value='';
    if(pass)pass.value='';
    if(prof)prof.value='';
  }
  // Autoseleccionar el proveedor de la cuenta elegida
  const prov=document.getElementById('cprov');
  if(prov){
    if(ca&&ca.proveedorId&&[...prov.options].some(o=>o.value===ca.proveedorId)){
      if(force||!prov.value)prov.value=ca.proveedorId;
    }else if(force&&!ca){
      prov.value='';
    }
    if(typeof toggleNuevoProv==='function')toggleNuevoProv();
  }
}

function handleImportCADrop(e){e.preventDefault();document.getElementById('dropZoneCA').style.borderColor='var(--border2)';const f=e.dataTransfer.files[0];if(f)processImportCAFile(f)}

async function processImportCAFile(file){
  try{await loadXLSX()}catch(err){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>❌</span><div><h4>Error al leer el archivo</h4><p>'+err.message+'</p></div></div>';return}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>❌</span><div><h4>Archivo vacío</h4></div></div>';return}
      importCAData=rows;
      const valid=rows.filter(r=>(r['Plataforma']||r['plataforma'])&&(r['Correo']||r['correo']));
      const totalCosto=valid.reduce((s,r)=>s+(parseFloat(r['Costo Mensual']||r['costo mensual']||0)||0),0);
      const byPlat={};
      valid.forEach(r=>{const p=r['Plataforma']||r['plataforma']||'Otro';byPlat[p]=(byPlat[p]||0)+1});
      const preview=Object.entries(byPlat).slice(0,10).map(([p,c])=>'<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span>'+pi(p)+' '+p+'</span><b>'+c+' cuenta(s)</b></div>').join('');
      document.getElementById('importCAPreview').innerHTML=
        '<div class="alert alertG"><span>✅</span><div><h4>'+valid.length+' cuentas maestras detectadas</h4><p>Costo mensual total estimado: <b>$'+totalCosto.toFixed(2)+'</b></p></div></div>'+
        '<div style="background:var(--surf2);border-radius:10px;padding:12px;max-height:200px;overflow-y:auto">'+preview+'</div>';
      document.getElementById('importCAConfirmBtn').style.display='inline-flex';
    }catch(err){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>❌</span><div><h4>Error al leer el archivo</h4><p>'+err.message+'</p></div></div>'}
  };
  r.readAsBinaryString(file);
}
async function confirmImportCA(){
  if(!importCAData.length)return;
  let added=0,updated=0;
  importCAData.forEach(r=>{
    const platform=String(r['Plataforma']||r['plataforma']||'').trim();
    const email=String(r['Correo']||r['correo']||'').trim();
    if(!platform||!email)return;
    const password=String(r['Contraseña']||r['contrasena']||r['Clave']||'').trim();
    const totalProfiles=parseInt(r['Total Perfiles']||r['total perfiles']||0)||getPlatLimit(platform);
    const costPerMonth=String(r['Costo Mensual']||r['costo mensual']||'').trim();
    const renewalDate=parseImportDate(r['Fecha Renovación']||r['fecha renovacion']||r['Fecha Renovacion']||'');
    const startDate=parseImportDate(r['Inicio']||r['inicio']||'');
    const cuentaEstado=String(r['Estado']||r['estado']||'ok').toLowerCase()==='caida'?'caida':String(r['Estado']||r['estado']||'ok').toLowerCase()==='verif'?'verif':'ok';
    const notes=String(r['Notas']||r['notas']||'').trim();
    // Proveedor: si viene el nombre, buscarlo (o crearlo) y enlazar
    const provName=String(r['Proveedor']||r['proveedor']||'').trim();
    const provPhone=String(r['Tel Proveedor']||r['tel proveedor']||r['Teléfono Proveedor']||'').trim();
    let proveedorId='';
    if(provName){
      if(!S.proveedores)S.proveedores=[];
      let pr=S.proveedores.find(p=>(p.name||'').toLowerCase()===provName.toLowerCase());
      if(!pr){pr={id:gid(),name:provName,phone:provPhone,notes:''};S.proveedores.push(pr);}
      else if(provPhone&&!pr.phone){pr.phone=provPhone;}
      proveedorId=pr.id;
    }
    // Buscar duplicado (mismo correo + plataforma)
    const existing=S.cuentas.find(c=>c.platform===platform&&(c.email||'').toLowerCase()===email.toLowerCase());
    if(existing){
      Object.assign(existing,{password:password||existing.password,totalProfiles:totalProfiles||existing.totalProfiles,costPerMonth:costPerMonth||existing.costPerMonth,startDate:startDate||existing.startDate,renewalDate:renewalDate||existing.renewalDate,cuentaEstado:cuentaEstado||existing.cuentaEstado,proveedorId:proveedorId||existing.proveedorId,notes:notes||existing.notes});
      updated++;
    }else{

function pedirRenovacionProveedor(provId){
  const p=(S.proveedores||[]).find(x=>x.id===provId);
  if(!p){toast('❌ Proveedor no encontrado','R');return;}
  if(!p.phone){toast('❌ El proveedor no tiene teléfono guardado','R');return;}
  const conFecha=cuentasDeProveedor(provId).filter(ca=>ca.renewalDate);
  if(!conFecha.length){toast('Este proveedor no tiene cuentas con fecha por renovar','B');return;}

  const fecha=[...conFecha].sort((a,b)=>new Date(a.renewalDate)-new Date(b.renewalDate))[0].renewalDate;
  const lista=conFecha.filter(ca=>ca.renewalDate===fecha);
  let msg=`¡Hola! ¿Qué tal? 👋\n\nQuiero renovar esta${lista.length>1?'s':''} cuenta${lista.length>1?'s':''}:`;

async function delProv(id){

async function restoreProv(id){

function genWANuevaCuenta(c,s){
  // Determinar dispositivos permitidos (bloque dinámico anti-compartir)

  }

    ?`📱 *Uso permitido:* 1 dispositivo a la vez.\n⚠️ Por favor *no compartas* tus datos ni inicies sesión en más de un dispositivo. Hacerlo puede suspender tu cuenta y *anular la garantía.*`

// Menú "Más opciones" en cada suscripción
function toggleSubMenu(sId,ev){
  if(ev)ev.stopPropagation();
  const menu=document.getElementById('subMenu_'+sId);
  if(!menu)return;
  const abierto=menu.style.display==='block';
  cerrarSubMenus();
  if(!abierto){menu.style.display='block';
    // Posición FIJA respecto a la ventana: así el menú no lo recorta el scroll de .cont
    // y puede usar todo el alto de la pantalla (antes se cortaba dentro del contenedor).
    menu.style.position='fixed';menu.style.maxHeight='none';menu.style.overflowY='visible';
    const wrap=menu.parentElement;const wr=wrap.getBoundingClientRect();
    const vh=window.innerHeight,vw=window.innerWidth,margen=10;
    const necesita=menu.scrollHeight;
    const menuW=menu.offsetWidth||220;
    // Alinear el borde derecho del menú con el del botón ⋯, sin salirse de la pantalla
    let left=wr.right-menuW;
    if(left<margen)left=margen;
    if(left+menuW>vw-margen)left=vw-margen-menuW;
    const espacioAbajo=vh-wr.bottom-margen;
    const espacioArriba=wr.top-margen;
    if(espacioAbajo>=necesita||espacioAbajo>=espacioArriba){
      // Abrir hacia abajo
      menu.style.top=(wr.bottom+2)+'px';menu.style.bottom='auto';
      menu.style.maxHeight=Math.max(160,espacioAbajo)+'px';
    }else{
      // Abrir hacia arriba
      menu.style.top='auto';menu.style.bottom=(vh-wr.top+2)+'px';
      menu.style.maxHeight=Math.max(160,espacioArriba)+'px';
    }
    menu.style.left=left+'px';menu.style.right='auto';menu.style.marginTop='0';menu.style.marginBottom='0';
    menu.style.overflowY='auto';
    // Cerrar al hacer click fuera o al hacer scroll en la lista
    setTimeout(()=>{document.addEventListener('click',cerrarSubMenusUnaVez);const cont=document.querySelector('.cont');if(cont)cont.addEventListener('scroll',cerrarSubMenusUnaVez,{passive:true});},50);
  }
}
function cerrarSubMenus(){
  document.querySelectorAll('[id^="subMenu_"]').forEach(m=>m.style.display='none');
}
function cerrarSubMenusUnaVez(){
  cerrarSubMenus();
  document.removeEventListener('click',cerrarSubMenusUnaVez);
  const cont=document.querySelector('.cont');if(cont)cont.removeEventListener('scroll',cerrarSubMenusUnaVez);
}

async function submitCMod(){
  const name=document.getElementById('cn').value.trim();
  const phone=document.getElementById('cp2').value.trim();
  const notes=document.getElementById('cnt').value.trim();
  if(!name&&!phone){toast('❌ Ingresa al menos el nombre o teléfono','R');return}
  // Detectar cliente duplicado al CREAR
  if(S.cMode==='add'){
    const phoneClean=phone.replace(/\D/g,'');
    const nameLower=name.toLowerCase();
    const dup=S.clients.find(c=>{
      const cPhone=(c.phone||'').replace(/\D/g,'');
      const cName=(c.name||'').toLowerCase();
      // Coincide por teléfono (mínimo 7 dígitos) o por nombre exacto
      if(phoneClean&&cPhone&&phoneClean.length>=7&&cPhone===phoneClean)return true;
      if(nameLower&&cName&&nameLower===cName)return true;
      return false;
    });
    if(dup){
      const motivo=(dup.phone||'').replace(/\D/g,'')===phone.replace(/\D/g,'')&&phone?'mismo teléfono':'mismo nombre';
      const subsCount=(dup.subs||[]).length;
      const msg=`⚠️ Ya existe un cliente con ${motivo}:\n\n👤 ${dup.name}\n📞 ${dup.phone||'—'}\n📺 ${subsCount} suscripción(es)\n\n¿Continuar de todas formas y crear un duplicado?\n\nCancelar para abrir el cliente existente.`;
      if(!confirm(msg)){
        S.cMod=false;
        openEditC(dup.id);
        return;
      }
    }
  }
  let newClientId=null;let newSubId=null;
  if(S.cMode==='add'){
    let platform=document.getElementById('cpl').value;
    // Si eligió "crear nueva plataforma", tomar el nombre escrito
    if(platform==='__NUEVA__'){
      const np=document.getElementById('cNuevaPlat');
      platform=np?np.value.trim():'';
      if(!platform){toast('❌ Escribe el nombre de la nueva plataforma','R');return}
      // ── ANTES DE CREAR: buscar si ya existe una plataforma igual o muy parecida ──
      const platNorm=platform.toLowerCase().replace(/[^a-z0-9]/g,'');
      const existente=PLATS.find(p=>{
        const pn=p.toLowerCase().replace(/[^a-z0-9]/g,'');
        return pn===platNorm||pn.startsWith(platNorm)||platNorm.startsWith(pn);
      });
      if(existente&&existente!=='Otro'){
        // Usar la plataforma existente directamente — no crear duplicado
        platform=existente;
        toast('📌 Se usó "'+existente+'" (ya existía en tu catálogo)','B');
      } else if(!PLATS.includes(platform)){
        const nuevoLimite=parseInt(document.getElementById('cNuevaPlatLimite')?.value)||4;
        PLATS.splice(PLATS.length-1,0,platform); // insertar antes de "Otro"
        if(!PI[platform])PI[platform]='📺';
        if(!PLATCOLORS[platform])PLATCOLORS[platform]='#6868a0';
        PLAT_LIMITS[platform]=nuevoLimite;
        // Guardar plataformas personalizadas
        if(!S.customPlats)S.customPlats=[];
        if(!S.customPlats.includes(platform))S.customPlats.push(platform);
      }
    }
    const email=document.getElementById('cemail').value.trim();
    const pass=document.getElementById('cpass').value;
    const profile=document.getElementById('cprofile').value.trim();
    const pin=document.getElementById('cpin').value.trim();
    const start=document.getElementById('cstart').value;
    const end=document.getElementById('cend').value;
    const price=document.getElementById('cprice').value;
    const masterId=document.getElementById('cmaster')?document.getElementById('cmaster').value:'';
    const cuentaCompleta=document.getElementById('cfull')?document.getElementById('cfull').value==='true':false;
    // Nuevos campos de configuración de cuenta maestra nueva
    const maxDevInp=document.getElementById('cMaxDev');
    const maxDev=maxDevInp?parseInt(maxDevInp.value)||0:0;
    const esCuentaCompletaNueva=document.getElementById('cNuevaCompleta')?document.getElementById('cNuevaCompleta').checked:false;
    const subs=[];
    newClientId=gid();
    // Si hay datos de suscripción (correo, contraseña, precio, perfil) PERO no hay plataforma → error
    const tieneAlgunDatoSub=email||pass||price||profile||pin||end;
    if(tieneAlgunDatoSub&&!platform){
      toast('❌ Selecciona la plataforma (Netflix, Disney+, etc) para la suscripción','R');
      return;
    }
    if(platform){
      newSubId=gid();
      let masterIdFinal=masterId;
      let autoCreatedMaster=false;
      // Auto-crear/vincular cuenta maestra automáticamente
      if(!masterIdFinal&&platform&&email){
        const tempSub={platform,accountEmail:email,password:pass,plan:'Estándar',endDate:end};
        const newMid=autoCrearCuentaMaestra(tempSub,name,{maxDev,esCompleta:esCuentaCompletaNueva});
        if(newMid){masterIdFinal=newMid;autoCreatedMaster=true;}
      }
      // Proveedor elegido (existente o nuevo) → asignarlo a la cuenta maestra de esta suscripción
      let provIdSel=document.getElementById('cprov')?document.getElementById('cprov').value:'';
      if(provIdSel==='__NUEVA__'){
        const pn=(document.getElementById('cNuevoProv')?.value||'').trim();
        if(pn){
          if(!S.proveedores)S.proveedores=[];
          let pr=S.proveedores.find(p=>(p.name||'').toLowerCase()===pn.toLowerCase());
          if(!pr){pr={id:gid(),name:pn,phone:(document.getElementById('cNuevoProvTel')?.value||'').trim(),notes:''};S.proveedores.push(pr);}
          provIdSel=pr.id;
        }else provIdSel='';
      }
      if(provIdSel&&masterIdFinal){const mca=S.cuentas.find(x=>x.id===masterIdFinal);if(mca)mca.proveedorId=provIdSel;}
      // Si el usuario marcó "cuenta completa" en la nueva cuenta, la suscripción también lo refleja
      const subEsCompleta=cuentaCompleta||esCuentaCompletaNueva;
      subs.push({id:newSubId,platform,plan:'Estándar',accountEmail:email,password:pass,profile,profilePin:pin,masterAccountId:masterIdFinal,cuentaCompleta:subEsCompleta,startDate:start,endDate:end,price,paymentMethod:'Efectivo',pagado:true});
      // Registrar el pago automáticamente si hay precio
      if(price&&parseFloat(price)>0){
        S.pagos.push({id:gid(),clientId:newClientId,clientName:name,platform,monto:parseFloat(price),fecha:nowDate(),notas:'Cliente nuevo - pago inicial'});
      }
      if(autoCreatedMaster){
        setTimeout(()=>toast('📡 Cuenta maestra de '+platform+' auto-creada','B'),800);
      }
    }
    S.clients.push({id:newClientId,name,phone,city:'',clientStatus:'Activo',notes,sendReminders:true,subs});
  }else{
    const i=S.clients.findIndex(c=>c.id===S.cEditId);
    if(i>=0)S.clients[i]={...S.clients[i],name,phone,notes,clientStatus:document.getElementById('cstatus').value};
  }
  const wasAdd=S.cMode==='add';
  await sv();S.cMod=false;
  // Si se creó cliente nuevo con suscripción, mostrar modal con botón real (funciona en móvil)
  if(wasAdd&&newSubId){
    S.welcomeMod=true;
    S.welcomeCId=newClientId;
    S.welcomeSId=newSubId;
  }
  render();
  toast(wasAdd?'✅ Cliente creado y marcado como pagado':'✅ Cliente actualizado','G');
}

// Función auxiliar para mostrar info de cuenta seleccionada
function updateCuentaInfo(){
  const sel=document.getElementById('sma');
  const info=document.getElementById('cuentaInfo');
  if(!sel||!info)return;
  if(!sel.value){info.innerHTML='';return}
  const ca=S.cuentas.find(x=>x.id===sel.value);
  if(!ca){info.innerHTML='';return}
  const used=profInUse(ca.id);
  const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
  const avail=profDisponibles(ca.id);
  const hasFull=tieneCuentaCompleta(ca.id);
  let html='<div style="background:var(--surf2);border-radius:8px;padding:8px 10px">';
  html+='<b style="color:'+pc(ca.platform)+'">'+pi(ca.platform)+' '+ca.platform+'</b> ';
  if(hasFull){html+='<span style="color:var(--purple);font-weight:700">🟣 VENDIDA COMPLETA</span>'}
  else if(avail===0){html+='<span style="color:var(--red);font-weight:700">🔴 LLENA</span>'}
  else{html+='<span style="color:var(--green);font-weight:700">🟢 '+avail+' de '+limit+' perfiles libres</span>'}
  html+='</div>';
  info.innerHTML=html;
}
// Sugiere el primer número de perfil libre (1..límite) en una cuenta
function sugerirPerfil(caId){
  const usados=new Set();
  S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===caId){const n=parseInt(s.profile);if(!isNaN(n))usados.add(n);}}));
  const ca=S.cuentas.find(x=>x.id===caId);
  const limit=parseInt(ca?.totalProfiles)||getPlatLimit(ca?.platform)||8;
  for(let i=1;i<=limit;i++){if(!usados.has(i))return i;}
  return '';
}
// Auto-asignar la cuenta maestra con MÁS perfiles libres para la plataforma elegida
function autoAsignarCuenta(){
  if(S.sMode!=='add')return;
  const sel=document.getElementById('sma');const info=document.getElementById('cuentaInfo');
  if(!sel)return;
  const plat=document.getElementById('spl')?.value;
  if(!plat)return;
  let prevEmail='';
  if(sel.value){
    const cur=S.cuentas.find(x=>x.id===sel.value);
    if(cur&&platGroup(cur.platform)===platGroup(plat)){updateCuentaInfo();return} // respeta elección válida
    prevEmail=cur?.email||'';sel.value=''; // la plataforma cambió: descartar la anterior
  }
  // Candidatas: misma plataforma (agrupada), no vendidas completas, con cupo. Más libres primero; desempata por menor costo.
  const cand=S.cuentas
    .filter(ca=>platGroup(ca.platform)===platGroup(plat)&&!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0)
    .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  if(!cand.length){
    if(info)info.innerHTML='<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 10px;color:var(--yellow)">⚠ No hay cuentas de '+plat+' con cupo libre. Llena el correo para auto-crear una nueva.</div>';
    return;
  }
  const best=cand[0];sel.value=best.id;
  const sae=document.getElementById('sae'),spw=document.getElementById('spw'),spr=document.getElementById('spr');
  if(sae&&(!sae.value||sae.value===prevEmail))sae.value=best.email||'';
  if(spw&&!spw.value)spw.value=best.password||'';
  if(spr&&!spr.value){const p=sugerirPerfil(best.id);if(p)spr.value=p;}
  const av=profDisponibles(best.id);
  if(info)info.innerHTML='<div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:8px 10px;color:var(--green)">✅ Auto-asignada la cuenta con más cupo: <b>'+pi(best.platform)+' '+(best.email||'—')+'</b> ('+av+' libres). Puedes cambiarla arriba.</div>';
}

// Avisar renovación a un cliente — unifica todas sus cuentas en un solo mensaje
function avisarRenovacionCliente(id){
  const c=S.clients.find(x=>x.id===id);
  if(!c){toast('Cliente no encontrado','R');return}
  if(!c.phone){toast('❌ Este cliente no tiene teléfono registrado','R');return}
  const subs=c.subs||[];
  if(!subs.length){toast('Sin suscripciones','B');return}
  // Determinar qué cuentas están vencidas vs por vencer
  const vencidas=subs.filter(s=>gst(s.endDate)==='ven');
  const porVencer=subs.filter(s=>gst(s.endDate)==='exp'||gst(s.endDate)==='act');
  let relevantes,tipo;
  if(vencidas.length&&!porVencer.length){relevantes=vencidas;tipo='venc';}
  else{relevantes=subs;tipo='proximo';}
  if(relevantes.length===1){
    const s=relevantes[0];
    const venc=gst(s.endDate)==='ven';
    let msg=`${venc?'⏰':'📅'} ¡Hola, *${c.name||'cliente'}*! 👋\n\n${venc?'Tu cuenta':'Te recuerdo que tu cuenta'} *${s.platform}*${s.accountEmail?` (${s.accountEmail})`:''} ${venc?'venció '+fdRel(s.endDate):'vence '+fdRel(s.endDate)}. La renovación es de *$${precioMostrar(s).toFixed(2)}*.\n\n¿Deseas ${venc?'reactivarla':'renovar'}? 🍿`;
    openWA(c.phone,msg);
  }else{
    const total=relevantes.reduce((sum,s)=>sum+precioMostrar(s),0);
    let msg=`📋 ¡Hola, *${c.name||'cliente'}*! 👋\n\nEste es el detalle de tus cuentas para renovar:\n\n`;
    msg+=relevantes.map(s=>`• ${pi(s.platform)} *${s.platform}*${s.accountEmail?` (${s.accountEmail})`:''}\n   ${gst(s.endDate)==='ven'?'Venció':'Vence'} ${fdRel(s.endDate)} — $${precioMostrar(s).toFixed(2)}`).join('\n\n');
    msg+=`\n\n💰 *Total a renovar: $${total.toFixed(2)}*\n\n¿Deseas renovar? 🍿`;
    openWA(c.phone,msg);
  }
}

// AUTOMATIZACIÓN: suspende clientes 100% vencidos hace más de N días (solo si está activado). Devuelve cuántos.
function autoSuspenderVencidos(){
  if(!S.autoSuspend)return 0;
  const dias=parseInt(S.autoSuspendDays)||30;let n=0;
  S.clients.forEach(c=>{
    if((c.clientStatus||'Activo')!=='Activo')return;
    const subs=c.subs||[];if(!subs.length)return;
    if(!subs.every(s=>gst(s.endDate)==='ven'))return;       // todas vencidas
    const latest=subs.reduce((m,s)=>{const d=dl(s.endDate);return d===null?m:Math.max(m,d)},-Infinity);
    if(latest===-Infinity)return;
    if(latest< -dias){c.clientStatus='Suspendido';c.autoSuspendedAt=nowDate();n++;}  // la más reciente venció hace +dias
  });
  return n;
}
// AUTOMATIZACIÓN: una vez al día, avisa qué hay por cobrar (no cambia datos)
function mostrarResumenDia(){
  if(!S.dailyDigest)return;
  const hoy=nowDate();const key='pf_digest_'+(auth.currentUser?.uid||'');
  let last='';try{last=localStorage.getItem(key)||''}catch(e){}
  if(last===hoy)return;
  try{localStorage.setItem(key,hoy)}catch(e){}
  const rem=getReminders();const venN=rem.vencidos.length,hoyN=rem.today.length,manN=rem.tomorrow.length;
  if(venN+hoyN+manN===0)return;
  const partes=[];
  if(venN)partes.push('🔴 '+venN+' vencido(s)');
  if(hoyN)partes.push('🚨 '+hoyN+' hoy');
  if(manN)partes.push('⏰ '+manN+' mañana');
  // Toast accionable: botón para abrir el flujo de envío directo
  const conTel=[...rem.vencidos,...rem.today,...rem.tomorrow].some(x=>x.c.phone);
  const t=document.createElement('div');
  t.className='toast tB';
  t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:360px';
  t.innerHTML='<span style="flex:1;color:var(--text)">📋 Resumen del día — '+partes.join(' · ')+'</span>'+(conTel?'<button onclick="this.closest(\'.toast\').remove();enviarTodosDia(\'todos\')" style="background:var(--acc);border:none;color:#fff;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">📨 Enviar ahora</button>':'')+'<button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">✕</button>';
  document.body.appendChild(t);
  setTimeout(()=>{if(t.parentNode)t.remove()},12000);
}

// Aplicar precios del catálogo a clientes existentes (cambio explícito de datos, con preview y selección por plataforma)

  const cat=S.catalogo||{};

  Object.keys(cat).forEach(plat=>{
    const precio=parseFloat(cat[plat]);if(!(precio>0))return;
    let afect=0;
    S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.platform===plat&&parseFloat(s.price||0)!==precio)afect++;}));
    if(afect>0)cambios.push({plat,precio,afect});
  });
  if(!cambios.length){toast('✅ Tus clientes ya tienen los precios del catálogo (guarda el catálogo primero si acabas de editarlo)','B');return}
  if(document.getElementById('aplicarCatMod'))return;

      <div style="display:flex;flex-direction:column;gap:8px">
        ${cambios.map(x=>`<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:10px;cursor:pointer">
          <input type="checkbox" class="aplicarCatChk" data-plat="${(x.plat||'').replace(/"/g,'&quot;')}" checked style="width:17px;height:17px;accent-color:var(--acc)">

async function ejecutarAplicarCatalogo(){
  const plats=[...document.querySelectorAll('.aplicarCatChk:checked')].map(c=>c.getAttribute('data-plat'));
  if(!plats.length){toast('Marca al menos una plataforma','B');return}
  const cat=S.catalogo||{};let n=0;
  S.clients.forEach(c=>(c.subs||[]).forEach(s=>{
    if(plats.includes(s.platform)){const precio=parseFloat(cat[s.platform]);if(precio>0&&parseFloat(s.price||0)!==precio){s.price=String(precio);n++;}}
  }));
  const mod=document.getElementById('aplicarCatMod');if(mod)mod.remove();
  await sv();render();toast('✅ '+n+' suscripción(es) actualizadas al precio del catálogo','G');
}

// ── MARCAR RECORDATORIO COMO ENVIADO (persistente) ───────────
// Se guarda { 'cId_sId': fechaVencimiento }. Si el cliente renueva (cambia la fecha),
// el marcador deja de coincidir → se puede volver a avisar en el nuevo ciclo.
function envEnviado(cId,sId,endDate){return !!(S.waEnviados&&S.waEnviados[cId+'_'+sId]===endDate);}
function segEnviado(cId,sId,endDate){return !!(S.waSeguimiento&&S.waSeguimiento[cId+'_'+sId]===endDate);}
// Conserva solo marcadores que coinciden con la fecha actual de una suscripción existente (limpia los viejos)
function _prunMarcadores(obj){if(!obj||typeof obj!=='object')return {};const valid={};S.clients.forEach(c=>(c.subs||[]).forEach(s=>{const k=c.id+'_'+s.id;if(obj[k]===s.endDate)valid[k]=s.endDate;}));return valid;}
function _fechaSub(cId,sId){const c=S.clients.find(x=>x.id===cId);const s=c&&(c.subs||[]).find(x=>x.id===sId);return s?s.endDate:nowDate();}
// full=true → re-render completo (necesario cuando se llama desde el modal, que vive fuera de .cont)
function marcarEnviado(cId,sId,full){
  if(!S.waEnviados||typeof S.waEnviados!=='object'||S.waEnviados instanceof Set)S.waEnviados={};
  S.waEnviados[cId+'_'+sId]=_fechaSub(cId,sId);

}

function marcarEnviadoGrupo(cId,sIdsStr,full){

// Lista de envío AGRUPADA por cliente + misma fecha de vencimiento (mismo día = 1 solo mensaje con total).
// 'todos' = vencidos + hoy (+ mañana si S.incluirManana). Cada grupo: {c, tipo, endDate, subs[]}
function getListaEnvio(dia){
  const rem=getReminders();
  const tag=(arr,t)=>arr.map(x=>({...x,tipo:t}));
  let flat;
  if(dia==='vencidos')flat=tag(rem.vencidos,'vencido');
  else if(dia==='tomorrow')flat=tag(rem.tomorrow,'manana');
  else if(dia==='today')flat=tag(rem.today,'hoy');
  else{flat=[...tag(rem.vencidos,'vencido'),...tag(rem.today,'hoy')];if(S.incluirManana!==false)flat=flat.concat(tag(rem.tomorrow,'manana'));}
  flat=flat.filter(x=>x.c.phone);
  const grupos=[];const idx={};
  flat.forEach(x=>{
    const key=x.c.id+'|'+(x.s.endDate||'');
    if(idx[key]===undefined){idx[key]=grupos.length;grupos.push({c:x.c,tipo:x.tipo,endDate:x.s.endDate,subs:[x.s]});}
    else grupos[idx[key]].subs.push(x.s);
  });
  return grupos;
}

function getSeguimiento(){
  if(S.seguimiento===false)return [];

  const grupos=[];
  S.clients.filter(c=>(c.clientStatus==='Activo'||!c.clientStatus)&&c.sendReminders!==false&&c.phone).forEach(c=>{
    const subs=(c.subs||[]).filter(s=>{const n=dl(s.endDate);return n!==null&&n<=-dias});
    if(subs.length)grupos.push({c,subs});
  });
  return grupos;
}

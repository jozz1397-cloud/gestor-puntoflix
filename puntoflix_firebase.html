<title>PUNTOFLIX Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6fb;--surf:#ffffff;--surf2:#f8f9fd;--surf3:#f1f3fa;
  --border:#e4e7f2;--border2:#d5d9ed;
  --acc:#a3e635;--acc2:#bef264;--accTx:#4d7c0f;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;
  --sw:252px;--sw-col:68px;
  --radius:14px;--radius2:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.05);
}
body.dark{
  --bg:#0d1424;--surf:#141c30;--surf2:#1a2340;--surf3:#212c4a;
  --border:#262f4c;--border2:#30395a;--accTx:#a3e635;
  --text:#eef2fb;--text2:#9eaace;--text3:#7884ad;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 16px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.2);
  --shadow-lg:0 10px 40px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.3);
}
body.dark select option{background:#141c30;color:var(--text)}
body.dark .tB{background:#141c30;border-color:var(--border2);color:var(--text)}
body.dark .lCard{box-shadow:var(--shadow-lg)}
body.dark #lScr{background:radial-gradient(ellipse at 30% 40%,rgba(163,230,53,.06) 0%,var(--bg) 60%)}
body.dark .tw{box-shadow:var(--shadow-md)}
body.dark .sb{background:var(--bg)}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased}
input,select,textarea{background:var(--surf);border:1.5px solid var(--border2);border-radius:var(--radius2);padding:9px 12px;color:var(--text);font-size:13px;outline:none;width:100%;transition:all .18s;font-family:inherit;font-weight:400}
input:focus,select:focus,textarea:focus{border-color:var(--accTx);box-shadow:0 0 0 3px rgba(163,230,53,.1);background:var(--surf)}
select option{background:var(--surf);color:var(--text)}
.lbl{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;letter-spacing:.2px;font-weight:500}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap;letter-spacing:.1px;font-family:inherit}
.bp{background:var(--acc);color:#07130c;box-shadow:0 2px 8px rgba(163,230,53,.3)}.bp:hover{background:#bef264;box-shadow:0 4px 14px rgba(163,230,53,.45);transform:translateY(-1px)}
.bs{background:var(--surf);color:var(--text);border:1.5px solid var(--border2)}.bs:hover{background:var(--surf2)}
.bg2{background:rgba(16,185,129,.08);color:var(--green);border:1.5px solid rgba(16,185,129,.2)}.bg2:hover{background:rgba(16,185,129,.15)}
.bw{background:rgba(37,211,102,.08);color:#25d366;border:1.5px solid rgba(37,211,102,.2)}.bw:hover{background:rgba(37,211,102,.15)}
.by{background:rgba(245,158,11,.08);color:var(--yellow);border:1.5px solid rgba(245,158,11,.2)}.by:hover{background:rgba(245,158,11,.15)}
.bb{background:rgba(59,130,246,.08);color:var(--blue);border:1.5px solid rgba(59,130,246,.2)}.bb:hover{background:rgba(59,130,246,.15)}
.br{background:rgba(239,68,68,.08);color:var(--red);border:1.5px solid rgba(239,68,68,.2)}.br:hover{background:rgba(239,68,68,.15)}
.bf{width:100%;justify-content:center}
.ib{padding:5px 7px;background:transparent;border:none;cursor:pointer;border-radius:6px;color:var(--text2);font-size:14px;transition:all .15s}.ib:hover{background:var(--surf3);color:var(--text)}
.subMenuItem{display:block;width:100%;text-align:left;padding:8px 12px;background:transparent;border:none;cursor:pointer;border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;transition:all .12s;font-weight:500}.subMenuItem:hover{background:var(--surf2)}

/* LOGIN */
#lScr{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;background:radial-gradient(ellipse at 30% 40%,#fff1f1 0%,var(--bg) 65%)}
.lCard{background:var(--surf);border:1.5px solid var(--border);border-radius:20px;padding:48px 44px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.lLogo{text-align:center;margin-bottom:36px}
.lLogo h1{font-size:30px;font-weight:800;background:linear-gradient(135deg,#bef264,var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.lLogo p{color:var(--text2);font-size:12px;margin-top:8px;letter-spacing:.3px;font-weight:500}
.lLogo svg{display:block;margin:0 auto 10px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.18))}
.fg{margin-bottom:16px}

/* APP LAYOUT */
#aScr{display:flex;height:100vh;height:100dvh}
.sb{width:var(--sw);background:var(--surf);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .22s cubic-bezier(.4,0,.2,1),min-width .22s;overflow:hidden}
.sb.collapsed{width:var(--sw-col);min-width:var(--sw-col)}
.sb.collapsed .sbLogoText,.sb.collapsed .nLbl,.sb.collapsed .bLbl,.sb.collapsed .sbDivider{opacity:0;pointer-events:none;width:0;overflow:hidden;white-space:nowrap}
.sb.collapsed .sbTop{padding:16px 18px}
.sb.collapsed .sbN{padding:8px}
.sb.collapsed .ni{padding:10px;justify-content:center;gap:0}
.sb.collapsed .nBdg{position:absolute;top:4px;right:4px;font-size:8px;padding:1px 4px;min-width:14px;display:flex;justify-content:center}
.sb.collapsed .sbF{padding:8px}
.sb.collapsed .sbF button{justify-content:center;padding:8px}
.sbToggle{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:4px 6px;border-radius:6px;margin-left:auto;transition:all .15s;flex-shrink:0}.sbToggle:hover{background:var(--surf2);color:var(--text2)}
.sbTop{padding:16px 18px;border-bottom:1.5px solid var(--border)}
.sbLogo{display:flex;align-items:center;gap:10px}
.sbLogoIcon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbLogoText{transition:opacity .18s;white-space:nowrap}
.sbLogoText div:first-child{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.3px}
.sbLogoText div:last-child{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500}
.sbN{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:pointer;color:var(--text);font-size:14px;transition:all .15s;position:relative;border:none;background:none;width:100%;text-align:left;border-radius:var(--radius2);font-weight:600}
.ni:hover{background:var(--surf2);color:var(--text)}
.ni.on{background:var(--acc);color:#07130c;font-weight:700}
.ni.on:hover{background:var(--acc);color:#07130c}
.ni.on .niIcon{color:#07130c}
.ni.on .nBdg.bdgR{background:#07130c;color:#fff}
.niIcon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nLbl{transition:opacity .18s;white-space:nowrap}
.nBdg{border-radius:20px;padding:2px 6px;font-size:10px;font-weight:700;margin-left:auto}
.bdgR{background:var(--red);color:#fff}.bdgG{background:var(--green);color:#fff}
.sbDivider{height:1px;background:var(--border);margin:4px 8px;transition:opacity .18s}
.sbF{padding:10px}.bLbl{transition:opacity .18s;white-space:nowrap}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.tbr{background:var(--surf);border-bottom:1.5px solid var(--border);padding:calc(11px + env(safe-area-inset-top)) 22px 11px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tbr h2{font-size:20px;font-weight:800;flex:1;color:var(--text);letter-spacing:-.4px}
.sB{position:relative;display:flex;align-items:center}
.sB input{padding:7px 12px 7px 32px;width:200px;border-radius:20px;font-size:12px}
.sI{position:absolute;left:10px;color:var(--text3);pointer-events:none;font-size:12px}
.cont{flex:1;overflow-y:auto;padding:22px}
.darkToggle{background:none;border:1.5px solid var(--border2);cursor:pointer;color:var(--text2);font-size:14px;padding:5px 9px;border-radius:8px;transition:all .15s;flex-shrink:0}.darkToggle:hover{background:var(--surf2);color:var(--text)}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 16px;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s;box-shadow:var(--shadow)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.cBlue::before{background:var(--blue)}
.sc.cGreen::before{background:var(--green)}
.sc.cYellow::before{background:var(--yellow)}
.sc.cRed::before{background:var(--red)}
.sc.cPurple::before{background:var(--purple)}
.sc .lb{font-size:12.5px;color:var(--text);margin-bottom:8px;font-weight:600}
.sc .vl{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sc .sb2{font-size:11px;color:var(--text2);margin-top:4px}
.cBlue .vl{color:var(--blue)}.cGreen .vl{color:var(--green)}.cYellow .vl{color:var(--yellow)}.cRed .vl{color:var(--red)}.cPurple .vl{color:var(--purple)}

/* CARDS / TABLE */
.tw{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.tb2{padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1.5px solid var(--border)}
.twTitle{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.1px}
.fs{background:var(--surf2);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;color:var(--text);font-size:12px;outline:none;cursor:pointer;font-weight:500}
.tc{overflow-x:auto;max-height:calc(100vh - 200px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;background:var(--surf2);z-index:2}
th{padding:9px 12px;text-align:left;font-size:11px;color:var(--text2);white-space:nowrap;font-weight:600;letter-spacing:.1px;border-bottom:1.5px solid var(--border)}
td{padding:12px 12px;border-top:1px solid var(--border);white-space:nowrap;vertical-align:middle;font-size:12px}
tr.cRow{transition:background .12s}
tr.cRow:hover td{background:rgba(59,130,246,.025)}
tr.sRow td{background:rgba(163,230,53,.012);border-top:1px solid var(--border)}
tr.sRow:hover td{background:rgba(163,230,53,.04)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.2px}
.bAct{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.bExp{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.bVen{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bUnk{background:rgba(107,114,128,.1);color:var(--text2);border:1px solid var(--border)}


/* ALERTS */
.alert{border-radius:var(--radius2);padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.alert h4{font-size:13px;font-weight:600;margin-bottom:2px}
.alert p{font-size:11px;opacity:.8}
.alertY{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2)}.alertY h4{color:var(--yellow)}
.alertR{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2)}.alertR h4{color:var(--red)}
.alertG{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2)}.alertG h4{color:var(--green)}

/* REMINDER CARDS */
.remCard{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--radius2);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:all .15s}
.remCard:hover{border-color:rgba(163,230,53,.35);background:rgba(163,230,53,.02)}
.remAvatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.remInfo{flex:1;min-width:0}
.remName{font-weight:600;font-size:13px;color:var(--text)}
.remSub{font-size:11px;color:var(--text2);margin-top:2px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:calc(16px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom));backdrop-filter:blur(6px)}
.mod{background:var(--surf);border:1.5px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:calc(100vh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));max-height:calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));overflow-y:auto;box-shadow:var(--shadow-lg)}
.mh{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:16px 16px 0 0}
.mh h3{font-size:14px;font-weight:700;letter-spacing:-.1px}
.mb{padding:20px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg2 .full{grid-column:1/-1}
.mf{padding:12px 20px;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surf);border-radius:0 0 16px 16px}
.pW{display:flex}.pW input{border-radius:var(--radius2) 0 0 var(--radius2)!important;border-right:none!important}
.pT{background:var(--surf2);border:1.5px solid var(--border2);border-left:none;border-radius:0 var(--radius2) var(--radius2) 0;padding:0 10px;cursor:pointer;color:var(--text2);font-size:13px}.pT:hover{color:var(--text)}

/* CHARTS */
.cr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.cc{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.cc h4{font-size:11px;color:var(--text2);margin-bottom:12px;font-weight:600;letter-spacing:.2px}
.bR{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px}
.bL{width:80px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.bT{flex:1;background:var(--surf3);border-radius:20px;height:14px;overflow:hidden}
.bF{height:100%;border-radius:20px;background:var(--acc);display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-size:9px;font-weight:700;color:#07130c;min-width:20px}

/* WA */
.waCard{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--radius2);padding:11px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s}
.waCard input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;margin-top:3px;accent-color:#25d366}
.waMsg{background:rgba(37,211,102,.04);border:1px solid rgba(37,211,102,.15);border-radius:6px;padding:10px;font-size:11px;color:var(--text2);margin-top:7px;white-space:pre-wrap;line-height:1.6}

/* ACTION BUTTONS */
.iconActionBtn{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;border:1px solid transparent;user-select:none;flex-shrink:0}
.fabBtn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:14px;background:var(--acc);color:#07130c;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(163,230,53,.4);z-index:90;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fabBtn:hover{transform:scale(1.06);box-shadow:0 6px 24px rgba(163,230,53,.5)}
@media(max-width:680px){
  .fabBtn{bottom:calc(84px + env(safe-area-inset-bottom));right:16px;width:48px;height:48px;font-size:20px;border-radius:12px}
  .toast{bottom:calc(90px + env(safe-area-inset-bottom))}
}
.iconActionBtn:hover{background:var(--surf3)}
.btnRen{background:rgba(16,185,129,.08);color:var(--green);border-color:rgba(16,185,129,.2)}.btnRen:hover{background:rgba(16,185,129,.15)}
.btnEdit{background:rgba(59,130,246,.08);color:var(--blue);border-color:rgba(59,130,246,.2)}.btnEdit:hover{background:rgba(59,130,246,.15)}
.btnWA{background:rgba(37,211,102,.08);color:#25d366;border-color:rgba(37,211,102,.2)}.btnWA:hover{background:rgba(37,211,102,.15)}

// в”Җв”Җ APLICAR DATOS DESDE FIRESTORE (una sola fuente, usada al cargar y al sincronizar) в”Җв”Җ
// в”Җв”Җ BASE DE SINCRONIZACIГ“N (para fusiГіn 3-way en conflictos) в”Җв”Җ
// Foto por-item (id вҶ’ JSON) del ГҡLTIMO estado del servidor que vio este dispositivo.
// En un conflicto permite distinguir quГ© items se tocaron AQUГҚ de los que solo estГЎn viejos:
// si un item local estГЎ idГ©ntico a la base, lo del servidor es mГЎs nuevo y debe ganar.
// (Antes lo local pisaba SIEMPRE: un dispositivo con datos viejos revertГӯa renovaciones
// hechas en el celular al guardar cualquier cosa, p.ej. marcar un recordatorio enviado.)
const _SYNC_COLS=['clients','pagos','cuentas','proveedores','papelera','papeleraCuentas','papeleraProveedores'];
let _syncBase={};
function _syncBaseFrom(d){
  try{
    const out={};
    _SYNC_COLS.forEach(k=>{
      const m=new Map();
      try{(JSON.parse(d[k]||'[]')||[]).forEach(it=>{if(it&&it.id!=null)m.set(it.id,JSON.stringify(it));});}catch(e){}
      out[k]=m;
    });
    _syncBase=out;
  }catch(e){}
}
function aplicarDatosFirestore(d){
  if(!d)return;
  if(d.clients)S.clients=JSON.parse(d.clients);
  if(d.pagos)S.pagos=JSON.parse(d.pagos);
  if(d.cuentas)S.cuentas=JSON.parse(d.cuentas);
  if(d.proveedores){try{S.proveedores=JSON.parse(d.proveedores)}catch(e){}}
  if(d.catalogo)S.catalogo=JSON.parse(d.catalogo);
  if(d.platLimits)S.platLimits=JSON.parse(d.platLimits);
  if(d.customPlats){S.customPlats=JSON.parse(d.customPlats);S.customPlats.forEach(p=>{if(!PLATS.includes(p)){PLATS.splice(PLATS.length-1,0,p);if(!PI[p])PI[p]='рҹ“ә';if(!PLATCOLORS[p])PLATCOLORS[p]='#6868a0';if(!PLAT_LIMITS[p])PLAT_LIMITS[p]=4;}});}
  if(d.papelera)S.papelera=JSON.parse(d.papelera);
  if(d.papeleraCuentas){try{S.papeleraCuentas=JSON.parse(d.papeleraCuentas)}catch(e){}}
  if(d.papeleraProveedores){try{S.papeleraProveedores=JSON.parse(d.papeleraProveedores)}catch(e){}}
  if(typeof d.autoBackupEnabled==='boolean')S.autoBackupEnabled=d.autoBackupEnabled;
  if(d.autoBackupDays)S.autoBackupDays=d.autoBackupDays;
  if(d.lastBackup)S.lastBackup=d.lastBackup;
  if(d.biz)S.biz=d.biz;
  if(d.reminderDays)S.reminderDays=d.reminderDays;
  if(d.countryCode)S.countryCode=d.countryCode;
  if(typeof d.dailyDigest==='boolean')S.dailyDigest=d.dailyDigest;
  if(typeof d.autoSuspend==='boolean')S.autoSuspend=d.autoSuspend;
  if(d.autoSuspendDays)S.autoSuspendDays=d.autoSuspendDays;
  if(typeof d.seguimiento==='boolean')S.seguimiento=d.seguimiento;
  if(d.seguimientoDias)S.seguimientoDias=d.seguimientoDias;
  if(typeof d.reporteMensual==='boolean')S.reporteMensual=d.reporteMensual;
  if(typeof d.confirmacionPago==='boolean')S.confirmacionPago=d.confirmacionPago;
  if(d.plantillas){try{S.plantillas=JSON.parse(d.plantillas)}catch(e){}}
  if(typeof d.datosPago==='string')S.datosPago=d.datosPago;
  if(d.waEnviados){try{S.waEnviados=_prunMarcadores(JSON.parse(d.waEnviados))}catch(e){}}
  if(d.waSeguimiento){try{S.waSeguimiento=_prunMarcadores(JSON.parse(d.waSeguimiento))}catch(e){}}
  if(d.platGroups){try{S.platGroups=JSON.parse(d.platGroups)}catch(e){}}
  if(d.combos){try{const cb=JSON.parse(d.combos);if(Array.isArray(cb))S.combos=cb}catch(e){}}
  // VersiГіn del documento (control de concurrencia entre dispositivos): registra la Гәltima revisiГіn vista.
  S._rev=(typeof d.rev==='number')?d.rev:0;
  _syncBaseFrom(d); // registrar la base: asГӯ quedГі el servidor la Гәltima vez que lo vimos
  aplicarMarca(); // cada usuario ve SU nombre de negocio (tГӯtulo, meta iOS, cachГ© local)
}
// Elimina de la papelera los items con mГЎs de 30 dГӯas (lo que promete la UI)
function _limpiarPapelera(){
  const limite=Date.now()-30*86400000;
  if(S.papeleraCuentas&&S.papeleraCuentas.length)S.papeleraCuentas=S.papeleraCuentas.filter(c=>!c.deletedAt||c.deletedAt>limite);
  if(S.papeleraProveedores&&S.papeleraProveedores.length){const purgar=S.papeleraProveedores.filter(p=>p.deletedAt&&p.deletedAt<=limite).map(p=>p.id);if(purgar.length)S.cuentas.forEach(ca=>{if(purgar.includes(ca.proveedorId))ca.proveedorId='';});S.papeleraProveedores=S.papeleraProveedores.filter(p=>!p.deletedAt||p.deletedAt>limite);}
  if(!S.papelera||!S.papelera.length)return 0;
  const antes=S.papelera.length;
  S.papelera=S.papelera.filter(c=>!c.deletedAt||c.deletedAt>limite);
  return antes-S.papelera.length;
}

// в”Җв”Җ GUARDAR EN FIRESTORE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let ultimoGuardadoLocal=0;
// Serializa los guardados: nunca corren dos a la vez en el mismo dispositivo (evita que un guardado
// automГЎtico en 2.Вә plano y uno manual choquen y se pisen). Cada sv() espera al anterior y luego corre.
let _svCola=Promise.resolve();
function sv(){_svCola=_svCola.then(_svCore,_svCore);return _svCola;}
// FusiГіn en caso de conflicto: trae lo Гәltimo del servidor PERO conserva el cambio
// que el usuario acaba de hacer en este dispositivo (antes se descartaba вҶ’ se perdГӯan clientes).
function _fusionarConflicto(serverData){
  // 0) Base 3-way: cГіmo estaba cada item la Гәltima vez que ESTE dispositivo vio el servidor.
  //    (capturar ANTES de aplicar el servidor, porque aplicarDatosFirestore la reescribe)
  const base=_syncBase||{};
  // 1) Guardar el estado local actual (incluye el cambio reciГ©n hecho, p.ej. el cliente nuevo)
  const local={
    clients:S.clients,pagos:S.pagos,cuentas:S.cuentas,proveedores:S.proveedores,
    papelera:S.papelera,papeleraCuentas:S.papeleraCuentas,papeleraProveedores:S.papeleraProveedores,
    waEnviados:S.waEnviados,waSeguimiento:S.waSeguimiento
  };
  // 2) Cargar lo Гәltimo del servidor (esto deja S._rev en la revisiГіn correcta del servidor)
  aplicarDatosFirestore(serverData);
  // 3) FusiГіn 3-way por id: parte de lo del servidor y superpone SOLO lo local que realmente
  //    cambiГі en este dispositivo (distinto a la base) o que es nuevo. Un item local IGUAL a la
  //    base no se tocГі aquГӯ вҶ’ manda el servidor (no lo pisa ni lo revive si otro lo borrГі).
  //    Antes lo local ganaba SIEMPRE y un dispositivo viejo revertГӯa renovaciones del celular.
  const fusion=(serverArr,localArr,baseMap)=>{
    const out=Array.isArray(serverArr)?serverArr.slice():[];
    const idx=new Map(out.map((x,i)=>[x.id,i]));
    (localArr||[]).forEach(it=>{
      if(!it||it.id==null)return;
      try{
        const bj=baseMap&&baseMap.get?baseMap.get(it.id):undefined;
        if(bj!==undefined&&bj===JSON.stringify(it))return; // sin cambios locales вҶ’ gana el servidor
      }catch(e){}
      if(idx.has(it.id))out[idx.get(it.id)]=it; else out.push(it);
    });
    return out;
  };
  S.clients=fusion(S.clients,local.clients,base.clients);
  S.pagos=fusion(S.pagos,local.pagos,base.pagos);
  S.cuentas=fusion(S.cuentas,local.cuentas,base.cuentas);
  S.proveedores=fusion(S.proveedores,local.proveedores,base.proveedores);
  S.papelera=fusion(S.papelera,local.papelera,base.papelera);
  S.papeleraCuentas=fusion(S.papeleraCuentas,local.papeleraCuentas,base.papeleraCuentas);
  S.papeleraProveedores=fusion(S.papeleraProveedores,local.papeleraProveedores,base.papeleraProveedores);
  // 3b) Marcadores de enviado: uniГіn servidor+local (lo local encima; sin esto, el clic de
  //     "marcar enviado" que disparГі este guardado se perderГӯa en el conflicto)
  try{S.waEnviados=Object.assign({},S.waEnviados||{},local.waEnviados||{});}catch(e){}
  try{S.waSeguimiento=Object.assign({},S.waSeguimiento||{},local.waSeguimiento||{});}catch(e){}
  // 4) Respetar borrados hechos en OTRO dispositivo: si algo estГЎ en la papelera, no revivirlo.
  const cliPapelera=new Set((S.papelera||[]).map(c=>c.id));
  S.clients=S.clients.filter(c=>!cliPapelera.has(c.id));
  const caPapelera=new Set((S.papeleraCuentas||[]).map(c=>c.id));
  S.cuentas=S.cuentas.filter(c=>!caPapelera.has(c.id));
}
let _ultimoUid=null; // Гәltimo uid conocido (para respaldar aunque la sesiГіn se caiga un instante)
function _guardarEmergencia(uid){
  if(!uid)return;
  try{
    const snapshot={
      clients:S.clients,pagos:S.pagos,cuentas:S.cuentas,proveedores:S.proveedores||[],papeleraProveedores:S.papeleraProveedores||[],
      catalogo:S.catalogo||{},customPlats:S.customPlats||[],papelera:S.papelera||[],papeleraCuentas:S.papeleraCuentas||[],
      biz:S.biz,reminderDays:S.reminderDays,lastBackup:S.lastBackup||'',platGroups:S.platGroups||{},combos:Array.isArray(S.combos)?S.combos:null,countryCode:S.countryCode||'',
      dailyDigest:S.dailyDigest,autoSuspend:S.autoSuspend,autoSuspendDays:S.autoSuspendDays,
      seguimiento:S.seguimiento,seguimientoDias:S.seguimientoDias,reporteMensual:S.reporteMensual,confirmacionPago:S.confirmacionPago,plantillas:S.plantillas||{},datosPago:S.datosPago||'',
      waEnviados:S.waEnviados||{},waSeguimiento:S.waSeguimiento||{},
      _savedAt:Date.now()
    };
    localStorage.setItem('pf_emergencia_'+uid,JSON.stringify(snapshot));
  }catch(e){/* localStorage lleno o no disponible, continuar */}
}
async function _svCore(_intentos){
  _intentos=_intentos||0;
  const uid=auth.currentUser?.uid;
  if(!uid){
    // SesiГіn no disponible en este instante (refresco de token, blip de auth). NO perder el cambio:
    // respaldar en el dispositivo y reintentar unos segundos a que vuelva la sesiГіn.
    _guardarEmergencia(_ultimoUid);
    setSync('error');
    if(_intentos<4){await new Promise(r=>setTimeout(r,1200));return _svCore(_intentos+1);}
    return 'sin-sesion';
  }
  _ultimoUid=uid;
  setSync('guardando');
  ultimoGuardadoLocal=Date.now(); // Marcar que acabamos de guardar (para el sync)
  // RESPALDO LOCAL DE EMERGENCIA: guardar copia en el dispositivo ANTES de Firebase
  // AsГӯ si falla internet, los datos no se pierden
  _guardarEmergencia(uid);
  const ref=db.collection('usuarios').doc(uid);
  const payload={
      clients:JSON.stringify(S.clients),
      pagos:JSON.stringify(S.pagos),
      cuentas:JSON.stringify(S.cuentas),
      proveedores:JSON.stringify(S.proveedores||[]),
      papeleraProveedores:JSON.stringify(S.papeleraProveedores||[]),
      catalogo:JSON.stringify(S.catalogo||{}),
      platLimits:JSON.stringify(S.platLimits||{}),
      customPlats:JSON.stringify(S.customPlats||[]),
      papelera:JSON.stringify(S.papelera||[]),
      papeleraCuentas:JSON.stringify(S.papeleraCuentas||[]),
      autoBackupEnabled:S.autoBackupEnabled,
      autoBackupDays:S.autoBackupDays,
      lastBackup:S.lastBackup||'',
      biz:S.biz,
      reminderDays:S.reminderDays,
      platGroups:JSON.stringify(S.platGroups||{}),
      combos:Array.isArray(S.combos)?JSON.stringify(S.combos):'',
      countryCode:S.countryCode||'',
      dailyDigest:S.dailyDigest,
      autoSuspend:S.autoSuspend,
      autoSuspendDays:S.autoSuspendDays,
      seguimiento:S.seguimiento,
      seguimientoDias:S.seguimientoDias,
      reporteMensual:S.reporteMensual,
      confirmacionPago:S.confirmacionPago,
      plantillas:JSON.stringify(S.plantillas||{}),
      datosPago:S.datosPago||'',
      waEnviados:JSON.stringify(S.waEnviados||{}),
      waSeguimiento:JSON.stringify(S.waSeguimiento||{}),
      rev:((typeof S._rev==='number')?S._rev:0)+1,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  // CONTROL DE CONCURRENCIA: una transacciГіn comprueba que el servidor no haya avanzado desde que cargamos.
  // Si otro dispositivo/pestaГұa ya guardГі (rev distinta), NO pisamos: recargamos lo Гәltimo y avisamos.
  try{
    await db.runTransaction(async tx=>{
      const snap=await tx.get(ref);
      const serverRev=snap.exists?(snap.data().rev||0):0;
      if(snap.exists&&typeof S._rev==='number'&&serverRev!==S._rev){
        const err=new Error('conflict');err.__conflict=true;err.__data=snap.data();throw err;
      }
      tx.set(ref,payload);
    });
    S._rev=payload.rev;
    _syncBaseFrom(payload); // lo nuestro ES ahora el estado del servidor
    setSync('ok');
    return 'ok';
  }catch(e){
    if(e&&e.__conflict){
      // Otro dispositivo escribiГі mientras tanto. Fusionamos lo del servidor con NUESTRO cambio
      // (sin perder el cliente/ediciГіn reciГ©n hecho) y reintentamos el guardado.
      try{_fusionarConflicto(e.__data);}catch(_){try{aplicarDatosFirestore(e.__data);}catch(__){}}
      if(typeof renderCont==='function')try{renderCont();}catch(_){}
      if(_intentos<3){
        // Reintentar ya con la revisiГіn del servidor + nuestro cambio fusionado.
        return _svCore(_intentos+1);
      }
      // Tras varios reintentos seguidos no podemos perder el cambio: forzar escritura (lo fusionado gana).
      const refF=db.collection('usuarios').doc(auth.currentUser?.uid);
      const payloadF={...payload,rev:((typeof S._rev==='number')?S._rev:0)+1,
        clients:JSON.stringify(S.clients),pagos:JSON.stringify(S.pagos),cuentas:JSON.stringify(S.cuentas),
        proveedores:JSON.stringify(S.proveedores||[]),papelera:JSON.stringify(S.papelera||[]),
        papeleraCuentas:JSON.stringify(S.papeleraCuentas||[]),papeleraProveedores:JSON.stringify(S.papeleraProveedores||[])};
      refF.set(payloadF).then(()=>{S._rev=payloadF.rev;_syncBaseFrom(payloadF);setSync('ok');toast('вң… Guardado (datos fusionados con otro dispositivo)','G');})
        .catch(err=>{console.error('Error guardando (fusiГіn):',err);setSync('error');});
      return 'ok';
    }else{
      // Sin conexiГіn: la transacciГіn falla offline вҶ’ guardado directo (se encola y sincroniza al reconectar).
      // No se puede esperar (offline nunca resuelve), asГӯ que se confГӯa en el respaldo local + la cola del SDK.
      if(!navigator.onLine){
        setSync('offline');
        ref.set(payload).then(()=>{S._rev=payload.rev;_syncBaseFrom(payload);setSync('ok');}).catch(err=>{console.error('Error guardando en la nube:',err);});
        return 'offline';
      }
      // Online pero la transacciГіn fallГі por otra razГіn (permisos, transitorio): intentar set directo
      // y ESPERAR el resultado real para no mentir con un "guardado" falso.
      try{await ref.set(payload);S._rev=payload.rev;_syncBaseFrom(payload);setSync('ok');return 'ok';}
      catch(err){console.error('Error guardando en la nube:',err);setSync('error');return 'error';}
    }
  }
}

// в”Җв”Җ CARGAR DESDE FIRESTORE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function ld(){
  const uid=auth.currentUser?.uid;
  if(!uid)return;
  let cargoDeNube=false;
  try{
    const doc=await db.collection('usuarios').doc(uid).get();
    if(doc.exists){
      aplicarDatosFirestore(doc.data());
      cargoDeNube=true;
    }
  }catch(e){console.error('Error cargando de la nube:',e);}
  // RECUPERACIГ“N DE EMERGENCIA: si la nube fallГі o vino vacГӯa, usar respaldo local completo
  if(!cargoDeNube||S.clients.length===0){
    try{
      const local=localStorage.getItem('pf_emergencia_'+uid);
      if(local){
        const snap=JSON.parse(local);
        if(snap.clients&&snap.clients.length>S.clients.length){
          S.clients=snap.clients;S.pagos=snap.pagos||[];S.cuentas=snap.cuentas||[];S.proveedores=snap.proveedores||[];
          S.catalogo=snap.catalogo||{};S.customPlats=snap.customPlats||[];S.papelera=snap.papelera||[];S.papeleraCuentas=snap.papeleraCuentas||[];S.papeleraProveedores=snap.papeleraProveedores||[];
          if(snap.biz)S.biz=snap.biz;if(snap.reminderDays)S.reminderDays=snap.reminderDays;
          if(snap.platGroups)S.platGroups=snap.platGroups;if(snap.countryCode)S.countryCode=snap.countryCode;if(Array.isArray(snap.combos))S.combos=snap.combos;
          if(typeof snap.dailyDigest==='boolean')S.dailyDigest=snap.dailyDigest;if(typeof snap.autoSuspend==='boolean')S.autoSuspend=snap.autoSuspend;if(snap.autoSuspendDays)S.autoSuspendDays=snap.autoSuspendDays;
          S.customPlats.forEach(p=>{if(!PLATS.includes(p)){PLATS.splice(PLATS.length-1,0,p);if(!PI[p])PI[p]='рҹ“ә';if(!PLATCOLORS[p])PLATCOLORS[p]='#6868a0';if(!PLAT_LIMITS[p])PLAT_LIMITS[p]=4;}});
          setTimeout(()=>toast('рҹӣҹ Datos recuperados del respaldo local','B'),1000);
        }
      }
    }catch(e){console.error('Error recuperaciГіn local:',e);}
  } else {
    // RESCATE FINO: la nube cargГі, pero un guardado RECIENTE pudo no haber llegado (se cayГі la sesiГіn/conexiГіn
    // justo al crear un cliente). Si el respaldo local es fresco y tiene items que la nube perdiГі, los re-inyectamos
    // por id. Solo si es reciente (вүӨ2 h) para no revivir borrados hechos en otro dispositivo.
    try{
      const local=localStorage.getItem('pf_emergencia_'+uid);
      if(local){
        const snap=JSON.parse(local);
        const fresco=snap._savedAt&&(Date.now()-snap._savedAt)<2*3600000;
        if(fresco){
          let rescatados=0;
          const enPapelera=new Set((S.papelera||[]).map(c=>c.id)); // no revivir lo que la nube ya borrГі
          const rescatar=(cloudArr,snapArr,vivosId)=>{
            const arr=Array.isArray(cloudArr)?cloudArr:[];
            const ids=new Set(arr.map(x=>x&&x.id));
            (snapArr||[]).forEach(it=>{
              if(it&&it.id!=null&&!ids.has(it.id)&&!(vivosId&&vivosId.has(it.id))){arr.push(it);rescatados++;}
            });
            return arr;
          };
          S.clients=rescatar(S.clients,snap.clients,enPapelera);
          const caPapelera=new Set((S.papeleraCuentas||[]).map(c=>c.id));
          S.cuentas=rescatar(S.cuentas,snap.cuentas,caPapelera);
          S.pagos=rescatar(S.pagos,snap.pagos,null);
          S.proveedores=rescatar(S.proveedores,snap.proveedores,null);
          if(rescatados>0){
            // Volver a subir lo rescatado para que nube y respaldo queden iguales.
            setTimeout(()=>{sv();toast('рҹӣҹ Se recuperaron '+rescatados+' dato(s) que no se habГӯan subido a la nube','B');},1200);
          }
        }
      }
    }catch(e){console.error('Error rescate local:',e);}
  }
  // Limpiar papelera de items con mГЎs de 30 dГӯas
  const eliminados=_limpiarPapelera();
  if(eliminados>0)sv();
  // Aviso si el documento se acerca al lГӯmite de 1 MB de Firestore
  if(dataBytes()>850000)setTimeout(()=>toast('вҡ пёҸ Tus datos estГЎn cerca del lГӯmite de almacenamiento. Ve a Ajustes вҶ’ Mantenimiento de Datos para archivar pagos viejos.','B'),2500);
  aplicarMarca(); // cubre tambiГ©n el restore de emergencia local, que setea S.biz sin pasar por aplicarDatosFirestore
  _registrarDirectorio(); // ficha en el directorio de usuarios (correo/marca/Гәltima entrada), en 2.Вә plano
}

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function gst(d){if(!d)return'unk';const t=new Date();t.setHours(0,0,0,0);const dt=new Date(d+'T00:00:00');dt.setHours(0,0,0,0);const df=Math.round((dt-t)/86400000);if(df<0)return'ven';if(df<=(S.reminderDays||7))return'exp';return'act'}
function dl(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const dt=new Date(d+'T00:00:00');dt.setHours(0,0,0,0);return Math.round((dt-t)/86400000)}
function fd(d){if(!d)return'вҖ”';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`}
function fdRel(d){if(!d)return'sin fecha';const n=dl(d);if(n===null)return'sin fecha';if(n===0)return'*hoy*';if(n===1)return'*maГұana*';if(n===2)return'*en 2 dГӯas*';if(n===3)return'*en 3 dГӯas*';if(n>3)return`*en ${n} dГӯas*`;if(n===-1)return'*ayer*';if(n===-2)return'*hace 2 dГӯas*';if(n===-3)return'*hace 3 dГӯas*';return`*hace ${Math.abs(n)} dГӯas*`;}

// Agrupa familias de plataformas SOLO para los filtros y selectores (NO cambia los datos).

function addMonths(d,n){if(!d)d=nowDate();const dt=new Date(d+'T12:00:00');const day=dt.getDate();dt.setMonth(dt.getMonth()+n);if(dt.getDate()<day)dt.setDate(0);return localISO(dt)}

function localISO(dt){const y=dt.getFullYear();const m=String(dt.getMonth()+1).padStart(2,'0');const day=String(dt.getDate()).padStart(2,'0');return`${y}-${m}-${day}`}
function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function cliSt(c){const sts=(c.subs||[]).map(s=>gst(s.endDate));if(sts.includes('ven'))return'ven';if(sts.includes('exp'))return'exp';if(sts.includes('act'))return'act';return'unk'}

function cliDeuda(c){return(c.subs||[]).filter(s=>gst(s.endDate)==='ven').reduce((s,x)=>s+precioMostrar(x),0)}
// в”Җв”Җ PUNTUALIDAD DE PAGO (score automГЎtico, sin datos nuevos que llenar) в”Җв”Җ
// Fuentes de "dГӯas de atraso": (1) pagos con venciaEl (exacto, guardado al renovar desde jul 2026);
// (2) pares consecutivos de pagos de la MISMA plataforma: fecha del pago vs endDate del pago anterior
//     (ese endDate era el vencimiento que se estaba pagando); (3) subs vencidas HOY (atraso corriente).
// Cache _puntCache por render (mismo patrГіn que _remCache; se anula en render() y renderCont()).
let _puntCache=null;
function _diasEntre(a,b){const d1=new Date(a),d2=new Date(b);if(isNaN(d1)||isNaN(d2))return null;return Math.round((d2-d1)/86400000);}
function puntualidadCliente(c){
  if(!_puntCache)_puntCache={};
  if(_puntCache[c.id]!==undefined)return _puntCache[c.id];
  const atrasos=[];
  const pagos=S.pagos.filter(p=>p.clientId===c.id&&!p.esCosto&&(parseFloat(p.monto)||0)>0).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  const prevPorPlat={};
  pagos.forEach(p=>{
    if(p.venciaEl){const d=_diasEntre(p.venciaEl,p.fecha);if(d!==null&&d>=-60&&d<=120)atrasos.push(d);}
    else if(p.platform&&p.endDate){
      const prev=prevPorPlat[p.platform];
      if(prev&&prev.endDate){const d=_diasEntre(prev.endDate,p.fecha);if(d!==null&&d>=-60&&d<=120)atrasos.push(d);}
    }
    if(p.platform&&p.endDate)prevPorPlat[p.platform]=p;
  });
  (c.subs||[]).forEach(s=>{if(gst(s.endDate)==='ven'){const n=dl(s.endDate);if(n!==null)atrasos.push(Math.min(-n,120));}});
  let r=null;
  if(atrasos.length>=2){
    const avg=atrasos.reduce((a,b)=>a+b,0)/atrasos.length;
    r={n:atrasos.length,avg,cat:avg<=1?'P':avg<=5?'M':'X'};
  }
  _puntCache[c.id]=r;
  return r;
}
function puntBadge(c){

  const m={P:['рҹҹў','Puntual'],M:['рҹҹЎ','Se atrasa'],X:['рҹ”ҙ','Moroso']}[p.cat];
  const avgTxt=p.avg<=0?'paga antes o al dГӯa':('promedio '+Math.round(p.avg)+' dГӯa(s) de atraso');
  return`<span title="вҸұпёҸ ${m[1]} В· ${avgTxt} В· basado en ${p.n} dato(s)" style="cursor:help;font-size:10px">${m[0]}</span>`;
}
function stBadge(st){const m={act:{c:'bAct',l:'вң“ Activo'},exp:{c:'bExp',l:'вҡ  Por vencer'},ven:{c:'bVen',l:'вң— Vencido'},unk:{c:'bUnk',l:'вҖ” Sin fecha'}};const x=m[st]||m.unk;return`<span class="badge ${x.c}">${x.l}</span>`}
function dLbl(d){const n=dl(d);if(n===null)return'';const dia=k=>k===1?'1 dГӯa':k+' dГӯas';if(n<0)return`<span style="color:var(--red);font-weight:700">VenciГі hace ${dia(Math.abs(n))}</span>`;if(n===0)return`<span style="color:var(--red);font-weight:700">Vence hoy</span>`;if(n===1)return`<span style="color:var(--red);font-weight:700">Vence maГұana</span>`;if(n<=7)return`<span style="color:var(--yellow);font-weight:600">Quedan ${dia(n)}</span>`;return`<span style="color:var(--text2)">Quedan ${dia(n)}</span>`}
// Perfiles ocupados SOLO por clientes activos (sin ajuste manual)
function profInUseReal(caId){
  const subs=S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).filter(s=>s.masterAccountId===caId);
  if(subs.some(s=>s.cuentaCompleta))return parseInt((S.cuentas.find(x=>x.id===caId)||{}).totalProfiles)||0;
  return subs.length;
}
function profInUse(caId){
  // Clientes activos + ajuste manual
  const ca=S.cuentas.find(x=>x.id===caId);
  const real=profInUseReal(caId);
  const manual=parseInt(ca?.perfilesManual)||0;
  return real+manual;
}
function profDisponibles(caId){
  const ca=S.cuentas.find(x=>x.id===caId);
  if(!ca)return 0;
  const subs=S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).filter(s=>s.masterAccountId===caId);
  if(subs.some(s=>s.cuentaCompleta))return 0;
  const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
  return Math.max(0,limit-profInUse(caId));
}

function totalMonthlyCost(){return S.cuentas.reduce((s,ca)=>s+(parseFloat(ca.costPerMonth)||0),0)}
// Ingreso mensual que generan los clientes activos vinculados a una cuenta maestra (prorrateado si el plan es de 3/6/12 meses)
function cuentaIngresos(caId){return S.clients.filter(c=>c.clientStatus!=='Cancelado').flatMap(c=>c.subs||[]).filter(s=>s.masterAccountId===caId).reduce((sum,s)=>sum+precioMensual(s),0)}
// Ganancia mensual de una cuenta = ingresos de sus clientes вҲ’ costo que pagas al proveedor
function cuentaGanancia(caId){const ca=S.cuentas.find(x=>x.id===caId);return cuentaIngresos(caId)-(parseFloat(ca&&ca.costPerMonth)||0)}
// Capacidad ociosa: perfiles libres (ya pagados) y el ingreso extra que generarГӯan si los vendieras
function oportunidadVenta(){
  let libresTotal=0,potencial=0;const precioPorPlat={};
  S.cuentas.forEach(ca=>{
    const libres=profDisponibles(ca.id);
    if(libres<=0)return;
    libresTotal+=libres;

// Normaliza un telГ©fono a formato internacional para WhatsApp, anteponiendo el cГіdigo de paГӯs si falta
function waNum(phone){
  let n=String(phone||'').replace(/\D/g,'');
  if(!n)return '';
  const cc=(S.countryCode||'593').replace(/\D/g,'');
  if(cc&&n.startsWith(cc))return n;        // ya trae el cГіdigo de paГӯs
  if(n.startsWith('00'))return n.slice(2); // prefijo internacional 00 вҶ’ quitar
  if(n.startsWith('0'))n=n.slice(1);       // quitar 0 inicial local
  if(cc&&n.length<=10)return cc+n;         // nГәmero local вҶ’ anteponer cГіdigo
  return n;
}
function openWA(phone,msg){

  // pero hay que asegurar que el string ya estГ© en UTF-8 correcto
  const encoded=encodeURIComponent(msg);

function precioMostrar(s){const tienePrecio=s&&s.price!==''&&s.price!==null&&s.price!==undefined;const propio=parseFloat(s&&s.price);if(tienePrecio&&propio>=0)return propio;const cat=getCatalogoPrecio(s.platform);return (cat&&parseFloat(cat)>0)?parseFloat(cat):0;}
// DuraciГіn en meses de una suscripciГіn, deducida de sus fechas inicioвҶ’fin (sin campos nuevos).
// Ej: Spotify 3 meses a $8 вҶ’ 3. Hasta ~45 dГӯas se considera mensual (mes + dГӯas de gracia).
function mesesSub(s){
  if(!s||!s.startDate||!s.endDate)return 1;

// в”Җв”Җ AUTO-CREAR/VINCULAR CUENTA MAESTRA AUTOMГҒTICAMENTE в”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function autoCrearCuentaMaestra(sub,clientName,opts){
  // opts = { maxDev, esCompleta, costoProveedor } opcionales
  // Necesita plataforma VГҒLIDA + correo (nunca crear cuentas sin categorГӯa)
  if(!sub.platform||sub.platform==='Otro'||!PLATS.includes(sub.platform))return null;
  if(!sub.accountEmail||!sub.accountEmail.trim())return null;
  const emailLower=sub.accountEmail.toLowerCase().trim();
  // Si ya existe con ese correo+plataforma, vincular a esa (no duplicar)
  const exists=S.cuentas.find(ca=>ca.platform===sub.platform&&(ca.email||'').toLowerCase().trim()===emailLower);
  if(exists)return exists.id;
  // Crear nueva cuenta maestra respetando maxDev si fue especificado
  const limit=(opts&&opts.maxDev&&parseInt(opts.maxDev)>0)?parseInt(opts.maxDev):getPlatLimit(sub.platform);
  const newCa={
    id:gid(),
    platform:sub.platform,
    plan:'',
    email:sub.accountEmail.trim(),
    password:sub.password||'',
    totalProfiles:limit,
    costPerMonth:(opts&&opts.costoProveedor>0)?String(opts.costoProveedor.toFixed(2)):'',
    startDate:(opts&&opts.startDate)||'',
    renewalDate:(opts&&opts.renewalDate)||sub.endDate||'',
    cuentaEstado:'ok',
    notes:'Auto-creada al registrar a '+(clientName||'cliente')
  };
  S.cuentas.push(newCa);
  return newCa.id;
}

async function saveSub(d,nuevaCfg){
  // nuevaCfg (opcional, solo al crear): { forzar, maxDev, costoProveedor, startDate, renewalDate, provId }
  const c=S.clients.find(x=>x.id===S.sClientId);
  if(!c)return;
  let subId;
  const wasAdd=S.sMode==='add';
  let autoCreated=false,autoLinked=false;
  const cfgOpts=nuevaCfg?{maxDev:nuevaCfg.maxDev,esCompleta:d.cuentaCompleta,costoProveedor:nuevaCfg.costoProveedor,renewalDate:nuevaCfg.renewalDate,startDate:nuevaCfg.startDate}:undefined;
  if(!d.masterAccountId&&d.platform){
    if(nuevaCfg&&nuevaCfg.forzar){
      // 0) El usuario pidiГі explГӯcitamente crear una cuenta maestra nueva
      if(d.accountEmail){
        const newMasterId=autoCrearCuentaMaestra(d,c.name,cfgOpts);
        if(newMasterId){d.masterAccountId=newMasterId;autoCreated=true;}
      }
    }else{
    // 1) Auto-asignar la cuenta existente con MГҒS perfiles libres (misma plataforma, con cupo)
    const cand=S.cuentas
      .filter(ca=>platGroup(ca.platform)===platGroup(d.platform)&&!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0)
      .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
    if(cand.length){
      const best=cand[0];d.masterAccountId=best.id;
      if(!d.accountEmail)d.accountEmail=best.email||'';
      if(!d.password)d.password=best.password||'';
      autoLinked=true;
    }else if(d.accountEmail){
      // 2) Si no hay cuentas con cupo, auto-crear una nueva desde el correo escrito
      const newMasterId=autoCrearCuentaMaestra(d,c.name,cfgOpts);
      if(newMasterId){d.masterAccountId=newMasterId;autoCreated=true;}
    }
    }
  }
  // Proveedor elegido en el panel de cuenta nueva вҶ’ asignarlo a la cuenta maestra creada/vinculada
  if(nuevaCfg&&nuevaCfg.provId&&d.masterAccountId){
    const mca=S.cuentas.find(x=>x.id===d.masterAccountId);
    if(mca)mca.proveedorId=nuevaCfg.provId;
  }
  if(wasAdd){
    if(!c.subs)c.subs=[];
    subId=gid();
    c.subs.push({id:subId,...d});
  }else{
    subId=S.sEditId;
    const i=(c.subs||[]).findIndex(s=>s.id===S.sEditId);
    if(i>=0)c.subs[i]={id:S.sEditId,...d};
  }
  if(autoCreated) setTimeout(()=>toast('рҹ“Ў Cuenta maestra de '+d.platform+' auto-creada','B'),600);
  if(autoLinked){const ca=S.cuentas.find(x=>x.id===d.masterAccountId);setTimeout(()=>toast('рҹ”— Auto-vinculado a '+(ca?ca.email||ca.platform:'cuenta')+' (la de mГЎs cupo)','B'),600);}
  // Editar correo/clave de una sub ligada a una cuenta maestra propaga a la cuenta maestra
  // y a TODOS los clientes que la comparten (mismo comportamiento que editar desde "Cuentas").
  let credsSync=0;
  if(!wasAdd&&d.masterAccountId){
    const ca=S.cuentas.find(x=>x.id===d.masterAccountId);
    if(ca){
      const emailCambio=!!d.accountEmail&&d.accountEmail!==ca.email;
      const passCambio=!!d.password&&d.password!==ca.password;
      if(emailCambio||passCambio){
        if(emailCambio)ca.email=d.accountEmail;
        if(passCambio)ca.password=d.password;
        S.clients.forEach(cl=>(cl.subs||[]).forEach(s=>{
          if(s.masterAccountId===d.masterAccountId){
            if(emailCambio)s.accountEmail=d.accountEmail;
            if(passCambio)s.password=d.password;
            if(s.id!==subId)credsSync++;
          }
        }));
      }
    }
  }
  S.sMod=false;
  const fueCombinado=S.sEditConCliente;S.sEditConCliente=false;
  render();
  sv(); // guardar en 2.Вә plano вҖ” no congelar el modal esperando la nube
  if(credsSync>0){
    const caId=d.masterAccountId;
    toast(`вң… Cuenta maestra actualizada вҖ” ${credsSync} cliente(s) mГЎs sincronizados`,'G');
    setTimeout(()=>{if(confirm('рҹ”„ Cambiaste el correo/clave de la cuenta maestra. ВҝAbrir la lista para notificar por WhatsApp a los clientes que la usan?'))notificarClientesDeCuenta(caId);},350);
    return;
  }
  toast(fueCombinado?'вң… Cliente y suscripciГіn actualizados':(wasAdd?'вң… SuscripciГіn agregada':'вң… SuscripciГіn actualizada'),'G');
  if(c.phone&&(d.accountEmail||d.password||d.profile||d.profilePin)){
    setTimeout(()=>{
      if(wasAdd){if(confirm('ВҝEnviar al cliente los datos de acceso por WhatsApp?'))waNuevaCuenta(c.id,subId);}
      else{if(confirm('ВҝEnviar al cliente los datos actualizados por WhatsApp?'))waActualizacion(c.id,subId);}
    },300);
  }
}
async function saveCuenta(d){
  if(!d.totalProfiles||parseInt(d.totalProfiles)<=0){d.totalProfiles=getPlatLimit(d.platform)}
  let clientesAfectados=[];
  let cambios={email:false,password:false};

  }else{
    const i=S.cuentas.findIndex(x=>x.id===S.caEditId);
    if(i>=0){
      const old=S.cuentas[i];
      cambios.email=old.email!==d.email;
      cambios.password=old.password!==d.password;
      if(cambios.email||cambios.password){
        S.clients.forEach(c=>{
          (c.subs||[]).forEach(s=>{
            if(s.masterAccountId===S.caEditId){
              if(cambios.email)s.accountEmail=d.email;

              clientesAfectados.push({clientId:c.id,subId:s.id,clientName:c.name,phone:c.phone});
            }
          });
        });
      }
      S.cuentas[i]={id:S.caEditId,...d};
    }
  }
  const editedCaId=S.caEditId;
  S.caMod=false;render();sv();
  if(clientesAfectados.length>0){

          notificarClientesDeCuenta(editedCaId);

      },300);

  }
}

async function confirmarPago(){
  const monto=parseFloat(document.getElementById('pMonto').value)||0;
  const nota=document.getElementById('pNota').value.trim();
  const c=S.clients.find(x=>x.id===S.pagoId);if(!c)return;
  const nuevaFecha=document.getElementById('pFecha')?document.getElementById('pFecha').value:'';
  const pagoId=gid();
  // Renovar: aplicar la nueva fecha de vencimiento a las cuentas vencidas (o a todas si ninguna venciГі).
  // La fecha de inicio pasa a ser hoy, igual que en una renovaciГіn normal.
  let renovadas=0,venciaEl='';
  if(nuevaFecha){
    const vencidas=(c.subs||[]).filter(s=>gst(s.endDate)==='ven');
    const renovables=vencidas.length?vencidas:(c.subs||[]);
    venciaEl=renovables.map(s=>s.endDate).filter(Boolean).sort()[0]||''; // vencimiento previo mГЎs prГіximo (score de puntualidad)
    renovables.forEach(s=>{s.endDate=nuevaFecha;s.startDate=nowDate();s.pagado=true;renovadas++;});
  }
  const minEnd=(c.subs||[]).filter(s=>s.endDate).map(s=>s.endDate).sort()[0]||'';
  const pago={id:pagoId,clientId:c.id,clientName:c.name,platform:(c.subs||[]).filter(s=>s.platform).map(s=>s.platform).join(', ')||'вҖ”',monto,fecha:nowDate(),notas:nota||(renovadas?`RenovaciГіn (${renovadas} cuenta(s)) hasta ${fd(nuevaFecha)}`:'Pago registrado'),endDate:nuevaFecha||minEnd};
  if(venciaEl)pago.venciaEl=venciaEl;
  S.pagos.push(pago);
  S.pagoMod=false;render();   // cerrar el modal YA, sin esperar al guardado
  sv();                        // guardar en 2.Вә plano (anti-pГ©rdida intacta)
  const msgToast=renovadas?`${renovadas} cuenta(s) renovadas вҖ” $${monto}`:`$${monto} registrado`;
  _ofrecerComprobante(pagoId,msgToast); // opciГіn PERSISTENTE de avisar al cliente
}

function render(){

  const oldCont=document.querySelector('.cont');

  if(S.in&&_membBloqueado()){

    document.body.classList.toggle('dark',!!S.dark);
    const mb=document.getElementById('membBanner');if(mb)mb.remove();
    return;
  }
  document.getElementById('root').innerHTML=S.in?renderApp():renderLogin();
  document.body.classList.toggle('dark',!!S.dark);
  _bannerMembresia(); // aviso de membresГӯa por vencer/vencida (no bloquea)
  if(!S.in)bindL();
  // Los modales NO se cierran al hacer clic fuera: solo con el botГіn Cancelar o la вң• (evita perder datos por un clic accidental).
  const newCont=document.querySelector('.cont');
  if(newCont&&scrollTop>0)newCont.scrollTop=scrollTop;
  if(S.in&&S.view==='dashboard')requestAnimationFrame(animarNumeros);
}
// Conteo animado de los nГәmeros del dashboard (estilo Bayzon)
function animarNumeros(){
  if(window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  document.querySelectorAll('.sg .sc .vl').forEach(el=>{
    const txt=el.textContent.trim();
    const m=txt.match(/^([^\d-]*)(-?\d+(?:\.\d+)?)(.*)$/);
    if(!m)return;
    const pre=m[1],end=parseFloat(m[2]),suf=m[3],dec=(m[2].split('.')[1]||'').length;
    const dur=650,t0=performance.now();
    (function step(t){
      const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3),v=end*e;
      el.textContent=pre+(dec?v.toFixed(dec):Math.round(v))+suf;
      if(p<1)requestAnimationFrame(step);else el.textContent=txt;
    })(t0);
  });
}

function cuentaMatchCliente(ca,q){
  // ВҝAlgГәn cliente vinculado a esta cuenta coincide por nombre, telГ©fono, correo o perfil?
  return S.clients.some(c=>(c.subs||[]).some(s=>s.masterAccountId===ca.id&&(
    norm(c.name).includes(q)||
    norm(c.phone).includes(q)||
    norm(s.accountEmail).includes(q)||
    norm(s.profile).includes(q)||
    norm(s.profilePin).includes(q)
  )));
}
function cuentaMatch(ca,q){
  if(!q)return true;
  return norm(ca.email).includes(q)||norm(ca.platform).includes(q)||cuentaMatchCliente(ca,q);
}
function cuentasOrdenadas(){
  let lista=[...S.cuentas];
  const q=norm(S.caSearch).trim();
  if(S.fCuentaPlat)lista=lista.filter(ca=>platGroup(ca.platform)===S.fCuentaPlat);
  if(q)lista=lista.filter(ca=>cuentaMatch(ca,q));
  if(S.fCuentaEspacio==='libre')lista=lista.filter(ca=>profDisponibles(ca.id)>0);
  if(S.fCuentaEspacio==='llena')lista=lista.filter(ca=>profDisponibles(ca.id)<=0);
  if(S.fCuentaProv==='__none__')lista=lista.filter(ca=>!ca.proveedorId||!(S.proveedores||[]).some(p=>p.id===ca.proveedorId));
  else if(S.fCuentaProv)lista=lista.filter(ca=>ca.proveedorId===S.fCuentaProv);
  return lista.sort((a,b)=>{
    const da=a.renewalDate?new Date(a.renewalDate).getTime():9e15;
    const db=b.renewalDate?new Date(b.renewalDate).getTime():9e15;
    return da-db;
  });
}

    return true;

      <div style="text-align:right;flex-shrink:0;min-width:54px"><div style="font-size:11px;color:var(--red);font-weight:700">$${parseFloat(ca.costPerMonth||0).toFixed(2)}</div><div style="font-size:9px;font-weight:700;color:${gan>=0?'var(--green)':'var(--red)'}">${gan>=0?'+':''}$${gan.toFixed(2)}/mes</div></div>

      </span>

  };
  let html='';
  cats.forEach(cat=>{
    const accs=mapa[cat].sort((a,b)=>{const da=a.renewalDate?new Date(a.renewalDate).getTime():9e15;const db=b.renewalDate?new Date(b.renewalDate).getTime():9e15;return da-db;});

// в”Җв”Җ VISTA AGRUPADA POR CUENTA MAESTRA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Filtro a nivel de SUSCRIPCIГ“N: filtered() deja pasar al cliente entero si CUALQUIER sub coincide,
// pero en la vista agrupada eso arrastraba las OTRAS cuentas del cliente a la pantalla (buscar un
// correo de cuenta mostraba grupos "no relacionados"). Regla: si lo buscado coincide con el CLIENTE
// (nombre/telГ©fono) se muestran todas sus subs; si solo coincide con datos de sub, solo las que coinciden.
function subMatchBusqueda(c,s){
  const q=norm(S.search).trim();
  if(!q)return true;
  if([c.name,c.phone].some(x=>norm(x).includes(q)))return true;
  return [s.platform,s.accountEmail,s.profile,s.profilePin].some(v=>norm(v).includes(q));
}
function renderClientesAgrupados(){
  const clientesOk=filtered(); // respeta bГәsqueda/plataforma/vencimiento/estado a nivel cliente
  const mapa={};const sinCuenta=[];const sinSubs=[];
  // Si se enfocГі una sola suscripciГіn (ej. clic desde el dashboard), mostrar solo esa
  const focusActivo=S.focusSub&&clientesOk.some(c=>(c.subs||[]).some(s=>s.id===S.focusSub));
  let focusCli=null;
  clientesOk.forEach(c=>{
    // Clientes SIN ninguna suscripciГіn: no caen en ningГәn grupo (la vista recorre subs) y
    // quedaban invisibles aunque filtered() los contara вҖ” van a su propia secciГіn.
    if(!(c.subs||[]).length){if(!focusActivo)sinSubs.push(c);return;}
    (c.subs||[]).forEach(s=>{
    if(focusActivo&&s.id!==S.focusSub)return; // foco: solo la sub elegida
    if(S.fpLat&&platGroup(s.platform)!==S.fpLat)return; // si filtras por plataforma, solo esas subs
    if(!focusActivo&&!subMatchBusqueda(c,s))return; // bГәsqueda por datos de sub: no arrastrar las otras cuentas del cliente
    if(focusActivo)focusCli=c;
    const ca=s.masterAccountId?S.cuentas.find(x=>x.id===s.masterAccountId):null;

  if(!caIds.length&&!sinCuenta.length&&!sinSubs.length)return '<div class="tw"><div class="empty"><div class="ei">рҹ“Ў</div><h3>Sin resultados</h3></div></div>';
  let html='';

  if(sinSubs.length){

// в”Җв”Җ ALTERNAR CUENTA COMPLETA (rГЎpido sin editar suscripciГіn) в”Җв”Җ
async function toggleCuentaCompleta(cId,sId){
  const c=S.clients.find(x=>x.id===cId);if(!c)return;
  const s=(c.subs||[]).find(x=>x.id===sId);if(!s)return;
  if(!s.cuentaCompleta){
    if(!s.masterAccountId){toast('вқҢ Primero vincula esta suscripciГіn a una cuenta maestra','R');return}
    const otrosClientes=[];
    S.clients.forEach(otherC=>{(otherC.subs||[]).forEach(otherS=>{if(otherS.masterAccountId===s.masterAccountId&&otherS.id!==s.id)otrosClientes.push({clientName:otherC.name,sub:otherS});});});
    if(otrosClientes.length>0){
      const nombres=otrosClientes.map(o=>'вҖў '+o.clientName).join('\n');
      if(!confirm('вҡ пёҸ Esta cuenta tiene '+otrosClientes.length+' cliente(s) mГЎs usГЎndola:\n\n'+nombres+'\n\nВҝContinuar igual? MarcarГЎ la cuenta como completa.'))return;
    }
    s.cuentaCompleta=true;
    renderCont();sv();toast('рҹҹЈ Marcada como CUENTA COMPLETA','G');
  }else{
    s.cuentaCompleta=false;
    renderCont();sv();toast('рҹҹў Cambiada a modo compartido','B');
  }
}

// Copiar la contraseГұa
async function copiarClave(cId,sId){
  const c=S.clients.find(x=>x.id===cId);
  const s=c?.subs?.find(x=>x.id===sId);
  if(!s||!s.password){toast('вқҢ Sin contraseГұa','R');return}
  try{await navigator.clipboard.writeText(s.password);toast('рҹ”‘ ContraseГұa copiada В· pГ©gala en la plataforma','G');}catch(e){toast('Error al copiar','R')}
}
// в”Җв”Җ TRANSFERIR SUSCRIPCIГ“N A OTRA CUENTA MAESTRA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Mover el perfil de un cliente a otra cuenta: libera la actual y ocupa la nueva (los perfiles se cuentan por masterAccountId)
function transferirCuenta(cId,sId){
  const c=S.clients.find(x=>x.id===cId);
  const s=c&&(c.subs||[]).find(x=>x.id===sId);
  if(!c||!s){toast('No se encontrГі la suscripciГіn','R');return}
  const actual=s.masterAccountId;const esCompleta=!!s.cuentaCompleta;
  let cand=S.cuentas.filter(ca=>ca.id!==actual&&platGroup(ca.platform)===platGroup(s.platform));
  if(esCompleta)cand=cand.filter(ca=>profInUse(ca.id)===0);
  else cand=cand.filter(ca=>!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0);
  cand.sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  if(document.getElementById('transferMod'))return;
  const caActual=S.cuentas.find(x=>x.id===actual);
  const mod=document.createElement('div');mod.id='transferMod';mod.className='ov';
  mod.onclick=e=>{if(e.target===mod)mod.remove()};
  mod.innerHTML=`<div class="mod" style="max-width:460px" onclick="event.stopPropagation()">
    <div class="mh"><h3>рҹ”„ Transferir a otra cuenta</h3><button class="ib" onclick="document.getElementById('transferMod').remove()">вң•</button></div>
    <div class="mb">
      <div style="background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:700">${c.name||'вҖ”'}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">${pi(s.platform)} ${s.platform}${s.profile?' В· Perfil '+s.profile:''}${esCompleta?' В· рҹҹЈ Cuenta completa':''}</div>
        <div style="font-size:11px;color:var(--text2)">Cuenta actual: <b>${caActual?caActual.email||caActual.platform:'sin asignar'}</b></div>
      </div>
      ${cand.length?`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">Elige la cuenta destino. Se copiarГЎn correo y clave, se conserva su perfil (se ajusta solo si choca con otro) y la cuenta actual recupera el cupo.</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${cand.map(ca=>{const avail=profDisponibles(ca.id);const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:10px">
          <span style="font-size:16px;flex-shrink:0">${pi(ca.platform)}</span>
          <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ca.email||'вҖ”'}</div><div style="font-size:10px;color:var(--green);font-weight:700">рҹҹў ${esCompleta?'cuenta vacГӯa':avail+' de '+limit+' libres'}</div></div>
          <button class="btn bp" style="border-radius:8px;font-size:11px;flex-shrink:0;padding:6px 12px" onclick="ejecutarTransferencia('${c.id}','${s.id}','${ca.id}')">Transferir aquГӯ</button>
        </div>`;}).join('')}
      </div>`:`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:12px;font-size:12px;color:var(--yellow)">вҡ пёҸ No hay otra cuenta de ${s.platform} ${esCompleta?'totalmente vacГӯa':'con cupo libre'} para transferir. Crea una cuenta nueva o libera espacio primero.</div>`}
    </div>
    <div class="mf"><button class="btn bs" onclick="document.getElementById('transferMod').remove()">Cerrar</button></div>
  </div>`;
  document.body.appendChild(mod);
}
async function ejecutarTransferencia(cId,sId,nuevaCaId){
  const c=S.clients.find(x=>x.id===cId);
  const s=c&&(c.subs||[]).find(x=>x.id===sId);
  const nueva=S.cuentas.find(x=>x.id===nuevaCaId);
  if(!c||!s||!nueva){toast('Error al transferir','R');return}
  s.masterAccountId=nueva.id;
  s.accountEmail=nueva.email||'';
  s.password=nueva.password||'';
  // Conservar el perfil del cliente (puede ser un nombre como "Kamig"). Solo se ajusta
  // si estГЎ vacГӯo o si choca con otro perfil ya usado en la cuenta destino.
  if(!s.cuentaCompleta){
    const miPerfil=String(s.profile||'').trim().toLowerCase();
    const choca=miPerfil&&S.clients.some(cl=>(cl.subs||[]).some(x=>x.masterAccountId===nueva.id&&x.id!==s.id&&String(x.profile||'').trim().toLowerCase()===miPerfil));
    if(!s.profile||choca){const p=sugerirPerfil(nueva.id);if(p)s.profile=String(p);}
  }
  const mod=document.getElementById('transferMod');if(mod)mod.remove();
  render();sv();
  toast('вң… Transferido a '+(nueva.email||'la cuenta nueva')+' В· cupo anterior liberado','G');
  if(c.phone){
    setTimeout(()=>{
      const t=document.createElement('div');t.className='toast tB';
      t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:360px';
      t.innerHTML='<span style="flex:1;color:var(--text)">рҹ“І ВҝAvisar a '+c.name+' los datos nuevos?</span><button onclick="enviarActualizacion(\''+c.id+'\',\''+s.id+'\');this.closest(\'.toast\').remove()" style="background:var(--acc);border:none;color:#fff;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">Avisar</button><button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">вң•</button>';
      document.body.appendChild(t);
      setTimeout(()=>{if(t.parentNode)t.remove()},10000);
    },400);
  }
}
// в”Җв”Җ TRANSFERENCIA MASIVA: mover TODOS los clientes de una cuenta a otra в”Җв”Җ
// Para cuando una cuenta se cae o se renueva con otro correo: en vez de transferir
// de uno en uno, se elige la cuenta destino y se mueven todas las subs vinculadas.
function transferirTodosCuenta(caId){
  const origen=S.cuentas.find(x=>x.id===caId);
  if(!origen){toast('No se encontrГі la cuenta','R');return}
  const mov=[];S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===caId)mov.push({c,s});}));
  if(!mov.length){toast('вқҢ Esta cuenta no tiene clientes vinculados','R');return}
  const hayCompleta=mov.some(x=>x.s.cuentaCompleta);
  let cand=S.cuentas.filter(ca=>ca.id!==caId&&platGroup(ca.platform)===platGroup(origen.platform));
  if(hayCompleta)cand=cand.filter(ca=>profInUse(ca.id)===0);
  else cand=cand.filter(ca=>!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>=mov.length);
  cand.sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  if(document.getElementById('transferAllMod'))return;
  const mod=document.createElement('div');mod.id='transferAllMod';mod.className='ov';
  mod.innerHTML=`<div class="mod" style="max-width:480px">

async function ejecutarTransferenciaMasiva(origenId,destinoId){
  const origen=S.cuentas.find(x=>x.id===origenId);
  const destino=S.cuentas.find(x=>x.id===destinoId);
  if(!origen||!destino){toast('Error al transferir','R');return}
  const mov=[];S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===origenId)mov.push({c,s});}));
  if(!mov.length){toast('вқҢ Esta cuenta ya no tiene clientes','R');return}
  if(!confirm('ВҝTransferir los '+mov.length+' cliente(s) de:\n'+(origen.email||origen.platform)+'\n\nвҶ’ a: '+(destino.email||destino.platform)+'?\n\nTodos recibirГЎn el correo y la clave de la cuenta destino.'))return;
  mov.forEach(x=>{const s=x.s;
    s.masterAccountId=destino.id;
    s.accountEmail=destino.email||'';
    s.password=destino.password||'';
    // Misma regla que la transferencia individual: conservar el perfil salvo vacГӯo o choque.
    if(!s.cuentaCompleta){
      const miPerfil=String(s.profile||'').trim().toLowerCase();
      const choca=miPerfil&&S.clients.some(cl=>(cl.subs||[]).some(y=>y.masterAccountId===destino.id&&y.id!==s.id&&String(y.profile||'').trim().toLowerCase()===miPerfil));
      if(!s.profile||choca){const p=sugerirPerfil(destino.id);if(p)s.profile=String(p);}
    }
  });
  const mod=document.getElementById('transferAllMod');if(mod)mod.remove();
  render();sv();
  toast('вң… '+mov.length+' cliente(s) transferidos a '+(destino.email||'la cuenta nueva'),'G');
  setTimeout(()=>{
    const t=document.createElement('div');t.className='toast tB';
    t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:10px;animation:slideUp .22s ease;max-width:360px';
    t.innerHTML='<span style="flex:1;color:var(--text)">рҹ“ў ВҝAvisar a los '+mov.length+' cliente(s) sus datos nuevos?</span><button onclick="notificarClientesDeCuenta(\''+destino.id+'\');this.closest(\'.toast\').remove()" style="background:var(--acc);border:none;color:#07130c;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">Avisar</button><button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">вң•</button>';
    document.body.appendChild(t);
    setTimeout(()=>{if(t.parentNode)t.remove()},15000);
  },400);
}

// Verificar si la plataforma escrita ya existe (para evitar duplicados)
function checkPlatExistente(){
  const inp=document.getElementById('cNuevaPlat');
  const warn=document.getElementById('platExistenteWarn');
  if(!inp||!warn)return;
  const val=inp.value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!val){warn.style.display='none';return;}
  // Buscar coincidencia exacta o muy cercana
  const match=PLATS.find(p=>{
    const pn=p.toLowerCase().replace(/[^a-z0-9]/g,'');
    return pn===val||pn.startsWith(val)||val.startsWith(pn);
  });
  if(match&&match!=='Otro'){
    warn.style.display='block';
    warn.innerHTML='вҡ пёҸ Ya existe <b>'+match+'</b> en tu catГЎlogo. Si quieres agregar una nueva cuenta de esta plataforma, selecciГіnala directamente en el campo <b>Plataforma</b> arriba вҖ” no necesitas crear una nueva. <button type="button" class="btn bb" style="margin-top:6px;width:100%;justify-content:center" onclick="usarPlatExistente(\''+match+'\')">вң… Usar '+match+' existente</button>';
  }else{
    warn.style.display='none';
  }
}

function updateCuentaDisponible(){
  const sel=document.getElementById('cpl');
  const plat=sel?sel.value:'';
  const box=document.getElementById('cuentaDispBox');
  const master=document.getElementById('cmaster');
  const full=document.getElementById('cfull');
  if(!plat||!box){if(box)box.style.display='none';if(master)master.value='';if(full)full.value='false';mostrarNuevaCuentaCfg(false);return}
  if(plat==='__NUEVA__'){if(box)box.style.display='none';if(master)master.value='';if(full)full.value='false';_limpiarDatosCuentaCliente();mostrarNuevaCuentaCfg(true);const md=document.getElementById('cMaxDev');if(md&&!md.value)md.placeholder='Ej: 4 dispositivos';return}
  const todas=S.cuentas.filter(ca=>platGroup(ca.platform)===plat);
  if(!todas.length){
    box.style.display='block';
    box.innerHTML='<div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:10px;font-size:11px;color:var(--yellow)"><b>вҡ пёҸ No tienes cuentas de '+pi(plat)+' '+plat+'</b><br>Se crearГЎ una cuenta maestra nueva con el correo que ingreses abajo.</div>';
    master.value='';full.value='false';
    _limpiarDatosCuentaCliente();
    mostrarNuevaCuentaCfg(true);
    // Pre-llenar el mГЎx. dispositivos con el lГӯmite por defecto de la plataforma
    const maxDevInp=document.getElementById('cMaxDev');
    if(maxDevInp&&!maxDevInp.value)maxDevInp.placeholder='Defecto: '+getPlatLimit(plat)+' dispositivos';
    return;
  }
  // Separar disponibles vs llenas вҖ” ordenadas por MГҒS cupo primero (desempata por menor costo)
  const disponibles=todas.filter(ca=>profDisponibles(ca.id)>0&&!tieneCuentaCompleta(ca.id))
    .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  const llenas=todas.length-disponibles.length;

    html+='<div style="background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.25);border-radius:10px;padding:10px;font-size:11px;color:var(--red)"><b>рҹ”ҙ Todas tus cuentas de '+plat+' estГЎn llenas</b><br>Se crearГЎ una cuenta maestra nueva con el correo de abajo.</div>';
    box.innerHTML=html;master.value='';full.value='false';
    _limpiarDatosCuentaCliente();
    mostrarNuevaCuentaCfg(true);
    const maxDevInp=document.getElementById('cMaxDev');
    if(maxDevInp&&!maxDevInp.value)maxDevInp.placeholder='Defecto: '+getPlatLimit(plat)+' dispositivos';
    return;
  }
  mostrarNuevaCuentaCfg(false);

// Limpia correo/clave/perfil/proveedor del form de cliente nuevo (al cambiar a "crear cuenta nueva")
function _limpiarDatosCuentaCliente(){
  ['cemail','cpass','cprofile'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  const prov=document.getElementById('cprov');if(prov){prov.value='';if(typeof toggleNuevoProv==='function')toggleNuevoProv();}
}
function selectCuentaForClient(caId,isFull,force){
  const master=document.getElementById('cmaster');
  const full=document.getElementById('cfull');
  const email=document.getElementById('cemail');
  const pass=document.getElementById('cpass');
  const prof=document.getElementById('cprofile');
  if(master)master.value=caId;
  if(full)full.value=isFull?'true':'false';
  // force (el usuario eligiГі otra cuenta) вҶ’ sobreescribe correo/clave/perfil.
  // Sin force (autorelleno inicial) вҶ’ solo rellena si estГЎ vacГӯo, para no pisar lo que escribiste.
  const ca=S.cuentas.find(x=>x.id===caId);
  if(ca){
    if(email&&(force||!email.value))email.value=ca.email||'';
    if(pass&&(force||!pass.value))pass.value=ca.password||'';
    if(prof&&(force||!prof.value)){const p=sugerirPerfil(caId);prof.value=p?String(p):'';}
  }else if(force){
    // "Crear cuenta nueva": limpiar para escribir datos frescos
    if(email)email.value='';
    if(pass)pass.value='';
    if(prof)prof.value='';
  }
  // Autoseleccionar el proveedor de la cuenta elegida
  const prov=document.getElementById('cprov');
  if(prov){
    if(ca&&ca.proveedorId&&[...prov.options].some(o=>o.value===ca.proveedorId)){
      if(force||!prov.value)prov.value=ca.proveedorId;
    }else if(force&&!ca){
      prov.value='';
    }
    if(typeof toggleNuevoProv==='function')toggleNuevoProv();
  }
}

async function confirmarGrpRen(){
  const nuevaFecha=document.getElementById('grFecha')?document.getElementById('grFecha').value:'';
  if(!nuevaFecha){toast('вқҢ Selecciona la nueva fecha de vencimiento','R');return}
  const monto=parseFloat(document.getElementById('grMonto').value)||0;
  const nota=document.getElementById('grNota').value.trim();
  const sel=S.grpRenSel||new Set();
  const items=_itemsGrupoUrg(S.grpRenCId,S.grpRenPhone,S.grpRenEnd).filter(i=>sel.has(i.c.id+'_'+i.s.id));
  if(!items.length){toast('вқҢ Marca al menos una cuenta','R');return}
  const venciaEl=items.map(i=>i.s.endDate).filter(Boolean).sort()[0]||''; // vencimiento previo mГЎs prГіximo (score de puntualidad)
  items.forEach(i=>{i.s.endDate=nuevaFecha;i.s.startDate=nowDate();i.s.pagado=true;});
  const dueГұo=items[0].c; // el pago se registra bajo el primer dueГұo seleccionado
  const plats=items.map(i=>i.s.platform).filter(Boolean).join(', ')||'вҖ”';
  const pagoId=gid();
  const pago={id:pagoId,clientId:dueГұo.id,clientName:dueГұo.name,platform:plats,monto,fecha:nowDate(),notas:nota||`RenovaciГіn (${items.length} cuenta(s)) hasta ${fd(nuevaFecha)}`,endDate:nuevaFecha};
  if(venciaEl)pago.venciaEl=venciaEl;
  S.pagos.push(pago);
  S.grpRenMod=false;render();   // cerrar YA
  sv();                          // guardar en 2.Вә plano
  _ofrecerComprobante(pagoId,`${items.length} cuenta(s) renovadas hasta ${fd(nuevaFecha)}`);
}

async function addComboDef(){
  // Lee TODAS las apps de la fila (las 2 fijas + las aГұadidas con вһ• Otra app)
  const apps=[...document.querySelectorAll('#cbAppsRow .cbAppSel')].map(s=>s.value).filter(Boolean);
  const precio=parseFloat(document.getElementById('cbPrecio').value);
  if(apps.length<2){toast('вқҢ Un combo lleva al menos 2 apps','R');return}
  if(new Set(apps.map(p=>platGroup(p))).size!==apps.length){toast('вқҢ No repitas apps en el combo','R');return}
  if(!(precio>0)){toast('вқҢ Escribe el precio del combo','R');return}
  const lista=_combosEdit();
  const mismas=(x,y)=>[...new Set(x.map(p=>platGroup(p)))].sort().join('|')===[...new Set(y.map(p=>platGroup(p)))].sort().join('|');
  if(lista.some(c=>mismas(c.apps,apps))){toast('вқҢ Ya existe un combo con esas mismas apps','R');return}
  const nombre=apps.join(' & ');
  lista.push({id:gid(),nombre,apps,precio});
  renderCont();sv();toast('рҹҺҒ Combo "'+nombre+'" creado вҖ” $'+precio.toFixed(2),'G');
}

// в”Җв”Җ INDICADOR DE SINCRONIZACIГ“N (estado en vivo) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let _syncEstado=(typeof navigator!=='undefined'&&navigator.onLine===false)?'offline':'ok';
function _syncMeta(e){
  if(e==='guardando')return{c:'#eab308',t:'GuardandoвҖҰ',pulse:true};
  if(e==='offline')return{c:'#9ca3af',t:'Sin conexiГіn',pulse:false};
  if(e==='error')return{c:'#ef4444',t:'Error al guardar',pulse:false};
  return{c:'#22c55e',t:'Sincronizado',pulse:false};
}
function renderSyncInd(){
  const m=_syncMeta(_syncEstado);
  return`<span id="syncInd" title="${m.t}" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text2);padding:5px 10px;border:1.5px solid var(--border2);border-radius:20px;flex-shrink:0"><span style="width:8px;height:8px;border-radius:50%;background:${m.c};flex-shrink:0;${m.pulse?'animation:syncPulse 1s ease-in-out infinite':''}"></span><span class="desktopOnly">${m.t}</span></span>`;
}
function setSync(e){
  const prev=_syncEstado;
  if(_syncEstado===e&&e!=='guardando'){_evaluarBannerSync(prev,e);return;}
  _syncEstado=e;
  const el=document.getElementById('syncInd');
  if(el)el.outerHTML=renderSyncInd();
  _evaluarBannerSync(prev,e);
}
// в”Җв”Җ BANNER ROJO DE ALERTA (imposible de ignorar cuando algo no se sube) в”Җв”Җв”Җв”Җв”Җв”Җ
// El puntito de "Sincronizado" es discreto a propГіsito; este banner es el aviso fuerte:
// aparece de inmediato en 'error' y, si el 'offline' se prolonga, tambiГ©n. Desaparece solo al volver a 'ok'.
let _bannerOfflineTimer=null;
function _evaluarBannerSync(prev,e){
  if(e==='ok'){ _ocultarBannerSync(); if(_bannerOfflineTimer){clearTimeout(_bannerOfflineTimer);_bannerOfflineTimer=null;} return; }
  if(e==='error'){ if(_bannerOfflineTimer){clearTimeout(_bannerOfflineTimer);_bannerOfflineTimer=null;} _mostrarBannerSync('error'); return; }
  if(e==='offline'){
    // No alarmar por un parpadeo de red: solo si sigue sin conexiГіn tras 12 s.
    if(_bannerOfflineTimer)return;
    _bannerOfflineTimer=setTimeout(()=>{_bannerOfflineTimer=null;if(_syncEstado==='offline')_mostrarBannerSync('offline');},12000);
    return;
  }
  // 'guardando': no tocar el banner (si habГӯa error y reintenta, se mantiene hasta saber el desenlace).
}
function _mostrarBannerSync(tipo){
  const esErr=tipo==='error';
  const msg=esErr
    ? 'вҡ пёҸ <b>No se pudieron subir tus Гәltimos cambios a la nube.</b> EstГЎn guardados en este telГ©fono. No cierres la app: revisa tu conexiГіn y reintenta.'
    : 'рҹ“¶ <b>Sin conexiГіn.</b> Tus cambios estГЎn guardados en este telГ©fono y se subirГЎn solos al volver el internet. No cierres la app todavГӯa.';
  const bg=esErr?'linear-gradient(135deg,#dc2626,#991b1b)':'linear-gradient(135deg,#d97706,#92400e)';
  let b=document.getElementById('syncBanner');
  if(!b){ b=document.createElement('div'); b.id='syncBanner'; document.body.appendChild(b); }
  b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:100000;background:'+bg+';color:#fff;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;font-size:12.5px;font-weight:600;line-height:1.45;box-shadow:0 4px 18px rgba(0,0,0,.45);display:flex;align-items:center;gap:10px;justify-content:center;text-align:center;animation:slideDownBanner .3s ease';
  b.innerHTML='<span style="flex:1;max-width:560px">'+msg+'</span>'
    +'<button onclick="reintentarSync()" style="flex-shrink:0;background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer">рҹ”„ Reintentar</button>';
}
function _ocultarBannerSync(){ const b=document.getElementById('syncBanner'); if(b)b.remove(); }

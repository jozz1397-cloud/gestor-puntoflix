function handleImportCADrop(e){e.preventDefault();document.getElementById('dropZoneCA').style.borderColor='var(--border2)';const f=e.dataTransfer.files[0];if(f)processImportCAFile(f)}
function handleImportCAFile(inp){if(inp.files[0])processImportCAFile(inp.files[0])}
async function processImportCAFile(file){
  try{await loadXLSX()}catch(err){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>вқҢ</span><div><h4>Error al leer el archivo</h4><p>'+err.message+'</p></div></div>';return}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>вқҢ</span><div><h4>Archivo vacГӯo</h4></div></div>';return}
      importCAData=rows;
      const valid=rows.filter(r=>(r['Plataforma']||r['plataforma'])&&(r['Correo']||r['correo']));
      const totalCosto=valid.reduce((s,r)=>s+(parseFloat(r['Costo Mensual']||r['costo mensual']||0)||0),0);
      const byPlat={};
      valid.forEach(r=>{const p=r['Plataforma']||r['plataforma']||'Otro';byPlat[p]=(byPlat[p]||0)+1});
      const preview=Object.entries(byPlat).slice(0,10).map(([p,c])=>'<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span>'+pi(p)+' '+p+'</span><b>'+c+' cuenta(s)</b></div>').join('');
      document.getElementById('importCAPreview').innerHTML=
        '<div class="alert alertG"><span>вң…</span><div><h4>'+valid.length+' cuentas maestras detectadas</h4><p>Costo mensual total estimado: <b>$'+totalCosto.toFixed(2)+'</b></p></div></div>'+
        '<div style="background:var(--surf2);border-radius:10px;padding:12px;max-height:200px;overflow-y:auto">'+preview+'</div>';
      document.getElementById('importCAConfirmBtn').style.display='inline-flex';
    }catch(err){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>вқҢ</span><div><h4>Error al leer el archivo</h4><p>'+err.message+'</p></div></div>'}
  };
  r.readAsBinaryString(file);
}
async function confirmImportCA(){
  if(!importCAData.length)return;
  let added=0,updated=0;
  importCAData.forEach(r=>{
    const platform=String(r['Plataforma']||r['plataforma']||'').trim();
    const email=String(r['Correo']||r['correo']||'').trim();
    if(!platform||!email)return;
    const password=String(r['ContraseГұa']||r['contrasena']||r['Clave']||'').trim();
    const totalProfiles=parseInt(r['Total Perfiles']||r['total perfiles']||0)||getPlatLimit(platform);
    const costPerMonth=String(r['Costo Mensual']||r['costo mensual']||'').trim();
    const renewalDate=parseImportDate(r['Fecha RenovaciГіn']||r['fecha renovacion']||r['Fecha Renovacion']||'');
    const startDate=parseImportDate(r['Inicio']||r['inicio']||'');
    const cuentaEstado=String(r['Estado']||r['estado']||'ok').toLowerCase()==='caida'?'caida':String(r['Estado']||r['estado']||'ok').toLowerCase()==='verif'?'verif':'ok';
    const notes=String(r['Notas']||r['notas']||'').trim();
    // Proveedor: si viene el nombre, buscarlo (o crearlo) y enlazar
    const provName=String(r['Proveedor']||r['proveedor']||'').trim();
    const provPhone=String(r['Tel Proveedor']||r['tel proveedor']||r['TelГ©fono Proveedor']||'').trim();
    let proveedorId='';
    if(provName){
      if(!S.proveedores)S.proveedores=[];
      let pr=S.proveedores.find(p=>(p.name||'').toLowerCase()===provName.toLowerCase());
      if(!pr){pr={id:gid(),name:provName,phone:provPhone,notes:''};S.proveedores.push(pr);}
      else if(provPhone&&!pr.phone){pr.phone=provPhone;}
      proveedorId=pr.id;
    }
    // Buscar duplicado (mismo correo + plataforma)
    const existing=S.cuentas.find(c=>c.platform===platform&&(c.email||'').toLowerCase()===email.toLowerCase());
    if(existing){
      Object.assign(existing,{password:password||existing.password,totalProfiles:totalProfiles||existing.totalProfiles,costPerMonth:costPerMonth||existing.costPerMonth,startDate:startDate||existing.startDate,renewalDate:renewalDate||existing.renewalDate,cuentaEstado:cuentaEstado||existing.cuentaEstado,proveedorId:proveedorId||existing.proveedorId,notes:notes||existing.notes});
      updated++;
    }else{
      S.cuentas.push({id:gid(),platform,plan:'',email,password,totalProfiles,costPerMonth,startDate,renewalDate,cuentaEstado,proveedorId,notes});
      added++;
    }
  });
  S.importCAMod=false;importCAData=[];
  // Vincular suscripciones de clientes ya importados a las nuevas cuentas (su sv() guarda TODO en 2.Вә plano)
  const vinc=await vincularSuscripcionesACuentas(true);
  render();
  let msg='вң… '+added+' cuentas importadas';
  if(updated)msg+=', '+updated+' actualizadas';
  if(vinc.vinculadas>0)msg+=' В· рҹ”— '+vinc.vinculadas+' clientes vinculados';
  toast(msg,'G');
}

function proveedorDe(caId){const ca=S.cuentas.find(x=>x.id===caId);if(!ca||!ca.proveedorId)return null;return (S.proveedores||[]).find(p=>p.id===ca.proveedorId)||null;}

function reportarProveedor(caId){

function pedirRenovacionCuenta(caId){
  const ca=S.cuentas.find(x=>x.id===caId);
  if(!ca){toast('вқҢ Cuenta no encontrada','R');return;}
  const p=proveedorDe(caId);
  if(!p){toast('вқҢ Esta cuenta no tiene proveedor asignado. AsГӯgnale uno editГЎndola.','R');return;}

async function delProv(id){
  const p=(S.proveedores||[]).find(x=>x.id===id);if(!p)return;
  if(!confirm(`ВҝMover al proveedor "${p.name}" a la papelera?\n\nPodrГЎs recuperarlo despuГ©s (sus cuentas conservan el vГӯnculo).`))return;
  p.deletedAt=Date.now();
  if(!S.papeleraProveedores)S.papeleraProveedores=[];
  S.papeleraProveedores.push(p);
  S.proveedores=S.proveedores.filter(x=>x.id!==id);
  render();sv();
  toast('рҹ—‘пёҸ Proveedor movido a papelera','B');
}
async function restoreProv(id){
  if(!S.papeleraProveedores)return;
  const i=S.papeleraProveedores.findIndex(x=>x.id===id);
  if(i<0)return;
  const p=S.papeleraProveedores[i];
  delete p.deletedAt;
  if(!S.proveedores)S.proveedores=[];
  S.proveedores.push(p);
  S.papeleraProveedores.splice(i,1);
  render();sv();toast('вң… Proveedor restaurado','G');
}
async function delProvForever(id){
  if(!confirm('вҡ пёҸ ВҝEliminar PERMANENTEMENTE este proveedor?\n\nSus cuentas quedarГЎn SIN proveedor. Esta acciГіn NO se puede deshacer.'))return;

// MenГә "MГЎs opciones" en cada suscripciГіn
function toggleSubMenu(sId,ev){
  if(ev)ev.stopPropagation();
  const menu=document.getElementById('subMenu_'+sId);
  if(!menu)return;
  const abierto=menu.style.display==='block';
  cerrarSubMenus();
  if(!abierto){menu.style.display='block';
    // Anular el transform :active de la tarjeta contenedora mientras el menГә estГ© abierto
    // (un transform en el ancestro re-ancla el menГә fixed y el toque cae fuera del botГіn).
    const host=menu.closest('.sc,.mCliCard,.caGRow,.tb2');
    if(host)host.classList.add('subMenuHostAbierto');
    // PosiciГіn FIJA respecto a la ventana: asГӯ el menГә no lo recorta el scroll de .cont
    // y puede usar todo el alto de la pantalla (antes se cortaba dentro del contenedor).
    menu.style.position='fixed';menu.style.maxHeight='none';menu.style.overflowY='visible';
    // Por encima del FAB (+, z 90) y la barra inferior mГіvil (z 50), debajo de los modales (z 100):
    // si el menГә se abre hacia abajo, esos elementos tapaban las Гәltimas opciones y robaban el toque.
    menu.style.zIndex='95';
    const wrap=menu.parentElement;const wr=wrap.getBoundingClientRect();
    const vh=window.innerHeight,vw=window.innerWidth,margen=10;
    const necesita=menu.scrollHeight;
    const menuW=menu.offsetWidth||220;
    // Alinear el borde derecho del menГә con el del botГіn вӢҜ, sin salirse de la pantalla
    let left=wr.right-menuW;
    if(left<margen)left=margen;
    if(left+menuW>vw-margen)left=vw-margen-menuW;
    const espacioAbajo=vh-wr.bottom-margen;
    const espacioArriba=wr.top-margen;
    if(espacioAbajo>=necesita||espacioAbajo>=espacioArriba){
      // Abrir hacia abajo
      menu.style.top=(wr.bottom+2)+'px';menu.style.bottom='auto';
      menu.style.maxHeight=Math.max(160,espacioAbajo)+'px';
    }else{
      // Abrir hacia arriba
      menu.style.top='auto';menu.style.bottom=(vh-wr.top+2)+'px';
      menu.style.maxHeight=Math.max(160,espacioArriba)+'px';
    }
    menu.style.left=left+'px';menu.style.right='auto';menu.style.marginTop='0';menu.style.marginBottom='0';
    menu.style.overflowY='auto';
    // Cerrar al hacer click fuera o al hacer scroll en la lista
    setTimeout(()=>{document.addEventListener('click',cerrarSubMenusUnaVez);const cont=document.querySelector('.cont');if(cont)cont.addEventListener('scroll',cerrarSubMenusUnaVez,{passive:true});},50);
  }
}
function cerrarSubMenus(){
  document.querySelectorAll('[id^="subMenu_"]').forEach(m=>m.style.display='none');
  document.querySelectorAll('.subMenuHostAbierto').forEach(e=>e.classList.remove('subMenuHostAbierto'));
}
function cerrarSubMenusUnaVez(){
  cerrarSubMenus();
  document.removeEventListener('click',cerrarSubMenusUnaVez);
  const cont=document.querySelector('.cont');if(cont)cont.removeEventListener('scroll',cerrarSubMenusUnaVez);
}

async function submitCMod(){

  let mergeTarget=null;
  if(S.cMode==='add'){
    const phoneClean=phone.replace(/\D/g,'');
    const nameN=norm(name).trim();
    // 1) Match FUERTE por telГ©fono (вүҘ7 dГӯgitos) вҶ’ es la misma persona con seguridad
    if(phoneClean.length>=7){
      mergeTarget=S.clients.find(c=>{const cp=(c.phone||'').replace(/\D/g,'');return cp.length>=7&&cp===phoneClean;})||null;
    }
    // 2) Si no hubo match por telГ©fono, por NOMBRE normalizado (ignora tildes y mayГәsculas: "SolГіrzano"=="solorzano")
    let soloPorNombre=false;
    if(!mergeTarget&&nameN){
      mergeTarget=S.clients.find(c=>norm(c.name||'').trim()===nameN)||null;
      soloPorNombre=!!mergeTarget;
    }
    // TelГ©fono igual вҶ’ anexar directo (sin preguntar). Solo el nombre igual вҶ’ confirmar (podrГӯa ser un homГіnimo).
    if(mergeTarget&&soloPorNombre){
      const n=(mergeTarget.subs||[]).length;
      if(!confirm(`вҡ пёҸ Ya existe un cliente llamado "${mergeTarget.name}" (${mergeTarget.phone||'sin telГ©fono'} В· ${n} suscripciГіn(es)).\n\nВҝEs la misma persona?\n\nвҖў Aceptar вҶ’ se le AГ‘ADE esta suscripciГіn (sin duplicar el cliente).\nвҖў Cancelar вҶ’ se crea un cliente aparte.`)){
        mergeTarget=null;
      }
    }
  }
  let newClientId=null;let newSubId=null;
  if(S.cMode==='add'){

    if(platform==='__NUEVA__'){

async function cpCampo(valor,etiqueta){

}

  if(S.sMode==='add'){

  }

  html+='</div>';

// Sugiere el primer nГәmero de perfil libre (1..lГӯmite) en una cuenta
function sugerirPerfil(caId){
  const usados=new Set();
  S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===caId){const n=parseInt(s.profile);if(!isNaN(n))usados.add(n);}}));
  const ca=S.cuentas.find(x=>x.id===caId);
  const limit=parseInt(ca?.totalProfiles)||getPlatLimit(ca?.platform)||8;
  for(let i=1;i<=limit;i++){if(!usados.has(i))return i;}
  return '';
}
// Auto-asignar la cuenta maestra con MГҒS perfiles libres para la plataforma elegida
function autoAsignarCuenta(){
  if(S.sMode!=='add')return;
  const sel=document.getElementById('sma');const info=document.getElementById('cuentaInfo');
  if(!sel)return;
  const plat=document.getElementById('spl')?.value;
  if(!plat)return;
  if(sel.value==='__NUEVA__'){mostrarNuevaCuentaCfgSub(true,plat);return} // respeta "crear cuenta nueva"
  let prevEmail='';
  if(sel.value){
    const cur=S.cuentas.find(x=>x.id===sel.value);
    if(cur&&platGroup(cur.platform)===platGroup(plat)){updateCuentaInfo();return} // respeta elecciГіn vГЎlida
    prevEmail=cur?.email||'';sel.value=''; // la plataforma cambiГі: descartar la anterior
  }
  // Candidatas: misma plataforma (agrupada), no vendidas completas, con cupo. MГЎs libres primero; desempata por menor costo.
  const cand=S.cuentas
    .filter(ca=>platGroup(ca.platform)===platGroup(plat)&&!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0)
    .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  if(!cand.length){
    if(info)info.innerHTML='<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 10px;color:var(--yellow)">вҡ  No hay cuentas de '+plat+' con cupo libre. Se crearГЎ una cuenta maestra nueva con el correo que escribas abajo.</div>';
    mostrarNuevaCuentaCfgSub(true,plat); // ofrecer fechas/costo/proveedor de la cuenta nueva
    return;
  }
  mostrarNuevaCuentaCfgSub(false);
  const best=cand[0];sel.value=best.id;
  const sae=document.getElementById('sae'),spw=document.getElementById('spw'),spr=document.getElementById('spr');
  if(sae&&(!sae.value||sae.value===prevEmail))sae.value=best.email||'';
  if(spw&&!spw.value)spw.value=best.password||'';
  if(spr&&!spr.value){const p=sugerirPerfil(best.id);if(p)spr.value=p;}
  const av=profDisponibles(best.id);
  if(info)info.innerHTML='<div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:8px 10px;color:var(--green)">вң… Auto-asignada la cuenta con mГЎs cupo: <b>'+pi(best.platform)+' '+(best.email||'вҖ”')+'</b> ('+av+' libres). Puedes cambiarla arriba.</div>';
}

// Avisar renovaciГіn a un cliente вҖ” unifica todas sus cuentas en un solo mensaje
function avisarRenovacionCliente(id){
  const c=S.clients.find(x=>x.id===id);
  if(!c){toast('Cliente no encontrado','R');return}
  if(!c.phone){toast('вқҢ Este cliente no tiene telГ©fono registrado','R');return}
  const subs=c.subs||[];
  if(!subs.length){toast('Sin suscripciones','B');return}
  // Determinar quГ© cuentas estГЎn vencidas vs por vencer
  const vencidas=subs.filter(s=>gst(s.endDate)==='ven');
  const porVencer=subs.filter(s=>gst(s.endDate)==='exp'||gst(s.endDate)==='act');
  let relevantes,tipo;
  if(vencidas.length&&!porVencer.length){relevantes=vencidas;tipo='venc';}
  else{relevantes=subs;tipo='proximo';}
  if(relevantes.length===1){
    const s=relevantes[0];
    const venc=gst(s.endDate)==='ven';

// в”Җв”Җ AUDITORГҚA DE DATOS ("рҹ©ә Salud de los Datos") в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Solo LEE: detecta inconsistencias y lleva al lugar para corregirlas a mano.
// Cancelados quedan fuera de los chequeos rojo/amarillo (no son negocio activo).
function auditarDatos(){
  const cats=[];
  const add=(sev,titulo,detalle,items)=>{if(items.length)cats.push({sev,titulo,detalle,items});};
  const activos=S.clients.filter(c=>c.clientStatus!=='Cancelado');
  const sinFecha=[],finAntes=[],ctaRota=[],sinPrecio=[],sinPlat=[],credDesync=[],sinTel=[],sinCta=[],sinSubs=[];
  activos.forEach(c=>{
    if(!(c.subs||[]).length)sinSubs.push({label:c.name||'вҖ”',det:c.phone||'sin telГ©fono',cId:c.id});
    if(!c.phone)sinTel.push({label:c.name||'вҖ”',det:(c.subs||[]).map(s=>s.platform).filter(Boolean).join(', ')||'sin suscripciones',cId:c.id});
    (c.subs||[]).forEach(s=>{
      const it={label:c.name||'вҖ”',cId:c.id,sId:s.id};
      if(!s.endDate)sinFecha.push({...it,det:(s.platform||'Вҝplataforma?')+' В· sin fecha de fin'});
      else if(s.startDate&&s.endDate<s.startDate)finAntes.push({...it,det:(s.platform||'вҖ”')+' В· fin '+fd(s.endDate)+' ANTES del inicio '+fd(s.startDate)});
      if(precioMostrar(s)<=0)sinPrecio.push({...it,det:(s.platform||'вҖ”')+' В· precio $0 (ni propio ni de catГЎlogo)'});
      if(!s.platform)sinPlat.push({...it,det:'suscripciГіn sin plataforma'});
      if(s.masterAccountId){
        const ca=S.cuentas.find(x=>x.id===s.masterAccountId);
        if(!ca){
          const enPap=(S.papeleraCuentas||[]).some(x=>x.id===s.masterAccountId);
          ctaRota.push({...it,det:(s.platform||'вҖ”')+' В· '+(enPap?'su cuenta maestra estГЎ en la PAPELERA':'su cuenta maestra ya NO existe')});
        }else if((ca.email&&s.accountEmail&&norm(ca.email)!==norm(s.accountEmail))||(ca.password&&s.password&&ca.password!==s.password)){
          credDesync.push({...it,det:(s.platform||'вҖ”')+' В· correo/clave distintos a los de la cuenta '+(ca.email||'')});
        }
      }else{
        sinCta.push({...it,det:(s.platform||'вҖ”')+' В· sin cuenta maestra asignada'});
      }
    });
  });
  // Perfil repetido en la misma cuenta (solo clientes Activos, igual que profInUse; las "cuenta completa" no usan perfil)
  const perfilDup=[];const porCtaPerfil={};
  S.clients.filter(c=>c.clientStatus==='Activo'||!c.clientStatus).forEach(c=>(c.subs||[]).forEach(s=>{
    if(!s.masterAccountId||s.cuentaCompleta)return;
    const p=norm(String(s.profile||'')).trim();if(!p)return;
    const k=s.masterAccountId+'|'+p;
    (porCtaPerfil[k]=porCtaPerfil[k]||[]).push({c,s});
  }));
  Object.values(porCtaPerfil).forEach(arr=>{
    if(arr.length<2)return;
    const ca=S.cuentas.find(x=>x.id===arr[0].s.masterAccountId);
    arr.forEach(x=>perfilDup.push({label:x.c.name||'вҖ”',det:'perfil "'+(x.s.profile||'')+'" repetido en '+(ca?ca.email||ca.platform:'la cuenta'),cId:x.c.id,sId:x.s.id}));
  });
  // Cuentas sobrevendidas (mГЎs perfiles ocupados que el lГӯmite)
  const sobreV=[];
  S.cuentas.forEach(ca=>{
    const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
    const used=profInUse(ca.id);
    if(used>limit)sobreV.push({label:ca.email||ca.platform||'вҖ”',det:pi(ca.platform)+' '+(ca.platform||'')+' В· '+used+' perfiles ocupados de '+limit,caId:ca.id});
  });
  const dups=detectarClientesDuplicados();
  add('R','вӣ” Sin fecha de fin','No entran a recordatorios ni cuentan como deuda',sinFecha);
  add('R','вӣ” Fecha de fin ANTES del inicio','Casi seguro un error de tipeo en la fecha',finAntes);
  add('R','вӣ” Cuenta maestra rota','La suscripciГіn apunta a una cuenta que ya no existe',ctaRota);
  add('R','вӣ” Cuenta sobrevendida','Hay mГЎs perfiles ocupados que los que da la cuenta',sobreV);
  add('Y','вҡ пёҸ Sin precio','Se cobrarГӯan $0 вҖ” ponles precio propio o de catГЎlogo',sinPrecio);
  add('Y','вҡ пёҸ Sin plataforma','Suscripciones sin app definida',sinPlat);
  add('Y','вҡ пёҸ Perfil repetido en la misma cuenta','Dos clientes con el mismo perfil chocarГӯan',perfilDup);
  add('Y','вҡ пёҸ Correo/clave desactualizados','La suscripciГіn no coincide con su cuenta maestra',credDesync);
  if(dups.length)cats.push({sev:'Y',titulo:'вҡ пёҸ Posibles clientes duplicados',detalle:'La misma persona registrada 2+ veces',accion:'dup',items:dups.map(g=>({label:(g.principal.name||'вҖ”')+' + '+g.otros.length+' registro(s) mГЎs',det:g.tipo==='tel'?'mismo telГ©fono':'mismo nombre',cId:g.principal.id}))});
  add('I','в„№пёҸ Sin telГ©fono','No puedes avisarles por WhatsApp',sinTel);
  add('I','в„№пёҸ Sin cuenta maestra asignada','Visibles en el grupo "Sin cuenta maestra" de Clientes',sinCta);
  add('I','в„№пёҸ Sin ninguna suscripciГіn','Visibles en la secciГіn "рҹ‘Ө Sin suscripciГіn" de Clientes',sinSubs);
  return cats;
}

function detectarClientesDuplicados(){
  const grupos=[];const usados=new Set();
  const clientes=S.clients||[];
  // Elige como principal el que tenga MГҒS suscripciones (desempata: el que tenga telГ©fono, luego el primero)
  const elegirPrincipal=arr=>arr.slice().sort((a,b)=>((b.subs||[]).length-(a.subs||[]).length)||((b.phone?1:0)-(a.phone?1:0)))[0];
  // 1) Por telГ©fono
  const porTel={};
  clientes.forEach(c=>{const ph=_phoneKey(c);if(ph.length>=7){(porTel[ph]=porTel[ph]||[]).push(c);}});
  Object.values(porTel).forEach(arr=>{
    if(arr.length<2)return;
    const principal=elegirPrincipal(arr);
    grupos.push({tipo:'tel',principal,otros:arr.filter(c=>c!==principal)});
    arr.forEach(c=>usados.add(c.id));
  });
  // 2) Por nombre normalizado (solo clientes que no cayeron en un grupo por telГ©fono)
  const porNom={};
  clientes.forEach(c=>{if(usados.has(c.id))return;const n=norm(c.name||'').trim();if(n)(porNom[n]=porNom[n]||[]).push(c);});
  Object.values(porNom).forEach(arr=>{
    if(arr.length<2)return;
    // Si tienen 2+ telГ©fonos DISTINTOS entre sГӯ, probablemente son personas diferentes вҶ’ no unir
    const telsDistintos=new Set(arr.map(c=>_phoneKey(c)).filter(p=>p.length>=7));
    if(telsDistintos.size>1)return;
    const principal=elegirPrincipal(arr);
    grupos.push({tipo:'nombre',principal,otros:arr.filter(c=>c!==principal)});
    arr.forEach(c=>usados.add(c.id));
  });
  return grupos;
}

async function confirmarUnirDuplicados(){
  const sel=S.dupSel||new Set();
  const grupos=_dupGroups.filter((g,i)=>sel.has(i));
  if(!grupos.length){toast('Marca al menos un grupo','B');return;}
  let unidos=0,subsMovidas=0;
  grupos.forEach(g=>{
    const P=g.principal;P.subs=P.subs||[];
    g.otros.forEach(o=>{
      // Mover (clonando) las suscripciones al principal вҖ” clon para no compartir referencias con la copia en papelera
      (o.subs||[]).forEach(s=>{P.subs.push({...s});subsMovidas++;});
      if(!P.phone&&o.phone)P.phone=o.phone;
      if(o.notes)P.notes=(P.notes?P.notes+' В· ':'')+o.notes;
      if(o.clientStatus==='Activo'||!o.clientStatus)P.clientStatus='Activo';
      // Reasignar los pagos del duplicado al cliente conservado (continuidad del historial)
      (S.pagos||[]).forEach(p=>{if(p.clientId===o.id){p.clientId=P.id;p.clientName=P.name;}});
      // Sacar el duplicado de clientes y guardarlo en papelera (con sus subs originales, recuperable)
      S.clients=S.clients.filter(c=>c.id!==o.id);
      if(!S.papelera)S.papelera=[];
      S.papelera.push({...o,deletedAt:Date.now(),_unidoA:P.id});
      unidos++;
    });
  });
  _dupGroups=[];S.dupSel=new Set();S.dupMod=false;render();
  sv();
  toast(`рҹ”— ${unidos} duplicado(s) unido(s) В· ${subsMovidas} suscripciГіn(es) movida(s)`,'G');
}

// AUTOMATIZACIГ“N: suspende clientes 100% vencidos hace mГЎs de N dГӯas (solo si estГЎ activado). Devuelve cuГЎntos.
function autoSuspenderVencidos(){
  if(!S.autoSuspend)return 0;
  const dias=parseInt(S.autoSuspendDays)||30;let n=0;
  S.clients.forEach(c=>{
    if((c.clientStatus||'Activo')!=='Activo')return;
    const subs=c.subs||[];if(!subs.length)return;
    if(!subs.every(s=>gst(s.endDate)==='ven'))return;       // todas vencidas
    const latest=subs.reduce((m,s)=>{const d=dl(s.endDate);return d===null?m:Math.max(m,d)},-Infinity);
    if(latest===-Infinity)return;
    if(latest< -dias){c.clientStatus='Suspendido';c.autoSuspendedAt=nowDate();n++;}  // la mГЎs reciente venciГі hace +dias
  });
  return n;
}
// AUTOMATIZACIГ“N: una vez al dГӯa, avisa quГ© hay por cobrar (no cambia datos)

  if(!S.dailyDigest)return;
  const hoy=nowDate();const key='pf_digest_'+(auth.currentUser?.uid||'');
  let last='';try{last=localStorage.getItem(key)||''}catch(e){}

  const rem=getReminders();const venN=rem.vencidos.length,hoyN=rem.today.length,manN=rem.tomorrow.length;
  if(venN+hoyN+manN===0)return;
  const partes=[];

  // Toast accionable: botГіn para abrir el flujo de envГӯo directo

  t.innerHTML='<span style="flex:1;color:var(--text)">рҹ“Ӣ Resumen del dГӯa вҖ” '+partes.join(' В· ')+'</span>'+(conTel?'<button onclick="this.closest(\'.toast\').remove();enviarTodosDia(\'todos\')" style="background:var(--acc);border:none;color:#07130c;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">рҹ“Ё Enviar ahora</button>':'')+'<button onclick="this.closest(\'.toast\').remove()" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px">вң•</button>';

  const plats=PLATS.filter(p=>p!=='Otro'&&parseFloat(getCatalogoPrecio(p))>0);
  const combos=getCombos().filter(cb=>parseFloat(cb.precio)>0);
  if(!plats.length&&!combos.length){toast('вқҢ Primero pon precios en el catГЎlogo (arriba) y guГЎrdalo','R');return}
  let msg=`рҹҺ¬ *${S.biz||'PUNTOFLIX'}* вҖ” Lista de Precios\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n`;
  if(plats.length)msg+='\n'+plats.map(p=>`${pi(p)} *${p}* вҖ” $${parseFloat(getCatalogoPrecio(p)).toFixed(2)}`).join('\n')+'\n';
  if(combos.length)msg+=`\nрҹҺҒ *COMBOS:*\n`+combos.map(cb=>`${cb.apps.map(a=>pi(a)).join('')} *${cb.nombre}* вҖ” $${parseFloat(cb.precio).toFixed(2)}`).join('\n')+'\n';

// Publica el catГЎlogo (precios + combos) en el doc PГҡBLICO publico/catalogo de Firestore.
// La landing (puntoflix.com) lo lee sin login y actualiza sus precios sola. Escritura directa
// (no pasa por sv(): es OTRO documento, no el de datos del negocio). Reglas: read pГәblico, write con sesiГіn.
async function publicarCatalogoWeb(){
  if(!esOwner()){toast('рҹ”’ Solo la cuenta principal puede publicar en puntoflix.com','R');return}
  const plats=PLATS.filter(p=>p!=='Otro'&&parseFloat(getCatalogoPrecio(p))>0);
  const combos=getCombos().filter(cb=>parseFloat(cb.precio)>0);
  if(!plats.length&&!combos.length){toast('вқҢ Primero pon precios en el catГЎlogo (arriba) y guГЎrdalo','R');return}
  const resumen=plats.map(p=>'вҖў '+p+': $'+parseFloat(getCatalogoPrecio(p)).toFixed(2)).join('\n');
  if(!confirm('рҹҸӘ Se publicarГЎn estos precios en tu pГЎgina web (puntoflix.com):\n\n'+resumen+'\n'+(combos.length?'\n+ '+combos.length+' combo(s)\n':'')+'\nLa pГЎgina los mostrarГЎ al instante. ВҝPublicar ahora?'))return;
  try{
    const precios={};plats.forEach(p=>{precios[p]=parseFloat(getCatalogoPrecio(p));});
    await db.collection('publico').doc('catalogo').set({
      precios:JSON.stringify(precios),
      combos:JSON.stringify(combos.map(cb=>({nombre:cb.nombre,apps:cb.apps,precio:parseFloat(cb.precio)}))),
      biz:S.biz||'PUNTOFLIX',
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('рҹҸӘ CatГЎlogo publicado вҖ” puntoflix.com ya muestra tus precios nuevos','G');
  }catch(e){
    console.error('Error publicando catГЎlogo:',e);
    toast('вқҢ No se pudo publicar'+(e&&e.code==='permission-denied'?' (permisos de la nube)':' вҖ” revisa tu conexiГіn'),'R');
  }
}

// в”Җв”Җ MARCAR RECORDATORIO COMO ENVIADO (persistente) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Se guarda { 'cId_sId': fechaVencimiento }. Si el cliente renueva (cambia la fecha),
// el marcador deja de coincidir вҶ’ se puede volver a avisar en el nuevo ciclo.
function envEnviado(cId,sId,endDate){return !!(S.waEnviados&&S.waEnviados[cId+'_'+sId]===endDate);}
function segEnviado(cId,sId,endDate){return !!(S.waSeguimiento&&S.waSeguimiento[cId+'_'+sId]===endDate);}
// Conserva solo marcadores que coinciden con la fecha actual de una suscripciГіn existente (limpia los viejos)
function _prunMarcadores(obj){if(!obj||typeof obj!=='object')return {};const valid={};S.clients.forEach(c=>(c.subs||[]).forEach(s=>{const k=c.id+'_'+s.id;if(obj[k]===s.endDate)valid[k]=s.endDate;}));return valid;}
function _fechaSub(cId,sId){const c=S.clients.find(x=>x.id===cId);const s=c&&(c.subs||[]).find(x=>x.id===sId);return s?s.endDate:nowDate();}
// full=true вҶ’ re-render completo (necesario cuando se llama desde el modal, que vive fuera de .cont)
function marcarEnviado(cId,sId,full){
  if(!S.waEnviados||typeof S.waEnviados!=='object'||S.waEnviados instanceof Set)S.waEnviados={};
  S.waEnviados[cId+'_'+sId]=_fechaSub(cId,sId);
  sv(); // persistir en Firebase para que sobreviva recarga / cierre de sesiГіn
  setTimeout(()=>full?render():renderCont(),500);
}
// Marca varias suscripciones de un cliente como enviadas (mensaje combinado)
function marcarEnviadoGrupo(cId,sIdsStr,full){
  if(!S.waEnviados||typeof S.waEnviados!=='object'||S.waEnviados instanceof Set)S.waEnviados={};
  (sIdsStr||'').split(',').forEach(sId=>{if(sId)S.waEnviados[cId+'_'+sId]=_fechaSub(cId,sId)});
  sv();
  setTimeout(()=>full?render():renderCont(),500);
}
// Igual que marcarEnviadoGrupo pero acepta pares 'cId:sId,cId:sId' вҶ’ cada sub con su dueГұo REAL
// (necesario cuando el grupo une clientes duplicados de la misma persona, cada uno con su propio id).
function marcarEnviadoItems(pairsStr,full){
  if(!S.waEnviados||typeof S.waEnviados!=='object'||S.waEnviados instanceof Set)S.waEnviados={};
  (pairsStr||'').split(',').forEach(pr=>{const a=pr.split(':');const cId=a[0],sId=a[1];if(cId&&sId)S.waEnviados[cId+'_'+sId]=_fechaSub(cId,sId);});
  sv();
  setTimeout(()=>full?render():renderCont(),500);
}
// Lista de envГӯo AGRUPADA por MISMO telГ©fono (o cliente) + misma fecha de vencimiento вҶ’ 1 solo mensaje con total,
// aunque sean 2 registros de la misma persona. 'todos' = vencidos + hoy (+ maГұana si S.incluirManana).
// Cada grupo: {c(primer dueГұo), tipo, endDate, subs[], items[{c,s}]} вҖ” items lleva el dueГұo real de cada sub.
function getListaEnvio(dia){
  const rem=getReminders();
  const tag=(arr,t)=>arr.map(x=>({...x,tipo:t}));
  let flat;
  if(dia==='vencidos')flat=tag(rem.vencidos,'vencido');
  else if(dia==='tomorrow')flat=tag(rem.tomorrow,'manana');
  else if(dia==='today')flat=tag(rem.today,'hoy');
  else{flat=[...tag(rem.vencidos,'vencido'),...tag(rem.today,'hoy')];if(S.incluirManana!==false)flat=flat.concat(tag(rem.tomorrow,'manana'));}
  flat=flat.filter(x=>x.c.phone);
  const grupos=[];const idx={};
  flat.forEach(x=>{
    const ph=_phoneKey(x.c);
    const key=(ph?'ph:'+ph:'id:'+x.c.id)+'|'+(x.s.endDate||'');
    if(idx[key]===undefined){idx[key]=grupos.length;grupos.push({c:x.c,tipo:x.tipo,endDate:x.s.endDate,subs:[x.s],items:[{c:x.c,s:x.s}]});}
    else{grupos[idx[key]].subs.push(x.s);grupos[idx[key]].items.push({c:x.c,s:x.s});}
  });
  return grupos;
}

function getSeguimiento(){
  if(S.seguimiento===false)return [];

  // Agrupar por MISMO telГ©fono (o cliente) вҶ’ un solo seguimiento por persona aunque sean 2 registros. items=[{c,s}]
  const grupos=[];const idx={};

function ymPrev(){const now=new Date();let y=now.getFullYear(),m=now.getMonth();m-=1;if(m<0){m=11;y--;}return y+'-'+String(m+1).padStart(2,'0');}
function ymAnterior(ym){const p=String(ym).split('-');let y=parseInt(p[0]),m=parseInt(p[1])-2;if(m<0){m=11;y--;}return y+'-'+String(m+1).padStart(2,'0');}
function nombreMes(ym){const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];const p=String(ym).split('-');return (meses[parseInt(p[1])-1]||'')+' '+p[0];}
function generarReporteMensual(ym){
  const pagosMes=S.pagos.filter(p=>p.fecha&&String(p.fecha).startsWith(ym));
  let ingresos=0,costos=0,cobros=0,nuevos=0;
  pagosMes.forEach(p=>{
    const m=parseFloat(p.monto)||0;
    if(p.esCosto||m<0){costos+=Math.abs(m);}else{ingresos+=m;cobros++;}
    if(/cliente nuevo|combo nuevo/i.test(p.notas||''))nuevos++;
  });
  return {ym,ingresos,costos,neto:ingresos-costos,cobros,nuevos,nPagos:pagosMes.length};
}
// в”Җв”Җ Reporte mensual en PDF (descargable) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let _jspdfPromise=null;
function loadJsPDF(){
  if(window.jspdf&&window.jspdf.jsPDF)return Promise.resolve();
  if(_jspdfPromise)return _jspdfPromise;
  _jspdfPromise=new Promise((resolve,reject)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    sc.onload=()=>resolve();
    sc.onerror=()=>{_jspdfPromise=null;reject(new Error('No se pudo cargar la librerГӯa de PDF. Revisa tu conexiГіn e intГ©ntalo de nuevo.'))};
    document.head.appendChild(sc);
  });
  return _jspdfPromise;
}
// Dibuja una tabla simple con encabezado oscuro, filas alternadas y salto de pГЎgina automГЎtico. Devuelve la nueva y.
function _pdfTabla(doc,x,y,width,cols,rows,H,M){
  const rowH=20;
  const drawHead=()=>{
    doc.setFillColor(26,26,46);doc.rect(x,y,width,22,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
    let cx=x;cols.forEach(c=>{const cw=width*c[1];const al=c[2]||'left';doc.text(c[0],al==='right'?cx+cw-8:cx+8,y+15,{align:al});cx+=cw;});
    y+=22;
  };
  drawHead();
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  rows.forEach((row,i)=>{
    if(y+rowH>H-40){doc.addPage();y=M+10;drawHead();doc.setFont('helvetica','normal');doc.setFontSize(9);}
    if(i%2===0){doc.setFillColor(245,245,248);doc.rect(x,y,width,rowH,'F');}
    doc.setTextColor(40,40,50);
    let cx=x;cols.forEach((c,ci)=>{const cw=width*c[1];const al=c[2]||'left';let txt=String(row[ci]==null?'':row[ci]);const maxCh=Math.floor(cw/5);if(txt.length>maxCh)txt=txt.slice(0,maxCh-1)+'вҖҰ';doc.text(txt,al==='right'?cx+cw-8:cx+8,y+14,{align:al});cx+=cw;});
    y+=rowH;
  });
  doc.setDrawColor(225,225,230);doc.line(x,y,x+width,y);
  return y;
}

let importData=[];

async function processImportFile(file){
  try{await loadXLSX()}catch(err){document.getElementById('importPreview').innerHTML=`<div class="alert alertR"><span>вқҢ</span><div><h4>Error al leer el archivo</h4><p>${err.message}</p></div></div>`;return}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){document.getElementById('importPreview').innerHTML='<div class="alert alertR"><span>вқҢ</span><div><h4>Archivo vacГӯo</h4></div></div>';return}
      importData=rows;
      const grouped={};
      rows.forEach(r=>{const n=(r['Nombre']||r['nombre']||'').toString().trim();if(!n)return;if(!grouped[n])grouped[n]=[];grouped[n].push(r)});
      const count=Object.keys(grouped).length;
      const preview=Object.entries(grouped).slice(0,5).map(([n,subs])=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)"><div class="cliAvatar" style="background:rgba(163,230,53,.1);color:var(--accTx);width:28px;height:28px;border-radius:8px;font-size:11px">${initials(n)}</div><div><b style="font-size:12px">${n}</b><span style="font-size:11px;color:var(--text2);margin-left:6px">${subs.length} suscripciГіn(es)</span></div></div>`).join('');
      document.getElementById('importPreview').innerHTML=`
        <div class="alert alertG"><span>вң…</span><div><h4>${count} clientes encontrados en el archivo</h4><p>${rows.length} filas procesadas${count>5?' В· mostrando primeros 5':''}</p></div></div>
        <div style="background:var(--surf2);border-radius:10px;padding:12px">${preview}${count>5?`<div style="font-size:11px;color:var(--text2);padding-top:6px">... y ${count-5} mГЎs</div>`:''}</div>`;
      document.getElementById('importConfirmBtn').style.display='inline-flex';
    }catch(err){document.getElementById('importPreview').innerHTML=`<div class="alert alertR"><span>вқҢ</span><div><h4>Error al leer el archivo</h4><p>${err.message}</p></div></div>`}
  };
  r.readAsBinaryString(file);
}
function parseImportDate(v){if(!v)return'';if(v instanceof Date)return v.toISOString().slice(0,10);const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`}return''}

// в”Җв”Җ VINCULAR SUSCRIPCIONES A CUENTAS MAESTRAS AUTOMГҒTICAMENTE в”Җв”Җ
async function vincularSuscripcionesACuentas(silent=false){
  let vinculadas=0,yaVinculadas=0,sinMatch=0;
  S.clients.forEach(c=>{
    (c.subs||[]).forEach(s=>{
      if(s.masterAccountId){const exists=S.cuentas.find(ca=>ca.id===s.masterAccountId);if(exists){yaVinculadas++;return}}
      if(!s.platform||!s.accountEmail){sinMatch++;return}
      const emailLower=s.accountEmail.toLowerCase().trim();
      const match=S.cuentas.find(ca=>ca.platform===s.platform&&(ca.email||'').toLowerCase().trim()===emailLower);
      if(match){s.masterAccountId=match.id;vinculadas++;}
      else sinMatch++;
    });
  });
  sv(); // guardado en 2.Вә plano вҖ” la vinculaciГіn ya quedГі aplicada en memoria
  if(!silent){
    if(vinculadas>0)toast('рҹ”— '+vinculadas+' suscripciГіn(es) vinculada(s) automГЎticamente','G');
    else if(yaVinculadas>0)toast('вң… Todas las suscripciones ya estaban vinculadas','B');
    else toast('вҡ пёҸ No se encontraron coincidencias para vincular','R');
  }
  return {vinculadas,yaVinculadas,sinMatch};
}

async function confirmImport(){
  if(!importData.length)return;
  // Agrupar filas del Excel por MISMO telГ©fono (вүҘ7 dГӯg) o nombre normalizado (sin tildes) вҶ’ no duplicar dentro del archivo
  const grouped={};
  importData.forEach(r=>{
    const n=sanTxt(r['Nombre']||r['nombre']||'');
    if(!n)return;
    const ph=String(r['TelГ©fono']||r['Telefono']||r['telefono']||'').trim();
    const phd=ph.replace(/\D/g,'');
    const key=phd.length>=7?('ph:'+phd):('nm:'+norm(n));
    if(!grouped[key])grouped[key]={name:n,phone:ph,notes:sanTxt(r['Notas']||r['notas']||''),subs:[]};
    else if(!grouped[key].phone&&ph)grouped[key].phone=ph; // completar telГ©fono si una fila lo traГӯa y otra no
    const plat=(r['Plataforma']||r['plataforma']||'').toString().trim();
    if(plat){grouped[key].subs.push({id:gid(),platform:plat,plan:'',accountEmail:String(r['Correo']||r['correo']||'').trim(),password:String(r['ContraseГұa']||r['contrasena']||r['Clave']||'').trim(),profile:String(r['Perfil']||r['perfil']||'').trim(),profilePin:String(r['PIN']||r['pin']||'').trim(),masterAccountId:'',startDate:parseImportDate(r['Inicio']||r['inicio']||''),endDate:parseImportDate(r['Vencimiento']||r['vencimiento']||''),price:String(r['Precio']||r['precio']||'').trim(),paymentMethod:'Efectivo',pagado:(r['Pagado']||r['pagado']||'').toString().toLowerCase()==='sГӯ'||(r['Pagado']||r['pagado']||'').toString().toLowerCase()==='si'})}
  });
  let added=0,skipped=0;
  Object.values(grouped).forEach(nc=>{
    const ncPhd=(nc.phone||'').replace(/\D/g,'');const ncNm=norm(nc.name);
    // Cliente existente por telГ©fono (si ambos tienen, deben coincidir) o por nombre normalizado (evita homГіnimos con tel distinto)
    const exists=S.clients.find(c=>{
      const cph=(c.phone||'').replace(/\D/g,'');
      if(ncPhd.length>=7&&cph.length>=7)return cph===ncPhd; // ambos con tel вҶ’ solo une si es el mismo nГәmero
      return !!ncNm&&norm(c.name||'')===ncNm;               // si a alguno le falta tel, compara por nombre
    });
    if(exists){nc.subs.forEach(s=>exists.subs.push(s));if(!exists.phone&&nc.phone)exists.phone=nc.phone;skipped++}
    else{S.clients.push({id:gid(),clientStatus:'Activo',sendReminders:true,...nc});added++}
  });
  S.importMod=false;importData=[];
  // Vincular automГЎticamente las suscripciones nuevas a sus cuentas maestras (su sv() guarda TODO en 2.Вә plano)
  const vinc=await vincularSuscripcionesACuentas(true);
  render();
  let msg='вң… '+added+' clientes importados';
  if(skipped)msg+=', '+skipped+' actualizados';
  if(vinc.vinculadas>0)msg+=' В· рҹ”— '+vinc.vinculadas+' vinculadas a cuentas';
  toast(msg,'G');
}

// в”Җв”Җ PWA: Registrar Service Worker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
// в”Җв”Җ PWA: Detectar instalaciГіn в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  try{
    if(!window.matchMedia('(display-mode: standalone)').matches&&!localStorage.getItem('pwa_dismissed')){
      setTimeout(()=>mostrarPwaPrompt(),3000);
    }
  }catch(e){}
});
function mostrarPwaPrompt(){
  if(!deferredPrompt)return;
  if(document.getElementById('pwaBanner'))return;
  const b=document.createElement('div');
  b.id='pwaBanner';
  b.style.cssText='position:fixed;bottom:84px;left:16px;right:16px;background:linear-gradient(135deg,#84cc16,#0f5132);color:#fff;padding:14px 18px;border-radius:14px;box-shadow:0 8px 30px rgba(163,230,53,.4);z-index:9999;display:flex;align-items:center;gap:12px;animation:slideUp .3s';
  b.innerHTML='<div style="font-size:26px">рҹ“ұ</div><div style="flex:1"><div style="font-weight:800;font-size:14px">Instala '+_bizCache()+'</div><div style="font-size:11px;opacity:.9">Acceso rГЎpido desde tu pantalla de inicio</div></div><button onclick="instalarPwa()" style="background:#fff;color:#84cc16;border:none;padding:8px 14px;border-radius:8px;font-weight:800;cursor:pointer;font-size:12px">Instalar</button><button onclick="cerrarPwaBanner()" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:18px;padding:4px">вң•</button>';
  document.body.appendChild(b);
}
async function instalarPwa(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  cerrarPwaBanner();
}
function cerrarPwaBanner(){
  const b=document.getElementById('pwaBanner');
  if(b)b.remove();
  try{localStorage.setItem('pwa_dismissed','1');}catch(e){}
}


// в”Җв”Җ AUTO-RESPALDO SILENCIOSO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function checkAutoBackup(){
  if(!S.autoBackupEnabled)return;
  if(!S.clients||S.clients.length===0)return; // No respaldar si no hay datos
  const days=S.autoBackupDays||7;
  const lastB=S.lastBackup?new Date(S.lastBackup):null;
  const now=new Date();now.setHours(0,0,0,0);
  // Calcular si toca respaldo
  let needsBackup=false;
  if(!lastB){
    needsBackup=true;
  }else{
    const diff=Math.floor((now-lastB)/86400000);
    if(diff>=days)needsBackup=true;
  }
  if(!needsBackup)return;
  // Hacer respaldo silencioso
  try{
    await loadXLSX();
    const wb=XLSX.utils.book_new();
    const rows=[];
    S.clients.forEach(c=>{
      if(!c.subs||!c.subs.length){
        rows.push({Nombre:c.name,'TelГ©fono':c.phone,Estado:c.clientStatus||'Activo',Plataforma:'',Vencimiento:'',Precio:'',Pagado:'',Notas:c.notes});
      }else{
        c.subs.forEach(s=>rows.push({Nombre:c.name,'TelГ©fono':c.phone,Estado:c.clientStatus||'Activo',Plataforma:s.platform,Perfil:s.profile,PIN:s.profilePin,Correo:s.accountEmail,'ContraseГұa':s.password,Inicio:s.startDate,Vencimiento:s.endDate,Precio:s.price,Pagado:s.pagado?'SГӯ':'No',Notas:c.notes}));
      }
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Clientes');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.pagos.map(p=>({Fecha:p.fecha,Cliente:p.clientName,Plataforma:p.platform,Monto:p.monto,Notas:p.notas}))),'Pagos');
    // Cuentas maestras tambiГ©n
    if(S.cuentas&&S.cuentas.length){
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.cuentas.map(ca=>{const pr=(S.proveedores||[]).find(p=>p.id===ca.proveedorId);return{Plataforma:ca.platform,Correo:ca.email,'ContraseГұa':ca.password,'Total Perfiles':ca.totalProfiles,'Costo Mensual':ca.costPerMonth,Inicio:ca.startDate,'Fecha RenovaciГіn':ca.renewalDate,Estado:ca.cuentaEstado||'ok',Proveedor:pr?pr.name:'','Tel Proveedor':pr?pr.phone:'',Notas:ca.notes};})),'CuentasMaestras');
    }
    XLSX.writeFile(wb,`${bizFile()}_auto_${nowDate()}.xlsx`);
    S.lastBackup=nowDate();
    await sv();
    toast('рҹ’ҫ Auto-respaldo descargado','B');
  }catch(err){console.error('Auto-backup failed:',err)}
}

async function toggleAutoBackup(){
  S.autoBackupEnabled=!S.autoBackupEnabled;
  render();sv();
  toast(S.autoBackupEnabled?'вң… Auto-respaldo activado':'вҸёпёҸ Auto-respaldo desactivado','B');
}
async function saveAutoBackupDays(){
  const v=parseInt(document.getElementById('abDays').value)||7;
  S.autoBackupDays=Math.max(1,Math.min(60,v));
  render();sv();
  toast('рҹ’ҫ Frecuencia actualizada: cada '+S.autoBackupDays+' dГӯas','G');
}

async function init(){
  // Estado de conexiГіn en vivo para el indicador de sincronizaciГіn
  window.addEventListener('offline',()=>setSync('offline'));
  window.addEventListener('online',()=>setSync('ok'));
  // Aviso antes de cerrar/recargar si hay un guardado en curso o que fallГі (evita perder un cambio sin subir).
  window.addEventListener('beforeunload',e=>{
    if(_syncEstado==='guardando'||_syncEstado==='error'){
      e.preventDefault();e.returnValue='';return'';
    }
  });
  // Restaurar dark mode y sidebar state desde preferencias locales
  try{
    // Oscuro por defecto (estilo Bayzon); solo claro si el usuario lo eligiГі explГӯcitamente
    if(localStorage.getItem('pf_dark')!=='0'){S.dark=true;document.body.classList.add('dark');}
  }catch(e){S.dark=true;document.body.classList.add('dark');}
  document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)"><div style="text-align:center"><div style="font-size:40px;font-weight:900;background:linear-gradient(135deg,#d9f99d,#a3e635);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;margin-bottom:12px">'+_bizCache()+'</div><div style="color:#7070a0;font-size:13px">Conectando...</div></div></div>';
  
  auth.onAuthStateChanged(async user=>{
    if(user){
      S.in=true;
      await ld();
      await _cargarMembresiaInicial(); // estado de membresГӯa ANTES del primer render (bloquea si estГЎ suspendido)
      const bloqueado=_membBloqueado();
      const nSusp=bloqueado?0:autoSuspenderVencidos();
      render();
      if(!bloqueado){
        if(nSusp>0){sv();setTimeout(()=>toast('рҹӣҢ '+nSusp+' cliente(s) suspendido(s) automГЎticamente (vencidos +'+(S.autoSuspendDays||30)+' dГӯas)','B'),1600);}
        // Resumen del dГӯa (una vez al dГӯa)
        setTimeout(()=>mostrarResumenDia(),2800);
        // Reporte mensual automГЎtico (una vez al iniciar un nuevo mes)
        setTimeout(()=>checkReporteMensual(),3600);
        // Verificar si toca auto-respaldo (esperar 2 seg para no interrumpir)
        setTimeout(()=>checkAutoBackup(),2000);
        // SincronizaciГіn en tiempo real: escuchar cambios en Firestore
        iniciarSyncTiempoReal();
      }
      // Vigilar la membresГӯa en vivo (suspender/reactivar surte efecto al instante; si estaba
      // bloqueado y lo reactivan, recarga la pГЎgina para arrancar sync/automatizaciones limpias)
      iniciarMembresiaWatch();
    } else {
      // Si HABГҚA sesiГіn y se cerrГі (logout, contraseГұa cambiada, sesiГіn revocada desde otro lado),
      // recargar igual que logout(): no dejar en memoria catГЎlogo/plantillas/ajustes del usuario
      // anterior para el siguiente que entre en esta pestaГұa. En la carga inicial S.in es false вҶ’ no recarga.
      if(S.in){location.reload();return;}
      S.in=false;
      S.clients=[];S.pagos=[];S.cuentas=[];
      render();
    }
  });
}
// в”Җв”Җ SINCRONIZACIГ“N EN TIEMPO REAL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let syncUnsub=null;
// Snapshot de otro dispositivo que llegГі cuando NO se podГӯa aplicar (modal abierto o guardado
// propio hace <3s). Antes se DESCARTABA y este dispositivo quedaba con datos viejos hasta el
// siguiente cambio remoto вҖ” causa de "renovГ© en el celular y en la PC siguiГі vencido" (y peor:
// al guardar cualquier cosa, la fusiГіn de conflicto re-subГӯa lo viejo). Ahora se APARCA aquГӯ
// y se aplica apenas se pueda (timer corto y al cerrar modales vГӯa closeAll).
let _syncPendiente=null,_syncPendienteTimer=null;
function _syncEditando(){return !!(S.cMod||S.sMod||S.caMod||S.renMod||S.pagoMod||S.grpRenMod||S.dupMod||S.renCaMod||S.importMod||S.importCAMod||S.comboMod||S.provMod||S.bulkRenMod);}
function _progSyncPendiente(){
  if(_syncPendienteTimer)return;
  _syncPendienteTimer=setTimeout(()=>{_syncPendienteTimer=null;_aplicarSyncPendiente();},3500);
}
function _aplicarSyncPendiente(){
  if(!_syncPendiente)return;
  const d=_syncPendiente;
  // Nuestro propio guardado ya alcanzГі o superГі esa revisiГіn вҶ’ quedГі vieja, descartar.
  if(typeof d.rev==='number'&&typeof S._rev==='number'&&d.rev<=S._rev){_syncPendiente=null;return;}
  if(_syncEditando()||Date.now()-ultimoGuardadoLocal<3000){_progSyncPendiente();return;}
  _syncPendiente=null;
  try{
    aplicarDatosFirestore(d);
    renderCont();
  }catch(e){console.error('Error sync (pendiente):',e);}
}
function iniciarSyncTiempoReal(){
  const uid=auth.currentUser?.uid;
  if(!uid)return;
  if(syncUnsub)syncUnsub(); // Cancelar listener anterior si existe
  syncUnsub=db.collection('usuarios').doc(uid).onSnapshot(doc=>{
    if(!doc.exists)return;
    // Ignorar cambios que vienen de nuestro propio guardado reciente (evita parpadeos)
    if(doc.metadata.hasPendingWrites)return;
    // No aplicar con un modal abierto (estГЎ editando) ni si acabamos de guardar nosotros
    // (<3 seg) вҖ” pero NO descartar: aparcar y aplicar en cuanto se pueda.
    if(_syncEditando()||Date.now()-ultimoGuardadoLocal<3000){
      _syncPendiente=doc.data();
      _progSyncPendiente();
      return;
    }
    _syncPendiente=null; // este snapshot es mГЎs nuevo que cualquiera aparcado
    try{
      aplicarDatosFirestore(doc.data());
      renderCont();
    }catch(e){console.error('Error sync:',e);}
  },err=>console.error('Sync error:',err));
}
init();
</script>

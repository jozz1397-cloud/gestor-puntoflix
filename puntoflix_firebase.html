function handleImportCADrop(e){e.preventDefault();document.getElementById('dropZoneCA').style.borderColor='var(--border2)';const f=e.dataTransfer.files[0];if(f)processImportCAFile(f)}
function handleImportCAFile(inp){if(inp.files[0])processImportCAFile(inp.files[0])}
async function processImportCAFile(file){
  try{await loadXLSX()}catch(err){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>❌</span><div><h4>Error al leer el archivo</h4><p>'+err.message+'</p></div></div>';return}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>❌</span><div><h4>Archivo vacío</h4></div></div>';return}
      importCAData=rows;
      const valid=rows.filter(r=>(r['Plataforma']||r['plataforma'])&&(r['Correo']||r['correo']));
      const totalCosto=valid.reduce((s,r)=>s+(parseFloat(r['Costo Mensual']||r['costo mensual']||0)||0),0);
      const byPlat={};
      valid.forEach(r=>{const p=r['Plataforma']||r['plataforma']||'Otro';byPlat[p]=(byPlat[p]||0)+1});
      const preview=Object.entries(byPlat).slice(0,10).map(([p,c])=>'<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span>'+pi(p)+' '+p+'</span><b>'+c+' cuenta(s)</b></div>').join('');
      document.getElementById('importCAPreview').innerHTML=
        '<div class="alert alertG"><span>✅</span><div><h4>'+valid.length+' cuentas maestras detectadas</h4><p>Costo mensual total estimado: <b>$'+totalCosto.toFixed(2)+'</b></p></div></div>'+
        '<div style="background:var(--surf2);border-radius:10px;padding:12px;max-height:200px;overflow-y:auto">'+preview+'</div>';
      document.getElementById('importCAConfirmBtn').style.display='inline-flex';
    }catch(err){document.getElementById('importCAPreview').innerHTML='<div class="alert alertR"><span>❌</span><div><h4>Error al leer el archivo</h4><p>'+err.message+'</p></div></div>'}
  };
  r.readAsBinaryString(file);
}
async function confirmImportCA(){
  if(!importCAData.length)return;
  let added=0,updated=0;
  importCAData.forEach(r=>{
    const platform=String(r['Plataforma']||r['plataforma']||'').trim();
    const email=String(r['Correo']||r['correo']||'').trim();
    if(!platform||!email)return;
    const password=String(r['Contraseña']||r['contrasena']||r['Clave']||'').trim();
    const totalProfiles=parseInt(r['Total Perfiles']||r['total perfiles']||0)||getPlatLimit(platform);
    const costPerMonth=String(r['Costo Mensual']||r['costo mensual']||'').trim();
    const renewalDate=parseImportDate(r['Fecha Renovación']||r['fecha renovacion']||r['Fecha Renovacion']||'');
    const startDate=parseImportDate(r['Inicio']||r['inicio']||'');
    const cuentaEstado=String(r['Estado']||r['estado']||'ok').toLowerCase()==='caida'?'caida':String(r['Estado']||r['estado']||'ok').toLowerCase()==='verif'?'verif':'ok';
    const notes=String(r['Notas']||r['notas']||'').trim();
    // Proveedor: si viene el nombre, buscarlo (o crearlo) y enlazar
    const provName=String(r['Proveedor']||r['proveedor']||'').trim();
    const provPhone=String(r['Tel Proveedor']||r['tel proveedor']||r['Teléfono Proveedor']||'').trim();
    let proveedorId='';
    if(provName){
      if(!S.proveedores)S.proveedores=[];
      let pr=S.proveedores.find(p=>(p.name||'').toLowerCase()===provName.toLowerCase());
      if(!pr){pr={id:gid(),name:provName,phone:provPhone,notes:''};S.proveedores.push(pr);}
      else if(provPhone&&!pr.phone){pr.phone=provPhone;}
      proveedorId=pr.id;
    }
    // Buscar duplicado (mismo correo + plataforma)
    const existing=S.cuentas.find(c=>c.platform===platform&&(c.email||'').toLowerCase()===email.toLowerCase());
    if(existing){
      Object.assign(existing,{password:password||existing.password,totalProfiles:totalProfiles||existing.totalProfiles,costPerMonth:costPerMonth||existing.costPerMonth,startDate:startDate||existing.startDate,renewalDate:renewalDate||existing.renewalDate,cuentaEstado:cuentaEstado||existing.cuentaEstado,proveedorId:proveedorId||existing.proveedorId,notes:notes||existing.notes});
      updated++;
    }else{
      S.cuentas.push({id:gid(),platform,plan:'',email,password,totalProfiles,costPerMonth,startDate,renewalDate,cuentaEstado,proveedorId,notes});
      added++;
    }
  });
  S.importCAMod=false;importCAData=[];
  // Vincular suscripciones de clientes ya importados a las nuevas cuentas (su sv() guarda TODO en 2.º plano)
  const vinc=await vincularSuscripcionesACuentas(true);
  render();
  let msg='✅ '+added+' cuentas importadas';
  if(updated)msg+=', '+updated+' actualizadas';
  if(vinc.vinculadas>0)msg+=' · 🔗 '+vinc.vinculadas+' clientes vinculados';
  toast(msg,'G');
}

async function restoreProv(id){

// Menú "Más opciones" en cada suscripción
function toggleSubMenu(sId,ev){
  if(ev)ev.stopPropagation();
  const menu=document.getElementById('subMenu_'+sId);
  if(!menu)return;
  const abierto=menu.style.display==='block';
  cerrarSubMenus();
  if(!abierto){menu.style.display='block';
    // Anular el transform :active de la tarjeta contenedora mientras el menú esté abierto
    // (un transform en el ancestro re-ancla el menú fixed y el toque cae fuera del botón).
    const host=menu.closest('.sc,.mCliCard,.caGRow,.tb2');
    if(host)host.classList.add('subMenuHostAbierto');
    // Posición FIJA respecto a la ventana: así el menú no lo recorta el scroll de .cont
    // y puede usar todo el alto de la pantalla (antes se cortaba dentro del contenedor).
    menu.style.position='fixed';menu.style.maxHeight='none';menu.style.overflowY='visible';
    // Por encima del FAB (+, z 90) y la barra inferior móvil (z 50), debajo de los modales (z 100):
    // si el menú se abre hacia abajo, esos elementos tapaban las últimas opciones y robaban el toque.
    menu.style.zIndex='95';
    const wrap=menu.parentElement;const wr=wrap.getBoundingClientRect();
    const vh=window.innerHeight,vw=window.innerWidth,margen=10;
    const necesita=menu.scrollHeight;
    const menuW=menu.offsetWidth||220;
    // Alinear el borde derecho del menú con el del botón ⋯, sin salirse de la pantalla
    let left=wr.right-menuW;
    if(left<margen)left=margen;
    if(left+menuW>vw-margen)left=vw-margen-menuW;
    const espacioAbajo=vh-wr.bottom-margen;
    const espacioArriba=wr.top-margen;
    if(espacioAbajo>=necesita||espacioAbajo>=espacioArriba){
      // Abrir hacia abajo
      menu.style.top=(wr.bottom+2)+'px';menu.style.bottom='auto';
      menu.style.maxHeight=Math.max(160,espacioAbajo)+'px';
    }else{
      // Abrir hacia arriba
      menu.style.top='auto';menu.style.bottom=(vh-wr.top+2)+'px';
      menu.style.maxHeight=Math.max(160,espacioArriba)+'px';
    }
    menu.style.left=left+'px';menu.style.right='auto';menu.style.marginTop='0';menu.style.marginBottom='0';
    menu.style.overflowY='auto';
    // Cerrar al hacer click fuera o al hacer scroll en la lista
    setTimeout(()=>{document.addEventListener('click',cerrarSubMenusUnaVez);const cont=document.querySelector('.cont');if(cont)cont.addEventListener('scroll',cerrarSubMenusUnaVez,{passive:true});},50);
  }
}
function cerrarSubMenus(){
  document.querySelectorAll('[id^="subMenu_"]').forEach(m=>m.style.display='none');
  document.querySelectorAll('.subMenuHostAbierto').forEach(e=>e.classList.remove('subMenuHostAbierto'));
}
function cerrarSubMenusUnaVez(){
  cerrarSubMenus();
  document.removeEventListener('click',cerrarSubMenusUnaVez);
  const cont=document.querySelector('.cont');if(cont)cont.removeEventListener('scroll',cerrarSubMenusUnaVez);
}

async function submitCMod(){
  const name=sanTxt(document.getElementById('cn').value);
  const phone=document.getElementById('cp2').value.trim();
  const notes=sanTxt(document.getElementById('cnt').value);
  if(!name&&!phone){toast('❌ Ingresa al menos el nombre o teléfono','R');return}
  // ── Evitar clientes DUPLICADOS: si el cliente ya existe, se ANEXA la nueva suscripción al existente ──
  let mergeTarget=null;
  if(S.cMode==='add'){
    const phoneClean=phone.replace(/\D/g,'');
    const nameN=norm(name).trim();
    // 1) Match FUERTE por teléfono (≥7 dígitos) → es la misma persona con seguridad
    if(phoneClean.length>=7){
      mergeTarget=S.clients.find(c=>{const cp=(c.phone||'').replace(/\D/g,'');return cp.length>=7&&cp===phoneClean;})||null;
    }
    // 2) Si no hubo match por teléfono, por NOMBRE normalizado (ignora tildes y mayúsculas: "Solórzano"=="solorzano")
    let soloPorNombre=false;
    if(!mergeTarget&&nameN){
      mergeTarget=S.clients.find(c=>norm(c.name||'').trim()===nameN)||null;
      soloPorNombre=!!mergeTarget;
    }
    // Teléfono igual → anexar directo (sin preguntar). Solo el nombre igual → confirmar (podría ser un homónimo).
    if(mergeTarget&&soloPorNombre){
      const n=(mergeTarget.subs||[]).length;
      if(!confirm(`⚠️ Ya existe un cliente llamado "${mergeTarget.name}" (${mergeTarget.phone||'sin teléfono'} · ${n} suscripción(es)).\n\n¿Es la misma persona?\n\n• Aceptar → se le AÑADE esta suscripción (sin duplicar el cliente).\n• Cancelar → se crea un cliente aparte.`)){
        mergeTarget=null;
      }
    }
  }
  let newClientId=null;let newSubId=null;
  if(S.cMode==='add'){
    let platform=document.getElementById('cpl').value;
    // Si eligió "crear nueva plataforma", tomar el nombre escrito
    if(platform==='__NUEVA__'){
      const np=document.getElementById('cNuevaPlat');
      platform=np?np.value.trim():'';
      if(!platform){toast('❌ Escribe el nombre de la nueva plataforma','R');return}
      // ── ANTES DE CREAR: buscar si ya existe una plataforma igual o muy parecida ──
      const platNorm=platform.toLowerCase().replace(/[^a-z0-9]/g,'');
      const existente=PLATS.find(p=>{
        const pn=p.toLowerCase().replace(/[^a-z0-9]/g,'');
        return pn===platNorm||pn.startsWith(platNorm)||platNorm.startsWith(pn);
      });
      if(existente&&existente!=='Otro'){
        // Usar la plataforma existente directamente — no crear duplicado
        platform=existente;
        toast('📌 Se usó "'+existente+'" (ya existía en tu catálogo)','B');
      } else if(!PLATS.includes(platform)){
        const nuevoLimite=parseInt(document.getElementById('cNuevaPlatLimite')?.value)||4;
        PLATS.splice(PLATS.length-1,0,platform); // insertar antes de "Otro"
        if(!PI[platform])PI[platform]='📺';
        if(!PLATCOLORS[platform])PLATCOLORS[platform]='#6868a0';
        PLAT_LIMITS[platform]=nuevoLimite;
        // Guardar plataformas personalizadas
        if(!S.customPlats)S.customPlats=[];
        if(!S.customPlats.includes(platform))S.customPlats.push(platform);
      }
    }
    const email=document.getElementById('cemail').value.trim();
    const pass=document.getElementById('cpass').value;
    const profile=document.getElementById('cprofile').value.trim();
    const pin=document.getElementById('cpin').value.trim();
    const start=document.getElementById('cstart').value;
    const end=document.getElementById('cend').value;
    const price=document.getElementById('cprice').value;
    const masterId=document.getElementById('cmaster')?document.getElementById('cmaster').value:'';
    const cuentaCompleta=document.getElementById('cfull')?document.getElementById('cfull').value==='true':false;
    // Nuevos campos de configuración de cuenta maestra nueva
    const maxDevInp=document.getElementById('cMaxDev');
    const maxDev=maxDevInp?parseInt(maxDevInp.value)||0:0;
    const costoProveedorInp=document.getElementById('cCostoProveedor');
    const costoProveedor=costoProveedorInp?parseFloat(costoProveedorInp.value)||0:0;
    const esCuentaCompletaNueva=document.getElementById('cNuevaCompleta')?document.getElementById('cNuevaCompleta').checked:false;
    const vencCuentaInp=document.getElementById('cVencCuenta');
    const vencCuenta=vencCuentaInp?vencCuentaInp.value:'';
    const iniCuentaInp=document.getElementById('cIniCuenta');
    const iniCuenta=iniCuentaInp?iniCuentaInp.value:'';
    const subs=[];
    newClientId=mergeTarget?mergeTarget.id:gid(); // si es duplicado, el pago/suscripción van al cliente existente
    // Si hay datos de suscripción (correo, contraseña, precio, perfil) PERO no hay plataforma → error
    const tieneAlgunDatoSub=email||pass||price||profile||pin||end;
    if(tieneAlgunDatoSub&&!platform){
      toast('❌ Selecciona la plataforma (Netflix, Disney+, etc) para la suscripción','R');
      return;
    }
    if(platform){
      newSubId=gid();
      let masterIdFinal=masterId;
      let autoCreatedMaster=false;
      // Auto-crear/vincular cuenta maestra automáticamente
      if(!masterIdFinal&&platform&&email){
        const tempSub={platform,accountEmail:email,password:pass,plan:'Estándar',endDate:end};
        const newMid=autoCrearCuentaMaestra(tempSub,name,{maxDev,esCompleta:esCuentaCompletaNueva,costoProveedor,renewalDate:vencCuenta,startDate:iniCuenta});
        if(newMid){masterIdFinal=newMid;autoCreatedMaster=true;}
      }
      // Proveedor elegido (existente o nuevo) → asignarlo a la cuenta maestra de esta suscripción
      let provIdSel=document.getElementById('cprov')?document.getElementById('cprov').value:'';
      if(provIdSel==='__NUEVA__'){
        const pn=(document.getElementById('cNuevoProv')?.value||'').trim();
        if(pn){
          if(!S.proveedores)S.proveedores=[];
          let pr=S.proveedores.find(p=>(p.name||'').toLowerCase()===pn.toLowerCase());
          if(!pr){pr={id:gid(),name:pn,phone:(document.getElementById('cNuevoProvTel')?.value||'').trim(),notes:''};S.proveedores.push(pr);}
          provIdSel=pr.id;
        }else provIdSel='';
      }
      if(provIdSel&&masterIdFinal){const mca=S.cuentas.find(x=>x.id===masterIdFinal);if(mca)mca.proveedorId=provIdSel;}
      // Si el usuario marcó "cuenta completa" en la nueva cuenta, la suscripción también lo refleja
      const subEsCompleta=cuentaCompleta||esCuentaCompletaNueva;
      subs.push({id:newSubId,platform,plan:'Estándar',accountEmail:email,password:pass,profile,profilePin:pin,masterAccountId:masterIdFinal,cuentaCompleta:subEsCompleta,startDate:start,endDate:end,price,paymentMethod:'Efectivo',pagado:true});
      // Registrar el pago automáticamente si hay precio
      if(price&&parseFloat(price)>0){
        S.pagos.push({id:gid(),clientId:newClientId,clientName:(mergeTarget?mergeTarget.name:name),platform,monto:parseFloat(price),fecha:nowDate(),notas:mergeTarget?'Suscripción añadida - pago inicial':'Cliente nuevo - pago inicial'});
      }
      if(autoCreatedMaster){
        setTimeout(()=>toast('📡 Cuenta maestra de '+platform+' auto-creada','B'),800);
      }
    }
    if(mergeTarget){
      // ── Cliente ya existía: anexar la nueva suscripción SIN duplicar ──
      mergeTarget.subs=(mergeTarget.subs||[]).concat(subs);
      if(!mergeTarget.phone&&phone)mergeTarget.phone=phone;                       // completar teléfono si faltaba
      if(mergeTarget.clientStatus&&mergeTarget.clientStatus!=='Activo')mergeTarget.clientStatus='Activo'; // reactivar si estaba suspendido/cancelado
      if(notes)mergeTarget.notes=(mergeTarget.notes?mergeTarget.notes+' · ':'')+notes;
    }else{
      S.clients.push({id:newClientId,name,phone,city:'',clientStatus:'Activo',notes,sendReminders:true,subs});
    }
  }else{
    const i=S.clients.findIndex(c=>c.id===S.cEditId);
    if(i>=0)S.clients[i]={...S.clients[i],name,phone,notes,clientStatus:document.getElementById('cstatus').value};
  }
  const wasAdd=S.cMode==='add';
  const fueAnexado=!!mergeTarget; // se añadió a un cliente existente (no se duplicó)
  // Cerrar el form y mostrar la bienvenida DE INMEDIATO; el guardado corre en 2.º plano
  // (un sv() lento en el celular dejaba el formulario "congelado" — mismo fix que confirmarRenovar/confirmarPago)
  S.cMod=false;
  // Si se creó/anexó una suscripción, mostrar modal con botón real (funciona en móvil)
  if(wasAdd&&newSubId){
    S.welcomeMod=true;
    S.welcomeCId=newClientId;
    S.welcomeSId=newSubId;
    S.welcomeMerged=fueAnexado;
  }
  render();
  // Mensaje honesto según el resultado real del guardado (no mentir con un "✅" si falló)
  sv().then(res=>{
    const accion=fueAnexado?'Suscripción añadida al cliente existente':'Cliente creado';
    if(res==='error'||res==='sin-sesion'){
      toast('⚠️ '+(wasAdd?accion:'Cambios')+' guardado en este dispositivo, pero NO se pudo subir a la nube. Revisa tu conexión/sesión — no cierres la app hasta que el indicador diga "Sincronizado".','R');
    }else if(res==='offline'){
      toast('📶 '+(wasAdd?accion:'Cliente actualizado')+' (sin conexión) — se subirá solo al recuperar internet.','B');
    }else{
      toast(wasAdd?(fueAnexado?`✅ Suscripción añadida a ${mergeTarget.name} (sin duplicar)`:'✅ Cliente creado y marcado como pagado'):'✅ Cliente actualizado','G');
    }
  });
}

// Copiar cualquier campo con su etiqueta
async function cpCampo(valor,etiqueta){
  if(!valor){toast('❌ Sin '+etiqueta,'R');return}
  try{await navigator.clipboard.writeText(valor);toast('📋 '+etiqueta+' copiado: '+valor,'G');}catch(e){toast('Error al copiar','R')}
}
function cerrarWelcome(){S.welcomeMod=false;S.welcomeCId=null;S.welcomeSId=null;S.welcomeComboSIds=null;S.welcomeMerged=false;render()}
function cpDatos(cId,sId){
  const c=S.clients.find(x=>x.id===cId);

  if(!c||!s)return;
  const esCombo=!!(S.welcomeComboSIds&&S.welcomeComboSIds.length>1);

}

// Sugiere el primer número de perfil libre (1..límite) en una cuenta
function sugerirPerfil(caId){
  const usados=new Set();
  S.clients.forEach(c=>(c.subs||[]).forEach(s=>{if(s.masterAccountId===caId){const n=parseInt(s.profile);if(!isNaN(n))usados.add(n);}}));
  const ca=S.cuentas.find(x=>x.id===caId);
  const limit=parseInt(ca?.totalProfiles)||getPlatLimit(ca?.platform)||8;
  for(let i=1;i<=limit;i++){if(!usados.has(i))return i;}
  return '';
}
// Auto-asignar la cuenta maestra con MÁS perfiles libres para la plataforma elegida
function autoAsignarCuenta(){
  if(S.sMode!=='add')return;
  const sel=document.getElementById('sma');const info=document.getElementById('cuentaInfo');
  if(!sel)return;
  const plat=document.getElementById('spl')?.value;
  if(!plat)return;
  if(sel.value==='__NUEVA__'){mostrarNuevaCuentaCfgSub(true,plat);return} // respeta "crear cuenta nueva"
  let prevEmail='';
  if(sel.value){
    const cur=S.cuentas.find(x=>x.id===sel.value);
    if(cur&&platGroup(cur.platform)===platGroup(plat)){updateCuentaInfo();return} // respeta elección válida
    prevEmail=cur?.email||'';sel.value=''; // la plataforma cambió: descartar la anterior
  }
  // Candidatas: misma plataforma (agrupada), no vendidas completas, con cupo. Más libres primero; desempata por menor costo.
  const cand=S.cuentas
    .filter(ca=>platGroup(ca.platform)===platGroup(plat)&&!ca.esCompleta&&!tieneCuentaCompleta(ca.id)&&profDisponibles(ca.id)>0)
    .sort((a,b)=>profDisponibles(b.id)-profDisponibles(a.id)||(parseFloat(a.costPerMonth)||0)-(parseFloat(b.costPerMonth)||0));
  if(!cand.length){
    if(info)info.innerHTML='<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 10px;color:var(--yellow)">⚠ No hay cuentas de '+plat+' con cupo libre. Se creará una cuenta maestra nueva con el correo que escribas abajo.</div>';
    mostrarNuevaCuentaCfgSub(true,plat); // ofrecer fechas/costo/proveedor de la cuenta nueva
    return;
  }
  mostrarNuevaCuentaCfgSub(false);
  const best=cand[0];sel.value=best.id;
  const sae=document.getElementById('sae'),spw=document.getElementById('spw'),spr=document.getElementById('spr');
  if(sae&&(!sae.value||sae.value===prevEmail))sae.value=best.email||'';
  if(spw&&!spw.value)spw.value=best.password||'';
  if(spr&&!spr.value){const p=sugerirPerfil(best.id);if(p)spr.value=p;}
  const av=profDisponibles(best.id);
  if(info)info.innerHTML='<div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:8px 10px;color:var(--green)">✅ Auto-asignada la cuenta con más cupo: <b>'+pi(best.platform)+' '+(best.email||'—')+'</b> ('+av+' libres). Puedes cambiarla arriba.</div>';
}

// Avisar renovación a un cliente — unifica todas sus cuentas en un solo mensaje
function avisarRenovacionCliente(id){
  const c=S.clients.find(x=>x.id===id);
  if(!c){toast('Cliente no encontrado','R');return}
  if(!c.phone){toast('❌ Este cliente no tiene teléfono registrado','R');return}
  const subs=c.subs||[];
  if(!subs.length){toast('Sin suscripciones','B');return}
  // Determinar qué cuentas están vencidas vs por vencer
  const vencidas=subs.filter(s=>gst(s.endDate)==='ven');
  const porVencer=subs.filter(s=>gst(s.endDate)==='exp'||gst(s.endDate)==='act');
  let relevantes,tipo;
  if(vencidas.length&&!porVencer.length){relevantes=vencidas;tipo='venc';}
  else{relevantes=subs;tipo='proximo';}
  if(relevantes.length===1){

function auditarDatos(){
  const cats=[];
  const add=(sev,titulo,detalle,items)=>{if(items.length)cats.push({sev,titulo,detalle,items});};
  const activos=S.clients.filter(c=>c.clientStatus!=='Cancelado');
  const sinFecha=[],finAntes=[],ctaRota=[],sinPrecio=[],sinPlat=[],credDesync=[],sinTel=[],sinCta=[],sinSubs=[];
  activos.forEach(c=>{
    if(!(c.subs||[]).length)sinSubs.push({label:c.name||'—',det:c.phone||'sin teléfono',cId:c.id});
    if(!c.phone)sinTel.push({label:c.name||'—',det:(c.subs||[]).map(s=>s.platform).filter(Boolean).join(', ')||'sin suscripciones',cId:c.id});
    (c.subs||[]).forEach(s=>{
      const it={label:c.name||'—',cId:c.id,sId:s.id};
      if(!s.endDate)sinFecha.push({...it,det:(s.platform||'¿plataforma?')+' · sin fecha de fin'});
      else if(s.startDate&&s.endDate<s.startDate)finAntes.push({...it,det:(s.platform||'—')+' · fin '+fd(s.endDate)+' ANTES del inicio '+fd(s.startDate)});
      if(precioMostrar(s)<=0)sinPrecio.push({...it,det:(s.platform||'—')+' · precio $0 (ni propio ni de catálogo)'});
      if(!s.platform)sinPlat.push({...it,det:'suscripción sin plataforma'});
      if(s.masterAccountId){
        const ca=S.cuentas.find(x=>x.id===s.masterAccountId);
        if(!ca){
          const enPap=(S.papeleraCuentas||[]).some(x=>x.id===s.masterAccountId);
          ctaRota.push({...it,det:(s.platform||'—')+' · '+(enPap?'su cuenta maestra está en la PAPELERA':'su cuenta maestra ya NO existe')});
        }else if((ca.email&&s.accountEmail&&norm(ca.email)!==norm(s.accountEmail))||(ca.password&&s.password&&ca.password!==s.password)){
          credDesync.push({...it,det:(s.platform||'—')+' · correo/clave distintos a los de la cuenta '+(ca.email||'')});
        }
      }else{
        sinCta.push({...it,det:(s.platform||'—')+' · sin cuenta maestra asignada'});
      }
    });
  });
  // Perfil repetido en la misma cuenta (solo clientes Activos, igual que profInUse; las "cuenta completa" no usan perfil)
  const perfilDup=[];const porCtaPerfil={};
  S.clients.filter(c=>c.clientStatus==='Activo'||!c.clientStatus).forEach(c=>(c.subs||[]).forEach(s=>{
    if(!s.masterAccountId||s.cuentaCompleta)return;
    const p=norm(String(s.profile||'')).trim();if(!p)return;
    const k=s.masterAccountId+'|'+p;
    (porCtaPerfil[k]=porCtaPerfil[k]||[]).push({c,s});
  }));
  Object.values(porCtaPerfil).forEach(arr=>{
    if(arr.length<2)return;
    const ca=S.cuentas.find(x=>x.id===arr[0].s.masterAccountId);
    arr.forEach(x=>perfilDup.push({label:x.c.name||'—',det:'perfil "'+(x.s.profile||'')+'" repetido en '+(ca?ca.email||ca.platform:'la cuenta'),cId:x.c.id,sId:x.s.id}));
  });
  // Cuentas sobrevendidas (más perfiles ocupados que el límite)
  const sobreV=[];
  S.cuentas.forEach(ca=>{
    const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
    const used=profInUse(ca.id);
    if(used>limit)sobreV.push({label:ca.email||ca.platform||'—',det:pi(ca.platform)+' '+(ca.platform||'')+' · '+used+' perfiles ocupados de '+limit,caId:ca.id});
  });
  const dups=detectarClientesDuplicados();
  add('R','⛔ Sin fecha de fin','No entran a recordatorios ni cuentan como deuda',sinFecha);
  add('R','⛔ Fecha de fin ANTES del inicio','Casi seguro un error de tipeo en la fecha',finAntes);
  add('R','⛔ Cuenta maestra rota','La suscripción apunta a una cuenta que ya no existe',ctaRota);
  add('R','⛔ Cuenta sobrevendida','Hay más perfiles ocupados que los que da la cuenta',sobreV);
  add('Y','⚠️ Sin precio','Se cobrarían $0 — ponles precio propio o de catálogo',sinPrecio);
  add('Y','⚠️ Sin plataforma','Suscripciones sin app definida',sinPlat);
  add('Y','⚠️ Perfil repetido en la misma cuenta','Dos clientes con el mismo perfil chocarían',perfilDup);
  add('Y','⚠️ Correo/clave desactualizados','La suscripción no coincide con su cuenta maestra',credDesync);
  if(dups.length)cats.push({sev:'Y',titulo:'⚠️ Posibles clientes duplicados',detalle:'La misma persona registrada 2+ veces',accion:'dup',items:dups.map(g=>({label:(g.principal.name||'—')+' + '+g.otros.length+' registro(s) más',det:g.tipo==='tel'?'mismo teléfono':'mismo nombre',cId:g.principal.id}))});
  add('I','ℹ️ Sin teléfono','No puedes avisarles por WhatsApp',sinTel);
  add('I','ℹ️ Sin cuenta maestra asignada','Visibles en el grupo "Sin cuenta maestra" de Clientes',sinCta);
  add('I','ℹ️ Sin ninguna suscripción','Visibles en la sección "👤 Sin suscripción" de Clientes',sinSubs);
  return cats;
}

function detectarClientesDuplicados(){
  const grupos=[];const usados=new Set();
  const clientes=S.clients||[];
  // Elige como principal el que tenga MÁS suscripciones (desempata: el que tenga teléfono, luego el primero)
  const elegirPrincipal=arr=>arr.slice().sort((a,b)=>((b.subs||[]).length-(a.subs||[]).length)||((b.phone?1:0)-(a.phone?1:0)))[0];
  // 1) Por teléfono
  const porTel={};
  clientes.forEach(c=>{const ph=_phoneKey(c);if(ph.length>=7){(porTel[ph]=porTel[ph]||[]).push(c);}});
  Object.values(porTel).forEach(arr=>{
    if(arr.length<2)return;
    const principal=elegirPrincipal(arr);
    grupos.push({tipo:'tel',principal,otros:arr.filter(c=>c!==principal)});
    arr.forEach(c=>usados.add(c.id));
  });
  // 2) Por nombre normalizado (solo clientes que no cayeron en un grupo por teléfono)
  const porNom={};
  clientes.forEach(c=>{if(usados.has(c.id))return;const n=norm(c.name||'').trim();if(n)(porNom[n]=porNom[n]||[]).push(c);});
  Object.values(porNom).forEach(arr=>{
    if(arr.length<2)return;
    // Si tienen 2+ teléfonos DISTINTOS entre sí, probablemente son personas diferentes → no unir
    const telsDistintos=new Set(arr.map(c=>_phoneKey(c)).filter(p=>p.length>=7));
    if(telsDistintos.size>1)return;
    const principal=elegirPrincipal(arr);
    grupos.push({tipo:'nombre',principal,otros:arr.filter(c=>c!==principal)});
    arr.forEach(c=>usados.add(c.id));
  });
  return grupos;
}

async function confirmarUnirDuplicados(){
  const sel=S.dupSel||new Set();
  const grupos=_dupGroups.filter((g,i)=>sel.has(i));
  if(!grupos.length){toast('Marca al menos un grupo','B');return;}
  let unidos=0,subsMovidas=0;
  grupos.forEach(g=>{
    const P=g.principal;P.subs=P.subs||[];
    g.otros.forEach(o=>{
      // Mover (clonando) las suscripciones al principal — clon para no compartir referencias con la copia en papelera
      (o.subs||[]).forEach(s=>{P.subs.push({...s});subsMovidas++;});
      if(!P.phone&&o.phone)P.phone=o.phone;
      if(o.notes)P.notes=(P.notes?P.notes+' · ':'')+o.notes;
      if(o.clientStatus==='Activo'||!o.clientStatus)P.clientStatus='Activo';
      // Reasignar los pagos del duplicado al cliente conservado (continuidad del historial)
      (S.pagos||[]).forEach(p=>{if(p.clientId===o.id){p.clientId=P.id;p.clientName=P.name;}});
      // Sacar el duplicado de clientes y guardarlo en papelera (con sus subs originales, recuperable)
      S.clients=S.clients.filter(c=>c.id!==o.id);
      if(!S.papelera)S.papelera=[];
      S.papelera.push({...o,deletedAt:Date.now(),_unidoA:P.id});
      unidos++;
    });
  });
  _dupGroups=[];S.dupSel=new Set();S.dupMod=false;render();
  sv();
  toast(`🔗 ${unidos} duplicado(s) unido(s) · ${subsMovidas} suscripción(es) movida(s)`,'G');
}

// AUTOMATIZACIÓN: suspende clientes 100% vencidos hace más de N días (solo si está activado). Devuelve cuántos.
function autoSuspenderVencidos(){
  if(!S.autoSuspend)return 0;
  const dias=parseInt(S.autoSuspendDays)||30;let n=0;
  S.clients.forEach(c=>{
    if((c.clientStatus||'Activo')!=='Activo')return;
    const subs=c.subs||[];if(!subs.length)return;
    if(!subs.every(s=>gst(s.endDate)==='ven'))return;       // todas vencidas
    const latest=subs.reduce((m,s)=>{const d=dl(s.endDate);return d===null?m:Math.max(m,d)},-Infinity);
    if(latest===-Infinity)return;
    if(latest< -dias){c.clientStatus='Suspendido';c.autoSuspendedAt=nowDate();n++;}  // la más reciente venció hace +dias
  });
  return n;
}

// La landing (puntoflix.com) lo lee sin login y actualiza sus precios sola. Escritura directa
// (no pasa por sv(): es OTRO documento, no el de datos del negocio). Reglas: read público, write con sesión.
async function publicarCatalogoWeb(){
  if(!esOwner()){toast('🔒 Solo la cuenta principal puede publicar en puntoflix.com','R');return}
  const plats=PLATS.filter(p=>p!=='Otro'&&parseFloat(getCatalogoPrecio(p))>0);

  if(!plats.length&&!combos.length){toast('❌ Primero pon precios en el catálogo (arriba) y guárdalo','R');return}
  const resumen=plats.map(p=>'• '+p+': $'+parseFloat(getCatalogoPrecio(p)).toFixed(2)).join('\n');

  try{

      precios:JSON.stringify(precios),
      combos:JSON.stringify(combos.map(cb=>({nombre:cb.nombre,apps:cb.apps,precio:parseFloat(cb.precio)}))),

function envEnviado(cId,sId,endDate){return !!(S.waEnviados&&S.waEnviados[cId+'_'+sId]===endDate);}

function _prunMarcadores(obj){if(!obj||typeof obj!=='object')return {};const valid={};S.clients.forEach(c=>(c.subs||[]).forEach(s=>{const k=c.id+'_'+s.id;if(obj[k]===s.endDate)valid[k]=s.endDate;}));return valid;}
function _fechaSub(cId,sId){const c=S.clients.find(x=>x.id===cId);const s=c&&(c.subs||[]).find(x=>x.id===sId);return s?s.endDate:nowDate();}
// full=true → re-render completo (necesario cuando se llama desde el modal, que vive fuera de .cont)
function marcarEnviado(cId,sId,full){
  if(!S.waEnviados||typeof S.waEnviados!=='object'||S.waEnviados instanceof Set)S.waEnviados={};
  S.waEnviados[cId+'_'+sId]=_fechaSub(cId,sId);

// Lista de envío AGRUPADA por MISMO teléfono (o cliente) + misma fecha de vencimiento → 1 solo mensaje con total,
// aunque sean 2 registros de la misma persona. 'todos' = vencidos + hoy (+ mañana si S.incluirManana).
// Cada grupo: {c(primer dueño), tipo, endDate, subs[], items[{c,s}]} — items lleva el dueño real de cada sub.
function getListaEnvio(dia){
  const rem=getReminders();
  const tag=(arr,t)=>arr.map(x=>({...x,tipo:t}));
  let flat;
  if(dia==='vencidos')flat=tag(rem.vencidos,'vencido');
  else if(dia==='tomorrow')flat=tag(rem.tomorrow,'manana');
  else if(dia==='today')flat=tag(rem.today,'hoy');
  else{flat=[...tag(rem.vencidos,'vencido'),...tag(rem.today,'hoy')];if(S.incluirManana!==false)flat=flat.concat(tag(rem.tomorrow,'manana'));}
  flat=flat.filter(x=>x.c.phone);
  const grupos=[];const idx={};
  flat.forEach(x=>{
    const ph=_phoneKey(x.c);
    const key=(ph?'ph:'+ph:'id:'+x.c.id)+'|'+(x.s.endDate||'');
    if(idx[key]===undefined){idx[key]=grupos.length;grupos.push({c:x.c,tipo:x.tipo,endDate:x.s.endDate,subs:[x.s],items:[{c:x.c,s:x.s}]});}
    else{grupos[idx[key]].subs.push(x.s);grupos[idx[key]].items.push({c:x.c,s:x.s});}
  });
  return grupos;
}

function getSeguimiento(){

    const subs=(c.subs||[]).filter(s=>{const n=dl(s.endDate);return n!==null&&n<=-dias});

function ymPrev(){const now=new Date();let y=now.getFullYear(),m=now.getMonth();m-=1;if(m<0){m=11;y--;}return y+'-'+String(m+1).padStart(2,'0');}
function ymAnterior(ym){const p=String(ym).split('-');let y=parseInt(p[0]),m=parseInt(p[1])-2;if(m<0){m=11;y--;}return y+'-'+String(m+1).padStart(2,'0');}
function nombreMes(ym){const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];const p=String(ym).split('-');return (meses[parseInt(p[1])-1]||'')+' '+p[0];}
function generarReporteMensual(ym){
  const pagosMes=S.pagos.filter(p=>p.fecha&&String(p.fecha).startsWith(ym));
  let ingresos=0,costos=0,cobros=0,nuevos=0;
  pagosMes.forEach(p=>{
    const m=parseFloat(p.monto)||0;
    if(p.esCosto||m<0){costos+=Math.abs(m);}else{ingresos+=m;cobros++;}
    if(/cliente nuevo|combo nuevo/i.test(p.notas||''))nuevos++;
  });
  return {ym,ingresos,costos,neto:ingresos-costos,cobros,nuevos,nPagos:pagosMes.length};
}
// ── Reporte mensual en PDF (descargable) ─────────────────────
let _jspdfPromise=null;
function loadJsPDF(){
  if(window.jspdf&&window.jspdf.jsPDF)return Promise.resolve();
  if(_jspdfPromise)return _jspdfPromise;
  _jspdfPromise=new Promise((resolve,reject)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    sc.onload=()=>resolve();
    sc.onerror=()=>{_jspdfPromise=null;reject(new Error('No se pudo cargar la librería de PDF. Revisa tu conexión e inténtalo de nuevo.'))};
    document.head.appendChild(sc);
  });
  return _jspdfPromise;
}
// Dibuja una tabla simple con encabezado oscuro, filas alternadas y salto de página automático. Devuelve la nueva y.
function _pdfTabla(doc,x,y,width,cols,rows,H,M){
  const rowH=20;
  const drawHead=()=>{
    doc.setFillColor(26,26,46);doc.rect(x,y,width,22,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
    let cx=x;cols.forEach(c=>{const cw=width*c[1];const al=c[2]||'left';doc.text(c[0],al==='right'?cx+cw-8:cx+8,y+15,{align:al});cx+=cw;});
    y+=22;
  };
  drawHead();
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  rows.forEach((row,i)=>{
    if(y+rowH>H-40){doc.addPage();y=M+10;drawHead();doc.setFont('helvetica','normal');doc.setFontSize(9);}
    if(i%2===0){doc.setFillColor(245,245,248);doc.rect(x,y,width,rowH,'F');}
    doc.setTextColor(40,40,50);
    let cx=x;cols.forEach((c,ci)=>{const cw=width*c[1];const al=c[2]||'left';let txt=String(row[ci]==null?'':row[ci]);const maxCh=Math.floor(cw/5);if(txt.length>maxCh)txt=txt.slice(0,maxCh-1)+'…';doc.text(txt,al==='right'?cx+cw-8:cx+8,y+14,{align:al});cx+=cw;});
    y+=rowH;
  });
  doc.setDrawColor(225,225,230);doc.line(x,y,x+width,y);
  return y;
}

async function processImportFile(file){
  try{await loadXLSX()}catch(err){document.getElementById('importPreview').innerHTML=`<div class="alert alertR"><span>❌</span><div><h4>Error al leer el archivo</h4><p>${err.message}</p></div></div>`;return}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){document.getElementById('importPreview').innerHTML='<div class="alert alertR"><span>❌</span><div><h4>Archivo vacío</h4></div></div>';return}
      importData=rows;
      const grouped={};
      rows.forEach(r=>{const n=(r['Nombre']||r['nombre']||'').toString().trim();if(!n)return;if(!grouped[n])grouped[n]=[];grouped[n].push(r)});
      const count=Object.keys(grouped).length;
      const preview=Object.entries(grouped).slice(0,5).map(([n,subs])=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)"><div class="cliAvatar" style="background:rgba(163,230,53,.1);color:var(--accTx);width:28px;height:28px;border-radius:8px;font-size:11px">${initials(n)}</div><div><b style="font-size:12px">${n}</b><span style="font-size:11px;color:var(--text2);margin-left:6px">${subs.length} suscripción(es)</span></div></div>`).join('');
      document.getElementById('importPreview').innerHTML=`
        <div class="alert alertG"><span>✅</span><div><h4>${count} clientes encontrados en el archivo</h4><p>${rows.length} filas procesadas${count>5?' · mostrando primeros 5':''}</p></div></div>
        <div style="background:var(--surf2);border-radius:10px;padding:12px">${preview}${count>5?`<div style="font-size:11px;color:var(--text2);padding-top:6px">... y ${count-5} más</div>`:''}</div>`;
      document.getElementById('importConfirmBtn').style.display='inline-flex';
    }catch(err){document.getElementById('importPreview').innerHTML=`<div class="alert alertR"><span>❌</span><div><h4>Error al leer el archivo</h4><p>${err.message}</p></div></div>`}
  };
  r.readAsBinaryString(file);
}

// ── VINCULAR SUSCRIPCIONES A CUENTAS MAESTRAS AUTOMÁTICAMENTE ──
async function vincularSuscripcionesACuentas(silent=false){
  let vinculadas=0,yaVinculadas=0,sinMatch=0;
  S.clients.forEach(c=>{
    (c.subs||[]).forEach(s=>{
      if(s.masterAccountId){const exists=S.cuentas.find(ca=>ca.id===s.masterAccountId);if(exists){yaVinculadas++;return}}
      if(!s.platform||!s.accountEmail){sinMatch++;return}
      const emailLower=s.accountEmail.toLowerCase().trim();
      const match=S.cuentas.find(ca=>ca.platform===s.platform&&(ca.email||'').toLowerCase().trim()===emailLower);
      if(match){s.masterAccountId=match.id;vinculadas++;}
      else sinMatch++;
    });
  });
  sv(); // guardado en 2.º plano — la vinculación ya quedó aplicada en memoria
  if(!silent){
    if(vinculadas>0)toast('🔗 '+vinculadas+' suscripción(es) vinculada(s) automáticamente','G');
    else if(yaVinculadas>0)toast('✅ Todas las suscripciones ya estaban vinculadas','B');
    else toast('⚠️ No se encontraron coincidencias para vincular','R');
  }
  return {vinculadas,yaVinculadas,sinMatch};
}

async function desvincularOcupante(cId,sId){

  const c=S.clients.find(x=>x.id===cId);if(!c)return;

async function recalcularPerfiles(){
  const idsValidos=new Set(S.cuentas.map(ca=>ca.id));
  let huerfanos=0,papeleraLimpiados=0;
  S.clients.forEach(c=>{(c.subs||[]).forEach(s=>{if(s.masterAccountId&&!idsValidos.has(s.masterAccountId)){s.masterAccountId='';huerfanos++;}});});
  (S.papelera||[]).forEach(c=>{(c.subs||[]).forEach(s=>{if(s.masterAccountId){s.masterAccountId='';papeleraLimpiados++;}});});
  let reporte='';let cuentasConProblema=0;
  S.cuentas.forEach(ca=>{
    const used=profInUse(ca.id);const limit=parseInt(ca.totalProfiles)||getPlatLimit(ca.platform);
    if(used>limit){cuentasConProblema++;reporte+='⚠️ '+pi(ca.platform)+' '+ca.platform+' ('+ca.email+'): '+used+'/'+limit+' SOBRECARGADA\n';}
  });
  render();sv();
  let msg='✅ RECÁLCULO COMPLETADO\n\n';
  if(huerfanos>0)msg+='🔗 '+huerfanos+' vínculo(s) roto(s) limpiado(s).\n';
  if(papeleraLimpiados>0)msg+='🗑️ '+papeleraLimpiados+' vínculo(s) liberado(s) de la papelera.\n';
  if(huerfanos===0&&papeleraLimpiados===0)msg+='No se encontraron vínculos rotos.\n';
  if(cuentasConProblema>0)msg+='\n'+reporte;
  msg+='\n💡 Los clientes cancelados/papelera no ocupan perfil.';
  alert(msg);
}

async function confirmImport(){
  if(!importData.length)return;
  // Agrupar filas del Excel por MISMO teléfono (≥7 díg) o nombre normalizado (sin tildes) → no duplicar dentro del archivo
  const grouped={};
  importData.forEach(r=>{
    const n=sanTxt(r['Nombre']||r['nombre']||'');
    if(!n)return;
    const ph=String(r['Teléfono']||r['Telefono']||r['telefono']||'').trim();
    const phd=ph.replace(/\D/g,'');
    const key=phd.length>=7?('ph:'+phd):('nm:'+norm(n));
    if(!grouped[key])grouped[key]={name:n,phone:ph,notes:sanTxt(r['Notas']||r['notas']||''),subs:[]};
    else if(!grouped[key].phone&&ph)grouped[key].phone=ph; // completar teléfono si una fila lo traía y otra no
    const plat=(r['Plataforma']||r['plataforma']||'').toString().trim();
    if(plat){grouped[key].subs.push({id:gid(),platform:plat,plan:'',accountEmail:String(r['Correo']||r['correo']||'').trim(),password:String(r['Contraseña']||r['contrasena']||r['Clave']||'').trim(),profile:String(r['Perfil']||r['perfil']||'').trim(),profilePin:String(r['PIN']||r['pin']||'').trim(),masterAccountId:'',startDate:parseImportDate(r['Inicio']||r['inicio']||''),endDate:parseImportDate(r['Vencimiento']||r['vencimiento']||''),price:String(r['Precio']||r['precio']||'').trim(),paymentMethod:'Efectivo',pagado:(r['Pagado']||r['pagado']||'').toString().toLowerCase()==='sí'||(r['Pagado']||r['pagado']||'').toString().toLowerCase()==='si'})}
  });
  let added=0,skipped=0;
  Object.values(grouped).forEach(nc=>{
    const ncPhd=(nc.phone||'').replace(/\D/g,'');const ncNm=norm(nc.name);
    // Cliente existente por teléfono (si ambos tienen, deben coincidir) o por nombre normalizado (evita homónimos con tel distinto)
    const exists=S.clients.find(c=>{
      const cph=(c.phone||'').replace(/\D/g,'');
      if(ncPhd.length>=7&&cph.length>=7)return cph===ncPhd; // ambos con tel → solo une si es el mismo número
      return !!ncNm&&norm(c.name||'')===ncNm;               // si a alguno le falta tel, compara por nombre
    });
    if(exists){nc.subs.forEach(s=>exists.subs.push(s));if(!exists.phone&&nc.phone)exists.phone=nc.phone;skipped++}
    else{S.clients.push({id:gid(),clientStatus:'Activo',sendReminders:true,...nc});added++}
  });
  S.importMod=false;importData=[];
  // Vincular automáticamente las suscripciones nuevas a sus cuentas maestras (su sv() guarda TODO en 2.º plano)
  const vinc=await vincularSuscripcionesACuentas(true);
  render();
  let msg='✅ '+added+' clientes importados';
  if(skipped)msg+=', '+skipped+' actualizados';
  if(vinc.vinculadas>0)msg+=' · 🔗 '+vinc.vinculadas+' vinculadas a cuentas';
  toast(msg,'G');
}

  ${S.focusSub&&(c.subs||[]).some(s=>s.id===S.focusSub)&&(c.subs||[]).length>1?`<button class="btn bs" style="width:100%;border-radius:10px;margin-top:4px;font-size:11px;color:var(--accTx)" onclick="verTodasLasSubs('${c.id}')">▾ Ver las otras ${(c.subs||[]).length-1} cuenta(s)</button>`:''}
  <button class="btn bp" style="width:100%;border-radius:10px;margin-top:4px;font-size:12px" onclick="openAddS('${c.id}')">➕ Agregar suscripción</button>

  <div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-weight:800;color:var(--text);font-size:15px">$${tot.toFixed(2)}/mes${cliDeuda(c)>0?' · <span style=\"color:var(--red)\">$'+cliDeuda(c).toFixed(2)+' pendiente</span>':''}</span>
    <div style="display:flex;gap:6px">
      <span class="iconActionBtn btnRen" onclick="renovarClienteRapido('${c.id}')" title="Renovar">🛒</span>
      ${c.phone?`<span class="iconActionBtn btnWA" onclick="avisarRenovacionCliente('${c.id}')" title="Avisar renovación">💬</span>`:''}
      <span class="iconActionBtn btnHist" onclick="verHistorial('${c.id}')" title="Historial de pagos">📋</span>
      <span class="iconActionBtn btnDel" onclick="delClient('${c.id}')" title="Eliminar">🗑️</span>

// ── PWA: Registrar Service Worker ────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
// ── PWA: Detectar instalación ────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  try{
    if(!window.matchMedia('(display-mode: standalone)').matches&&!localStorage.getItem('pwa_dismissed')){
      setTimeout(()=>mostrarPwaPrompt(),3000);
    }
  }catch(e){}
});
function mostrarPwaPrompt(){
  if(!deferredPrompt)return;
  if(document.getElementById('pwaBanner'))return;
  const b=document.createElement('div');
  b.id='pwaBanner';
  b.style.cssText='position:fixed;bottom:84px;left:16px;right:16px;background:linear-gradient(135deg,#84cc16,#0f5132);color:#fff;padding:14px 18px;border-radius:14px;box-shadow:0 8px 30px rgba(163,230,53,.4);z-index:9999;display:flex;align-items:center;gap:12px;animation:slideUp .3s';
  b.innerHTML='<div style="font-size:26px">📱</div><div style="flex:1"><div style="font-weight:800;font-size:14px">Instala '+_bizCache()+'</div><div style="font-size:11px;opacity:.9">Acceso rápido desde tu pantalla de inicio</div></div><button onclick="instalarPwa()" style="background:#fff;color:#84cc16;border:none;padding:8px 14px;border-radius:8px;font-weight:800;cursor:pointer;font-size:12px">Instalar</button><button onclick="cerrarPwaBanner()" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:18px;padding:4px">✕</button>';
  document.body.appendChild(b);
}
async function instalarPwa(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  cerrarPwaBanner();
}
function cerrarPwaBanner(){
  const b=document.getElementById('pwaBanner');
  if(b)b.remove();
  try{localStorage.setItem('pwa_dismissed','1');}catch(e){}
}


// ── AUTO-RESPALDO SILENCIOSO ─────────────────────────────────
async function checkAutoBackup(){
  if(!S.autoBackupEnabled)return;
  if(!S.clients||S.clients.length===0)return; // No respaldar si no hay datos
  const days=S.autoBackupDays||7;
  const lastB=S.lastBackup?new Date(S.lastBackup):null;
  const now=new Date();now.setHours(0,0,0,0);
  // Calcular si toca respaldo
  let needsBackup=false;
  if(!lastB){
    needsBackup=true;
  }else{
    const diff=Math.floor((now-lastB)/86400000);
    if(diff>=days)needsBackup=true;
  }
  if(!needsBackup)return;
  // Hacer respaldo silencioso
  try{
    await loadXLSX();
    const wb=XLSX.utils.book_new();
    const rows=[];
    S.clients.forEach(c=>{
      if(!c.subs||!c.subs.length){
        rows.push({Nombre:c.name,'Teléfono':c.phone,Estado:c.clientStatus||'Activo',Plataforma:'',Vencimiento:'',Precio:'',Pagado:'',Notas:c.notes});
      }else{
        c.subs.forEach(s=>rows.push({Nombre:c.name,'Teléfono':c.phone,Estado:c.clientStatus||'Activo',Plataforma:s.platform,Perfil:s.profile,PIN:s.profilePin,Correo:s.accountEmail,'Contraseña':s.password,Inicio:s.startDate,Vencimiento:s.endDate,Precio:s.price,Pagado:s.pagado?'Sí':'No',Notas:c.notes}));
      }
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Clientes');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.pagos.map(p=>({Fecha:p.fecha,Cliente:p.clientName,Plataforma:p.platform,Monto:p.monto,Notas:p.notas}))),'Pagos');
    // Cuentas maestras también
    if(S.cuentas&&S.cuentas.length){
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.cuentas.map(ca=>{const pr=(S.proveedores||[]).find(p=>p.id===ca.proveedorId);return{Plataforma:ca.platform,Correo:ca.email,'Contraseña':ca.password,'Total Perfiles':ca.totalProfiles,'Costo Mensual':ca.costPerMonth,Inicio:ca.startDate,'Fecha Renovación':ca.renewalDate,Estado:ca.cuentaEstado||'ok',Proveedor:pr?pr.name:'','Tel Proveedor':pr?pr.phone:'',Notas:ca.notes};})),'CuentasMaestras');
    }
    XLSX.writeFile(wb,`${bizFile()}_auto_${nowDate()}.xlsx`);
    S.lastBackup=nowDate();
    await sv();
    toast('💾 Auto-respaldo descargado','B');
  }catch(err){console.error('Auto-backup failed:',err)}
}

async function toggleAutoBackup(){
  S.autoBackupEnabled=!S.autoBackupEnabled;
  render();sv();
  toast(S.autoBackupEnabled?'✅ Auto-respaldo activado':'⏸️ Auto-respaldo desactivado','B');
}
async function saveAutoBackupDays(){
  const v=parseInt(document.getElementById('abDays').value)||7;
  S.autoBackupDays=Math.max(1,Math.min(60,v));
  render();sv();
  toast('💾 Frecuencia actualizada: cada '+S.autoBackupDays+' días','G');
}

async function init(){
  // Estado de conexión en vivo para el indicador de sincronización
  window.addEventListener('offline',()=>setSync('offline'));
  window.addEventListener('online',()=>setSync('ok'));
  // Aviso antes de cerrar/recargar si hay un guardado en curso o que falló (evita perder un cambio sin subir).
  window.addEventListener('beforeunload',e=>{
    if(_syncEstado==='guardando'||_syncEstado==='error'){
      e.preventDefault();e.returnValue='';return'';
    }
  });
  // Restaurar dark mode y sidebar state desde preferencias locales
  try{
    // Oscuro por defecto (estilo Bayzon); solo claro si el usuario lo eligió explícitamente
    if(localStorage.getItem('pf_dark')!=='0'){S.dark=true;document.body.classList.add('dark');}
  }catch(e){S.dark=true;document.body.classList.add('dark');}
  document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)"><div style="text-align:center"><div style="font-size:40px;font-weight:900;background:linear-gradient(135deg,#d9f99d,#a3e635);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;margin-bottom:12px">'+_bizCache()+'</div><div style="color:#7070a0;font-size:13px">Conectando...</div></div></div>';
  
  auth.onAuthStateChanged(async user=>{
    if(user){
      S.in=true;
      await ld();
      await _cargarMembresiaInicial(); // estado de membresía ANTES del primer render (bloquea si está suspendido)
      const bloqueado=_membBloqueado();
      const nSusp=bloqueado?0:autoSuspenderVencidos();
      render();
      if(!bloqueado){
        if(nSusp>0){sv();setTimeout(()=>toast('🛌 '+nSusp+' cliente(s) suspendido(s) automáticamente (vencidos +'+(S.autoSuspendDays||30)+' días)','B'),1600);}
        // Resumen del día (una vez al día)
        setTimeout(()=>mostrarResumenDia(),2800);
        // Reporte mensual automático (una vez al iniciar un nuevo mes)
        setTimeout(()=>checkReporteMensual(),3600);
        // Verificar si toca auto-respaldo (esperar 2 seg para no interrumpir)
        setTimeout(()=>checkAutoBackup(),2000);
        // Sincronización en tiempo real: escuchar cambios en Firestore
        iniciarSyncTiempoReal();
      }
      // Vigilar la membresía en vivo (suspender/reactivar surte efecto al instante; si estaba
      // bloqueado y lo reactivan, recarga la página para arrancar sync/automatizaciones limpias)
      iniciarMembresiaWatch();
    } else {
      // Si HABÍA sesión y se cerró (logout, contraseña cambiada, sesión revocada desde otro lado),
      // recargar igual que logout(): no dejar en memoria catálogo/plantillas/ajustes del usuario
      // anterior para el siguiente que entre en esta pestaña. En la carga inicial S.in es false → no recarga.
      if(S.in){location.reload();return;}
      S.in=false;
      S.clients=[];S.pagos=[];S.cuentas=[];
      render();
    }
  });
}
// ── SINCRONIZACIÓN EN TIEMPO REAL ────────────────────────────
let syncUnsub=null;
// Snapshot de otro dispositivo que llegó cuando NO se podía aplicar (modal abierto o guardado
// propio hace <3s). Antes se DESCARTABA y este dispositivo quedaba con datos viejos hasta el
// siguiente cambio remoto — causa de "renové en el celular y en la PC siguió vencido" (y peor:
// al guardar cualquier cosa, la fusión de conflicto re-subía lo viejo). Ahora se APARCA aquí
// y se aplica apenas se pueda (timer corto y al cerrar modales vía closeAll).
let _syncPendiente=null,_syncPendienteTimer=null;
function _syncEditando(){return !!(S.cMod||S.sMod||S.caMod||S.renMod||S.pagoMod||S.grpRenMod||S.dupMod||S.renCaMod||S.importMod||S.importCAMod||S.comboMod||S.provMod||S.bulkRenMod);}
function _progSyncPendiente(){
  if(_syncPendienteTimer)return;
  _syncPendienteTimer=setTimeout(()=>{_syncPendienteTimer=null;_aplicarSyncPendiente();},3500);
}
function _aplicarSyncPendiente(){
  if(!_syncPendiente)return;
  const d=_syncPendiente;
  // Nuestro propio guardado ya alcanzó o superó esa revisión → quedó vieja, descartar.
  if(typeof d.rev==='number'&&typeof S._rev==='number'&&d.rev<=S._rev){_syncPendiente=null;return;}
  if(_syncEditando()||Date.now()-ultimoGuardadoLocal<3000){_progSyncPendiente();return;}
  _syncPendiente=null;
  try{
    aplicarDatosFirestore(d);
    renderCont();
  }catch(e){console.error('Error sync (pendiente):',e);}
}
function iniciarSyncTiempoReal(){
  const uid=auth.currentUser?.uid;
  if(!uid)return;
  if(syncUnsub)syncUnsub(); // Cancelar listener anterior si existe
  syncUnsub=db.collection('usuarios').doc(uid).onSnapshot(doc=>{
    if(!doc.exists)return;
    // Ignorar cambios que vienen de nuestro propio guardado reciente (evita parpadeos)
    if(doc.metadata.hasPendingWrites)return;
    // No aplicar con un modal abierto (está editando) ni si acabamos de guardar nosotros
    // (<3 seg) — pero NO descartar: aparcar y aplicar en cuanto se pueda.
    if(_syncEditando()||Date.now()-ultimoGuardadoLocal<3000){
      _syncPendiente=doc.data();
      _progSyncPendiente();
      return;
    }
    _syncPendiente=null; // este snapshot es más nuevo que cualquiera aparcado
    try{
      aplicarDatosFirestore(doc.data());
      renderCont();
    }catch(e){console.error('Error sync:',e);}
  },err=>console.error('Sync error:',err));
}
init();
</script>
